<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Machines Simples / Simple Machines — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81; --blue-dark:#0a3559; --navy:#0f172a;
  --orange:#f97316; --orange-dark:#ea580c;
  --gold:#ffd23f; --sky:#7ec3ee; --sky-light:#eaf6ff;
  --slate:#475569; --success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(160deg,#dbeeff 0%,var(--sky-light) 100%);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif}
#topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.25)}
#topbar .logo-area{display:flex;align-items:center;gap:8px;flex:1}
#topbar .brand{color:#fff;font-family:'Fredoka','Nunito',system-ui,sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:.5px}
.lang-btn{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.35);border-radius:8px;padding:4px 11px;cursor:pointer;font-size:.85rem;font-weight:700;transition:.2s}
.lang-btn.active{background:#fff;color:var(--blue)}
.lang-btn:hover:not(.active){background:rgba(255,255,255,.28)}
#muteBtn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px 6px;border-radius:8px;transition:.2s}
#muteBtn:hover{background:rgba(255,255,255,.2)}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;min-height:calc(100vh - 56px)}
.screen.active{display:flex}
#titleScreen{gap:16px;text-align:center}
.mascot-wrap{margin-bottom:4px}
.game-title{font-size:2.2rem;color:var(--blue);line-height:1.1}
.game-subtitle{font-size:1.05rem;color:var(--slate);max-width:400px}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:16px;padding:16px 44px;font-size:1.3rem;font-family:'Fredoka','Nunito',system-ui,sans-serif;font-weight:700;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:.15s;margin-top:6px}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark)}
.btn-parents{background:none;border:2px solid var(--blue);color:var(--blue);border-radius:12px;padding:9px 22px;font-size:.9rem;cursor:pointer;font-weight:700;transition:.2s;margin-top:4px}
.btn-parents:hover{background:var(--blue);color:#fff}
#parentModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center}
#parentModal.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:28px;max-width:370px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.modal-box h2{color:var(--blue);margin-bottom:12px}
.modal-box p{margin-bottom:14px;color:var(--slate);font-size:.95rem}
#parentQ{font-size:1.15rem;font-weight:700;color:var(--navy);margin-bottom:10px}
#parentAns{font-size:1.1rem;padding:9px 14px;border:2px solid var(--sky);border-radius:10px;width:120px;text-align:center;outline:none}
#parentAns:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:10px;justify-content:center;margin-top:12px}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);transition:.15s}
.btn-blue:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark)}
.btn-cancel{background:#e2e8f0;color:var(--slate);border:none;border-radius:12px;padding:10px 18px;font-size:.95rem;cursor:pointer;font-weight:600}
#parentError{color:#e53e3e;font-size:.9rem;margin-top:6px;min-height:18px}
.parent-info{display:none;text-align:left;margin-top:10px;color:var(--slate);font-size:.9rem;line-height:1.6}
.parent-info h3{color:var(--blue);margin-bottom:8px}
#gameScreen{padding:12px 8px;gap:14px;justify-content:flex-start}
.level-header{display:flex;align-items:center;gap:10px;width:100%;max-width:680px;flex-wrap:wrap}
.level-badge{background:var(--blue);color:#fff;border-radius:12px;padding:5px 14px;font-weight:700;font-size:.9rem}
.challenge-title{font-size:1rem;color:var(--navy);font-weight:700;flex:1}
.stars-row{display:flex;gap:3px;font-size:1.3rem}
.scene-wrap{width:100%;max-width:680px;background:#fff;border-radius:20px;box-shadow:0 4px 18px rgba(15,76,129,.12);overflow:hidden;position:relative}
.scene-svg{width:100%;display:block}
.palette{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:680px;width:100%}
.machine-card{background:#fff;border:3px solid #d1e4f6;border-radius:16px;padding:12px 14px;cursor:pointer;text-align:center;min-width:120px;flex:1;max-width:160px;transition:.18s;user-select:none}
.machine-card:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 4px 14px rgba(249,115,22,.18)}
.machine-card.selected{border-color:var(--orange);background:#fff8f0;box-shadow:0 4px 14px rgba(249,115,22,.25)}
.machine-card.correct-flash{border-color:var(--success);background:#edfff5}
.machine-icon{font-size:2.4rem;display:block;margin-bottom:4px}
.machine-name{font-size:.85rem;font-weight:700;color:var(--blue)}
.btn-action{background:var(--orange);color:#fff;border:none;border-radius:14px;padding:13px 36px;font-size:1.1rem;font-family:'Fredoka','Nunito',system-ui,sans-serif;font-weight:700;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:.15s;min-width:200px;min-height:48px}
.btn-action:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:0 5px 0 var(--orange-dark)}
.btn-action:not(:disabled):active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark)}
.feedback-box{background:#fff;border-radius:16px;padding:14px 20px;max-width:620px;text-align:center;box-shadow:0 3px 14px rgba(0,0,0,.1);border-left:5px solid var(--success);display:none;width:100%}
.feedback-box.visible{display:block}
.feedback-box.error-fb{border-left-color:var(--orange)}
.feedback-title{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.feedback-text{font-size:.9rem;color:var(--slate);line-height:1.5}
#successScreen{gap:18px;text-align:center}
.success-stars{font-size:3rem;letter-spacing:4px}
.success-msg{font-size:1.6rem;color:var(--blue)}
.success-sub{font-size:1rem;color:var(--slate);max-width:380px}
.success-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.btn-secondary{background:var(--blue);color:#fff;border:none;border-radius:14px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);transition:.15s;min-height:48px}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark)}
.progress-bar-wrap{width:100%;max-width:680px;height:10px;background:#d1e4f6;border-radius:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--blue));border-radius:8px;transition:width .4s ease}
[aria-live]{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
@media(max-width:480px){.game-title{font-size:1.6rem}.machine-card{min-width:90px;padding:9px 10px}.machine-icon{font-size:1.9rem}.machine-name{font-size:.78rem}.btn-play{padding:14px 32px;font-size:1.15rem}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.float-anim{animation:float 2.4s ease-in-out infinite}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp .35s ease}
</style>
</head>

var audioCtx = null;
function getAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq,dur,type,vol){
  if(muted) return;
  type=type||"sine"; vol=vol||0.15;
  try{
    var ctx=getAudio();
    var o=ctx.createOscillator();
    var g=ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playSuccess(){ [523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,.22,"triangle",.13);},i*100);}); }
function playError(){ playTone(220,.28,"square",.09); }
function playClick(){ playTone(660,.07,"sine",.09); }
function playClink(){ playTone(880,.14,"triangle",.11); }

  showScreen("gameScreen");

function getLevels(){ return T[lang].levels; }

function renderLevel(){
  var levels=getLevels();
  if(currentLevel>=levels.length){ showSuccessEnd(); return; }
  var lv=levels[currentLevel];
  selectedMachine=null; actionDone=false; animRunning=false;
  document.getElementById("levelBadge").textContent=t("levelLabel")+" "+(currentLevel+1)+"/"+levels.length;
  document.getElementById("challengeTitle").textContent=lv.title;
  var save=getSave();
  var stars=save["stars_"+lv.id]||0;
  var sh=""; for(var i=0;i<3;i++) sh+="<span>"+(i<stars?"⭐":"☆")+"</span>";
  document.getElementById("starsRow").innerHTML=sh;
  var pct=Math.round((currentLevel/levels.length)*100);
  document.getElementById("progressFill").style.width=pct+"%";
  drawScene(lv);
  renderPalette(lv);
  var btn=document.getElementById("btnAction");
  btn.textContent=t("btnAction");
  btn.disabled=true;
  btn.onclick=doAction;
  hideFeedback();
  setAriaFeedback(lv.task);
}

function renderPalette(lv){
  var pal=document.getElementById("machinePalette");
  pal.innerHTML="";
  var machines;
  if(lv.machine==="combo"){
    machines=["levier","poulie","rampe","roue"];
  } else if(lv.machine==="poulie"||lv.machine==="rampe"||lv.machine==="roue"||lv.machine==="levier"){
    var all=["levier","poulie","rampe","roue"];
    var distractors=all.filter(function(m){return m!==lv.machine;});
    var d=shuffle(distractors).slice(0,2);
    machines=shuffle([lv.machine].concat(d));
  } else {
    machines=["levier","poulie","rampe","roue"];
  }
  var icons={levier:"⚖️",poulie:"🪝",rampe:"📐",roue:"⚙️"};
  machines.forEach(function(m){
    var card=document.createElement("div");
    card.className="machine-card";
    card.setAttribute("role","button");
    card.setAttribute("tabindex","0");
    card.setAttribute("aria-pressed","false");
    card.setAttribute("aria-label",t("machine_"+m));
    card.innerHTML='<span class="machine-icon">'+icons[m]+'</span><span class="machine-name">'+t("machine_"+m)+'</span>';
    card.onclick=function(){selectMachine(m,card,lv);};
    card.onkeydown=function(e){if(e.key===" "||e.key==="Enter")selectMachine(m,card,lv);};
    pal.appendChild(card);
  });
}

function selectMachine(m,cardEl,lv){
  if(actionDone) return;
  playClick();
  selectedMachine=m;
  document.querySelectorAll(".machine-card").forEach(function(c){c.classList.remove("selected");c.setAttribute("aria-pressed","false");});
  cardEl.classList.add("selected"); cardEl.setAttribute("aria-pressed","true");
  cardEl.classList.add("pop"); setTimeout(function(){cardEl.classList.remove("pop");},350);
  var btn=document.getElementById("btnAction");
  btn.disabled=false; btn.textContent=t("btnAction");
  hideFeedback();
}

function doAction(){
  if(animRunning||!selectedMachine) return;
  var levels=getLevels(); var lv=levels[currentLevel];
  var correct=isCorrect(lv,selectedMachine);
  if(correct){
    animRunning=true; actionDone=true; playSuccess();
    runAnimation(lv,function(){
      var save=getSave();
      var prev=save["stars_"+lv.id]||0;
      save["stars_"+lv.id]=Math.max(prev,3);
      save.level=Math.max(save.level||0,currentLevel+1);
      setSave(save);
      showFeedback(true,getSuccessTitle(),lv.explanation);
      setAriaFeedback(lv.explanation);
      updateStarsDisplay(3);
      var btn=document.getElementById("btnAction");
      btn.disabled=false;
      btn.textContent="→ "+t("btnNext");
      btn.onclick=nextLevel;
      animRunning=false;
    });
  } else {
    playError();
    showFeedback(false,t("tryAgain"),t("wrongMachine"));
    setAriaFeedback(t("wrongMachine"));
    highlightCorrect(lv);
  }
}

function isCorrect(lv,m){
  if(lv.machine==="combo") return m==="levier"||m==="rampe";
  return m===lv.machine;
}

function highlightCorrect(lv){
  var correct=lv.machine==="combo"?"levier":lv.machine;
  var label=t("machine_"+correct);
  document.querySelectorAll(".machine-card").forEach(function(c){
    if(c.querySelector(".machine-name")&&c.querySelector(".machine-name").textContent===label){
      c.classList.add("correct-flash");
      setTimeout(function(){c.classList.remove("correct-flash");},1200);
    }
  });
}

function getSuccessTitle(){
  var msgs=[t("bravo"),t("excellent"),t("parfait")];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

function drawArrow(svg,x1,y1,x2,y2,color,label){
  addLine(svg,x1,y1,x2,y2,color,2.5);
  var angle=Math.atan2(y2-y1,x2-x1); var ah=12;
  var ax1=x2-ah*Math.cos(angle-0.4); var ay1=y2-ah*Math.sin(angle-0.4);

  var arr=ns("polygon"); arr.setAttribute("points",x2+","+y2+" "+ax1+","+ay1+" "+ax2+","+ay2); arr.setAttribute("fill",color); svg.appendChild(arr);
  if(label) addText(svg,(x1+x2)/2,(y1+y2)/2-12,label,12,color);

    var lev=ns("rect"); lev.setAttribute("x","430"); lev.setAttribute("y","124"); lev.setAttribute("width","130"); lev.setAttribute("height","10"); lev.setAttribute("rx","4"); lev.setAttribute("fill","#7ec3ee"); lev.setAttribute("transform","rotate(-15 495 138)"); svg.appendChild(lev);
    addText(svg,340,210,"⚖️",30);
  } else {
    addText(svg,505,196,"📦",32);
    addText(svg,310,200,"⚖️",32);
    addText(svg,320,176,lang==="fr"?"+ levier":"+ lever",14,"#0f4c81");
  }
}

/* ANIMATION */
function runAnimation(lv,cb){
  if(lv.scene==="lever") animScene(function(svg){drawLeverScene(svg,lv.variant,true);},cb);
  else if(lv.scene==="pulley") animScene(function(svg){drawPulleyScene(svg,lv.variant,true);},cb);
  else if(lv.scene==="ramp") animScene(function(svg){drawRampScene(svg,lv.variant,true);},cb);
  else if(lv.scene==="wheel") animScene(function(svg){drawWheelScene(svg,lv.variant,true);},cb);
  else if(lv.scene==="choose") animScene(function(svg){drawChooseScene(svg,lv.variant,true);},cb);
  else if(lv.scene==="combo") animScene(function(svg){drawComboScene(svg,lv.variant,true);},cb);
  else cb();
}
function animScene(drawFn,cb){
  var svg=document.getElementById("sceneSVG"); svg.innerHTML="";
  drawFn(svg); drawTaskText(svg); playClink();
  setTimeout(cb,1000);
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=a[i]; a[i]=a[j]; a[j]=tmp; }
  return a;
}

document.addEventListener("keydown",function(e){ if(e.key==="Enter"&&document.activeElement&&document.activeElement.classList.contains("machine-card")) document.activeElement.click(); });

renderUI();
</script>
