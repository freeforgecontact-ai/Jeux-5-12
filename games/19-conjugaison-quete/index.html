<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conjugaison Quête / Verb Quest — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;
  --orange:#f97316;--orange-dark:#ea580c;--gold:#ffd23f;
  --sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(160deg,#dbeeff 0%,var(--sky-light) 50%,#e8f4ff 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--navy);}
.topbar{width:100%;max-width:700px;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue);border-radius:0 0 18px 18px;box-shadow:0 4px 16px rgba(15,76,129,.25);}
.topbar img{height:34px}
.topbar .brand{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;color:#fff;font-size:1.15rem;font-weight:700;flex:1}
.topbar button{background:rgba(255,255,255,.18);border:none;border-radius:9px;color:#fff;font-size:.85rem;font-weight:700;padding:6px 11px;cursor:pointer;min-width:48px;min-height:36px;transition:background .2s}
.topbar button.active{background:var(--orange);color:#fff}
.topbar button:hover{background:rgba(255,255,255,.32)}
.screen{display:none;flex-direction:column;align-items:center;padding:18px 12px 28px;width:100%;max-width:700px}
.screen.active{display:flex}
.mascot-wrap{margin:10px 0 4px}
h1{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2rem;color:var(--blue);text-align:center;margin:6px 0 2px;text-shadow:0 2px 0 rgba(15,76,129,.12)}
.subtitle{color:var(--slate);font-size:1.05rem;text-align:center;margin-bottom:14px}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:16px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.35rem;font-weight:700;padding:16px 40px;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;min-height:56px;margin-top:8px}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark)}
.btn-parents{background:none;border:2px solid var(--blue);color:var(--blue);border-radius:12px;font-size:.9rem;padding:8px 18px;cursor:pointer;margin-top:12px;min-height:44px;font-weight:700;transition:background .2s}
.btn-parents:hover{background:rgba(15,76,129,.08)}
.gate-box{background:#fff;border-radius:18px;padding:22px 24px;box-shadow:0 4px 24px rgba(15,76,129,.13);width:100%;max-width:400px;text-align:center;margin-top:16px}
.gate-box h2{color:var(--blue);font-size:1.2rem;margin-bottom:10px}
.gate-question{font-size:1.4rem;font-weight:700;color:var(--orange);margin:10px 0}
.gate-input{border:2px solid var(--sky);border-radius:10px;padding:10px 14px;font-size:1.2rem;text-align:center;width:100%;outline:none;margin:8px 0}
.gate-input:focus{border-color:var(--blue)}
.gate-err{color:#e53e3e;font-size:.9rem;min-height:20px}
.btn-gate{background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;padding:12px 24px;cursor:pointer;min-height:48px;margin-top:6px;box-shadow:0 4px 0 var(--blue-dark)}
.parent-info{background:var(--sky-light);border-radius:14px;padding:14px 18px;color:var(--slate);font-size:.92rem;line-height:1.6;margin-top:12px;text-align:left}
.parent-info h3{color:var(--blue);margin-bottom:6px}
.level-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.5rem;color:var(--blue);margin-bottom:4px;text-align:center}
.progress-bar-wrap{width:100%;max-width:420px;background:rgba(15,76,129,.12);border-radius:99px;height:12px;margin:8px 0 16px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sky),var(--blue));transition:width .4s}
.adventure-scene{width:100%;max-width:560px;border-radius:22px;overflow:hidden;box-shadow:0 6px 28px rgba(15,76,129,.18);margin-bottom:16px;position:relative;height:180px}
.scene-svg{width:100%;height:100%}
.q-card{background:#fff;border-radius:18px;padding:18px 20px 14px;box-shadow:0 4px 20px rgba(15,76,129,.13);width:100%;max-width:500px;text-align:center}
.q-verb{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2rem;color:var(--orange);font-weight:700}
.q-context{font-size:1.05rem;color:var(--slate);margin:4px 0 12px;line-height:1.5}
.q-context strong{color:var(--blue)}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:12px;width:100%}
.choice-btn{background:var(--sky-light);border:2.5px solid var(--sky);border-radius:14px;font-size:1.1rem;font-weight:700;padding:13px 18px;cursor:pointer;transition:background .15s,border-color .15s,transform .1s;min-height:52px;color:var(--navy);}
.choice-btn:hover:not(:disabled){background:#dbeeff;border-color:var(--blue);transform:translateY(-2px)}
.choice-btn.correct{background:#d1fae5;border-color:var(--success);color:#065f46}
.choice-btn.wrong{background:#fee2e2;border-color:#f87171;color:#991b1b}
.choice-btn:disabled{cursor:default}
.feedback{font-size:1.1rem;font-weight:700;min-height:30px;margin-top:10px;text-align:center;border-radius:10px;padding:6px 14px;}
.feedback.ok{color:#065f46;background:#d1fae5}
.feedback.ko{color:#991b1b;background:#fee2e2}
.success-card{background:#fff;border-radius:22px;padding:28px 22px;box-shadow:0 6px 28px rgba(15,76,129,.16);text-align:center;width:100%;max-width:460px}
.stars{font-size:2.4rem;margin:8px 0}
.success-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.8rem;color:var(--blue);margin-bottom:6px}
.success-sub{color:var(--slate);margin-bottom:18px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-action{background:var(--orange);color:#fff;border:none;border-radius:14px;font-size:1.05rem;font-weight:700;padding:13px 22px;cursor:pointer;box-shadow:0 4px 0 var(--orange-dark);min-height:52px;transition:transform .1s}
.btn-action:active{transform:translateY(2px)}
.btn-secondary{background:var(--blue);color:#fff;border:none;border-radius:14px;font-size:1.05rem;font-weight:700;padding:13px 22px;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);min-height:52px}
.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;width:100%;max-width:560px;margin-top:8px}
.level-card{background:#fff;border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;box-shadow:0 3px 14px rgba(15,76,129,.1);border:2.5px solid transparent;transition:border-color .2s,transform .15s}
.level-card:hover{border-color:var(--blue);transform:translateY(-3px)}
.level-card.done{border-color:var(--success)}
.lc-icon{font-size:2rem}
.lc-name{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:.95rem;color:var(--blue);margin-top:4px;font-weight:700}
.lc-stars{font-size:.9rem;min-height:20px}
#aria-live{position:absolute;left:-9999px}
</style>
</head>

const LS_KEY="pgrg_conjugaison_quete";
let lang=navigator.language.startsWith("fr")?"fr":"en";
let muted=false;
let currentLevelIdx=0,currentQIdx=0,score=0,answered=false;
let gateA=0,gateB=0,heroX=60,animFrame=null;

function getSaved(id){try{const d=JSON.parse(localStorage.getItem(LS_KEY)||"{}");return d[id]||{stars:0,best:0};}catch(e){return{stars:0,best:0};}}
function setSaved(id,obj){try{const d=JSON.parse(localStorage.getItem(LS_KEY)||"{}");d[id]=obj;localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){}}

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type,vol){
  type=type||"sine";vol=vol||0.18;
  if(muted)return;
  try{const ac=getAudio(),osc=ac.createOscillator(),gain=ac.createGain();osc.connect(gain);gain.connect(ac.destination);osc.type=type;osc.frequency.value=freq;gain.gain.setValueAtTime(vol,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);osc.start();osc.stop(ac.currentTime+dur);}catch(e){}
}
function playSuccess(){playTone(523,.12);setTimeout(function(){playTone(659,.12);},130);setTimeout(function(){playTone(784,.25);},260);}
function playWrong(){playTone(220,.15,"sawtooth",.12);setTimeout(function(){playTone(196,.2,"sawtooth",.1);},160);}
function playLevelComplete(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,.2);},i*120);});}
function toggleMute(){muted=!muted;document.getElementById("btn-mute").textContent=muted?"🔇":"🔊";}

function showScreen(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById(id).classList.add("active");var el=document.getElementById(id);announce(el.getAttribute("aria-label")||"");}
function announce(msg){var el=document.getElementById("aria-live");el.textContent="";setTimeout(function(){el.textContent=msg;},50);}
function setLang(l){lang=l;document.documentElement.lang=l;document.getElementById("btn-fr").classList.toggle("active",l==="fr");document.getElementById("btn-en").classList.toggle("active",l==="en");render();}
function render(){
  var t=T[lang];
  document.getElementById("t-title").textContent=t.title;
  document.getElementById("t-sub").textContent=t.sub;
  document.getElementById("t-play").textContent=t.play;
  document.getElementById("t-parents").textContent=t.parents;
  document.getElementById("pg-title").textContent=t.pg_title;
  document.getElementById("pg-q-label").textContent=t.pg_q_label;
  document.getElementById("pg-btn").textContent=t.pg_btn;
  document.getElementById("pg-back").textContent=t.pg_back;
  document.getElementById("ls-title").textContent=t.ls_title;
  document.getElementById("ls-back").textContent=t.ls_back;
  document.getElementById("g-quit").textContent=t.quit;
  if(document.getElementById("screen-levels").classList.contains("active"))renderLevelSelect();
}
function openParentGate(){
  gateA=Math.floor(Math.random()*9)+2;gateB=Math.floor(Math.random()*9)+2;
  document.getElementById("pg-question").textContent=gateA+" × "+gateB+" = ?";
  document.getElementById("pg-input").value="";
  document.getElementById("pg-err").textContent="";
  document.getElementById("pg-info").style.display="none";
  showScreen("screen-parent");
  setTimeout(function(){document.getElementById("pg-input").focus();},200);
}
function checkGate(){
  var val=parseInt(document.getElementById("pg-input").value,10),t=T[lang];
  if(val===gateA*gateB){document.getElementById("pg-err").textContent="";document.getElementById("pg-info").style.display="block";document.getElementById("pg-info").innerHTML=t.pg_info;playSuccess();}
  else{document.getElementById("pg-err").textContent=t.pg_err;playWrong();}
}
function goLevelSelect(){renderLevelSelect();showScreen("screen-levels");}
function renderLevelSelect(){
  var grid=document.getElementById("level-grid");grid.innerHTML="";
  ALL_LEVELS.forEach(function(lv,i){
    var saved=getSaved(lv.id),div=document.createElement("div");
    div.className="level-card"+(saved.stars>0?" done":"");
    div.setAttribute("role","button");div.setAttribute("tabindex","0");
    div.setAttribute("aria-label",lv.name[lang]+(saved.stars>0?" ✔":""));
    div.innerHTML='<div class="lc-icon">'+lv.icon+'</div><div class="lc-name">'+lv.name[lang]+'</div><div class="lc-stars">'+(saved.stars>0?"⭐".repeat(saved.stars):"")+'</div>';
    div.onclick=function(){startLevel(i);};
    div.onkeydown=function(e){if(e.key==="Enter"||e.key===" ")startLevel(i);};
    grid.appendChild(div);
  });
}
function startLevel(idx){
  currentLevelIdx=idx;currentQIdx=0;score=0;answered=false;heroX=60;
  var lv=ALL_LEVELS[idx];
  document.getElementById("g-level-name").textContent=lv.name[lang];
  showScreen("screen-game");
  updateScene();renderQuestion();
}
function getObstacleSVG(qIdx){
  var type=qIdx%3;
  if(type===0)return'<g><rect x="320" y="125" width="130" height="18" rx="4" fill="#92400e"/><line x1="320" y1="125" x2="320" y2="143" stroke="#78350f" stroke-width="4"/><line x1="450" y1="125" x2="450" y2="143" stroke="#78350f" stroke-width="4"/><rect x="310" y="115" width="150" height="12" rx="3" fill="#b45309"/><ellipse cx="385" cy="150" rx="65" ry="10" fill="#7dd3fc" opacity=".6"/><ellipse cx="385" cy="107" rx="14" ry="16" fill="#86efac"/><circle cx="385" cy="90" r="11" fill="#4ade80"/><circle cx="381" cy="88" r="2.5" fill="#0f172a"/><circle cx="389" cy="88" r="2.5" fill="#0f172a"/><path d="M381 95 Q385 99 389 95" stroke="#166534" stroke-width="1.5" fill="none"/><text x="369" y="76" font-size="12">🛡️</text></g>';
  if(type===1)return'<g><ellipse cx="390" cy="118" rx="28" ry="20" fill="#f97316"/><circle cx="390" cy="97" r="16" fill="#fb923c"/><circle cx="384" cy="94" r="3" fill="#0f172a"/><circle cx="396" cy="94" r="3" fill="#0f172a"/><path d="M384 102 Q390 107 396 102" stroke="#7c2d12" stroke-width="1.5" fill="none"/><polygon points="385,84 380,72 390,80" fill="#ef4444"/><polygon points="395,84 400,72 390,80" fill="#ef4444"/><path d="M364 105 Q340 85 360 95" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/><path d="M416 105 Q440 85 420 95" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/><text x="378" y="145" font-size="11">🔥</text></g>';
  return'<g><rect x="355" y="80" width="65" height="65" rx="6" fill="none" stroke="#a855f7" stroke-width="4"/><rect x="364" y="110" width="20" height="35" rx="4" fill="#7c3aed"/><rect x="391" y="110" width="20" height="35" rx="4" fill="#7c3aed"/><ellipse cx="387" cy="95" rx="25" ry="18" fill="#ddd6fe" stroke="#a855f7" stroke-width="3"/><text x="374" y="100" font-size="16">⭐</text><circle cx="363" cy="90" r="4" fill="#ffd23f"/><circle cx="412" cy="90" r="4" fill="#ffd23f"/></g>';
}
function updateScene(){
  var lv=ALL_LEVELS[currentLevelIdx];
  document.getElementById("obstacle-g").innerHTML=getObstacleSVG(currentQIdx);
  document.getElementById("score-display").textContent=T[lang].score_lbl+" "+score+"/"+lv.questions.length;
  document.getElementById("g-progress").style.width=((currentQIdx/lv.questions.length)*100)+"%";
}
function moveHero(toX,cb){
  cancelAnimationFrame(animFrame);
  var x=heroX;
  function step(){
    x+=(toX-x)*.15;if(Math.abs(toX-x)<1){x=toX;}
    document.getElementById("hero-g").setAttribute("transform","translate("+x+",105)");heroX=x;
    if(Math.abs(x-toX)>0.5){animFrame=requestAnimationFrame(step);}else if(cb)setTimeout(cb,100);
  }step();
}
function renderQuestion(){
  var lv=ALL_LEVELS[currentLevelIdx],q=lv.questions[currentQIdx];
  answered=false;updateScene();
  document.getElementById("q-verb").textContent=q.verb;
  document.getElementById("q-context").innerHTML="<strong>"+q.pronoun[lang]+"</strong> — "+q.tense[lang]+"<br><em>"+q.tmpl[lang].replace("___","________")+"</em>";
  var choices=[q.correct,q.wrong[0],q.wrong[1]];
  for(var i=choices.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=choices[i];choices[i]=choices[j];choices[j]=tmp;}
  var cont=document.getElementById("choices");cont.innerHTML="";
  choices.forEach(function(c){
    var btn=document.createElement("button");btn.className="choice-btn";btn.textContent=c;btn.setAttribute("aria-label",c);
    btn.onclick=function(){checkAnswer(c,q,lv);};
    cont.appendChild(btn);
  });
  document.getElementById("feedback").textContent="";document.getElementById("feedback").className="feedback";
}
function checkAnswer(chosen,q,lv){
  if(answered)return;answered=true;
  var t=T[lang],correct=(chosen===q.correct);
  document.querySelectorAll(".choice-btn").forEach(function(b){
    b.disabled=true;
    if(b.textContent===q.correct)b.classList.add("correct");
    if(b.textContent===chosen&&!correct)b.classList.add("wrong");
  });
  var fb=document.getElementById("feedback");
  if(correct){
    score++;
    var msg=t.correct[Math.floor(Math.random()*t.correct.length)];
    fb.textContent=msg;fb.className="feedback ok";announce(msg);playSuccess();
    var targetX=Math.min(heroX+55,350);
    moveHero(targetX,function(){setTimeout(function(){advanceQuestion(lv);},400);});
  }else{
    var msg2=t.wrong_pre+" "+q.correct;
    fb.textContent=msg2;fb.className="feedback ko";announce(msg2);playWrong();
    setTimeout(function(){advanceQuestion(lv);},1500);
  }
}
function advanceQuestion(lv){currentQIdx++;if(currentQIdx>=lv.questions.length)endLevel(lv);else renderQuestion();}
function endLevel(lv){
  cancelAnimationFrame(animFrame);
  var total=lv.questions.length,pct=score/total,stars=pct>=1?3:pct>=0.67?2:pct>=0.33?1:0,t=T[lang];
  var prev=getSaved(lv.id);
  if(stars>prev.stars||score>prev.best)setSaved(lv.id,{stars:Math.max(stars,prev.stars),best:Math.max(score,prev.best)});
  playLevelComplete();
  document.getElementById("s-stars").textContent=stars>0?"⭐".repeat(stars):"🌱";
  document.getElementById("s-title").textContent=stars>=3?t.s_perfect:t.s_bravo;
  document.getElementById("s-sub").textContent=score+" "+t.s_sub_pts+" "+total;
  document.getElementById("s-replay").textContent=t.s_replay;
  document.getElementById("s-levels").textContent=t.s_levels;
  var hasNext=currentLevelIdx<ALL_LEVELS.length-1,nextBtn=document.getElementById("s-next");
  nextBtn.textContent=t.s_next;nextBtn.style.display=hasNext?"inline-block":"none";
  showScreen("screen-success");
}
function replayLevel(){startLevel(currentLevelIdx);}
function nextLevel(){if(currentLevelIdx<ALL_LEVELS.length-1)startLevel(currentLevelIdx+1);else showScreen("screen-levels");}
function exitGame(){cancelAnimationFrame(animFrame);showScreen("screen-levels");}

(function(){
  document.getElementById("btn-fr").classList.toggle("active",lang==="fr");
  document.getElementById("btn-en").classList.toggle("active",lang==="en");
  document.documentElement.lang=lang;render();showScreen("screen-title");
})();
</script>
