<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le Petit Jardinier / Tiny Gardener – PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;
  --orange:#f97316;--orange-dark:#ea580c;--gold:#ffd23f;
  --sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(160deg,#d0eeff 0%,#eaf6ff 60%,#c8f0d0 100%);min-height:100vh;color:var(--navy);}
h1,h2,h3,.title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{display:flex;align-items:center;justify-content:space-between;background:var(--blue);padding:8px 14px;box-shadow:0 2px 8px #0003;}
#topbar-left{display:flex;align-items:center;gap:10px;}
#topbar-left img{height:34px;}
#topbar-brand{color:#fff;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:.5px;}
#topbar-right{display:flex;gap:8px;}
.lang-btn,.mute-btn{background:rgba(255,255,255,.18);color:#fff;border:2px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 13px;font-size:1rem;cursor:pointer;font-family:inherit;font-weight:700;min-width:48px;min-height:40px;}
.lang-btn.active{background:var(--orange);border-color:var(--orange-dark);}
.mute-btn{font-size:1.2rem;padding:5px 10px;}
.screen{display:none;padding:16px;max-width:700px;margin:0 auto;}
.screen.active{display:block;}
#title-screen{text-align:center;padding-top:20px;}
#title-screen h1{font-size:2.4rem;color:var(--blue);text-shadow:0 2px 0 #fff;}
#title-screen .subtitle{font-size:1.1rem;color:var(--slate);margin:8px 0 24px;}
.mascot-container{display:flex;justify-content:center;margin:16px 0;}
.btn-play{background:var(--orange);color:#fff;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.5rem;font-weight:700;border:none;border-radius:30px;padding:16px 48px;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;min-height:56px;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-secondary{background:var(--blue);color:#fff;font-family:inherit;font-size:1rem;font-weight:700;border:none;border-radius:20px;padding:10px 24px;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);margin-top:16px;min-height:48px;}
.btn-secondary:active{transform:translateY(2px);}
#plant-select{display:flex;justify-content:center;flex-wrap:wrap;gap:16px;margin:20px 0;}
.plant-card{background:#fff;border-radius:20px;padding:16px;cursor:pointer;box-shadow:0 4px 12px #0002;transition:transform .15s,box-shadow .15s;border:3px solid transparent;min-width:130px;text-align:center;}
.plant-card:hover,.plant-card:focus{transform:translateY(-4px);box-shadow:0 8px 20px #0003;outline:3px solid var(--orange);border-color:var(--orange);}
.plant-card.locked{opacity:.5;cursor:not-allowed;}
.plant-card svg{display:block;margin:0 auto 8px;}
.plant-card .plant-name{font-weight:700;font-size:1rem;color:var(--blue);}
.plant-card .plant-lvl{font-size:.8rem;color:var(--slate);}
#game-screen{padding-top:12px;}
.game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.game-header h2{font-size:1.3rem;color:var(--blue);}
.stage-bar{display:flex;gap:6px;align-items:center;}
.stage-dot{width:18px;height:18px;border-radius:50%;background:#cde;border:2px solid #aac;transition:background .3s;}
.stage-dot.done{background:var(--success);}
.stage-dot.current{background:var(--gold);border-color:#c8a200;}
#garden-area{background:linear-gradient(180deg,#87ceeb 0%,#87ceeb 55%,#5d9e3c 55%,#4a7c2e 100%);border-radius:24px;width:100%;aspect-ratio:4/3;max-height:340px;position:relative;overflow:hidden;box-shadow:0 4px 16px #0003;margin-bottom:14px;}
#plant-svg-container{position:absolute;left:50%;bottom:28%;transform:translateX(-50%);transition:bottom .4s;}
#soil{position:absolute;bottom:0;left:0;right:0;height:28%;background:linear-gradient(180deg,#7c5228 0%,#5a3b1a 100%);border-radius:0 0 24px 24px;}
.weed{position:absolute;bottom:28%;cursor:pointer;font-size:1.8rem;transition:transform .15s;user-select:none;}
.weed:hover{transform:scale(1.2);}
.water-drop{position:absolute;font-size:1.6rem;pointer-events:none;animation:dropFall .6s ease-in forwards;}
@keyframes dropFall{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(60px);}}
.happy-particle{position:absolute;font-size:1.4rem;pointer-events:none;animation:riseUp 1s ease-out forwards;}
@keyframes riseUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.4);}}
#tools-area{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.tool-btn{background:#fff;border:3px solid var(--sky);border-radius:18px;padding:10px 16px;cursor:pointer;font-size:1.5rem;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:72px;min-height:72px;justify-content:center;box-shadow:0 3px 8px #0002;transition:transform .12s,border-color .12s;-webkit-tap-highlight-color:transparent;}
.tool-btn:hover,.tool-btn:focus{border-color:var(--orange);transform:scale(1.08);outline:none;}
.tool-btn:active{transform:scale(.97);}
.tool-btn span.tool-label{font-size:.72rem;font-weight:700;color:var(--slate);white-space:nowrap;}
#status-msg{text-align:center;min-height:44px;font-size:1.05rem;font-weight:700;color:var(--blue);background:rgba(255,255,255,.75);border-radius:14px;padding:8px 16px;margin-bottom:10px;transition:color .3s;}
#status-msg.bad{color:#c0392b;}
#status-msg.good{color:var(--success);}
#water-meter-wrap{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:10px;}
#water-meter-wrap label{font-size:.85rem;font-weight:700;color:var(--blue);}
#water-meter{height:16px;flex:1;max-width:180px;border-radius:8px;background:#c8e6ff;border:2px solid #aac;overflow:hidden;}
#water-bar{height:100%;background:var(--sky);border-radius:8px;transition:width .4s;}
#water-level-text{font-size:.82rem;font-weight:700;color:var(--slate);}
#quiz-panel{background:#fff;border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 3px 12px #0002;display:none;}
#quiz-panel h3{font-size:1.1rem;color:var(--blue);margin-bottom:12px;text-align:center;}
#quiz-options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.quiz-opt{background:var(--sky-light);border:2.5px solid var(--sky);border-radius:16px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:1rem;min-height:48px;transition:background .15s,border-color .15s;}
.quiz-opt:hover,.quiz-opt:focus{background:#cde;border-color:var(--blue);outline:none;}
.quiz-opt.correct{background:#b6f5d0;border-color:var(--success);}
.quiz-opt.wrong{background:#ffd0cc;border-color:#e74c3c;}
#success-screen{text-align:center;padding-top:30px;}
#success-screen h2{font-size:2rem;color:var(--blue);}
.stars{font-size:2.5rem;margin:12px 0;}
.success-plant{display:flex;justify-content:center;margin:14px 0;}
.btn-row{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:20px;}
#parents-modal{display:none;position:fixed;inset:0;background:#0008;z-index:1000;justify-content:center;align-items:center;}
#parents-modal.open{display:flex;}
#parents-box{background:#fff;border-radius:24px;padding:28px;max-width:420px;width:92%;box-shadow:0 8px 40px #0005;text-align:center;}
#parents-box h2{color:var(--blue);font-size:1.4rem;margin-bottom:12px;}
#gate-q{font-size:1rem;color:var(--slate);margin-bottom:10px;}
#gate-input{border:2px solid var(--sky);border-radius:12px;padding:10px;font-size:1.3rem;text-align:center;width:100px;margin-bottom:12px;}
#gate-feedback{min-height:24px;font-weight:700;margin-bottom:8px;}
#gate-content{display:none;text-align:left;font-size:.95rem;color:var(--navy);line-height:1.6;}
#gate-content p{margin-bottom:8px;}
.modal-close{background:var(--orange);color:#fff;border:none;border-radius:16px;padding:9px 24px;font-size:1rem;font-weight:700;cursor:pointer;min-height:48px;box-shadow:0 4px 0 var(--orange-dark);}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
@media(max-width:500px){
  #title-screen h1{font-size:1.8rem;}
  .tool-btn{min-width:60px;min-height:60px;font-size:1.3rem;padding:7px 10px;}
  #garden-area{aspect-ratio:3/2;}
}
</style>
</head>

<!-- GAME SCREEN -->

function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol, delay){
  if(muted) return;
  try{
    var ac=getAudio(); var o=ac.createOscillator(); var g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,ac.currentTime+(delay||0));
    g.gain.linearRampToValueAtTime(vol||0.15,ac.currentTime+(delay||0)+0.02);
    g.gain.linearRampToValueAtTime(0,ac.currentTime+(delay||0)+(dur||0.2));
    o.start(ac.currentTime+(delay||0)); o.stop(ac.currentTime+(delay||0)+(dur||0.2)+0.01);
  }catch(e){}
}
function playSuccess(){ [523,659,784,1047].forEach(function(f,i){playTone(f,'sine',0.2,0.18,i*0.12);}); }
function playPositive(){ playTone(523,'sine',0.1,0.15); playTone(659,'sine',0.1,0.15,0.11); }
function playError(){ playTone(200,'sawtooth',0.15,0.12); }
function playGrow(){ [330,392,523].forEach(function(f,i){playTone(f,'sine',0.18,0.16,i*0.1);}); }

function renderPlantSelect(){
  var d=T[lang];
  var cont=document.getElementById('plant-select');
  cont.innerHTML='';
  [0,1,2].forEach(function(i){
    var locked=(saveData.unlocked<=i);
    var stars=saveData.stars[i]||0;
    var card=document.createElement('div');
    card.className='plant-card'+(locked?' locked':'');
    card.setAttribute('tabindex',locked?'-1':'0');
    card.setAttribute('role','button');
    card.setAttribute('aria-label',d.plantNames[i]+(locked?' '+d.locked:''));
    card.innerHTML=PLANTS[i].svgs[3]+
      '<div class="plant-name">'+d.plantNames[i]+'</div>'+
      '<div class="plant-lvl">'+d.plantLvl[i]+'</div>'+
      '<div style="font-size:1.1rem;margin-top:4px;">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div>'+
      (locked?'<div style="color:#e74c3c;font-weight:700;font-size:.85rem;">'+d.locked+'</div>':'');
    if(!locked){
      card.onclick=function(){ startGame(i); };
      card.onkeydown=function(e){ if(e.key==='Enter'||e.key===' ') startGame(i); };
    }

}

function startGame(plantIdx){
  currentPlant=plantIdx; currentStage=0; waterLevel=50;
  sunActions=0; weedActions=0; weedsOnField=0; stageProgress=0;
  quizShown=false; quizAnswered=false; quizDone=0; gameActive=true;
  clearWeedTimers();
  document.getElementById('game-plant-name').textContent=T[lang].plantNames[currentPlant];
  document.getElementById('tool-plant').style.display='';
  document.getElementById('quiz-panel').style.display='none';
  renderStageBar(); renderPlantSVG(); updateWaterBar();
  setStatus(T[lang].stagePrompt[0]);
  showScreen('game-screen');
}

function clearWeedTimers(){
  weedTimers.forEach(function(t){clearTimeout(t);});
  weedTimers=[];
  document.querySelectorAll('.weed').forEach(function(w){w.remove();});
  weedsOnField=0;
}

function renderStageBar(){
  var bar=document.getElementById('stage-bar'); bar.innerHTML='';
  T[lang].stages.forEach(function(s,i){
    var dot=document.createElement('div');
    dot.className='stage-dot'+(i<currentStage?' done':i===currentStage?' current':'');
    dot.title=s; dot.setAttribute('aria-label',s);
    bar.appendChild(dot);
  });
}

function renderPlantSVG(){
  var cont=document.getElementById('plant-svg-container');
  var s=Math.min(currentStage,4);
  cont.innerHTML=PLANTS[currentPlant].svgs[s];
  cont.style.opacity='0'; cont.style.transform='translateX(-50%) scale(.7)';
  requestAnimationFrame(function(){
    cont.style.transition='opacity .4s, transform .4s';
    cont.style.opacity='1'; cont.style.transform='translateX(-50%) scale(1)';
  });
}

function updateWaterBar(){
  var bar=document.getElementById('water-bar');
  var txt=document.getElementById('water-level-text');
  bar.style.width=waterLevel+'%';
  if(waterLevel<25){ bar.style.background='#e74c3c'; txt.textContent='🏜️ '+Math.round(waterLevel)+'%'; }
  else if(waterLevel>80){ bar.style.background='#3498db'; txt.textContent='🌊 '+Math.round(waterLevel)+'%'; }
  else { bar.style.background='var(--sky)'; txt.textContent=Math.round(waterLevel)+'%'; }
  document.getElementById('water-meter').setAttribute('aria-valuenow',Math.round(waterLevel));
}

function setStatus(msg,cls){
  var el=document.getElementById('status-msg');
  el.textContent=msg; el.className=cls||'';
  document.getElementById('aria-live').textContent=msg;
}

function useTool(tool){
  if(!gameActive) return;
  if(quizShown && !quizAnswered) return;
  var garden=document.getElementById('garden-area');

  if(tool==='plant'){
    if(currentStage===0){
      document.getElementById('tool-plant').style.display='none';
      stageProgress=35; playGrow(); spawnParticle('🌱',garden);
      setStatus(randArr(T[lang].msgWater),'good'); checkAdvance();
    } return;
  }
  if(tool==='water'){
    if(currentStage===0){ setStatus(T[lang].stagePrompt[0]); return; }
    if(waterLevel>85){
      waterLevel=Math.min(100,waterLevel+3);
      updateWaterBar(); playError();
      setStatus(T[lang].msgTooMuch,'bad');
      stageProgress=Math.max(0,stageProgress-8); return;
    }
    waterLevel=Math.min(100,waterLevel+22); updateWaterBar();
    playPositive(); setStatus(randArr(T[lang].msgWater),'good');
    spawnParticle('💧',garden); stageProgress+=20; checkAdvance(); return;
  }
  if(tool==='sun'){
    if(currentStage===0){ setStatus(T[lang].stagePrompt[0]); return; }
    if(waterLevel<15){ playError(); setStatus(T[lang].msgTooLittle,'bad'); return; }
    sunActions++; waterLevel=Math.max(0,waterLevel-9); updateWaterBar();
    playPositive(); setStatus(randArr(T[lang].msgSun),'good');
    spawnParticle('☀️',garden); stageProgress+=22; checkAdvance(); return;
  }
  if(tool==='weed'){
    if(currentStage===0){ setStatus(T[lang].stagePrompt[0]); return; }
    var weeds=document.querySelectorAll('.weed');
    if(weeds.length===0){ setStatus(T[lang].msgNoWeeds); return; }
    var w=weeds[0];
    w.style.animation='riseUp .4s ease-out forwards';
    setTimeout(function(){w.remove();},400);
    weedsOnField=Math.max(0,weedsOnField-1);
    playPositive(); setStatus(randArr(T[lang].msgWeed),'good');
    stageProgress+=18; checkAdvance(); return;
  }
}

function checkAdvance(){
  if(stageProgress>=100 && currentStage<4){
    currentStage++; stageProgress=0;
    waterLevel=Math.max(20,waterLevel-5); updateWaterBar();
    renderStageBar(); renderPlantSVG(); playGrow();
    var garden=document.getElementById('garden-area');
    if(currentStage<4){
      setStatus(T[lang].msgGrow[currentStage-1]||'','good');
      spawnParticle('🌟',garden);
      if(currentStage===2 && quizDone===0){ setTimeout(showQuiz,700); }
    }
    if(currentStage>=1) scheduleWeed();
    if(currentStage===4){
      stageProgress=50;
      setTimeout(function(){ setStatus(T[lang].msgDone[currentPlant],'good'); if(quizDone<2) setTimeout(showQuiz,800); else setTimeout(winGame,1000); },600);
    }
    setStatus(T[lang].stagePrompt[currentStage]||'');
  }
  if(currentStage===4 && stageProgress>=100){ winGame(); }
}

function scheduleWeed(){
  if(!gameActive) return;
  var delay=8000-currentPlant*1500+Math.random()*4000;
  var tid=setTimeout(function(){
    if(gameActive && currentStage>=1){ spawnWeed(); }
    scheduleWeed();
  },delay);
  weedTimers.push(tid);
}

function spawnWeed(){
  if(weedsOnField>=3) return;
  var garden=document.getElementById('garden-area');
  var weeds=['🌾','🍃','🌿'];
  var w=document.createElement('div');
  w.className='weed'; w.textContent=randArr(weeds);
  w.setAttribute('aria-label','mauvaise herbe');
  w.setAttribute('role','button'); w.setAttribute('tabindex','0');
  w.style.left=(12+Math.random()*76)+'%';
  w.onclick=function(){ useTool('weed'); };
  w.onkeydown=function(e){ if(e.key==='Enter'||e.key===' ') useTool('weed'); };
  garden.appendChild(w); weedsOnField++;
  if(weedsOnField>=3) stageProgress=Math.max(0,stageProgress-6);
}

function spawnParticle(emoji,container){
  var p=document.createElement('div');
  p.className='happy-particle'; p.textContent=emoji;
  p.style.left=(25+Math.random()*50)+'%'; p.style.bottom='38%';
  container.appendChild(p); setTimeout(function(){p.remove();},1100);
}

function showQuiz(){
  if(!gameActive||quizShown) return;
  quizShown=true; quizAnswered=false;
  var panel=document.getElementById('quiz-panel'); panel.style.display='block';
  document.getElementById('quiz-q').textContent=T[lang].quizQ;
  var optsEl=document.getElementById('quiz-options'); optsEl.innerHTML='';
  var opts=T[lang].quizOpts;
  var correct=opts.filter(function(o){return o.correct;});
  var wrong=opts.filter(function(o){return !o.correct;});
  var chosen=correct.sort(function(){return .5-Math.random();}).slice(0,2)
    .concat(wrong.sort(function(){return .5-Math.random();}).slice(0,2))
    .sort(function(){return .5-Math.random();});
  chosen.forEach(function(opt){
    var btn=document.createElement('button');
    btn.className='quiz-opt'; btn.textContent=opt.text;
    btn.onclick=function(){ answerQuiz(btn,opt.correct); };
    optsEl.appendChild(btn);
  });
}

function answerQuiz(btn,correct){
  if(quizAnswered) return;
  if(correct){
    btn.classList.add('correct'); playSuccess();
    setStatus(T[lang].quizCorrect,'good');
    quizAnswered=true; quizDone++;
    stageProgress+=30;
    setTimeout(function(){
      document.getElementById('quiz-panel').style.display='none';
      quizShown=false;
      checkAdvance();
      if(currentStage===4 && stageProgress>=100) winGame();
    },1300);
  } else {
    btn.classList.add('wrong'); playError();
    setStatus(T[lang].quizWrong,'bad');
    setTimeout(function(){ btn.classList.remove('wrong'); setStatus(T[lang].quizQ); },950);
  }
}

function winGame(){
  if(!gameActive) return;
  gameActive=false; clearWeedTimers();
  document.getElementById('quiz-panel').style.display='none';
  var stars=3;
  if(weedsOnField>1) stars--;
  if(waterLevel<12||waterLevel>92) stars--;
  stars=Math.max(1,stars);
  if(stars>(saveData.stars[currentPlant]||0)) saveData.stars[currentPlant]=stars;
  if(currentPlant+1>=saveData.unlocked) saveData.unlocked=Math.min(3,currentPlant+2);
  try { localStorage.setItem(LSKEY,JSON.stringify(saveData)); } catch(e){}
  playSuccess();
  document.getElementById('success-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('t-success-title').textContent=T[lang].successTitle;
  document.getElementById('t-success-msg').textContent=T[lang].successMsg[currentPlant];
  document.getElementById('success-plant-svg').innerHTML=PLANTS[currentPlant].svgs[4];
  var nb=document.getElementById('t-next');
  nb.style.display=(currentPlant>=2)?'none':'';
  showScreen('success-screen');
}
function replayLevel(){ startGame(currentPlant); }
function nextLevel(){ if(currentPlant<2) startGame(currentPlant+1); else showPlantSelect(); }
function toggleMute(){
  muted=!muted;
  document.getElementById('btn-mute').textContent=muted?'🔇':'🔊';
  document.getElementById('btn-mute').setAttribute('aria-label',muted?'Son désactivé':'Muet');
}
function openParents(){
  var a=2+Math.floor(Math.random()*7); var b=2+Math.floor(Math.random()*7);
  gateAnswer=a*b;
  document.getElementById('gate-q').textContent=T[lang].gateQ+' '+a+' × '+b+' ?';
  document.getElementById('gate-input').value='';
  document.getElementById('gate-feedback').textContent='';
  document.getElementById('gate-content').style.display='none';
  document.getElementById('parents-modal').classList.add('open');
}
function closeParents(){ document.getElementById('parents-modal').classList.remove('open'); }
function checkGate(){
  var val=parseInt(document.getElementById('gate-input').value);
  var fb=document.getElementById('gate-feedback');
  if(val===gateAnswer){
    fb.textContent=T[lang].gateOk; fb.style.color='var(--success)';
    document.getElementById('gate-content').style.display='block';
  } else if(!isNaN(val)&&document.getElementById('gate-input').value.length>0){
    fb.textContent=T[lang].gateBad; fb.style.color='#e74c3c';
    document.getElementById('gate-content').style.display='none';
  }
}
renderTexts();
setStatus('');
</script>
</body>
</html>
