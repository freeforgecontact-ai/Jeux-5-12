<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f4c81">
<title>Multiplication Galaxie / Times Table Galaxy — PGRG IA</title>
<style>
:root {
  --blue:#0f4c81;
  --blue-dark:#0a3559;
  --navy:#0f172a;
  --orange:#f97316;
  --orange-dark:#ea580c;
  --gold:#ffd23f;
  --sky:#7ec3ee;
  --sky-light:#eaf6ff;
  --slate:#475569;
  --success:#34c77b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',system-ui,sans-serif;background:var(--navy);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hidden{display:none!important;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;
  background:rgba(10,53,89,0.92);
  backdrop-filter:blur(4px);
  height:50px;
}
#top-bar .brand{display:flex;align-items:center;gap:8px;color:#fff;font-family:'Fredoka','Baloo 2','Nunito',system-ui;font-size:1.1rem;font-weight:700;}
#top-bar .brand img{height:34px;}
.top-controls{display:flex;gap:6px;}
.btn-lang,.btn-sound{
  min-width:48px;min-height:44px;border:none;border-radius:10px;cursor:pointer;
  font-size:.85rem;font-weight:700;padding:0 10px;
  transition:transform .1s,filter .1s;
}
.btn-lang{background:var(--sky-light);color:var(--blue);}
.btn-lang.active{background:var(--orange);color:#fff;}
.btn-lang:hover{filter:brightness(1.1);}
.btn-sound{background:var(--blue);color:#fff;font-size:1.2rem;padding:0 8px;}
.btn-sound:hover{filter:brightness(1.3);}
.screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 16px 16px;
  overflow-y:auto;
}
#screen-title{
  background:radial-gradient(ellipse at 50% 30%, #1a3a6e 0%, var(--navy) 70%);
}
.stars-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:.2;}to{opacity:1;}}
.title-card{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  max-width:480px;width:100%;
}
.mascot{width:110px;height:110px;filter:drop-shadow(0 4px 12px rgba(249,115,22,.5));}
.game-title{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui;
  font-size:clamp(1.8rem,5vw,3rem);
  font-weight:800;color:#fff;text-align:center;
  text-shadow:0 3px 0 var(--blue-dark),0 0 30px rgba(255,210,63,.4);
  line-height:1.15;
  white-space:pre-line;
}
.game-subtitle{color:var(--sky);font-size:clamp(.95rem,2.5vw,1.2rem);text-align:center;}
.btn-play{
  margin-top:8px;padding:16px 48px;
  border:none;border-radius:20px;cursor:pointer;
  background:var(--orange);color:#fff;
  font-family:'Fredoka','Nunito',system-ui;font-size:1.5rem;font-weight:800;
  box-shadow:0 5px 0 var(--orange-dark);
  transition:transform .1s,box-shadow .1s;
  min-width:200px;min-height:60px;
}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-play:hover{filter:brightness(1.08);}
.link-parents{
  background:none;border:none;cursor:pointer;
  color:var(--sky);font-size:.9rem;text-decoration:underline;
  padding:4px 8px;min-height:44px;
}
.link-parents:hover{color:#fff;}
#screen-tables{
  background:radial-gradient(ellipse at 50% 20%, #1a3a6e 0%, var(--navy) 70%);
}
.tables-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;max-width:380px;width:100%;margin-top:16px;
}
@media(min-width:480px){.tables-grid{grid-template-columns:repeat(5,1fr);max-width:460px;}}
.btn-table{
  aspect-ratio:1;border:none;border-radius:16px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Fredoka','Nunito',system-ui;font-size:1.3rem;font-weight:800;
  transition:transform .12s,box-shadow .12s;
  box-shadow:0 4px 0 rgba(0,0,0,.3);
  min-height:72px;position:relative;
}
.btn-table:active{transform:translateY(3px);}
.btn-table.locked{background:#1e3a5f;color:#4a6fa5;cursor:default;}
.btn-table.locked:active{transform:none;}
.btn-table.unlocked{background:var(--blue);color:#fff;}
.btn-table.unlocked:hover{filter:brightness(1.2);}
.btn-table.mastered{background:var(--gold);color:var(--navy);}
.btn-table.mastered:hover{filter:brightness(1.1);}
.table-stars{font-size:.75rem;letter-spacing:1px;}
.btn-back{
  margin-top:16px;padding:12px 32px;
  border:none;border-radius:14px;cursor:pointer;
  background:var(--blue);color:#fff;
  font-size:1rem;font-weight:700;
  box-shadow:0 4px 0 var(--blue-dark);
  min-height:48px;
}
#screen-game{
  background:transparent;padding:0;justify-content:flex-start;
}
#game-canvas-wrap{
  position:absolute;inset:0;top:50px;
}
canvas#game-canvas{
  display:block;width:100%;height:100%;
}
#game-ui{
  position:absolute;top:54px;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;pointer-events:none;z-index:10;
}
#score-display{
  background:rgba(10,53,89,.85);color:var(--gold);
  font-family:'Fredoka','Nunito',system-ui;font-size:1.2rem;font-weight:800;
  padding:6px 14px;border-radius:12px;
}
#progress-display{
  background:rgba(10,53,89,.85);color:#fff;
  font-size:.9rem;font-weight:700;
  padding:6px 14px;border-radius:12px;
  display:flex;align-items:center;gap:4px;
}
#question-panel{
  position:absolute;left:50%;transform:translateX(-50%);
  top:112px;z-index:10;pointer-events:none;
  text-align:center;width:90%;
}
#question-text{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui;
  font-size:clamp(2.2rem,6vw,4rem);
  font-weight:900;color:#fff;
  text-shadow:0 3px 0 var(--blue-dark),0 0 20px var(--gold);
  white-space:nowrap;
}
#feedback-text{
  font-family:'Fredoka','Nunito',system-ui;
  font-size:clamp(1rem,3vw,1.4rem);font-weight:700;
  min-height:34px;margin-top:4px;
}
#feedback-text.good{color:var(--success);}
#feedback-text.bad{color:#ff8a65;}
#btn-exit-game{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:20;padding:10px 28px;
  border:none;border-radius:12px;cursor:pointer;
  background:rgba(10,53,89,.9);color:var(--sky);
  font-size:.9rem;font-weight:700;min-height:48px;
  border:1px solid var(--blue);
}
#btn-exit-game:hover{background:var(--blue);}
#aria-live{position:fixed;top:-100px;opacity:0;pointer-events:none;}
#screen-win{
  background:radial-gradient(ellipse at 50% 30%, #1a3a6e 0%, var(--navy) 70%);
}
.win-card{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  max-width:460px;width:100%;
}
.win-title{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui;
  font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;
  color:var(--gold);text-align:center;
  text-shadow:0 3px 0 var(--orange-dark);
}
.win-stars{font-size:3rem;letter-spacing:8px;line-height:1.2;}
.win-score{color:#fff;font-size:1.2rem;font-weight:700;}
.win-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:8px;}
.btn-win{
  padding:14px 28px;border:none;border-radius:16px;cursor:pointer;
  font-family:'Fredoka','Nunito',system-ui;font-size:1.1rem;font-weight:800;
  transition:transform .1s,box-shadow .1s;
  min-height:56px;min-width:140px;
}
.btn-win:active{transform:translateY(3px);}
.btn-win.orange{background:var(--orange);color:#fff;box-shadow:0 5px 0 var(--orange-dark);}
.btn-win.orange:active{box-shadow:0 2px 0 var(--orange-dark);}
.btn-win.blue{background:var(--blue);color:#fff;box-shadow:0 5px 0 var(--blue-dark);}
.btn-win.blue:active{box-shadow:0 2px 0 var(--blue-dark);}
.btn-win:hover{filter:brightness(1.1);}
#modal-parents{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.modal-box{
  background:#fff;border-radius:20px;max-width:420px;width:100%;
  padding:28px 24px;display:flex;flex-direction:column;gap:14px;
  max-height:90vh;overflow-y:auto;
}
.modal-box h2{font-family:'Fredoka','Nunito',system-ui;color:var(--blue);font-size:1.5rem;}
.modal-box p{color:var(--slate);font-size:.95rem;line-height:1.5;}
.modal-gate{display:flex;flex-direction:column;gap:10px;}
.modal-gate label{color:var(--navy);font-weight:700;font-size:1rem;}
.modal-gate .gate-q{color:var(--orange);font-weight:800;font-size:1.2rem;}
.gate-input{
  border:2px solid var(--blue);border-radius:10px;
  font-size:1.2rem;padding:8px 14px;width:100%;outline:none;
  font-family:'Nunito',system-ui;
}
.gate-input:focus{border-color:var(--orange);}
.gate-error{color:#e53e3e;font-size:.9rem;min-height:20px;}
.btn-gate{
  padding:12px;border:none;border-radius:12px;cursor:pointer;
  background:var(--orange);color:#fff;font-size:1rem;font-weight:700;
  box-shadow:0 4px 0 var(--orange-dark);min-height:48px;
}
.btn-gate:active{transform:translateY(2px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-close-modal{
  padding:10px;border:none;border-radius:10px;cursor:pointer;
  background:var(--sky-light);color:var(--blue);font-size:.95rem;font-weight:700;
  min-height:44px;
}
.parents-content{display:none;flex-direction:column;gap:10px;}
.parents-content.visible{display:flex;}
.parents-content ul{padding-left:18px;color:var(--slate);font-size:.9rem;line-height:1.7;}
.parents-content strong{color:var(--navy);}
.section-title{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui;
  font-size:clamp(1.4rem,4vw,2rem);font-weight:800;
  color:#fff;text-align:center;
  text-shadow:0 2px 0 var(--blue-dark);
}
.section-sub{color:var(--sky);font-size:.95rem;text-align:center;margin-top:-6px;}
@media(max-width:380px){
  .tables-grid{grid-template-columns:repeat(3,1fr);}
  #question-text{font-size:2rem;}
}
</style>
</head>
<body>

<div id="aria-live" aria-live="polite" aria-atomic="true"></div>

<div id="top-bar">
  <div class="brand">
    <img src="../../brand/logo-pgrg-256.png" alt="PGRG IA" onerror="this.style.display='none'">
    <span>PGRG IA</span>
  </div>
  <div class="top-controls">
    <button class="btn-lang" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="btn-lang" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="btn-sound" id="btn-sound" onclick="toggleSound()">&#128266;</button>
  </div>
</div>

<!-- TITLE SCREEN -->
<div id="screen-title" class="screen">
  <div class="stars-bg" id="stars-title"></div>
  <div class="title-card">
    <svg class="mascot" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="55" cy="42" rx="28" ry="30" fill="#1e4d80" stroke="#7ec3ee" stroke-width="3"/>
      <ellipse cx="55" cy="42" rx="18" ry="18" fill="#7ec3ee" opacity=".85"/>
      <ellipse cx="55" cy="40" rx="12" ry="10" fill="#eaf6ff" opacity=".5"/>
      <circle cx="48" cy="40" r="4" fill="#0f172a"/>
      <circle cx="62" cy="40" r="4" fill="#0f172a"/>
      <circle cx="49" cy="39" r="1.5" fill="#fff"/>
      <circle cx="63" cy="39" r="1.5" fill="#fff"/>
      <path d="M48 50 Q55 56 62 50" stroke="#0f172a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <rect x="35" y="70" width="40" height="28" rx="10" fill="#1e4d80" stroke="#7ec3ee" stroke-width="2"/>
      <polygon points="55,76 57,82 63,82 58,86 60,92 55,88 50,92 52,86 47,82 53,82" fill="#ffd23f"/>
      <rect x="18" y="72" width="14" height="8" rx="4" fill="#2860a0" stroke="#7ec3ee" stroke-width="1.5"/>
      <rect x="78" y="72" width="14" height="8" rx="4" fill="#2860a0" stroke="#7ec3ee" stroke-width="1.5"/>
      <rect x="40" y="97" width="11" height="10" rx="5" fill="#2860a0"/>
      <rect x="59" y="97" width="11" height="10" rx="5" fill="#2860a0"/>
      <line x1="55" y1="13" x2="55" y2="22" stroke="#7ec3ee" stroke-width="2"/>
      <circle cx="55" cy="11" r="4" fill="#ffd23f" stroke="#f97316" stroke-width="1.5"/>
    </svg>
    <h1 class="game-title" id="ttl-title"></h1>
    <p class="game-subtitle" id="ttl-sub"></p>
    <button class="btn-play" id="btn-play" onclick="showTables()"></button>
    <button class="link-parents" id="btn-parents" onclick="openParents()"></button>
  </div>
</div>

<!-- TABLE SELECT SCREEN -->
<div id="screen-tables" class="screen hidden">
  <div class="stars-bg" id="stars-tables"></div>
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:480px;">
    <h2 class="section-title" id="ttl-tables"></h2>
    <p class="section-sub" id="sub-tables"></p>
    <div class="tables-grid" id="tables-grid"></div>
    <button class="btn-back" id="btn-back-tables" onclick="showTitle()"></button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen hidden">
  <div id="game-canvas-wrap">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="game-ui">
    <div id="score-display">&#11088; <span id="score-val">0</span></div>
    <div id="progress-display">
      <span id="progress-val">0</span><span>/</span><span id="progress-max">10</span>
    </div>
  </div>
  <div id="question-panel">
    <div id="question-text"></div>
    <div id="feedback-text"></div>
  </div>
  <button id="btn-exit-game" onclick="exitGame()"></button>
</div>

<!-- WIN SCREEN -->
<div id="screen-win" class="screen hidden">
  <div class="stars-bg" id="stars-win"></div>
  <div class="win-card">
    <div class="win-title" id="win-title"></div>
    <div class="win-stars" id="win-stars"></div>
    <div class="win-score" id="win-score"></div>
    <div class="win-btns">
      <button class="btn-win orange" id="btn-replay" onclick="replayTable()"></button>
      <button class="btn-win blue" id="btn-next" onclick="nextTable()"></button>
      <button class="btn-win blue" id="btn-home-win" onclick="showTables()"></button>
    </div>
  </div>
</div>

<!-- PARENTS MODAL -->
<div id="modal-parents" class="hidden">
  <div class="modal-box">
    <h2 id="modal-parents-title"></h2>
    <div class="modal-gate" id="gate-section">
      <label id="gate-label"></label>
      <span class="gate-q" id="gate-q"></span>
      <input class="gate-input" type="number" id="gate-input" min="0" max="200" inputmode="numeric">
      <span class="gate-error" id="gate-error"></span>
      <button class="btn-gate" id="btn-gate-ok" onclick="checkGate()"></button>
    </div>
    <div class="parents-content" id="parents-content">
      <p id="parents-p1"></p>
      <ul id="parents-ul"></ul>
    </div>
    <button class="btn-close-modal" id="btn-close-modal" onclick="closeParents()"></button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── TRANSLATIONS ── */
var T = {
  fr: {
    gameTitle: "Multiplication\nGalaxie",
    gameSub: "Maîtrise les tables de multiplication dans l'espace !",
    play: "JOUER",
    parents: "Pour les parents",
    chooseTable: "Choisis ta table",
    chooseSub: "Débloque les tables en jouant !",
    backBtn: "Accueil",
    question: "{a} x {b} = ?",
    feedbackGood: ["Super !", "Bravo !", "Excellent !", "Parfait !", "Genial !"],
    feedbackBad: "Essaie encore...",
    winTitle: "Table x{n} maitrisee !",
    winScore: "Score : {s} point(s)",
    replay: "Rejouer",
    next: "Table suivante",
    homeWin: "Choisir",
    exitGame: "Quitter",
    modalParentsTitle: "Pour les parents",
    gateLabel: "Prouvez que vous etes un adulte :",
    gateBtnOk: "Valider",
    gateError: "Mauvaise reponse, essayez encore.",
    parentsP1: "Multiplication Galaxie est un jeu educatif gratuit, sans publicite, sans collecte de donnees.",
    parentsUl: [
      "Objectif pedagogique : memoriser les tables de 2 a 10.",
      "Progression : 9 niveaux (une table par niveau).",
      "Chaque table se debloque apres 8 bonnes reponses sur la precedente.",
      "Les etoiles et la progression sont sauvegardees localement sur cet appareil.",
      "Aucune donnee personnelle n'est collectee. Aucun lien externe."
    ],
    closeModal: "Fermer",
    winStars: function(s){ return "S".repeat(s)+"O".repeat(3-s); },
    ariaCorrect: "Bonne reponse !",
    ariaWrong: "Mauvaise reponse, essaie encore."
  },
  en: {
    gameTitle: "Times Table\nGalaxy",
    gameSub: "Master multiplication tables in space!",
    play: "PLAY",
    parents: "For parents",
    chooseTable: "Choose your table",
    chooseSub: "Unlock tables by playing!",
    backBtn: "Home",
    question: "{a} x {b} = ?",
    feedbackGood: ["Great!", "Brilliant!", "Excellent!", "Perfect!", "Amazing!"],
    feedbackBad: "Try again...",
    winTitle: "Table x{n} mastered!",
    winScore: "Score: {s} point(s)",
    replay: "Play again",
    next: "Next table",
    homeWin: "Choose",
    exitGame: "Quit",
    modalParentsTitle: "For parents",
    gateLabel: "Prove you are an adult:",
    gateBtnOk: "Confirm",
    gateError: "Wrong answer, please try again.",
    parentsP1: "Times Table Galaxy is a free educational game with no ads and no data collection.",
    parentsUl: [
      "Learning goal: memorize multiplication tables 2-10.",
      "Progression: 9 levels (one table per level).",
      "Each table unlocks after 8 correct answers on the previous one.",
      "Stars and progress are saved locally on this device.",
      "No personal data is collected. No external links."
    ],
    closeModal: "Close",
    winStars: function(s){ return "S".repeat(s)+"O".repeat(3-s); },
    ariaCorrect: "Correct answer!",
    ariaWrong: "Wrong answer, try again."
  }
};

/* ── STATE ── */
var SAVE_KEY = 'pgrg_multiplication_galaxie';
var TABLES = [2,3,4,5,6,7,8,9,10];
var QUESTIONS_TO_WIN = 10;

var lang = 'fr';
var soundOn = true;
var audioCtx = null;

var save = { unlockedUpTo:0, starsPerTable:{} };

var game = {
  table:2, score:0, correct:0, total:0,
  currentQ:null, asteroids:[], particles:[],
  animId:null, feedbackTimer:0, canAnswer:true,
  bgStars:[], pendingWin:false, currentWinTable:null
};

/* ── SAVE/LOAD ── */
function loadSave(){
  try{
    var r=localStorage.getItem(SAVE_KEY);
    if(r){ var p=JSON.parse(r); save.unlockedUpTo=p.unlockedUpTo||0; save.starsPerTable=p.starsPerTable||{}; }
  }catch(e){}
}
function writeSave(){
  try{ localStorage.setItem(SAVE_KEY,JSON.stringify(save)); }catch(e){}
}

/* ── AUDIO ── */
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq,dur,type,vol,startFreq){
  if(!soundOn) return;
  try{
    var ctx=getCtx();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type=type||'sine';
    if(startFreq){
      osc.frequency.setValueAtTime(startFreq,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(freq,ctx.currentTime+dur*0.7);
    } else {
      osc.frequency.setValueAtTime(freq,ctx.currentTime);
    }
    gain.gain.setValueAtTime(vol||0.22,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playSuccess(){
  playTone(523,.12,'sine',.2);
  setTimeout(function(){playTone(659,.12,'sine',.2);},120);
  setTimeout(function(){playTone(784,.25,'sine',.2);},240);
}
function playWrong(){
  playTone(280,.18,'triangle',.15,320);
}
function playWin(){
  var freqs=[523,659,784,1047];
  freqs.forEach(function(f,i){ setTimeout(function(){playTone(f,.3,'sine',.18);},i*150); });
}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('btn-sound').innerHTML=soundOn?'&#128266;':'&#128263;';
}

/* ── LANGUAGE ── */
function setLang(l){
  lang=l;
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.documentElement.lang=l;
  renderUI();
}

function tr(key,vars){
  var val=T[lang][key];
  if(typeof val==='function') return val;
  if(vars){ Object.keys(vars).forEach(function(k){ val=val.replace('{'+k+'}',vars[k]); }); }
  return val;
}

function pickRand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ── STAR ICONS (text) ── */
function starsText(n){
  var s='';
  for(var i=0;i<3;i++) s+=(i<n)?'⭐':'☆';
  return s;
}

/* ── RENDER UI ── */
function renderUI(){
  var L=T[lang];
  // title
  document.getElementById('ttl-title').textContent=L.gameTitle;
  document.getElementById('ttl-sub').textContent=L.gameSub;
  document.getElementById('btn-play').textContent=L.play;
  document.getElementById('btn-parents').textContent=L.parents;
  // tables
  document.getElementById('ttl-tables').textContent=L.chooseTable;
  document.getElementById('sub-tables').textContent=L.chooseSub;
  document.getElementById('btn-back-tables').textContent=L.backBtn;
  // game
  document.getElementById('btn-exit-game').textContent=L.exitGame;
  // win
  document.getElementById('btn-replay').textContent=L.replay;
  document.getElementById('btn-next').textContent=L.next;
  document.getElementById('btn-home-win').textContent=L.homeWin;
  // modal
  document.getElementById('modal-parents-title').textContent=L.modalParentsTitle;
  document.getElementById('gate-label').textContent=L.gateLabel;
  document.getElementById('btn-gate-ok').textContent=L.gateBtnOk;
  document.getElementById('btn-close-modal').textContent=L.closeModal;
  buildTablesGrid();
  if(game.currentWinTable) renderWin(game.currentWinTable);
}

/* ── STARS BG ── */
function makeStarsBg(id,count){
  var el=document.getElementById(id);
  el.innerHTML='';
  for(var i=0;i<count;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=Math.random()*2.5+0.8;
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;animation-delay:'+Math.random()*2+'s;animation-duration:'+(1.5+Math.random()*2)+'s;';
    el.appendChild(s);
  }
}

/* ── SCREENS ── */
function showOnly(id){
  ['screen-title','screen-tables','screen-game','screen-win'].forEach(function(s){
    document.getElementById(s).classList.toggle('hidden',s!==id);
  });
}

function showTitle(){
  stopGame();
  game.currentWinTable=null;
  showOnly('screen-title');
  makeStarsBg('stars-title',80);
}

function showTables(){
  stopGame();
  showOnly('screen-tables');
  makeStarsBg('stars-tables',70);
  buildTablesGrid();
}

/* ── TABLES GRID ── */
var TABLE_COLORS=['#1e5fa8','#17568f','#1a4f80','#1e4870','#164073','#1a3a6e','#163464','#122d5a','#0f2650'];

function buildTablesGrid(){
  var grid=document.getElementById('tables-grid');
  grid.innerHTML='';
  TABLES.forEach(function(n,idx){
    var btn=document.createElement('button');
    btn.className='btn-table';
    var unlocked=idx<=save.unlockedUpTo;
    var stars=save.starsPerTable[n]||0;
    if(!unlocked){
      btn.classList.add('locked');
      btn.disabled=true;
      btn.style.background='#1e3a5f';
      btn.innerHTML='<span style="font-size:1.4rem">🔒</span><span style="font-size:.8rem;color:#4a6fa5">x'+n+'</span>';
      btn.setAttribute('aria-label','Table x'+n+' verrouillee');
    } else {
      btn.classList.add(stars>=1?'mastered':'unlocked');
      btn.style.background=stars>=1?'var(--gold)':TABLE_COLORS[idx]||'#1e4d80';
      if(stars>=1) btn.style.color='var(--navy)';
      btn.innerHTML='<span>x '+n+'</span><span class="table-stars">'+starsText(stars)+'</span>';
      btn.setAttribute('aria-label','Table x'+n+(stars>0?' — '+stars+' etoile(s)':''));
      (function(tableN){ btn.onclick=function(){ startGame(tableN); }; })(n);
    }
    grid.appendChild(btn);
  });
}

/* ── GAME START ── */
function startGame(tableN){
  stopGame();
  game.table=tableN;
  game.score=0; game.correct=0; game.total=0;
  game.asteroids=[]; game.particles=[];
  game.feedbackTimer=0; game.canAnswer=true;
  game.pendingWin=false; game.currentWinTable=null;
  showOnly('screen-game');
  setupCanvas();
  initBgStars();
  newQuestion();
  gameLoop();
}

function stopGame(){
  if(game.animId){ cancelAnimationFrame(game.animId); game.animId=null; }
}

/* ── CANVAS ── */
var canvas, ctx2d;

function setupCanvas(){
  canvas=document.getElementById('game-canvas');
  ctx2d=canvas.getContext('2d');
  resizeCanvas();
  canvas.removeEventListener('click',onCanvasClick);
  canvas.removeEventListener('touchend',onCanvasTouch);
  canvas.addEventListener('click',onCanvasClick);
  canvas.addEventListener('touchend',onCanvasTouch,{passive:false});
}

function resizeCanvas(){
  if(!canvas) return;
  var wrap=document.getElementById('game-canvas-wrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
}

window.addEventListener('resize',function(){
  resizeCanvas();
  if(!document.getElementById('screen-game').classList.contains('hidden')) repositionAsteroids();
});

/* ── BG STARS ── */
function initBgStars(){
  game.bgStars=[];
  for(var i=0;i<120;i++){
    game.bgStars.push({
      x:Math.random(), y:Math.random(),
      r:Math.random()*1.5+0.3,
      a:Math.random()*.7+.3,
      phase:Math.random()*Math.PI*2,
      speed:Math.random()*.002+.001
    });
  }
}

/* ── QUESTION ── */
function newQuestion(){
  var n=game.table;
  var a=n;
  var b=Math.floor(Math.random()*9)+2;
  var correct=a*b;

  var wrongs=[];
  var attempts=0;
  while(wrongs.length<3 && attempts<60){
    attempts++;
    var w;
    var r=Math.random();
    if(r<0.35) w=correct+(Math.random()<.5?1:-1)*(Math.floor(Math.random()*3)+1)*n;
    else if(r<0.65) w=a*(b+(Math.random()<.5?1:-1)*(Math.floor(Math.random()*2)+1));
    else w=correct+(Math.random()<.5?1:-1)*(Math.floor(Math.random()*6)+1);
    if(w>0 && w!==correct && wrongs.indexOf(w)===-1) wrongs.push(w);
  }
  // fill missing
  while(wrongs.length<3){ var ww=correct+wrongs.length+1; if(wrongs.indexOf(ww)===-1) wrongs.push(ww); }

  var answers=[correct,wrongs[0],wrongs[1],wrongs[2]];
  for(var i=answers.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=answers[i]; answers[i]=answers[j]; answers[j]=tmp;
  }

  game.currentQ={a:a,b:b,correct:correct};
  document.getElementById('question-text').textContent=a+' x '+b+' = ?';
  setFeedback('','');
  updateProgress();
  spawnAsteroids(answers,correct);
  game.canAnswer=true;
}

function updateProgress(){
  document.getElementById('score-val').textContent=game.score;
  document.getElementById('progress-val').textContent=game.correct;
  document.getElementById('progress-max').textContent=QUESTIONS_TO_WIN;
}

/* ── ASTEROIDS ── */
var SHAPES=['blob','hex','diamond','star'];
var ASTRO_COLORS=[
  {fill:'#1a5aa8',stroke:'#7ec3ee'},
  {fill:'#7c3aed',stroke:'#c4b5fd'},
  {fill:'#9a4300',stroke:'#fcd34d'},
  {fill:'#0d7a5f',stroke:'#6ee7b7'}
];

function spawnAsteroids(answers,correct){
  game.asteroids=[];
  var W=canvas.width, H=canvas.height;
  var topOffset=200;
  var positions=placeAsteroids(answers.length,W,H,topOffset);
  answers.forEach(function(val,i){
    var pos=positions[i];
    var rad=Math.min(W,H)*0.088+Math.random()*6;
    game.asteroids.push({
      x:pos.x, y:pos.y,
      vx:(Math.random()-.5)*.55,
      vy:(Math.random()-.5)*.55,
      angle:Math.random()*Math.PI*2,
      avx:(Math.random()-.5)*.013,
      value:val,
      isCorrect:(val===correct),
      shape:SHAPES[i%SHAPES.length],
      color:ASTRO_COLORS[i%ASTRO_COLORS.length],
      radius:rad,
      label:String(val),
      shaking:false,
      shakePhase:0,
      scale:0,
      growing:true
    });
  });
}

function placeAsteroids(count,W,H,topOffset){
  var positions=[];
  var margin=Math.min(90,W*0.12);
  var available=H-topOffset-70;
  var cols=(count<=3)?count:2;
  var rows=Math.ceil(count/cols);
  var cw=(W-margin*2)/cols;
  var rh=available/rows;
  var idx=0;
  for(var r=0;r<rows&&idx<count;r++){
    for(var c=0;c<cols&&idx<count;c++){
      positions.push({
        x:margin+cw*(c+0.5)+(Math.random()-.5)*cw*.28,
        y:topOffset+rh*(r+0.5)+(Math.random()-.5)*rh*.22
      });
      idx++;
    }
  }
  return positions;
}

function repositionAsteroids(){
  if(!game.asteroids.length) return;
  var W=canvas.width, H=canvas.height;
  var pos=placeAsteroids(game.asteroids.length,W,H,200);
  game.asteroids.forEach(function(a,i){ a.x=pos[i].x; a.y=pos[i].y; });
}

/* ── PARTICLES ── */
var PART_COLORS=['#ffd23f','#f97316','#34c77b','#7ec3ee','#fff','#c4b5fd'];
function spawnParticles(x,y){
  for(var i=0;i<18;i++){
    var ang=Math.random()*Math.PI*2;
    var spd=Math.random()*3+1;
    game.particles.push({
      x:x, y:y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      life:1,
      decay:Math.random()*.03+.025,
      r:Math.random()*5+2,
      color:PART_COLORS[Math.floor(Math.random()*PART_COLORS.length)]
    });
  }
}

/* ── HIT TEST ── */
function onCanvasClick(e){
  var rect=canvas.getBoundingClientRect();
  var sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  handleTap((e.clientX-rect.left)*sx,(e.clientY-rect.top)*sy);
}
function onCanvasTouch(e){
  e.preventDefault();
  var rect=canvas.getBoundingClientRect();
  var sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  var t=e.changedTouches[0];
  handleTap((t.clientX-rect.left)*sx,(t.clientY-rect.top)*sy);
}
function handleTap(x,y){
  if(!game.canAnswer) return;
  for(var i=0;i<game.asteroids.length;i++){
    var a=game.asteroids[i];
    var dx=x-a.x, dy=y-a.y;
    var hitR=a.radius*a.scale+12;
    if(dx*dx+dy*dy<hitR*hitR){ selectAsteroid(i); return; }
  }
}

function selectAsteroid(idx){
  if(!game.canAnswer) return;
  var a=game.asteroids[idx];
  game.canAnswer=false;
  if(a.isCorrect){
    playSuccess();
    spawnParticles(a.x,a.y);
    game.score++; game.correct++; game.total++;
    updateProgress();
    var fb=pickRand(T[lang].feedbackGood);
    setFeedback(fb,'good');
    setAriaLive(T[lang].ariaCorrect+' '+fb);
    if(game.correct>=QUESTIONS_TO_WIN){
      game.pendingWin=true;
      game.feedbackTimer=90;
    } else {
      game.feedbackTimer=58;
    }
  } else {
    playWrong();
    a.shaking=true; a.shakePhase=0;
    game.total++;
    setFeedback(T[lang].feedbackBad,'bad');
    setAriaLive(T[lang].ariaWrong);
    game.feedbackTimer=42;
  }
}

function setFeedback(text,cls){
  var el=document.getElementById('feedback-text');
  el.textContent=text; el.className=cls;
}
function setAriaLive(text){
  var el=document.getElementById('aria-live');
  el.textContent='';
  setTimeout(function(){ el.textContent=text; },50);
}

/* ── GAME LOOP ── */
function gameLoop(){
  update();
  draw();
  game.animId=requestAnimationFrame(gameLoop);
}

function update(){
  var W=canvas.width, H=canvas.height;
  var now=Date.now()*.001;

  game.asteroids.forEach(function(a){
    if(a.growing){ a.scale=Math.min(1,a.scale+.065); if(a.scale>=1) a.growing=false; }
    a.x+=a.vx; a.y+=a.vy; a.angle+=a.avx;
    var r=a.radius*a.scale;
    var top=196, bot=H-60;
    if(a.x<r){ a.x=r; a.vx=Math.abs(a.vx); }
    if(a.x>W-r){ a.x=W-r; a.vx=-Math.abs(a.vx); }
    if(a.y<top+r){ a.y=top+r; a.vy=Math.abs(a.vy); }
    if(a.y>bot-r){ a.y=bot-r; a.vy=-Math.abs(a.vy); }
    if(a.shaking){ a.shakePhase++; if(a.shakePhase>22){ a.shaking=false; a.shakePhase=0; } }
  });

  game.particles=game.particles.filter(function(p){
    p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.life-=p.decay; return p.life>0;
  });

  // bg star twinkle
  game.bgStars.forEach(function(s){ s.phase+=s.speed; });

  if(game.feedbackTimer>0){
    game.feedbackTimer--;
    if(game.feedbackTimer===0){
      if(game.pendingWin){ game.pendingWin=false; triggerWin(); }
      else {
        // re-enable
        var fbEl=document.getElementById('feedback-text');
        if(fbEl.className==='bad'){ fbEl.textContent=''; fbEl.className=''; }
        newQuestion();
      }
    }
  }
}

/* ── DRAW ── */
function draw(){
  var W=canvas.width, H=canvas.height;
  var now=Date.now()*.001;
  ctx2d.clearRect(0,0,W,H);

  // bg
  var bg=ctx2d.createRadialGradient(W/2,H*.3,0,W/2,H*.3,Math.max(W,H));
  bg.addColorStop(0,'#1a3a6e');
  bg.addColorStop(1,'#0f172a');
  ctx2d.fillStyle=bg;
  ctx2d.fillRect(0,0,W,H);

  // bg stars
  game.bgStars.forEach(function(s){
    ctx2d.globalAlpha=s.a*(0.6+Math.sin(s.phase)*0.4);
    ctx2d.fillStyle='#fff';
    ctx2d.beginPath();
    ctx2d.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx2d.fill();
  });
  ctx2d.globalAlpha=1;

  // particles
  game.particles.forEach(function(p){
    ctx2d.globalAlpha=p.life;
    ctx2d.fillStyle=p.color;
    ctx2d.beginPath();
    ctx2d.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx2d.fill();
  });
  ctx2d.globalAlpha=1;

  // asteroids
  game.asteroids.forEach(function(a){ drawAsteroid(a,now); });
}

function drawAsteroid(a,now){
  var sc=a.scale;
  if(sc<=0) return;
  ctx2d.save();
  var ox=a.x, oy=a.y;
  if(a.shaking) ox+=Math.sin(a.shakePhase*1.6)*8;
  ctx2d.translate(ox,oy);
  ctx2d.rotate(a.angle);
  ctx2d.scale(sc,sc);
  var r=a.radius;

  // glow
  var glow=ctx2d.createRadialGradient(0,0,r*.2,0,0,r*1.5);
  glow.addColorStop(0,a.color.fill+'66');
  glow.addColorStop(1,'transparent');
  ctx2d.fillStyle=glow;
  ctx2d.beginPath();
  ctx2d.arc(0,0,r*1.5,0,Math.PI*2);
  ctx2d.fill();

  // shape body
  ctx2d.beginPath();
  drawShape(a.shape,r);
  ctx2d.fillStyle=a.color.fill;
  ctx2d.fill();
  ctx2d.strokeStyle=a.color.stroke;
  ctx2d.lineWidth=2.5;
  ctx2d.stroke();

  // craters
  ctx2d.fillStyle='rgba(0,0,0,.12)';
  ctx2d.beginPath(); ctx2d.arc(r*.3,-r*.2,r*.16,0,Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.arc(-r*.25,r*.28,r*.11,0,Math.PI*2); ctx2d.fill();

  // label
  ctx2d.rotate(-a.angle);
  var fs=Math.max(13,r*.58);
  ctx2d.font='900 '+fs+'px \'Fredoka\',\'Nunito\',system-ui';
  ctx2d.textAlign='center';
  ctx2d.textBaseline='middle';
  ctx2d.strokeStyle=a.color.fill;
  ctx2d.lineWidth=4;
  ctx2d.strokeText(a.label,0,0);
  ctx2d.fillStyle='#fff';
  ctx2d.fillText(a.label,0,0);

  ctx2d.restore();
}

function drawShape(shape,r){
  switch(shape){
    case 'blob': drawBlob(r); break;
    case 'hex': drawPoly(6,r); break;
    case 'diamond': drawPoly(4,r); break;
    case 'star': drawStar5(r,r*.5); break;
    default: ctx2d.arc(0,0,r,0,Math.PI*2);
  }
}

function drawBlob(r){
  var pts=10;
  ctx2d.beginPath();
  for(var i=0;i<pts;i++){
    var ang=i/pts*Math.PI*2;
    var jitter=1+Math.sin(i*2.3+1.2)*.11;
    var x=Math.cos(ang)*r*jitter, y=Math.sin(ang)*r*jitter;
    i===0?ctx2d.moveTo(x,y):ctx2d.lineTo(x,y);
  }
  ctx2d.closePath();
}
function drawPoly(sides,r){
  ctx2d.beginPath();
  for(var i=0;i<sides;i++){
    var ang=i/sides*Math.PI*2-Math.PI/2;
    var x=Math.cos(ang)*r, y=Math.sin(ang)*r;
    i===0?ctx2d.moveTo(x,y):ctx2d.lineTo(x,y);
  }
  ctx2d.closePath();
}
function drawStar5(outer,inner){
  var pts=5;
  ctx2d.beginPath();
  for(var i=0;i<pts*2;i++){
    var ang=i/pts*Math.PI-Math.PI/2;
    var rr=(i%2===0)?outer:inner;
    var x=Math.cos(ang)*rr, y=Math.sin(ang)*rr;
    i===0?ctx2d.moveTo(x,y):ctx2d.lineTo(x,y);
  }
  ctx2d.closePath();
}

/* ── WIN ── */
function triggerWin(){
  stopGame();
  var n=game.table;
  game.currentWinTable=n;
  var ratio=game.correct/Math.max(game.total,1);
  var stars=1;
  if(ratio>=.9) stars=3;
  else if(ratio>=.7) stars=2;
  var prev=save.starsPerTable[n]||0;
  save.starsPerTable[n]=Math.max(prev,stars);
  var idx=TABLES.indexOf(n);
  if(idx>=0&&idx<TABLES.length-1){
    if(save.unlockedUpTo<=idx) save.unlockedUpTo=idx+1;
  }
  writeSave();
  playWin();
  renderWin(n,stars);
  showOnly('screen-win');
  makeStarsBg('stars-win',90);
}

function renderWin(n,stars){
  if(!stars) stars=save.starsPerTable[n]||1;
  var L=T[lang];
  document.getElementById('win-title').textContent=L.winTitle.replace('{n}',n);
  document.getElementById('win-stars').textContent=starsText(stars);
  document.getElementById('win-score').textContent=L.winScore.replace('{s}',game.score||0);
  var idx=TABLES.indexOf(n);
  document.getElementById('btn-next').classList.toggle('hidden',idx>=TABLES.length-1);
}

function replayTable(){ startGame(game.currentWinTable||game.table); }
function nextTable(){
  var idx=TABLES.indexOf(game.currentWinTable||game.table);
  if(idx>=0&&idx<TABLES.length-1) startGame(TABLES[idx+1]);
  else showTables();
}
function exitGame(){ stopGame(); showTables(); }

/* ── PARENTS MODAL ── */
var gateAnswer=0;
function openParents(){
  var a=Math.floor(Math.random()*6)+5;
  var b=Math.floor(Math.random()*6)+5;
  gateAnswer=a*b;
  document.getElementById('gate-q').textContent=a+' x '+b+' = ?';
  document.getElementById('gate-input').value='';
  document.getElementById('gate-error').textContent='';
  document.getElementById('gate-section').style.display='flex';
  document.getElementById('parents-content').classList.remove('visible');
  document.getElementById('modal-parents').classList.remove('hidden');
  setTimeout(function(){ document.getElementById('gate-input').focus(); },100);
}
function checkGate(){
  var val=parseInt(document.getElementById('gate-input').value,10);
  if(val===gateAnswer){
    document.getElementById('gate-section').style.display='none';
    var content=document.getElementById('parents-content');
    content.classList.add('visible');
    var L=T[lang];
    document.getElementById('parents-p1').textContent=L.parentsP1;
    var ul=document.getElementById('parents-ul');
    ul.innerHTML=L.parentsUl.map(function(x){ return '<li>'+x+'</li>'; }).join('');
  } else {
    document.getElementById('gate-error').textContent=T[lang].gateError;
    document.getElementById('gate-input').value='';
    document.getElementById('gate-input').focus();
  }
}
function closeParents(){ document.getElementById('modal-parents').classList.add('hidden'); }

document.getElementById('gate-input').addEventListener('keydown',function(e){
  if(e.key==='Enter') checkGate();
});

/* ── INIT ── */
(function(){
  loadSave();
  var nl=navigator.language||'fr';
  lang=nl.toLowerCase().startsWith('en')?'en':'fr';
  document.getElementById('btn-fr').classList.toggle('active',lang==='fr');
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  document.documentElement.lang=lang;
  renderUI();
  makeStarsBg('stars-title',80);
  showOnly('screen-title');
})();


/* ── GLOBAL EXPORTS for onclick attributes ── */
window.setLang      = setLang;
window.toggleSound  = toggleSound;
window.showTables   = showTables;
window.showTitle    = showTitle;
window.openParents  = openParents;
window.checkGate    = checkGate;
window.closeParents = closeParents;
window.exitGame     = exitGame;
window.replayTable  = replayTable;
window.nextTable    = nextTable;

})();
