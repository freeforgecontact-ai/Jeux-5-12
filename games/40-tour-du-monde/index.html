<!DOCTYPE html>
<html lang="fr">

<title>Tour du Monde / World Tour — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81; --blue-dark:#0a3559; --navy:#0f172a;
  --orange:#f97316; --orange-dark:#ea580c;
  --gold:#ffd23f; --sky:#7ec3ee; --sky-light:#eaf6ff;
  --slate:#475569; --success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(160deg,#eaf6ff 0%,#d0eaff 100%);
  min-height:100vh; color:var(--navy);
  display:flex; flex-direction:column;
}
#topbar{
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; background:var(--blue);
  box-shadow:0 2px 8px #0003;
}
#topbar img{height:34px;}
#brand{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  color:#fff; font-size:1.15rem; font-weight:700; flex:1;
}
.lang-btn{
  background:transparent; border:2px solid #fff8;
  color:#fff; border-radius:8px; padding:4px 10px;
  cursor:pointer; font-size:.85rem; font-weight:700;
  transition:background .2s;
}
.lang-btn.active{background:#fff3; border-color:#fff;}
.lang-btn:hover{background:#fff2;}
#muteBtn{
  background:transparent; border:none; cursor:pointer;
  font-size:1.4rem; line-height:1; padding:2px 6px;
}
.screen{display:none; flex-direction:column; align-items:center; padding:20px 12px; flex:1;}
.screen.active{display:flex;}
#titleScreen{justify-content:center; gap:14px;}
#gameTitleTxt{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:2.2rem; font-weight:700; color:var(--blue); text-align:center;
  line-height:1.15;
}
#gameSubtitle{color:var(--slate); font-size:1.05rem; text-align:center;}
.btn-play{
  background:var(--orange); color:#fff; border:none;
  font-family:inherit; font-size:1.2rem; font-weight:700;
  padding:14px 40px; border-radius:30px;
  box-shadow:0 5px 0 var(--orange-dark);
  cursor:pointer; transition:transform .1s, box-shadow .1s;
  margin-top:6px;
}
.btn-play:active{transform:translateY(3px); box-shadow:0 2px 0 var(--orange-dark);}
.btn-sec{
  background:var(--blue); color:#fff; border:none;
  font-family:inherit; font-size:1rem; font-weight:700;
  padding:10px 26px; border-radius:20px;
  box-shadow:0 4px 0 var(--blue-dark);
  cursor:pointer; transition:transform .1s, box-shadow .1s;
}
.btn-sec:active{transform:translateY(2px); box-shadow:0 2px 0 var(--blue-dark);}
#parentModal{
  display:none; position:fixed; inset:0;
  background:#0009; z-index:100;
  align-items:center; justify-content:center;
}
#parentModal.open{display:flex;}
.modal-box{
  background:#fff; border-radius:20px; padding:28px 24px;
  max-width:360px; width:90%; text-align:center;
  box-shadow:0 8px 40px #0004;
}
.modal-box h2{color:var(--blue); margin-bottom:12px; font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
.modal-box input{
  width:100%; padding:10px; font-size:1.1rem;
  border:2px solid var(--sky); border-radius:10px;
  text-align:center; margin:10px 0;
}
.modal-box .err{color:#e55; font-size:.9rem; min-height:1.2em;}
#levelSelectScreen{gap:16px;}
#levelTitle{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:1.7rem; color:var(--blue); text-align:center;
}
.level-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:12px; width:100%; max-width:600px;
}
.level-card{
  background:#fff; border-radius:16px; padding:14px 10px;
  box-shadow:0 3px 12px #0002; text-align:center;
  cursor:pointer; border:3px solid transparent;
  transition:transform .15s, border-color .15s;
  position:relative;
}
.level-card:hover{transform:translateY(-3px);}
.level-card.locked{opacity:.55; cursor:not-allowed;}
.level-card.unlocked{border-color:var(--sky);}
.level-card.completed{border-color:var(--success); background:#f0fff7;}
.level-card .cont-icon{font-size:2rem;}
.level-card .cont-name{font-weight:700; color:var(--blue); font-size:1rem; margin-top:4px;}
.lock-icon{position:absolute;top:6px;right:10px;font-size:1rem;}
#gameScreen{gap:10px; max-width:900px; width:100%; margin:0 auto;}
#gameHeader{display:flex; align-items:center; gap:10px; width:100%;}
#backBtn{
  background:var(--blue); color:#fff; border:none;
  border-radius:12px; padding:7px 14px; cursor:pointer;
  font-family:inherit; font-size:.95rem; font-weight:700;
  box-shadow:0 3px 0 var(--blue-dark);
}
#levelLabel{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:1.1rem; color:var(--blue); font-weight:700; flex:1; text-align:center;
}
#scoreArea{font-size:.95rem; color:var(--slate); white-space:nowrap;}
#questionBox{
  background:#fff; border-radius:16px; padding:14px 18px;
  width:100%; text-align:center; font-size:1.1rem;
  font-weight:700; color:var(--navy);
  box-shadow:0 2px 10px #0002; min-height:56px;
}
#feedbackLive{min-height:30px; font-size:1rem; font-weight:700; text-align:center;}
#mapContainer{
  width:100%; max-width:800px;
  background:#c8e8ff; border-radius:18px;
  box-shadow:0 3px 14px #0003;
  position:relative; overflow:hidden;
}
#mapContainer svg{width:100%; height:auto; display:block;}
.country-path{stroke:#fff; stroke-width:1.2; cursor:pointer; transition:opacity .15s;}
.country-path:hover{opacity:.78; stroke-width:2.2;}
.correct-anim{animation:correctPulse .5s ease;}
.wrong-anim{animation:wrongShake .4s ease;}
@keyframes correctPulse{0%{opacity:1}30%{opacity:.4}60%{opacity:1}100%{opacity:1}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
#optionsArea{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; width:100%;}
.opt-btn{
  background:#fff; border:3px solid var(--sky);
  border-radius:14px; padding:10px 18px;
  font-family:inherit; font-size:1rem; font-weight:700;
  color:var(--navy); cursor:pointer; min-width:140px; min-height:48px;
  transition:background .15s, border-color .15s;
}
.opt-btn:hover{background:var(--sky-light); border-color:var(--blue);}
.opt-btn.correct{background:#e0fff0; border-color:var(--success); color:#1a7a4a;}
.opt-btn.wrong{background:#ffe0e0; border-color:#e55; color:#c00;}
#collectionBar{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; width:100%; padding:6px 0;}
.flag-chip{
  background:#fff; border-radius:10px; padding:4px 8px;
  font-size:1.3rem; box-shadow:0 2px 6px #0002;
  display:flex; align-items:center; gap:4px;
}
.flag-chip span.cc{font-size:.7rem; color:var(--slate); font-weight:700;}
.flag-chip.locked-chip{filter:grayscale(1) opacity(.35);}
#progressWrap{width:100%; background:#dde; border-radius:20px; height:10px; overflow:hidden;}
#progressBar{height:100%; background:var(--success); border-radius:20px; transition:width .4s;}
#successScreen{justify-content:center; gap:16px;}
#successTitle{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:2rem; color:var(--orange); text-align:center;
}
#starsRow{font-size:2.5rem; text-align:center; letter-spacing:4px;}
#successMsg{color:var(--slate); text-align:center; font-size:1.05rem;}
.btn-row{display:flex; flex-wrap:wrap; gap:12px; justify-content:center;}
@media(max-width:500px){
  #gameTitleTxt{font-size:1.6rem;}
  .opt-btn{font-size:.9rem; padding:8px 12px; min-width:110px;}
}
</style>
</head>

let lang=(navigator.language||'fr').startsWith('fr')?'fr':'en';
function t(k){return T[lang][k]||k;}
function setLang(l){
  lang=l;

let muted=false;
let AC=null;
try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
function beep(freq,dur,type,vol){
  if(muted||!AC)return;
  type=type||'sine';vol=vol||0.15;
  try{
    if(AC.state==='suspended')AC.resume();
    var g=AC.createGain();g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    var o=AC.createOscillator();o.type=type;o.frequency.value=freq;
    o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
function soundCorrect(){beep(660,.1);setTimeout(function(){beep(880,.18);},110);}
function soundWrong(){beep(200,.25,'sawtooth',.1);}
function soundWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,.2);},i*110);});}

var LS_KEY='pgrg_tour_monde';
var state={unlockedLevels:[0],completedLevels:[],collection:[],scores:{}};
function loadState(){
  try{var s=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if(s.unlockedLevels)state.unlockedLevels=s.unlockedLevels;
    if(s.completedLevels)state.completedLevels=s.completedLevels;
    if(s.collection)state.collection=s.collection;
    if(s.scores)state.scores=s.scores;
  }catch(e){}
}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}

var currentScreen='title';
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  currentScreen=id;
}
function renderCurrentScreen(){
  if(currentScreen==='title')renderTitle();
  else if(currentScreen==='levelSelect')renderLevelSelect();
  else if(currentScreen==='game')renderGameUI();
  else if(currentScreen==='success')renderSuccess();
}
function showTitle(){renderTitle();showScreen('titleScreen');}
function renderTitle(){
  document.getElementById('gameSubtitle').textContent=t('subtitle');
  document.getElementById('playBtn').textContent=t('play');
  document.getElementById('parentBtn').textContent=t('parentBtn');
  document.getElementById('titleCollLabel').textContent=t('collectionLabel');
  renderChips('titleCollChips');
}
function renderChips(cid){
  var el=document.getElementById(cid);el.innerHTML='';
  COUNTRIES.forEach(function(c){
    var d=document.createElement('div');
    d.className='flag-chip'+(state.collection.indexOf(c.id)<0?' locked-chip':'');
    d.title=c.name[lang];
    d.innerHTML=c.flag+'<span class="cc">'+c.id.toUpperCase()+'</span>';
    el.appendChild(d);
  });
}

var pmAnswer=0,pmCallback=null;
function openParent(cb){
  pmCallback=cb;
  var a=2+Math.floor(Math.random()*8),b=2+Math.floor(Math.random()*8);
  pmAnswer=a*b;
  document.getElementById('pmTitle').textContent=t('pmTitle');
  document.getElementById('pmQuestion').textContent=t('pmQ')+a+' x '+b+' = ?';
  document.getElementById('pmOk').textContent=t('pmOk');
  document.getElementById('pmErr').textContent='';
  document.getElementById('pmInput').value='';
  document.getElementById('parentModal').classList.add('open');
  setTimeout(function(){document.getElementById('pmInput').focus();},120);
}
function closeParent(){document.getElementById('parentModal').classList.remove('open');}
function checkParent(){
  var v=parseInt(document.getElementById('pmInput').value,10);
  if(v===pmAnswer){
    closeParent();
    if(pmCallback)pmCallback();
    else alert(T[lang].pmInfo);
  }else{
    document.getElementById('pmErr').textContent=t('pmErr');
    document.getElementById('pmInput').value='';
    document.getElementById('pmInput').focus();
  }
}
document.getElementById('pmInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkParent();});

var CONT_ICONS=['🌎','🌍','🌍','🌏','🌏'];
function showLevelSelect(){renderLevelSelect();showScreen('levelSelectScreen');}
function renderLevelSelect(){
  document.getElementById('levelTitle').textContent=t('levelTitle');
  document.getElementById('levelSubtitle').textContent=t('levelSub');
  document.getElementById('levelBackBtn').textContent=t('levelBack');
  var grid=document.getElementById('levelGrid');grid.innerHTML='';
  var names=t('continents'),subs=t('continentSubs');
  for(var ci=0;ci<5;ci++){
    (function(ci){
      var card=document.createElement('div');
      var isUnlocked=state.unlockedLevels.indexOf(ci)>=0;
      var isCompleted=state.completedLevels.indexOf(ci)>=0;
      card.className='level-card '+(isCompleted?'completed':isUnlocked?'unlocked':'locked');
      card.innerHTML='<div class="cont-icon">'+CONT_ICONS[ci]+'</div>'
        +'<div class="cont-name">'+names[ci]+'</div>'
        +'<div style="font-size:.8rem;color:var(--slate);margin-top:4px;">'+subs[ci]+'</div>'
        +(isCompleted?'<div style="font-size:.75rem;color:var(--success);margin-top:4px;">'+t('completed')+' ✓</div>':'')
        +(!isUnlocked?'<div class="lock-icon">🔒</div>':'');
      if(isUnlocked)card.addEventListener('click',function(){startLevel(ci);});
      grid.appendChild(card);
    })(ci);
  }
}

var currentContinent=0,questions=[],qIndex=0,correct=0,wrongCountQ=0,waitingNext=false;
function startLevel(ci){
  currentContinent=ci;
  buildQuestions(ci);
  qIndex=0;correct=0;wrongCountQ=0;waitingNext=false;
  renderGameUI();
  showScreen('gameScreen');
  initMap();
  nextQuestion();
}
function buildQuestions(ci){
  var countries=getContCountries(ci);questions=[];
  countries.forEach(function(c,i){
    var type=['find','capital','capitalReverse'][i%3];
    questions.push({type:type,country:c});
  });
  for(var i=questions.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=questions[i];questions[i]=questions[j];questions[j]=tmp;
  }
}
function renderGameUI(){
  var names=t('continents');
  document.getElementById('backBtn').textContent=t('back');
  document.getElementById('levelLabel').textContent=CONT_ICONS[currentContinent]+' '+names[currentContinent];
  updateScore();
}
function updateScore(){
  document.getElementById('scoreArea').textContent=t('score')+correct+' / '+questions.length;
  document.getElementById('progressBar').style.width=(qIndex/Math.max(questions.length,1)*100)+'%';
  renderChips('collectionBar');
}
function initMap(){
  document.getElementById('mapContainer').innerHTML=MAP_SVG;
  document.querySelectorAll('.country-path').forEach(function(p){
    p.addEventListener('click',function(){onMapClick(p.dataset.country);});
    p.addEventListener('touchend',function(e){e.preventDefault();onMapClick(p.dataset.country);},{passive:false});
  });
  resetMapHighlights();
}
function resetMapHighlights(){
  document.querySelectorAll('.country-path').forEach(function(p){
    p.classList.remove('correct-anim','wrong-anim');
    p.style.opacity='';
    p.style.strokeWidth='';
  });
}
function dimOtherContinents(ci){
  var ids=getContCountries(ci).map(function(c){return c.id;});
  document.querySelectorAll('.country-path').forEach(function(p){
    p.style.opacity=(ids.indexOf(p.dataset.country)>=0)?'1':'0.38';
  });
}
function nextQuestion(){
  if(qIndex>=questions.length){endLevel();return;}
  waitingNext=false;wrongCountQ=0;
  var q=questions[qIndex];
  resetMapHighlights();
  dimOtherContinents(currentContinent);
  document.getElementById('feedbackLive').textContent='';
  document.getElementById('optionsArea').innerHTML='';
  updateScore();
  if(q.type==='find'){
    document.getElementById('questionBox').textContent=t('qFindCountry')+' '+q.country.name[lang]+' '+q.country.flag;
    document.getElementById('optionsArea').style.display='none';
    document.getElementById('mapContainer').style.display='';
  }else if(q.type==='capital'){
    document.getElementById('questionBox').textContent=t('qCapitalOf')+' '+q.country.name[lang]+' '+q.country.flag+' ?';
    showOptions(q.country,false);
    document.getElementById('mapContainer').style.display='none';
    document.getElementById('optionsArea').style.display='flex';
  }else{
    document.getElementById('questionBox').textContent=t('qCountryOfCapital')+' '+q.country.capital[lang]+' ?';
    showOptions(q.country,true);
    document.getElementById('mapContainer').style.display='none';
    document.getElementById('optionsArea').style.display='flex';
  }
}
function showOptions(correctC,reverse){
  var area=document.getElementById('optionsArea');area.innerHTML='';
  var pool=COUNTRIES.filter(function(c){return c.id!==correctC.id;});
  pool.sort(function(){return Math.random()-.5;});
  var wrongs=pool.slice(0,3);
  var all=[correctC].concat(wrongs);all.sort(function(){return Math.random()-.5;});
  all.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=reverse?(c.name[lang]+' '+c.flag):(c.capital[lang]);
    btn.addEventListener('click',function(){onOptionClick(btn,c.id,correctC.id);});
    area.appendChild(btn);
  });
}
function onMapClick(cid){
  if(waitingNext)return;
  var q=questions[qIndex];if(q.type!=='find')return;
  var path=document.querySelector('[data-country="'+cid+'"]');if(!path)return;
  if(cid===q.country.id)handleCorrect(path,null);
  else handleWrong(path,null,q.country.id);
}
function onOptionClick(btn,selectedId,correctId){
  if(waitingNext)return;
  if(selectedId===correctId)handleCorrect(null,btn);
  else handleWrong(null,btn,correctId);
}
function handleCorrect(path,btn){
  waitingNext=true;correct++;
  var q=questions[qIndex];
  if(state.collection.indexOf(q.country.id)<0){state.collection.push(q.country.id);saveState();}
  soundCorrect();
  var fb=document.getElementById('feedbackLive');
  fb.style.color='var(--success)';fb.textContent=t('correct')+' '+q.country.flag;
  if(path){path.classList.add('correct-anim');path.style.fill='#34c77b';path.style.stroke='#fff';}
  if(btn){btn.classList.add('correct');document.querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;});}
  updateScore();qIndex++;
  setTimeout(nextQuestion,950);
}
function handleWrong(path,btn,correctId){
  wrongCountQ++;
  soundWrong();
  var fb=document.getElementById('feedbackLive');
  fb.style.color='#e55';fb.textContent=t('wrong');
  if(path){path.classList.add('wrong-anim');setTimeout(function(){path.classList.remove('wrong-anim');},450);}
  if(btn){btn.classList.add('wrong');btn.disabled=true;}
  if(wrongCountQ>=2){
    waitingNext=true;
    var q=questions[qIndex];
    if(q.type==='find'){
      var cp=document.querySelector('[data-country="'+correctId+'"]');
      if(cp){cp.style.fill='#ffd23f';cp.style.stroke='#f97316';}
    }else{
      var cc=getCountryById(correctId);
      document.querySelectorAll('.opt-btn').forEach(function(b){
        var txt=b.textContent;
        if(cc&&(txt.indexOf(cc.capital[lang])>=0||txt.indexOf(cc.name[lang])>=0))b.classList.add('correct');
        b.disabled=true;
      });
    }
    fb.textContent=t('wrongReveal')+(getCountryById(correctId)?getCountryById(correctId).name[lang]:'');
    qIndex++;wrongCountQ=0;
    setTimeout(function(){fb.textContent='';nextQuestion();},1500);
  }
}
var lastStars=0;
function endLevel(){
  var pct=correct/questions.length;
  lastStars=pct>=.9?3:pct>=.7?2:1;
  if(state.completedLevels.indexOf(currentContinent)<0)state.completedLevels.push(currentContinent);
  if(currentContinent<4&&state.unlockedLevels.indexOf(currentContinent+1)<0)state.unlockedLevels.push(currentContinent+1);
  state.scores[currentContinent]=Math.max(state.scores[currentContinent]||0,Math.round(pct*100));
  saveState();soundWin();
  renderSuccess();showScreen('successScreen');
}
function renderSuccess(){
  document.getElementById('starsRow').textContent=['⭐','⭐⭐','⭐⭐⭐'][lastStars-1];
  document.getElementById('successTitle').textContent=[t('stars1'),t('stars2'),t('stars3')][lastStars-1];
  document.getElementById('successMsg').textContent=t('successMsg');
  document.getElementById('replayBtn').textContent=t('replay');
  var hasNext=currentContinent<4&&state.unlockedLevels.indexOf(currentContinent+1)>=0;
  var nb=document.getElementById('nextBtn');nb.textContent=t('next')+' →';nb.style.display=hasNext?'':'none';
  document.getElementById('homeBtn').textContent=t('home');
  document.getElementById('successCollLabel').textContent=t('collectionLabel');
  renderChips('successCollChips');
}
function replayLevel(){startLevel(currentContinent);}
function nextLevelOrEnd(){if(currentContinent<4)startLevel(currentContinent+1);else showLevelSelect();}

loadState();renderTitle();showScreen('titleScreen');
document.addEventListener('touchend',function(e){if(e.detail>1)e.preventDefault();},{passive:false});
</script>
