<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;
  --orange:#f97316;--orange-dark:#ea580c;--gold:#ffd23f;
  --sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(135deg,#eaf6ff 0%,#d0ebff 100%);min-height:100vh;color:var(--navy);}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{display:flex;align-items:center;gap:8px;background:var(--blue);padding:8px 16px;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100;flex-wrap:wrap;}
#topbar img{height:34px;}
#brand-text{color:#fff;font-family:'Fredoka','Nunito',system-ui,sans-serif;font-size:1.2rem;font-weight:700;flex:1;}
.lang-btn{background:transparent;border:2px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:.85rem;font-weight:700;transition:background .2s;min-width:48px;min-height:36px;}
.lang-btn.active,.lang-btn:hover{background:rgba(255,255,255,.25);}
#mute-btn{background:transparent;border:none;font-size:1.4rem;cursor:pointer;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;}
.screen{display:none;padding:16px;max-width:820px;margin:0 auto;}
.screen.active{display:block;}
#screen-title{text-align:center;padding-top:20px;}
#title-mascot{margin:0 auto 16px;display:block;}
#game-title{font-size:2.4rem;color:var(--blue);line-height:1.1;}
#game-subtitle{color:var(--slate);font-size:1.1rem;margin:8px 0 24px;}
.btn-main{display:inline-block;background:var(--orange);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:1.3rem;font-family:'Fredoka','Nunito',system-ui,sans-serif;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;min-height:56px;}
.btn-main:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-secondary{display:inline-block;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:1rem;font-family:'Fredoka','Nunito',system-ui,sans-serif;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);transition:transform .1s,box-shadow .1s;min-height:48px;}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
#parents-link{display:inline-block;margin-top:20px;color:var(--slate);font-size:.9rem;cursor:pointer;text-decoration:underline;background:none;border:none;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal-box{background:#fff;border-radius:20px;padding:28px;max-width:420px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.3);}
#modal-box h2{color:var(--blue);margin-bottom:12px;font-size:1.4rem;}
#modal-box p{color:var(--slate);font-size:.95rem;margin-bottom:12px;line-height:1.6;}
#parent-gate{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
#parent-gate label{font-weight:700;color:var(--navy);}
#parent-answer{border:2px solid var(--blue);border-radius:8px;padding:8px 12px;font-size:1.1rem;width:100px;text-align:center;}
#gate-error{color:red;font-size:.85rem;min-height:1em;}
#parent-content{display:none;}
.close-modal{background:var(--slate);color:#fff;border:none;border-radius:10px;padding:8px 20px;cursor:pointer;font-size:.95rem;margin-top:8px;}
#screen-game{padding-bottom:32px;}
#level-info{display:flex;align-items:center;gap:12px;background:#fff;border-radius:16px;padding:12px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);flex-wrap:wrap;}
#level-badge{background:var(--blue);color:#fff;border-radius:10px;padding:4px 14px;font-weight:700;font-size:1rem;font-family:'Fredoka','Nunito',system-ui,sans-serif;}
#level-title-txt{flex:1;font-weight:700;color:var(--navy);}
#score-display{color:var(--orange);font-weight:700;font-size:1rem;}
#grid-container{background:#fff;border-radius:20px;padding:12px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.1);display:flex;justify-content:center;overflow-x:auto;}
#grid{display:inline-grid;gap:3px;}
.cell{width:50px;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;position:relative;border:2px solid transparent;transition:background .15s;}
.cell.path{background:#e8f4fd;}
.cell.wall{background:#334155;}
.cell.target{background:#fef9c3;border-color:var(--gold);}
.cell.start{background:#dcfce7;border-color:var(--success);}
.cell.robot-here{background:#dbeafe;border-color:var(--blue);}
.cell.trail{background:#bfdbfe;}
.cell.fail-cell{background:#fee2e2;border-color:#ef4444;}
.cell.success-cell{background:#dcfce7;border-color:var(--success);}
#instructions-panel{background:#fff;border-radius:20px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
#instructions-panel h3{color:var(--blue);margin-bottom:10px;font-size:1rem;}
#instr-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center;}
.instr-slot{width:54px;height:54px;border-radius:12px;background:var(--sky-light);border:2px solid var(--sky);display:flex;align-items:center;justify-content:center;font-size:1.7rem;cursor:pointer;position:relative;transition:transform .15s,border-color .15s,background .15s;user-select:none;flex-direction:column;}
.instr-slot:hover{transform:scale(1.08);}
.instr-slot.selected{border-color:var(--orange);background:#fff7ed;transform:scale(1.12);}
.instr-slot.fixed{border-color:var(--success);background:#dcfce7;}
.instr-slot.wrong{border-color:#ef4444;background:#fee2e2;}
.instr-idx{font-size:.58rem;font-weight:700;color:var(--slate);line-height:1;}
#replace-panel{background:#fff;border-radius:20px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
#replace-panel h3{color:var(--blue);margin-bottom:10px;font-size:1rem;}
#replace-options{display:flex;gap:10px;flex-wrap:wrap;}
.replace-btn{width:54px;height:54px;border-radius:12px;background:var(--sky-light);border:2px solid var(--sky);font-size:1.7rem;cursor:pointer;transition:transform .15s,border-color .15s;}
.replace-btn:hover{transform:scale(1.1);border-color:var(--blue);}
.replace-btn.chosen{border-color:var(--success);background:#dcfce7;}
#feedback-area{border-radius:14px;padding:12px 16px;margin-bottom:10px;min-height:52px;font-size:1rem;line-height:1.5;font-weight:600;display:flex;align-items:center;gap:10px;transition:background .3s;}
#feedback-area.info{background:#e0f0ff;color:var(--blue);}
#feedback-area.success{background:#dcfce7;color:#166534;}
#feedback-area.error{background:#fee2e2;color:#991b1b;}
#feedback-area.warn{background:#fef9c3;color:#854d0e;}
#game-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
#run-btn{min-width:140px;}
#reset-btn{min-width:120px;}
#screen-win{text-align:center;padding-top:30px;}
#win-stars{font-size:3rem;margin:12px 0;}
#win-title{font-size:2rem;color:var(--blue);margin-bottom:8px;}
#win-subtitle{color:var(--slate);margin-bottom:24px;}
.win-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
@media(max-width:520px){
  .cell{width:38px;height:38px;font-size:1rem;}
  .instr-slot,.replace-btn{width:44px;height:44px;font-size:1.3rem;}
  #game-title{font-size:1.8rem;}
}
</style>
</head>

  {rows:6,cols:7,walls:['2,2','2,3','2,4','4,1','4,2','4,3'],
   start:{r:0,c:0},target:{r:5,c:6},
   program:['вһЎпёҸ','вһЎпёҸ','вһЎпёҸ','в¬ҮпёҸ','в¬ҮпёҸ','вһЎпёҸ','вһЎпёҸ','вһЎпёҸ','в¬ҮпёҸ','в¬ҮпёҸ','вһЎпёҸ'],bugIndex:3,bugInstruction:'вһЎпёҸ'},
  // 8 - multi-obstacle
  {rows:6,cols:7,walls:['1,1','1,2','1,3','1,4','3,0','3,1','3,2','5,2','5,3','5,4'],
   start:{r:0,c:0},target:{r:4,c:6},
   program:['в¬ҮпёҸ','в¬ҮпёҸ','вһЎпёҸ','вһЎпёҸ','вһЎпёҸ','в¬ҮпёҸ','вһЎпёҸ','вһЎпёҸ','вһЎпёҸ','в¬ҮпёҸ'],bugIndex:2,bugInstruction:'в¬ҮпёҸ'},
  // 9 - expert 7x7
  {rows:7,cols:7,walls:['1,1','1,2','2,4','2,5','3,2','3,3','4,0','4,1','5,4','5,5','6,2'],
   start:{r:0,c:0},target:{r:6,c:6},
   program:['вһЎпёҸ','вһЎпёҸ','вһЎпёҸ','в¬ҮпёҸ','в¬ҮпёҸ','в¬…пёҸ','в¬ҮпёҸ','в¬ҮпёҸ','вһЎпёҸ','вһЎпёҸ','в¬ҮпёҸ','в¬ҮпёҸ','вһЎпёҸ'],bugIndex:5,bugInstruction:'в¬ҮпёҸ'}
];

var LS_KEY='pgrg_debogue_robot';
var lang=(navigator.language||'fr').startsWith('fr')?'fr':'en';
var muted=false;
var currentLevel=0;
var score=0;
var selectedSlot=-1;
var currentProgram=[];
var isFixed=false;
var isRunning=false;
var animTimeout=null;
var gateA=0,gateB=0;

function loadProgress(){
  try{
    var s=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if(typeof s.level==='number')currentLevel=Math.min(s.level,LEVELS.length-1);
    if(typeof s.score==='number')score=s.score;
    if(typeof s.lang==='string')lang=s.lang;
  }catch(e){}
}
function saveProgress(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({level:currentLevel,score:score,lang:lang}));}catch(e){}
}

function t(k){return T[lang][k]||T['fr'][k]||k;}

function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  renderTexts();
  if(document.getElementById('screen-game').classList.contains('active')){
    renderLevelUI();
    setFeedback(t('feedbackInit'),'info');
  }
  saveProgress();
}

function renderTexts(){
  document.getElementById('game-title').textContent=t('gameTitle');
  document.getElementById('game-subtitle').textContent=t('gameSubtitle');
  document.getElementById('play-btn').textContent=t('playBtn');
  document.getElementById('parents-link').textContent=t('parentsLink');
  document.getElementById('modal-title').textContent=t('modalTitle');
  document.getElementById('gate-btn').textContent=t('gateBtn');
  document.getElementById('parent-text').textContent=t('parentText');
  document.getElementById('run-btn').textContent=t('runBtn');
  document.getElementById('reset-btn').textContent=t('resetBtn');
  document.getElementById('home-btn').textContent=t('homeBtn');
  document.getElementById('win-replay').textContent=t('winReplay');
  document.getElementById('win-next').textContent=t('winNext');
  document.getElementById('win-home').textContent=t('winHome');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

function goHome(){
  clearRunAnim();
  showScreen('screen-title');
}

var audioCtx=null;
function getAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq,dur,type,vol){
  if(muted)return;
  type=type||'sine';vol=vol||0.15;
  try{
    var a=getAudio();
    var osc=a.createOscillator();
    var g=a.createGain();
    osc.connect(g);g.connect(a.destination);
    osc.type=type;osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    osc.start();osc.stop(a.currentTime+dur);
  }catch(e){}
}
function playClick(){playTone(600,0.08,'square',0.1);}
function playStep(){playTone(440,0.06,'sine',0.08);}
function playSuccess(){
  var notes=[523,659,784,1047];
  notes.forEach(function(f,i){setTimeout(function(){playTone(f,0.2,'sine',0.18);},i*90);});
}
function playFail(){
  [330,220].forEach(function(f,i){setTimeout(function(){playTone(f,0.25,'sawtooth',0.1);},i*130);});
}
function playFix(){playTone(880,0.15,'sine',0.15);}

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'рҹ”Ү':'рҹ”Ҡ';
}

function openParents(){
  gateA=2+Math.floor(Math.random()*8);
  gateB=2+Math.floor(Math.random()*8);
  document.getElementById('gate-label').textContent=t('gateLabel')+' '+gateA+' Г— '+gateB+' ?';
  document.getElementById('parent-answer').value='';
  document.getElementById('gate-error').textContent='';
  document.getElementById('parent-gate').style.display='flex';
  document.getElementById('parent-content').style.display='none';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('parent-answer').focus();
}
function checkGate(){
  var ans=parseInt(document.getElementById('parent-answer').value,10);
  if(ans===gateA*gateB){
    document.getElementById('parent-gate').style.display='none';
    document.getElementById('parent-content').style.display='block';
    document.getElementById('parent-text').textContent=t('parentText');
  }else{
    document.getElementById('gate-error').textContent=t('gateError');
    playFail();
  }
}
function closeParents(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('parent-answer').addEventListener('keydown',function(e){if(e.key==='Enter')checkGate();});
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===document.getElementById('modal-overlay'))closeParents();});

function startGame(){
  clearRunAnim();
  loadLevelData();
  showScreen('screen-game');
}

function loadLevelData(){
  var lv=LEVELS[currentLevel];
  currentProgram=lv.program.slice();
  currentProgram[lv.bugIndex]=lv.bugInstruction;
  selectedSlot=-1;
  isFixed=false;
  isRunning=false;
  renderAll();
}

function renderAll(){
  renderLevelUI();
  renderGrid(null,null,false,false);
  renderInstructions();
  document.getElementById('replace-panel').style.display='none';
  setFeedback(t('feedbackInit'),'info');
}

function renderLevelUI(){
  var titles=T[lang].levelTitles;
  document.getElementById('level-badge').textContent=t('levelLabel')+' '+(currentLevel+1);
  document.getElementById('level-title-txt').textContent=titles[currentLevel]||'';
  document.getElementById('score-display').textContent=t('scoreLabel')+': '+score;
  document.getElementById('win-title').textContent=t('winTitle');
  document.getElementById('win-subtitle-txt').textContent=t('winSubtitle');
}

function renderGrid(robotPos,trailSet,failed,succeeded){
  var lv=LEVELS[currentLevel];
  var grid=document.getElementById('grid');
  grid.style.gridTemplateColumns='repeat('+lv.cols+',auto)';
  grid.innerHTML='';
  for(var r=0;r<lv.rows;r++){
    for(var c=0;c<lv.cols;c++){
      var cell=document.createElement('div');
      cell.className='cell';
      var key=r+','+c;
      var isWall=lv.walls.indexOf(key)>=0;
      var isStart=r===lv.start.r&&c===lv.start.c;
      var isTarget=r===lv.target.r&&c===lv.target.c;
      var isRobot=robotPos&&robotPos.r===r&&robotPos.c===c;
      var isTrail=trailSet&&trailSet[key];
      if(isWall){cell.classList.add('wall');cell.textContent='рҹ§ұ';cell.setAttribute('aria-label','Mur');}
      else if(isRobot&&succeeded){cell.classList.add('success-cell');cell.textContent='рҹӨ–';}
      else if(isRobot&&failed){cell.classList.add('fail-cell');cell.textContent='рҹӨ–';}
      else if(isRobot){cell.classList.add('robot-here');cell.textContent='рҹӨ–';}
      else if(isTarget){cell.classList.add('target');cell.textContent='вӯҗ';cell.setAttribute('aria-label','Cible');}
      else if(isStart){cell.classList.add('start');cell.textContent='рҹҹў';cell.setAttribute('aria-label','DГ©part');}
      else if(isTrail){cell.classList.add('trail');}
      else{cell.classList.add('path');}
      grid.appendChild(cell);
    }
  }
}

function renderInstructions(){
  var lv=LEVELS[currentLevel];
  document.getElementById('instr-title').textContent=t('instrTitle');
  document.getElementById('instr-hint').textContent=t('instrHint');
  var list=document.getElementById('instr-list');
  list.innerHTML='';
  currentProgram.forEach(function(instr,i){
    var slot=document.createElement('div');
    slot.className='instr-slot';
    slot.setAttribute('role','listitem');
    slot.setAttribute('tabindex','0');
    slot.setAttribute('aria-label','Instruction '+(i+1)+': '+instr);
    var idx=document.createElement('span');
    idx.className='instr-idx';
    idx.textContent=i+1;
    slot.appendChild(idx);
    var em=document.createElement('span');
    em.textContent=instr;
    slot.appendChild(em);
    if(i===selectedSlot)slot.classList.add('selected');
    if(isFixed&&i===lv.bugIndex)slot.classList.add('fixed');
    slot.addEventListener('click',function(){selectSlot(i);});
    slot.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();selectSlot(i);}});
    list.appendChild(slot);
  });
}

function selectSlot(i){
  if(isRunning)return;
  if(isFixed){setFeedback(t('feedbackAlreadyFixed'),'warn');return;}
  playClick();
  selectedSlot=i;
  renderInstructions();
  renderReplacePanel();
}

function renderReplacePanel(){
  if(selectedSlot<0){document.getElementById('replace-panel').style.display='none';return;}
  document.getElementById('replace-title').textContent=t('replaceTitle');
  var opts=document.getElementById('replace-options');
  opts.innerHTML='';
  DIR_KEYS.forEach(function(d){
    var btn=document.createElement('button');
    btn.className='replace-btn';
    btn.setAttribute('role','listitem');
    btn.setAttribute('aria-label',d);
    btn.textContent=d;
    if(currentProgram[selectedSlot]===d)btn.classList.add('chosen');
    btn.addEventListener('click',function(){applyReplacement(d);});
    opts.appendChild(btn);
  });
  document.getElementById('replace-panel').style.display='block';
}

function applyReplacement(newInstr){
  if(isRunning)return;
  var lv=LEVELS[currentLevel];
  var old=currentProgram[selectedSlot];
  if(newInstr===old){setFeedback(t('feedbackNoBug'),'warn');return;}
  currentProgram[selectedSlot]=newInstr;
  var correct=lv.program;
  var ok=currentProgram.every(function(v,i){return v===correct[i];});
  if(ok){
    isFixed=true;
    playFix();
    setFeedback(t('feedbackFixed'),'success');
  }else{
    setFeedback(t('feedbackNoBug'),'warn');
    playFail();
  }
  renderInstructions();
  renderReplacePanel();
}

function runProgram(){
  if(isRunning)return;
  clearRunAnim();
  isRunning=true;
  var lv=LEVELS[currentLevel];
  var pos={r:lv.start.r,c:lv.start.c};
  var trail={};
  trail[pos.r+','+pos.c]=true;
  var step=0;
  setFeedback(t('feedbackRunning'),'info');
  renderGrid(pos,trail,false,false);

  function doStep(){
    if(step>=currentProgram.length){
      isRunning=false;
      var atTarget=pos.r===lv.target.r&&pos.c===lv.target.c;
      if(atTarget){
        renderGrid(pos,trail,false,true);
        playSuccess();
        score+=10+Math.max(0,(LEVELS.length-currentLevel));
        saveProgress();
        setTimeout(showWinScreen,700);
      }else{
        renderGrid(pos,trail,true,false);
        playFail();
        setFeedback(t('feedbackFail'),'error');
      }
      return;
    }
    var instr=currentProgram[step];
    var d=DIRS[instr];
    if(!d){step++;animTimeout=setTimeout(doStep,300);return;}
    var nr=pos.r+d.r,nc=pos.c+d.c;
    var wallKey=nr+','+nc;
    if(nr<0||nr>=lv.rows||nc<0||nc>=lv.cols||lv.walls.indexOf(wallKey)>=0){
      isRunning=false;
      renderGrid(pos,trail,true,false);
      playFail();
      setFeedback(t('feedbackFail'),'error');
      return;
    }
    pos={r:nr,c:nc};
    trail[pos.r+','+pos.c]=true;
    playStep();
    renderGrid(pos,trail,false,false);
    step++;
    animTimeout=setTimeout(doStep,340);
  }
  doStep();
}

function clearRunAnim(){
  if(animTimeout){clearTimeout(animTimeout);animTimeout=null;}
  isRunning=false;
}

function setFeedback(msg,type){
  var el=document.getElementById('feedback-area');
  el.textContent=msg;
  el.className='';
  el.setAttribute('class',type);
  el.id='feedback-area';
}

function showWinScreen(){
  renderLevelUI();
  var stars=currentLevel<3?'вӯҗ':currentLevel<6?'вӯҗвӯҗ':'вӯҗвӯҗвӯҗ';
  document.getElementById('win-stars').textContent=stars;
  document.getElementById('win-title').textContent=t('winTitle');
  document.getElementById('win-subtitle-txt').textContent=t('winSubtitle');
  document.getElementById('win-next').style.display=currentLevel<LEVELS.length-1?'':'none';
  showScreen('screen-win');
}

function nextLevel(){
  if(currentLevel<LEVELS.length-1){
    currentLevel++;
    saveProgress();
    startGame();
  }else{
    goHome();
  }
}

function resetLevel(){
  clearRunAnim();
  loadLevelData();
  showScreen('screen-game');
}

loadProgress();
setLang(lang);
renderTexts();
</script>
