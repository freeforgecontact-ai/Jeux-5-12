*{box-sizing:border-box;margin:0;padding:0;}

.screen.active{display:block;}
#title-screen{text-align:center;padding-top:24px;}
.game-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2.4rem;font-weight:700;color:var(--blue);text-shadow:2px 3px 0 #b3d9f7;margin:.5rem 0 .2rem;}
.game-subtitle{color:var(--slate);font-size:1.05rem;margin-bottom:1.5rem;}
.btn-play{background:var(--orange);color:#fff;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.4rem;font-weight:700;border:none;border-radius:50px;padding:14px 48px;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;margin:.5rem;display:inline-block;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-secondary{background:var(--blue);color:#fff;font-size:1rem;font-weight:700;border:none;border-radius:50px;padding:10px 28px;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);transition:transform .1s,box-shadow .1s;margin:.4rem;display:inline-block;}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
.parent-link{display:inline-block;margin-top:1rem;color:var(--slate);font-size:.9rem;cursor:pointer;text-decoration:underline;}
#parent-gate{position:fixed;inset:0;background:rgba(15,23,42,.7);display:none;align-items:center;justify-content:center;z-index:9999;}
#parent-gate.open{display:flex;}
.gate-box{background:#fff;border-radius:20px;padding:30px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.gate-box h2{color:var(--blue);margin-bottom:.8rem;}
.gate-box input{border:2px solid var(--sky);border-radius:12px;padding:10px;font-size:1.2rem;text-align:center;width:100%;margin:.5rem 0;}
.gate-error{color:#e22;font-size:.9rem;min-height:1.2em;}
#scene-container{position:relative;width:100%;border-radius:18px;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.18);touch-action:none;user-select:none;}
#scene-svg{width:100%;height:auto;display:block;}
#checklist-panel{background:#fff;border-radius:16px;padding:14px;margin-top:12px;box-shadow:0 3px 14px rgba(0,0,0,.1);}
#checklist-panel h3{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;color:var(--blue);font-size:1.1rem;margin-bottom:8px;}
#checklist{display:flex;flex-wrap:wrap;gap:8px;}
.chk-item{display:flex;align-items:center;gap:6px;background:var(--sky-light);border:2px solid var(--sky);border-radius:30px;padding:6px 14px;font-size:1rem;font-weight:700;transition:background .3s;}

#hud{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}

#progress-bar-outer{flex:1;min-width:80px;background:#dbeeff;border-radius:20px;height:14px;overflow:hidden;}

.stars-row{font-size:3rem;letter-spacing:4px;margin:1rem 0;}
.success-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2rem;color:var(--orange);font-weight:700;}
.found-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;font-weight:700;background:#ffffffdd;border-radius:20px;padding:12px 28px;pointer-events:none;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;color:var(--success);box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:1000;animation:popIn .7s forwards;}

.found-ring{stroke:#34c77b;stroke-width:6;fill:none;rx:14;stroke-dasharray:999;stroke-dashoffset:999;animation:drawRing .5s ease forwards;pointer-events:none;}
@keyframes drawRing{to{stroke-dashoffset:0;}}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}

function getACtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playTone(freq,type,dur,vol){
  vol=vol||0.18;
  if(muted)return;
  try{
    var ctx=getACtx(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function soundFound(){playTone(523,'sine',.12);setTimeout(function(){playTone(659,'sine',.12);},100);setTimeout(function(){playTone(784,'sine',.2);},200);}

/* SVG HELPERS */
var SVG_NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs,parent){
  var e=document.createElementNS(SVG_NS,tag);
  Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k]);});
  if(parent)parent.appendChild(e);
  return e;
}

/* SCENE BUILDERS */
function buildScene(si,tgts){
  var svg=document.getElementById('scene-svg');
  svg.innerHTML='';
  if(si===0)drawForest(svg,tgts);
  else if(si===1)drawCity(svg,tgts);
  else drawBeach(svg,tgts);
}

function drawCloud(svg,cx,cy,rw,rh){
  var g=svgEl('g',{},svg);
  svgEl('ellipse',{cx:cx,cy:cy,rx:rw,ry:rh,fill:'#ffffffcc'},g);
  svgEl('ellipse',{cx:cx-rw*.35,cy:cy+rh*.1,rx:rw*.55,ry:rh*.75,fill:'#ffffffcc'},g);
  svgEl('ellipse',{cx:cx+rw*.35,cy:cy+rh*.1,rx:rw*.55,ry:rh*.75,fill:'#ffffffcc'},g);
}
function drawTree(svg,cx,baseY,sc){
  sc=sc||1;
  var h=140*sc,tw=70*sc;
  svgEl('rect',{x:cx-8*sc,y:baseY,width:16*sc,height:50*sc,fill:'#7a5230'},svg);
  svgEl('polygon',{points:cx+','+(baseY-h)+' '+(cx-tw)+','+(baseY-h*.35)+' '+(cx+tw)+','+(baseY-h*.35),fill:'#2d8a3e'},svg);
  svgEl('polygon',{points:cx+','+(baseY-h*.75)+' '+(cx-tw*.85)+','+(baseY-h*.2)+' '+(cx+tw*.85)+','+(baseY-h*.2),fill:'#3da34e'},svg);
  svgEl('polygon',{points:cx+','+(baseY-h*.5)+' '+(cx-tw*.7)+','+baseY+' '+(cx+tw*.7)+','+baseY,fill:'#4dbb5e'},svg);
}
function drawBush(svg,cx,cy){
  svgEl('ellipse',{cx:cx,cy:cy,rx:40,ry:22,fill:'#3a8a2e'},svg);
  svgEl('ellipse',{cx:cx-25,cy:cy+4,rx:25,ry:18,fill:'#4da03e'},svg);
  svgEl('ellipse',{cx:cx+25,cy:cy+4,rx:25,ry:18,fill:'#4da03e'},svg);
}
function drawSmallFlower(svg,x,y){
  var cols=['#ff8','#f9a','#aff','#f7c'];
  cols.forEach(function(c,i){var a=i*90*Math.PI/180;svgEl('circle',{cx:x+Math.cos(a)*8,cy:y+Math.sin(a)*8,r:5,fill:c},svg);});
  svgEl('circle',{cx:x,cy:y,r:4,fill:'#ffd23f'},svg);
}
function drawBird(svg,x,y){
  svgEl('path',{d:'M'+x+','+y+' Q'+(x+10)+','+(y-8)+' '+(x+20)+','+y+' Q'+(x+10)+','+(y-4)+' '+x+','+y,fill:'#333'},svg);
}

function drawForest(svg,tgts){
  svgEl('rect',{x:0,y:0,width:800,height:480,fill:'#87ceeb'},svg);
  svgEl('circle',{cx:720,cy:70,r:55,fill:'#ffd23f'},svg);
  drawCloud(svg,100,60,110,50);
  drawCloud(svg,350,42,130,55);
  drawCloud(svg,560,80,100,45);
  svgEl('rect',{x:0,y:330,width:800,height:150,fill:'#5a9c3a'},svg);
  svgEl('rect',{x:0,y:380,width:800,height:100,fill:'#4a8a2a'},svg);
  svgEl('ellipse',{cx:400,cy:420,rx:120,ry:40,fill:'#c4a265'},svg);
  var trees=[[60,150],[160,120],[260,160],[500,140],[600,120],[700,155],[50,240],[700,250],[130,310],[640,310]];
  trees.forEach(function(p){drawTree(svg,p[0],p[1],.8+Math.random()*.3);});
  [[200,342],[350,352],[500,347],[650,342]].forEach(function(p){drawBush(svg,p[0],p[1]);});
  [[250,90],[280,75],[580,55],[605,65]].forEach(function(p){drawBird(svg,p[0],p[1]);});
  [[230,370],[320,367],[420,374],[550,370],[700,365]].forEach(function(p){drawSmallFlower(svg,p[0],p[1]);});
  svgEl('ellipse',{cx:350,cy:300,rx:15,ry:8,fill:'#33333322'},svg);
  svgEl('ellipse',{cx:600,cy:290,rx:12,ry:6,fill:'#33333322'},svg);
  placeTargets(svg,tgts);
}

function drawBuilding(svg,x,top,w,h,fill,dark){
  svgEl('rect',{x:x,y:top,width:w,height:h,fill:fill,rx:4},svg);
  svgEl('rect',{x:x,y:top,width:w,height:16,fill:dark,rx:4},svg);
  var rows=Math.floor((h-30)/45),cols=Math.floor(w/38);
  for(var r=0;r<rows;r++){for(var c=0;c<cols;c++){
    var lit=(r+c)%3!==0;
    svgEl('rect',{x:x+c*38+12,y:top+22+r*45,width:18,height:22,fill:lit?'#ffd23f80':'#fff5',rx:3},svg);
  }}
}
function drawLamp(svg,x,y){
  svgEl('line',{x1:x,y1:y,x2:x,y2:y-60,stroke:'#555','stroke-width':4},svg);
  svgEl('line',{x1:x,y1:y-60,x2:x+20,y2:y-60,stroke:'#555','stroke-width':4},svg);
  svgEl('circle',{cx:x+20,cy:y-60,r:8,fill:'#ffd23f'},svg);
}
function drawPotTree(svg,x,y){
  svgEl('rect',{x:x-10,y:y-20,width:20,height:20,fill:'#8B4513',rx:3},svg);
  svgEl('circle',{cx:x,cy:y-35,r:22,fill:'#3da34e'},svg);
}

function drawCity(svg,tgts){
  svgEl('rect',{x:0,y:0,width:800,height:480,fill:'#d0eaff'},svg);
  svgEl('circle',{cx:680,cy:80,r:45,fill:'#ffd23f'},svg);
  drawCloud(svg,150,70,100,42);
  drawCloud(svg,450,50,120,50);
  svgEl('rect',{x:0,y:370,width:800,height:110,fill:'#888'},svg);
  svgEl('rect',{x:0,y:360,width:800,height:15,fill:'#aaa'},svg);
  for(var i=0;i<8;i++)svgEl('rect',{x:80+i*100,y:415,width:60,height:10,fill:'#fff9',rx:4},svg);
  drawBuilding(svg,30,100,120,270,'#7ec3ee','#5ba0cc');
  drawBuilding(svg,165,60,100,310,'#f97316','#ea580c');
  drawBuilding(svg,275,130,110,240,'#0f4c81','#0a3559');
  drawBuilding(svg,395,80,90,290,'#34c77b','#28a060');
  drawBuilding(svg,495,110,105,260,'#ffd23f','#e5b800');
  drawBuilding(svg,610,50,120,320,'#cc0077','#990055');
  drawBuilding(svg,740,140,60,230,'#888','#666');
  [[200,365],[450,365],[620,365]].forEach(function(p){drawLamp(svg,p[0],p[1]);});
  [[90,360],[380,360],[700,360]].forEach(function(p){drawPotTree(svg,p[0],p[1]);});
  placeTargets(svg,tgts);
}

function drawPalm(svg,x,baseY){
  svgEl('path',{d:'M'+x+','+baseY+' Q'+(x+20)+','+(baseY-60)+' '+(x+10)+','+(baseY-130),stroke:'#7a5230','stroke-width':14,fill:'none','stroke-linecap':'round'},svg);
  var leaves=[[-70,-20],[-40,-50],[0,-60],[40,-50],[65,-20],[30,-5],[-30,-5]];
  leaves.forEach(function(l){svgEl('path',{d:'M'+(x+10)+','+(baseY-130)+' Q'+(x+10+l[0]/2)+','+(baseY-130+l[1]/2)+' '+(x+10+l[0])+','+(baseY-130+l[1]),stroke:'#4da03e','stroke-width':9,fill:'none','stroke-linecap':'round'},svg);});
  svgEl('circle',{cx:x+10,cy:baseY-128,r:7,fill:'#7a5230'},svg);
}
function drawUmbrella(svg,x,y,col){
  svgEl('line',{x1:x,y1:y,x2:x,y2:y+80,stroke:'#a0522d','stroke-width':5},svg);
  svgEl('path',{d:'M'+(x-60)+','+y+' Q'+x+','+(y-40)+' '+(x+60)+','+y,fill:col,stroke:'#000','stroke-width':1.5},svg);
  svgEl('path',{d:'M'+(x-60)+','+y+' Q'+x+','+(y+10)+' '+(x+60)+','+y,fill:col+'bb'},svg);
}
function drawBeach(svg,tgts){
  var defs=svgEl('defs',{},svg);
  var grad=document.createElementNS(SVG_NS,'linearGradient');
  grad.setAttribute('id','skyG');grad.setAttribute('x1','0');grad.setAttribute('y1','0');grad.setAttribute('x2','0');grad.setAttribute('y2','1');
  var s1=document.createElementNS(SVG_NS,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color','#4fc3f7');
  var s2=document.createElementNS(SVG_NS,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color','#b3e5fc');
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);
  svgEl('rect',{x:0,y:0,width:800,height:480,fill:'url(#skyG)'},svg);
  svgEl('circle',{cx:700,cy:80,r:55,fill:'#ffd23f'},svg);
  svgEl('circle',{cx:700,cy:80,r:45,fill:'#ffec5c'},svg);
  for(var i=0;i<8;i++){var a=i*45*Math.PI/180;svgEl('line',{x1:700+Math.cos(a)*56,y1:80+Math.sin(a)*56,x2:700+Math.cos(a)*76,y2:80+Math.sin(a)*76,stroke:'#ffd23f','stroke-width':4,'stroke-linecap':'round'},svg);}
  drawCloud(svg,120,60,110,48);
  drawCloud(svg,380,45,130,52);
  svgEl('rect',{x:0,y:200,width:800,height:220,fill:'#0288d1'},svg);
  svgEl('ellipse',{cx:400,cy:200,rx:500,ry:30,fill:'#0288d1'},svg);
  for(var w=0;w<4;w++){var wx=w*200;svgEl('path',{d:'M'+wx+','+(230+w*18)+' Q'+(wx+55)+','+(215+w*18)+' '+(wx+110)+','+(230+w*18)+' Q'+(wx+165)+','+(245+w*18)+' '+(wx+220)+','+(230+w*18),stroke:'#fff','stroke-width':3,fill:'none','stroke-opacity':.5},svg);}
  svgEl('rect',{x:0,y:330,width:800,height:150,fill:'#f5c64a'},svg);
  svgEl('ellipse',{cx:400,cy:330,rx:500,ry:28,fill:'#f5c64a'},svg);
  svgEl('rect',{x:0,y:390,width:800,height:90,fill:'#e8b830'},svg);
  drawUmbrella(svg,150,300,'#e22222');
  drawUmbrella(svg,500,295,'#0f4c81');
  drawUmbrella(svg,670,305,'#f97316');
  drawPalm(svg,80,200);
  drawPalm(svg,720,210);
  svgEl('ellipse',{cx:350,cy:230,rx:25,ry:12,fill:'#888'},svg);
  svgEl('ellipse',{cx:550,cy:250,rx:18,ry:9,fill:'#999'},svg);
  /* small shells & rocks on sand */
  [[200,350],[450,360],[600,345]].forEach(function(p){svgEl('ellipse',{cx:p[0],cy:p[1],rx:8,ry:5,fill:'#e0c88a'},svg);});
  placeTargets(svg,tgts);
}

function placeTargets(svg,tgts){
  tgts.forEach(function(tgt){
    var g=svgEl('g',{'data-id':tgt.id,style:'cursor:pointer;',role:'button',tabindex:'0','aria-label':lang==='fr'?tgt.labelFr:tgt.labelEn},svg);
    svgEl('rect',{x:tgt.x-6,y:tgt.y-6,width:tgt.w+12,height:tgt.h+12,fill:'transparent',rx:12,'stroke':'none'},g);
    var fo=document.createElementNS(SVG_NS,'foreignObject');
    fo.setAttribute('x',tgt.x);fo.setAttribute('y',tgt.y);
    fo.setAttribute('width',tgt.w);fo.setAttribute('height',tgt.h);
    var div=document.createElement('div');
    div.style.cssText='font-size:'+Math.round(tgt.w*.78)+'px;line-height:1;user-select:none;pointer-events:none;';
    div.textContent=tgt.emoji;
    fo.appendChild(div);g.appendChild(fo);
    g.addEventListener('click',function(){onTargetClick(tgt.id);});
    g.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' ')onTargetClick(tgt.id);});
  });
}

function onTargetClick(id){
  var tgt=null;
  for(var i=0;i<targets.length;i++){if(targets[i].id===id){tgt=targets[i];break;}}
  if(!tgt||tgt.found)return;
  tgt.found=true;
  foundCount++;
  soundFound();
  showFoundFlash();
  drawFoundRing(tgt);
  var g=document.querySelector('[data-id="'+id+'"]');
  if(g)g.style.pointerEvents='none';
  updateChecklist();
  updateProgressBar();
  announce((lang==='fr'?tgt.labelFr:tgt.labelEn)+' — '+t('found'));
  if(foundCount===targets.length)setTimeout(showSuccess,800);
}

function drawFoundRing(tgt){
  var svg=document.getElementById('scene-svg');
  var rect=svgEl('rect',{x:tgt.x-8,y:tgt.y-8,width:tgt.w+16,height:tgt.h+16,rx:16,fill:'none',stroke:'#34c77b','stroke-width':6,'stroke-dasharray':999,'stroke-dashoffset':999},svg);
  rect.style.animation='drawRing .5s ease forwards';
  /* add inline keyframe via style */
  if(!document.getElementById('ringKf')){
    var s=document.createElement('style');s.id='ringKf';
    s.textContent='@keyframes drawRing{to{stroke-dashoffset:0;}}';
    document.head.appendChild(s);
  }
}

function showFoundFlash(){
  var f=document.createElement('div');
  f.className='found-flash';
  f.textContent='✅ '+t('found')+'!';
  document.body.appendChild(f);
  setTimeout(function(){if(f.parentNode)f.parentNode.removeChild(f);},750);
}

function renderChecklist(){
  var cl=document.getElementById('checklist');
  cl.innerHTML='';
  targets.forEach(function(tgt){
    var div=document.createElement('div');
    div.className='chk-item'+(tgt.found?' found':'');
    div.dataset.id=tgt.id;
    div.innerHTML='<span class="tick">'+(tgt.found?'✅':'🔍')+'</span><span>'+tgt.emoji+'</span><span class="chk-label">'+(lang==='fr'?tgt.labelFr:tgt.labelEn)+'</span>';
    cl.appendChild(div);
  });
}
function updateChecklist(){
  document.querySelectorAll('.chk-item').forEach(function(el){
    var id=el.dataset.id;
    var tgt=null;for(var i=0;i<targets.length;i++){if(targets[i].id===id){tgt=targets[i];break;}}
    if(tgt&&tgt.found){el.classList.add('found');el.querySelector('.tick').textContent='✅';}
  });
}
function updateProgressBar(){
  var pct=targets.length?Math.round(foundCount/targets.length*100):0;
  document.getElementById('progress-bar').style.width=pct+'%';
}

function showSuccess(){
  soundWin();
  var prog=loadProgress();
  var nextLv=Math.min(currentLevel+1,LEVELS.length-1);
  if((prog.level||0)<=currentLevel)saveProgress({level:nextLv});
  document.getElementById('stars-row').textContent='⭐⭐⭐';
  document.getElementById('t-found-all').textContent=t('foundAll');
  document.getElementById('t-bravo').textContent=t('bravo');
  var btns=document.getElementById('level-buttons');
  btns.innerHTML='';
  var r=document.createElement('button');r.className='btn-secondary';r.textContent=t('replay');
  r.onclick=function(){loadLevel(currentLevel);showScreen('game-screen');};
  btns.appendChild(r);
  if(currentLevel<LEVELS.length-1){
    var n=document.createElement('button');n.className='btn-play';n.textContent=t('nextLevel');
    n.onclick=function(){loadLevel(currentLevel+1);showScreen('game-screen');};
    btns.appendChild(n);
  }
  var h=document.createElement('button');h.className='btn-secondary';h.textContent=t('home');
  h.onclick=function(){showScreen('title-screen');};
  btns.appendChild(h);
  showScreen('success-screen');
  announce(t('bravo')+' — '+t('foundAll'));
}

function startGame(){
  var prog=loadProgress();
  currentLevel=Math.min(prog.level||0,LEVELS.length-1);
  showScreen('game-screen');
  loadLevel(currentLevel);
}

function loadLevel(idx){
  currentLevel=idx;
  var lvl=LEVELS[idx];
  targets=lvl.targets.map(function(tg){return {id:tg.id,emoji:tg.emoji,labelFr:tg.labelFr,labelEn:tg.labelEn,x:tg.x,y:tg.y,w:tg.w,h:tg.h,found:false};});
  foundCount=0;
  updateProgressBar();
  document.getElementById('level-label').textContent=t('levelWord')+' '+(idx+1)+' / '+LEVELS.length;
  buildScene(lvl.scene,targets);
  renderChecklist();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  renderUI();
}

function renderUI(){
  document.getElementById('t-title').innerHTML=t('title');
  document.getElementById('t-subtitle').textContent=t('subtitle').replace(/&amp;/g,'&');
  document.getElementById('t-play').textContent=t('play');
  document.getElementById('t-parents').textContent=t('parents');
  document.getElementById('gate-title').textContent=t('gateTitle');
  document.getElementById('t-gate-ok').textContent=t('gateOk');
  document.getElementById('t-gate-close').textContent=t('gateClose');
  document.getElementById('t-find').textContent=t('find');
  document.getElementById('t-bravo').textContent=t('bravo');
  var fa=document.getElementById('t-found-all');if(fa)fa.textContent=t('foundAll');
  var ll=document.getElementById('level-label');
  if(ll&&targets.length)ll.textContent=t('levelWord')+' '+(currentLevel+1)+' / '+LEVELS.length;
  document.querySelectorAll('.chk-item').forEach(function(el){
    var id=el.dataset.id;var tgt=null;
    for(var i=0;i<targets.length;i++){if(targets[i].id===id){tgt=targets[i];break;}}
    if(tgt){var lbl=el.querySelector('.chk-label');if(lbl)lbl.textContent=lang==='fr'?tgt.labelFr:tgt.labelEn;}
  });
}

/* PARENT GATE */
function openParentGate(){
  gateA=Math.floor(Math.random()*9)+2;gateB=Math.floor(Math.random()*9)+2;
  document.getElementById('t-gate-q').textContent=t('gateQ')+' '+gateA+' × '+gateB+' = ?';
  document.getElementById('gate-input').value='';
  document.getElementById('gate-error').textContent='';
  document.getElementById('parent-info').style.display='none';
  document.getElementById('parent-gate').classList.add('open');
  setTimeout(function(){document.getElementById('gate-input').focus();},100);
}
function closeParentGate(){document.getElementById('parent-gate').classList.remove('open');}
function checkGate(){
  var val=parseInt(document.getElementById('gate-input').value,10);
  if(val===gateA*gateB){
    document.getElementById('gate-error').textContent='';
    var info=document.getElementById('parent-info');
    info.innerHTML=T[lang].parentInfo;
    info.style.display='block';
  } else {
    soundWrong();
    document.getElementById('gate-error').textContent=t('gateWrong');
    gateA=Math.floor(Math.random()*9)+2;gateB=Math.floor(Math.random()*9)+2;
    document.getElementById('t-gate-q').textContent=t('gateQ')+' '+gateA+' × '+gateB+' = ?';
    document.getElementById('gate-input').value='';
  }
}
document.getElementById('gate-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkGate();});

renderUI();
</script>
</body>
