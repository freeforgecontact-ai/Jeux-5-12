<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Machine à Voyager dans le Temps / Time Machine — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;--orange:#f97316;
  --orange-dark:#ea580c;--gold:#ffd23f;--sky:#7ec3ee;--sky-light:#eaf6ff;
  --slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(135deg,var(--sky-light) 0%,#d0ecff 100%);min-height:100vh;color:var(--navy);}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{display:flex;align-items:center;justify-content:space-between;background:var(--blue);color:#fff;padding:8px 16px;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
#topbar .brand{display:flex;align-items:center;gap:8px;font-family:'Fredoka','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700;}
#topbar .controls{display:flex;gap:6px;align-items:center;}
button{cursor:pointer;border:none;border-radius:12px;font-family:inherit;font-size:1rem;}
.btn-lang{background:rgba(255,255,255,0.18);color:#fff;padding:6px 14px;border-radius:10px;font-weight:700;min-width:48px;min-height:48px;transition:background .2s;}
.btn-lang.active,.btn-lang:hover{background:var(--orange);}
.btn-mute{background:rgba(255,255,255,0.18);color:#fff;padding:6px 10px;border-radius:10px;font-size:1.3rem;min-width:48px;min-height:48px;}
.btn-mute:hover{background:rgba(255,255,255,0.3);}
.screen{display:none;flex-direction:column;align-items:center;padding:20px 12px;min-height:calc(100vh - 60px);}
.screen.active{display:flex;}
#screen-title{justify-content:center;gap:18px;text-align:center;}
.title-main{font-size:clamp(1.6rem,5vw,2.4rem);color:var(--blue);line-height:1.2;}
.title-sub{font-size:1.1rem;color:var(--slate);max-width:400px;}
.btn-play{background:var(--orange);color:#fff;font-size:1.3rem;font-weight:800;padding:16px 48px;border-radius:18px;box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;min-height:60px;min-width:180px;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{background:none;color:var(--blue);text-decoration:underline;font-size:.95rem;padding:8px;border-radius:8px;}
#screen-parents{justify-content:center;gap:16px;max-width:480px;margin:0 auto;text-align:center;}
.parent-card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 4px 18px rgba(15,76,129,.12);width:100%;max-width:440px;}
#parent-question{font-size:1.4rem;color:var(--blue);font-weight:700;margin:12px 0;}
#parent-input{font-size:1.2rem;padding:10px 16px;border:2px solid var(--sky);border-radius:12px;text-align:center;width:120px;font-family:inherit;}
#parent-error{color:#e53e3e;font-size:.95rem;min-height:20px;}
.btn-secondary{background:var(--blue);color:#fff;padding:12px 28px;border-radius:14px;box-shadow:0 4px 0 var(--blue-dark);font-weight:700;min-height:48px;}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
.info-parents{text-align:left;color:var(--slate);font-size:.95rem;line-height:1.6;}
.info-parents strong{color:var(--navy);}
#screen-levels{justify-content:flex-start;gap:20px;padding-top:30px;align-items:center;}
.level-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:700px;}
.level-card{background:#fff;border-radius:18px;padding:24px 20px;text-align:center;box-shadow:0 4px 16px rgba(15,76,129,.12);min-width:160px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:3px solid transparent;}
.level-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(15,76,129,.18);}
.level-card.unlocked{border-color:var(--sky);}
.level-card.completed{border-color:var(--success);}
.level-card.locked{opacity:.5;cursor:not-allowed;}
.level-icon{font-size:2.4rem;margin-bottom:8px;}
.level-name{font-size:1.1rem;font-weight:800;color:var(--blue);}
.level-desc{font-size:.85rem;color:var(--slate);margin-top:4px;}
.level-stars{font-size:1.2rem;margin-top:6px;min-height:24px;}
#screen-game{align-items:stretch;gap:12px;max-width:900px;margin:0 auto;width:100%;}
.game-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.game-info{display:flex;gap:12px;align-items:center;}
.score-box{background:var(--blue);color:#fff;border-radius:10px;padding:6px 14px;font-weight:700;font-size:1rem;}
.progress-bar-wrap{flex:1;max-width:200px;background:#c8e8f8;border-radius:8px;height:12px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--orange);border-radius:8px;transition:width .4s;}
.btn-home{background:var(--blue-dark);color:#fff;padding:8px 16px;border-radius:10px;font-size:.9rem;min-height:48px;}
.event-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 14px rgba(15,76,129,.12);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:grab;user-select:none;touch-action:none;transition:box-shadow .2s,transform .15s;min-height:140px;min-width:140px;}
.event-card:hover,.event-card.dragging{box-shadow:0 10px 28px rgba(15,76,129,.22);transform:scale(1.04);}
.event-card.dragging{cursor:grabbing;z-index:200;opacity:.9;}
.event-emoji{font-size:2.6rem;}
.event-title{font-size:1rem;font-weight:700;color:var(--navy);text-align:center;line-height:1.2;}
.event-info{font-size:.78rem;color:var(--slate);text-align:center;line-height:1.3;}
#cards-pool{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;min-height:160px;padding:16px;background:rgba(126,195,238,.15);border-radius:16px;border:2px dashed var(--sky);}
#timeline-slots{display:flex;align-items:flex-start;gap:12px;overflow-x:auto;padding:16px 8px;min-height:200px;}
.timeline-slot{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:140px;}
.slot-drop{width:140px;min-height:140px;border:3px dashed var(--sky);border-radius:16px;background:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--sky);transition:background .2s,border-color .2s;position:relative;flex-direction:column;}
.slot-drop.over{background:rgba(126,195,238,.35);border-color:var(--orange);}
.slot-drop.filled{border-style:solid;border-color:var(--success);}
.slot-position{font-size:.75rem;color:var(--slate);font-weight:700;text-align:center;}
.position-arrow{font-size:1.2rem;color:var(--blue);}
#feedback-banner{text-align:center;padding:14px 20px;border-radius:14px;font-size:1.1rem;font-weight:700;transition:opacity .3s;min-height:52px;display:flex;align-items:center;justify-content:center;gap:8px;}
#feedback-banner.hidden{opacity:0;pointer-events:none;}
#feedback-banner.ok{background:#d1fae5;color:#065f46;}
#feedback-banner.err{background:#fee2e2;color:#991b1b;}
#aria-live{position:absolute;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;}
#screen-result{justify-content:center;gap:20px;text-align:center;padding-top:40px;}
.stars-row{font-size:3rem;letter-spacing:6px;}
.result-title{font-size:2rem;color:var(--blue);font-weight:800;}
.result-score{font-size:1.1rem;color:var(--slate);}
.result-buttons{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn-action{background:var(--orange);color:#fff;padding:14px 28px;border-radius:16px;font-size:1.1rem;font-weight:800;box-shadow:0 5px 0 var(--orange-dark);min-height:52px;}
.btn-action:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
#info-popup{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;}
#info-popup.hidden{display:none;}
.popup-card{background:#fff;border-radius:20px;padding:24px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center;}
.popup-emoji{font-size:3rem;margin-bottom:8px;}
.popup-title{font-size:1.4rem;font-weight:800;color:var(--navy);}
.popup-year{font-size:1rem;color:var(--orange);font-weight:700;margin:4px 0 12px;}
.popup-text{font-size:.95rem;color:var(--slate);line-height:1.6;}
.btn-popup-close{margin-top:16px;background:var(--blue);color:#fff;padding:12px 32px;border-radius:14px;font-weight:700;font-size:1rem;min-height:48px;box-shadow:0 4px 0 var(--blue-dark);}
#mode-order{display:none;flex-direction:column;gap:16px;width:100%;}
#mode-order.active{display:flex;}
.order-instruction{text-align:center;color:var(--slate);font-size:.95rem;}
#btn-check-order{background:var(--orange);color:#fff;font-size:1.1rem;font-weight:800;padding:12px 32px;border-radius:16px;box-shadow:0 5px 0 var(--orange-dark);min-height:52px;align-self:center;min-width:180px;}
#btn-check-order:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
@media(max-width:600px){
  .level-cards{flex-direction:column;align-items:center;}
  #timeline-slots{flex-direction:column;align-items:center;}
  .slot-drop{width:100%;max-width:280px;}
  .event-card{min-width:110px;}
}
</style>
</head>

// ===== STATE =====
const STORAGE_KEY='pgrg_machine_temps';
let lang=navigator.language.startsWith('fr')?'fr':'en';
let muted=false;
let state={stars:[0,0,0]};

let currentLevelIdx=null;
let currentCards=[];
let slots=[];
let score=0;

let dragCard=null;
let dragOrigin=null;
let dragClone=null;
let dragOffX=0,dragOffY=0;
let touchEv=null,touchSlotOrigin=null;

let parentA=0,parentB=0;

// ===== UTILS =====
function t(k){return T[lang][k]||k;}
function formatYear(y){
  if(y<0)return lang==='fr'?`${Math.abs(y).toLocaleString()} av. J.-C.`:`${Math.abs(y).toLocaleString()} BC`;
  if(y<500)return lang==='fr'?`an ${y}`:`year ${y}`;
  return `${y}`;
}
function announce(msg){const el=document.getElementById('aria-live');el.textContent='';setTimeout(()=>{el.textContent=msg;},60);}

// ===== AUDIO =====
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,vol,dur,type='sine'){
  if(muted)return;
  try{const c=getCtx();const o=c.createOscillator();const g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  o.start(c.currentTime);o.stop(c.currentTime+dur);}catch(e){}
}
function playSuccess(){if(muted)return;[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.07,.3),i*130));}
function toggleMute(){muted=!muted;document.getElementById('btn-mute').textContent=muted?'🔇':'🔊';}

// ===== PERSISTENCE =====
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s&&s.stars)state=s;}catch(e){}}

// ===== LANG =====
function setLang(l){lang=l;document.getElementById('btn-fr').classList.toggle('active',l==='fr');document.getElementById('btn-en').classList.toggle('active',l==='en');renderCurrentScreen();}
function renderCurrentScreen(){
  const ids=['title','parents','levels','game','result'];
  let cur='title';
  ids.forEach(id=>{if(document.getElementById('screen-'+id).classList.contains('active'))cur=id;});
  if(cur==='title')renderTitle();
  else if(cur==='parents')renderParents();
  else if(cur==='levels')renderLevels();
  else if(cur==='game'){renderGameLabels();if(currentLevelIdx!==null)renderOrderMode();}
  else if(cur==='result')renderResultLabels();
}

// ===== SCREENS =====
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}
function goTitle(){showScreen('title');renderTitle();}
function goLevels(){showScreen('levels');renderLevels();}

function renderTitle(){
  document.getElementById('title-h1').textContent=t('title');
  document.getElementById('title-sub').textContent=t('subtitle');
  document.getElementById('btn-play').textContent=t('play');
  document.getElementById('btn-parents').textContent=t('parents');
}

function openParents(){
  parentA=Math.floor(Math.random()*9)+2;parentB=Math.floor(Math.random()*9)+2;
  document.getElementById('parent-info').style.display='none';
  document.getElementById('parent-input').value='';
  document.getElementById('parent-error').textContent='';
  showScreen('parents');renderParents();
}
function renderParents(){
  document.getElementById('parent-title').textContent=t('parentTitle');
  document.getElementById('parent-question').textContent=`${t('parentQ')} ${parentA} × ${parentB} ?`;
  document.getElementById('btn-parent-check').textContent=t('parentCheck');
  document.getElementById('parent-info-text').innerHTML=t('parentInfo');
  document.getElementById('btn-parent-back').textContent=t('parentBack');
}
function checkParent(){
  const val=parseInt(document.getElementById('parent-input').value);
  if(val===parentA*parentB){document.getElementById('parent-info').style.display='block';document.getElementById('parent-error').textContent='';playTone(523,.07,.3);}
  else{document.getElementById('parent-error').textContent=t('parentErr');playTone(200,.08,.25);}
}

function renderLevels(){
  document.getElementById('levels-title').textContent=t('levelsTitle');
  const cont=document.getElementById('level-cards');cont.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const stars=state.stars[i]||0;
    const prevOk=i===0||((state.stars[i-1]||0)>=lv.starsNeeded);
    const locked=!prevOk;
    const div=document.createElement('div');
    div.className='level-card '+(locked?'locked':(stars>0?'completed':'unlocked'));
    div.setAttribute('role','button');div.setAttribute('tabindex',locked?'-1':'0');
    div.setAttribute('aria-label',lv[lang].name+(locked?' — '+t('levelLocked'):''));
    div.innerHTML=`<div class="level-icon">${i===0?'🕰️':i===1?'⏳':'🔭'}</div>
      <div class="level-name title-font">${lv[lang].name}</div>
      <div class="level-desc">${lv[lang].desc}</div>
      <div class="level-stars">${'⭐'.repeat(stars)+'☆'.repeat(3-stars)}</div>`;
    if(!locked){div.onclick=()=>startLevel(i);div.onkeydown=e=>{if(e.key==='Enter'||e.key===' ')startLevel(i);};}
    cont.appendChild(div);
  });
}

// ===== GAME =====
function pickCards(lv){
  const pool=EVENTS.filter(e=>lv.eventIds.includes(e.id));
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  const selected=shuffled.slice(0,lv.cardCount);
  selected.sort((a,b)=>a.year-b.year);
  return selected;
}

function startLevel(idx){
  currentLevelIdx=idx;
  const lv=LEVELS[idx];
  currentCards=pickCards(lv);
  slots=new Array(currentCards.length).fill(null);
  score=0;
  showScreen('game');
  renderGameLabels();
  renderOrderMode();
}

function renderGameLabels(){
  if(currentLevelIdx===null)return;
  const lv=LEVELS[currentLevelIdx];
  document.getElementById('score-box').textContent='⭐ '+score;
  document.getElementById('round-label').textContent=lv[lang].name;
  document.getElementById('btn-check-order').textContent=t('btnCheck');
  document.getElementById('btn-home-game').textContent=t('btnHome');
  updateProgress();
}
function updateProgress(){
  const filled=slots.filter(s=>s!==null).length;
  const pct=currentCards.length>0?(filled/currentCards.length)*100:0;
  const bar=document.getElementById('progress-fill');
  bar.style.width=pct+'%';
  bar.parentElement.setAttribute('aria-valuenow',Math.round(pct));
}

function renderOrderMode(){
  document.getElementById('order-instruction').textContent=t('orderInstruction');
  // Pool
  const pool=document.getElementById('cards-pool');
  pool.innerHTML='';
  const shuffled=[...currentCards].sort(()=>Math.random()-.5);
  shuffled.forEach(ev=>{pool.appendChild(makeCard(ev,true));});
  // Slots
  const slotsEl=document.getElementById('timeline-slots');slotsEl.innerHTML='';
  currentCards.forEach((ev,i)=>{
    const wrap=document.createElement('div');wrap.className='timeline-slot';
    const lbl=document.createElement('div');lbl.className='slot-position';lbl.textContent=`${t('slotLabel')} ${i+1}`;
    const drop=document.createElement('div');drop.className='slot-drop';drop.dataset.slot=i;
    drop.innerHTML='<span style="font-size:2rem;color:var(--sky)">📅</span>';
    drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
    drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
    drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');handleDrop(parseInt(drop.dataset.slot));});
    wrap.appendChild(lbl);wrap.appendChild(drop);slotsEl.appendChild(wrap);
  });
  hideFeedback();
}

function makeCard(ev,draggable,inSlot){
  const card=document.createElement('div');
  card.className='event-card';card.dataset.eventId=ev.id;
  card.innerHTML=`<div class="event-emoji">${ev.emoji}</div><div class="event-title">${ev[lang].name}</div><div class="event-info">${ev[lang].info.substring(0,55)}…</div>`;
  card.setAttribute('role','button');card.setAttribute('tabindex','0');card.setAttribute('aria-label',ev[lang].name);
  if(draggable){
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart',e=>{dragCard=ev;dragOrigin=inSlot!==undefined?inSlot:'pool';card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragCard=null;});
    card.addEventListener('touchstart',e=>handleTouchStart(e,ev,card,inSlot),{passive:false});
  }
  card.addEventListener('dblclick',()=>showPopup(ev));
  return card;
}

function handleDrop(slotIdx){
  if(!dragCard)return;
  const ev=dragCard;
  // Remove from origin
  if(dragOrigin==='pool'){
    const pool=document.getElementById('cards-pool');
    pool.querySelectorAll('.event-card').forEach(c=>{if(c.dataset.eventId===ev.id)c.remove();});
  } else if(typeof dragOrigin==='number'){
    slots[dragOrigin]=null;renderSlot(dragOrigin);
  }
  // Displace existing card in target slot
  if(slots[slotIdx]){
    const displaced=slots[slotIdx];slots[slotIdx]=null;
    document.getElementById('cards-pool').appendChild(makeCard(displaced,true));
  }
  slots[slotIdx]=ev;renderSlot(slotIdx);updateProgress();hideFeedback();dragCard=null;
}

function renderSlot(i){
  const wrap=document.getElementById('timeline-slots').querySelectorAll('.timeline-slot')[i];
  const drop=wrap.querySelector('.slot-drop');
  drop.innerHTML='';drop.classList.toggle('filled',slots[i]!==null);
  if(slots[i]){
    const ev=slots[i];
    const mini=makeCard(ev,true,i);
    mini.querySelector('.event-info').style.fontSize='.7rem';
    drop.appendChild(mini);
  } else {
    drop.innerHTML='<span style="font-size:2rem;color:var(--sky)">📅</span>';
  }
}

// ===== POOL DROP =====
function setupPoolDrop(){
  const pool=document.getElementById('cards-pool');
  pool.addEventListener('dragover',e=>{e.preventDefault();pool.style.background='rgba(126,195,238,.3)';});
  pool.addEventListener('dragleave',()=>{pool.style.background='';});
  pool.addEventListener('drop',e=>{
    e.preventDefault();pool.style.background='';
    if(!dragCard)return;
    const ev=dragCard;
    if(typeof dragOrigin==='number'){slots[dragOrigin]=null;renderSlot(dragOrigin);}
    const exists=[...pool.querySelectorAll('.event-card')].some(c=>c.dataset.eventId===ev.id);
    if(!exists)pool.appendChild(makeCard(ev,true));
    updateProgress();hideFeedback();dragCard=null;
  });
}

// ===== CHECK =====
function checkOrder(){
  const allFilled=slots.every(s=>s!==null);
  if(!allFilled){showFeedback('⚠️ '+(lang==='fr'?'Remplis toutes les positions !':'Fill all positions!'),'err');return;}
  let correct=0;
  slots.forEach((ev,i)=>{if(ev&&ev.id===currentCards[i].id)correct++;});
  score=correct;
  document.getElementById('score-box').textContent='⭐ '+score;
  // Visual feedback on slots
  document.getElementById('timeline-slots').querySelectorAll('.timeline-slot').forEach((wrap,i)=>{
    const drop=wrap.querySelector('.slot-drop');
    if(slots[i]&&slots[i].id===currentCards[i].id){drop.style.borderColor='var(--success)';drop.style.background='#d1fae5';}
    else{drop.style.borderColor='#f87171';drop.style.background='#fee2e2';}
  });
  if(correct===currentCards.length){
    showFeedback(t('feedOk'),'ok');playSuccess();announce(t('feedOk'));
    setTimeout(()=>endLevel(correct),1600);
  } else {
    showFeedback(t('feedErr'),'err');playTone(260,.08,.3);announce(t('feedErr'));
    setTimeout(()=>{showCorrectOrder();setTimeout(()=>endLevel(correct),2200);},900);
  }
}

function showCorrectOrder(){
  currentCards.forEach((ev,i)=>{slots[i]=ev;renderSlot(i);});
  document.getElementById('timeline-slots').querySelectorAll('.timeline-slot').forEach((wrap,i)=>{
    const drop=wrap.querySelector('.slot-drop');
    drop.style.borderColor='var(--orange)';drop.style.background='#fff7ed';
    const yr=document.createElement('div');
    yr.style.cssText='font-size:.7rem;color:var(--orange);font-weight:700;text-align:center;padding:4px 4px 0;';
    yr.textContent=formatYear(currentCards[i].year);drop.appendChild(yr);
  });
}

function endLevel(correct){
  const total=currentCards.length;
  const pct=correct/total;
  let stars=0;
  if(pct===1)stars=3;else if(pct>=0.6)stars=2;else if(pct>=0.3)stars=1;
  const idx=currentLevelIdx;
  if(stars>(state.stars[idx]||0))state.stars[idx]=stars;
  saveState();
  showScreen('result');
  renderResultLabels(correct,total,stars,idx);
}

function renderResultLabels(correct,total,stars,idx){
  if(correct===undefined){
    document.getElementById('btn-replay').textContent=t('replay');
    document.getElementById('btn-levels-result').textContent=t('backLevels');
    document.getElementById('btn-next-level').textContent=t('nextLevel');
    return;
  }
  const msgs=[t('resultTitle0'),t('resultTitle1'),t('resultTitle2'),t('resultTitle3')];
  document.getElementById('result-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('result-title').textContent=msgs[stars];
  document.getElementById('result-score').textContent=`${t('scoreLabel')} ${correct} / ${total}`;
  document.getElementById('btn-replay').textContent=t('replay');
  document.getElementById('btn-levels-result').textContent=t('backLevels');
  const nb=document.getElementById('btn-next-level');
  if(idx<LEVELS.length-1){nb.style.display='';nb.textContent=t('nextLevel');}else{nb.style.display='none';}
}
function replayLevel(){if(currentLevelIdx!==null)startLevel(currentLevelIdx);}
function nextLevel(){if(currentLevelIdx!==null&&currentLevelIdx<LEVELS.length-1)startLevel(currentLevelIdx+1);else goLevels();}

// ===== FEEDBACK =====
function showFeedback(msg,type){const fb=document.getElementById('feedback-banner');fb.textContent=msg;fb.className=type;fb.classList.remove('hidden');announce(msg);}
function hideFeedback(){document.getElementById('feedback-banner').classList.add('hidden');}

// ===== POPUP =====
function showPopup(ev){
  document.getElementById('popup-emoji').textContent=ev.emoji;
  document.getElementById('popup-title').textContent=ev[lang].name;
  document.getElementById('popup-year').textContent=formatYear(ev.year);
  document.getElementById('popup-text').textContent=ev[lang].info;
  document.getElementById('btn-popup-close').textContent=t('popupClose');
  document.getElementById('info-popup').classList.remove('hidden');
}
function closePopup(){document.getElementById('info-popup').classList.add('hidden');}
document.getElementById('info-popup').addEventListener('click',function(e){if(e.target===this)closePopup();});

// ===== TOUCH DRAG =====
function handleTouchStart(e,ev,cardEl,slotIdx){
  e.preventDefault();
  const touch=e.touches[0];
  touchEv=ev;touchSlotOrigin=slotIdx!==undefined?slotIdx:null;
  if(dragClone){dragClone.remove();dragClone=null;}
  const rect=cardEl.getBoundingClientRect();
  dragOffX=touch.clientX-rect.left;dragOffY=touch.clientY-rect.top;
  dragClone=cardEl.cloneNode(true);
  dragClone.style.cssText=`position:fixed;pointer-events:none;z-index:999;width:${rect.width}px;opacity:.88;left:${touch.clientX-dragOffX}px;top:${touch.clientY-dragOffY}px;border:2px solid var(--orange);border-radius:16px;`;
  document.body.appendChild(dragClone);
  document.addEventListener('touchmove',onTouchMove,{passive:false});
  document.addEventListener('touchend',onTouchEnd,{passive:false});
}
function onTouchMove(e){
  e.preventDefault();const touch=e.touches[0];
  if(dragClone){dragClone.style.left=(touch.clientX-dragOffX)+'px';dragClone.style.top=(touch.clientY-dragOffY)+'px';}
  document.querySelectorAll('.slot-drop').forEach(el=>el.classList.remove('over'));
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  if(el){const s=el.closest('.slot-drop');if(s)s.classList.add('over');}
}
function onTouchEnd(e){
  document.removeEventListener('touchmove',onTouchMove);
  document.removeEventListener('touchend',onTouchEnd);
  const touch=e.changedTouches[0];
  document.querySelectorAll('.slot-drop').forEach(el=>el.classList.remove('over'));
  document.getElementById('cards-pool').style.background='';
  if(dragClone){dragClone.remove();dragClone=null;}
  if(!touchEv)return;
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  if(!el){touchEv=null;touchSlotOrigin=null;return;}
  const slotDrop=el.closest('.slot-drop');
  const pool=el.closest('#cards-pool');
  if(slotDrop){
    const idx=parseInt(slotDrop.dataset.slot);
    // Remove from origin
    if(touchSlotOrigin!==null){slots[touchSlotOrigin]=null;renderSlot(touchSlotOrigin);}
    else{const p=document.getElementById('cards-pool');p.querySelectorAll('.event-card').forEach(c=>{if(c.dataset.eventId===touchEv.id)c.remove();});}
    if(slots[idx]){const d=slots[idx];slots[idx]=null;document.getElementById('cards-pool').appendChild(makeCard(d,true));}
    slots[idx]=touchEv;renderSlot(idx);updateProgress();hideFeedback();
  } else if(pool&&touchSlotOrigin!==null){
    slots[touchSlotOrigin]=null;renderSlot(touchSlotOrigin);
    const p=document.getElementById('cards-pool');
    const exists=[...p.querySelectorAll('.event-card')].some(c=>c.dataset.eventId===touchEv.id);
    if(!exists)p.appendChild(makeCard(touchEv,true));
    updateProgress();hideFeedback();
  }
  touchEv=null;touchSlotOrigin=null;
}

// ===== INIT =====
loadState();
renderTitle();
// Setup pool drop after DOM is ready
setupPoolDrop();
</script>
