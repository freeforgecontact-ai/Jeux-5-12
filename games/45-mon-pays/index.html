<style>
:root {
  --blue:#0f4c81; --blue-dark:#0a3559; --navy:#0f172a;
  --orange:#f97316; --orange-dark:#ea580c; --gold:#ffd23f;
  --sky:#7ec3ee; --sky-light:#eaf6ff; --slate:#475569;
  --success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(160deg,#dbeeff 0%,#eaf6ff 60%,#fffbea 100%);min-height:100vh;color:var(--navy);}
#topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue);box-shadow:0 3px 10px rgba(0,0,0,.25);position:sticky;top:0;z-index:100;}
#topbar img{height:34px;}
#brand-text{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;color:#fff;font-size:1.15rem;font-weight:700;letter-spacing:.5px;flex:1;}
.lang-btn{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:8px;padding:5px 11px;font-size:.9rem;font-weight:700;cursor:pointer;transition:.15s;}
.lang-btn.active,.lang-btn:hover{background:#fff;color:var(--blue);}
#mute-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px 8px;}
.screen{display:none;flex-direction:column;align-items:center;padding:18px 12px 30px;min-height:calc(100vh - 56px);}
.screen.active{display:flex;}
#screen-title{justify-content:center;text-align:center;gap:10px;}
h1.game-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2.3rem;color:var(--blue);line-height:1.1;}
h1.game-title span{color:var(--orange);}
.subtitle{font-size:1.05rem;color:var(--slate);margin-bottom:6px;}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:18px;padding:16px 44px;font-size:1.3rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;margin-top:8px;min-width:48px;min-height:48px;transition:.1s;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{background:none;border:none;color:var(--blue);text-decoration:underline;cursor:pointer;font-size:.95rem;margin-top:6px;padding:8px;}
#screen-parents{justify-content:center;text-align:center;gap:12px;max-width:480px;margin:auto;}
.parents-box{background:#fff;border-radius:18px;padding:22px 24px;box-shadow:0 4px 18px rgba(15,76,129,.12);max-width:420px;width:100%;}
.parents-box h2{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;color:var(--blue);font-size:1.4rem;margin-bottom:10px;}
.parents-box p{color:var(--slate);font-size:.97rem;line-height:1.6;}
#gate-question{font-size:1.1rem;font-weight:700;color:var(--navy);margin:10px 0 4px;}
#gate-input{font-size:1.2rem;padding:10px 16px;border-radius:10px;border:2px solid var(--blue);width:100px;text-align:center;margin:0 auto;display:block;}
#gate-error{color:#d00;font-size:.9rem;margin-top:4px;}
.btn-secondary{background:var(--blue);color:#fff;border:none;border-radius:14px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);margin-top:6px;min-height:48px;min-width:48px;}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
#screen-levels{gap:14px;text-align:center;}
#screen-levels h2{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.8rem;color:var(--blue);margin-top:6px;}
.level-cards{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:8px;}
.level-card{background:#fff;border-radius:16px;padding:18px 22px;box-shadow:0 4px 14px rgba(15,76,129,.13);cursor:pointer;min-width:140px;max-width:180px;text-align:center;border:3px solid transparent;transition:.15s;}
.level-card:hover,.level-card:focus{border-color:var(--orange);outline:none;}
.level-card .lv-icon{font-size:2.2rem;}
.level-card .lv-name{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700;color:var(--blue);margin-top:4px;}
.level-card .lv-desc{font-size:.82rem;color:var(--slate);margin-top:3px;}
.level-card .lv-stars{font-size:1.1rem;margin-top:6px;}
#screen-game{padding:10px 8px 24px;gap:8px;width:100%;}
#game-header{display:flex;align-items:center;gap:8px;width:100%;max-width:900px;margin:0 auto;}
#game-header button{background:none;border:none;cursor:pointer;font-size:1.3rem;padding:8px;min-width:44px;min-height:44px;}
#level-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.2rem;color:var(--blue);font-weight:700;flex:1;text-align:center;}
#score-display{font-size:1rem;color:var(--slate);font-weight:700;}
#question-banner{background:var(--blue);color:#fff;border-radius:14px;padding:12px 20px;text-align:center;font-size:1.15rem;font-weight:700;width:100%;max-width:900px;margin:0 auto;}
#map-area{width:100%;max-width:900px;margin:0 auto;position:relative;}
#map-svg{width:100%;border-radius:16px;box-shadow:0 4px 18px rgba(15,76,129,.15);}
#feedback-live{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;font-weight:900;pointer-events:none;opacity:0;transition:opacity .4s;text-shadow:0 2px 8px rgba(0,0,0,.3);}
#choices-area{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%;max-width:700px;margin:0 auto;}
.choice-btn{background:#fff;border:2.5px solid var(--blue);border-radius:14px;padding:11px 18px;font-size:1rem;font-weight:700;color:var(--blue);cursor:pointer;min-height:48px;min-width:120px;transition:.12s;font-family:'Nunito',system-ui,sans-serif;}
.choice-btn:hover{background:var(--sky-light);border-color:var(--orange);}
.choice-btn.correct{background:var(--success);border-color:var(--success);color:#fff;}
.choice-btn.wrong{background:#fdd;border-color:#d00;color:#900;}
#progress-bar-wrap{width:100%;max-width:700px;height:12px;background:#d0e8f8;border-radius:8px;overflow:hidden;margin:2px auto 0;}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--success),var(--sky));border-radius:8px;transition:width .5s;}
#screen-win{justify-content:center;text-align:center;gap:12px;}
#win-stars{font-size:3rem;}
#win-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2rem;color:var(--orange);}
#win-msg{color:var(--slate);font-size:1.05rem;}
.win-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:8px;}
#tooltip{position:absolute;background:rgba(15,23,42,.92);color:#fff;border-radius:10px;padding:7px 13px;font-size:.93rem;font-weight:700;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:50;top:0;left:0;}
.region{cursor:pointer;transition:filter .15s,opacity .15s;}
.region:hover{filter:brightness(1.15);}
.region.found{opacity:.55;cursor:default;}
@keyframes pulse{0%{filter:brightness(1)}50%{filter:brightness(1.7)}100%{filter:brightness(1)}}
@media(max-width:600px){
  h1.game-title{font-size:1.7rem;}
  #question-banner{font-size:1rem;}
  .choice-btn{font-size:.9rem;padding:9px 12px;}
}
</style>
</head>

    svg.appendChild(tx);
  });
  LANDMARKS.forEach(function(lm){
    var hit=svgEl('path');hit.setAttribute('d',lm.d);hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width','22');hit.setAttribute('fill','none');
    hit.setAttribute('class','region');hit.setAttribute('data-id',lm.id);hit.setAttribute('data-type','landmark');hit.setAttribute('style','cursor:pointer');
    svg.appendChild(hit);
    var el=svgEl('path');el.setAttribute('d',lm.d);el.setAttribute('stroke',lm.color);el.setAttribute('stroke-width',lm.w);el.setAttribute('fill','none');el.setAttribute('stroke-linecap','round');el.setAttribute('stroke-linejoin','round');
    el.setAttribute('class','region');el.id='lm-'+lm.id;el.setAttribute('data-id',lm.id);el.setAttribute('data-type','landmark');
    el.setAttribute('tabindex','0');el.setAttribute('role','button');el.setAttribute('aria-label',lang==='fr'?lm.fr:lm.en);
    svg.appendChild(el);
  });
  CITIES.forEach(function(c){
    var g=svgEl('g');g.setAttribute('class','region');g.id='city-'+c.id;g.setAttribute('data-id',c.id);g.setAttribute('data-type','city');
    g.setAttribute('tabindex','0');g.setAttribute('role','button');g.setAttribute('aria-label',lang==='fr'?c.fr:c.en);
    var hit=svgEl('circle');hit.setAttribute('cx',c.x);hit.setAttribute('cy',c.y);hit.setAttribute('r','22');hit.setAttribute('fill','transparent');
    var dot=svgEl('circle');dot.setAttribute('cx',c.x);dot.setAttribute('cy',c.y);dot.setAttribute('r',c.r);dot.setAttribute('fill','#f97316');dot.setAttribute('stroke','#fff');dot.setAttribute('stroke-width','2');dot.setAttribute('pointer-events','none');
    g.appendChild(hit);g.appendChild(dot);
    svg.appendChild(g);
  });
  var lbl=svgEl('text');lbl.setAttribute('x','400');lbl.setAttribute('y','472');lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-size','12');lbl.setAttribute('fill','#0f4c81');lbl.setAttribute('font-weight','bold');
  lbl.textContent=lang==='fr'?'Canada — Vue simplifiée':'Canada — Simplified Map';
  svg.appendChild(lbl);
  attachMapEvents();
}
function svgEl(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag)}

function attachMapEvents(){
  var svg=document.getElementById('map-svg');
  function onClick(e){
    var el=e.target;var id=el.getAttribute('data-id');var type=el.getAttribute('data-type');
    if(!id){var p=el.parentElement;if(p){id=p.getAttribute('data-id');type=p.getAttribute('data-type');}}
    if(id) handleClick(id,type);
  }
  function onOver(e){
    var el=e.target;var id=el.getAttribute('data-id');var type=el.getAttribute('data-type');
    if(!id){var p=el.parentElement;if(p){id=p.getAttribute('data-id');type=p.getAttribute('data-type');}}
    if(!id) return;
    var name='';
    var prov=PROVS.find(function(x){return x.id===id});
    if(prov) name=lang==='fr'?prov.fr:prov.en;
    var city=CITIES.find(function(x){return x.id===id});
    if(city) name=lang==='fr'?city.fr:city.en;
    var lm=LANDMARKS.find(function(x){return x.id===id});
    if(lm) name=lang==='fr'?lm.fr:lm.en;
    if(name) showTip(e,name);
  }
  svg.addEventListener('click',onClick);
  svg.addEventListener('mouseover',onOver);
  svg.addEventListener('mouseout',function(){hideTip()});
  svg.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){onClick(e)}});
}

function showTip(e,text){
  var tt=document.getElementById('tooltip');
  var area=document.getElementById('map-area').getBoundingClientRect();
  tt.textContent=text;tt.style.opacity='1';
  var x=e.clientX-area.left,y=e.clientY-area.top;
  tt.style.left=Math.max(0,x-60)+'px';tt.style.top=Math.max(0,y-36)+'px';
}
function hideTip(){document.getElementById('tooltip').style.opacity='0'}

function startLevel(lvl){
  currentLevel=lvl;score=0;correctCount=0;currentQIdx=0;
  var type=LEVELS[lvl].type;
  var raw;
  if(type==='province') raw=PROVS.map(function(p){return{target:p.id,label:lang==='fr'?p.fr:p.en,type:'province'}});
  else if(type==='city') raw=CITIES.map(function(c){return{target:c.id,label:lang==='fr'?c.fr:c.en,type:'city'}});
  else raw=LANDMARKS.map(function(l){return{target:l.id,label:lang==='fr'?l.fr:l.en,type:'landmark'}});
  questions=shuffle(raw.slice());
  drawMap();
  updateScore();
  renderQ();
  showScreen('screen-game');
  var names=[t('level1_name'),t('level2_name'),t('level3_name')];
  document.getElementById('level-title').textContent=names[lvl];
}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return arr}

function renderQ(){
  if(currentQIdx>=questions.length){showWin();return}
  var q=questions[currentQIdx];
  var prefix=q.type==='province'?t('qprov'):q.type==='city'?t('qcity'):t('qriver');
  document.getElementById('question-banner').textContent=prefix+q.label+' ?';
  document.getElementById('progress-bar').style.width=((currentQIdx/questions.length)*100)+'%';
  if(currentLevel===1||currentLevel===2) buildChoices(q);
  else document.getElementById('choices-area').innerHTML='';
}

function buildChoices(q){
  var area=document.getElementById('choices-area');area.innerHTML='';
  var pool;
  if(currentLevel===1) pool=CITIES.filter(function(c){return c.id!==q.target});
  else pool=LANDMARKS.filter(function(l){return l.id!==q.target});
  var dist=shuffle(pool.slice()).slice(0,3).map(function(d){return{id:d.id,label:lang==='fr'?d.fr:d.en}});
  var all=shuffle([{id:q.target,label:q.label}].concat(dist));
  all.forEach(function(ch){
    var btn=document.createElement('button');btn.className='choice-btn';btn.textContent=ch.label;btn.setAttribute('data-id',ch.id);
    btn.addEventListener('click',function(){handleClick(ch.id,q.type)});
    area.appendChild(btn);
  });
}

function handleClick(id,type){
  if(currentQIdx>=questions.length) return;
  var q=questions[currentQIdx];
  if(id===q.target){
    playCorrect();score+=10;correctCount++;
    flashFeedback(t('correct'));markFound(q.target,q.type);highlightBtn(q.target,true);
    currentQIdx++;updateScore();
    setTimeout(function(){if(currentQIdx>=questions.length)showWin();else renderQ()},700);
  } else {
    playWrong();flashFeedback(t('wrong'));highlightBtn(id,false);
    score=Math.max(0,score-2);updateScore();
    var el=document.getElementById('prov-'+id)||document.getElementById('city-'+id)||document.getElementById('lm-'+id);
    if(el){el.style.filter='brightness(.65)';setTimeout(function(){el.style.filter=''},400)}
  }
}

function highlightBtn(id,correct){
  document.querySelectorAll('.choice-btn').forEach(function(b){
    if(b.getAttribute('data-id')===id){
      b.classList.add(correct?'correct':'wrong');
      setTimeout(function(){b.classList.remove('correct','wrong')},700);
    }
  });
}

function markFound(id,type){
  var el=document.getElementById('prov-'+id)||document.getElementById('city-'+id)||document.getElementById('lm-'+id);
  if(el){el.classList.add('found');el.style.filter='brightness(1.6)';setTimeout(function(){el.style.filter=''},400)}
}

function flashFeedback(msg){
  var el=document.getElementById('feedback-live');el.textContent=msg;el.style.opacity='1';
  setTimeout(function(){el.style.opacity='0'},800);
}

function updateScore(){document.getElementById('score-display').textContent=t('score')+': '+score}

function showWin(){
  playWin();
  var pct=questions.length>0?correctCount/questions.length:1;
  var stars=pct>=0.9?3:pct>=0.6?2:1;
  var prev=progress['s'+currentLevel]||0;
  if(stars>prev){progress['s'+currentLevel]=stars;saveProg()}
  document.getElementById('win-stars').textContent=stars>=3?'⭐⭐⭐':stars>=2?'⭐⭐':'⭐';
  var wt=t('win_titles');document.getElementById('win-title').textContent=wt[Math.min(stars-1,2)];
  document.getElementById('win-msg').textContent=t('win_msg')+' | '+t('score')+': '+score;
  document.getElementById('win-replay').textContent=t('replay');
  document.getElementById('win-next').textContent=t('next_level');
  document.getElementById('win-home').textContent=t('home');
  document.getElementById('win-next').style.display=currentLevel<2?'':'none';
  showScreen('screen-win');
}
function replayLevel(){startLevel(currentLevel)}
function nextLevel(){if(currentLevel<2)startLevel(currentLevel+1);else showLevels()}

function startParents(){
  gateA=Math.floor(Math.random()*8)+2;gateB=Math.floor(Math.random()*8)+2;
  document.getElementById('gate-question').textContent=gateA+' × '+gateB+' = ?';
  document.getElementById('gate-input').value='';document.getElementById('gate-error').textContent='';
  document.getElementById('parents-info').style.display='none';
  showScreen('screen-parents');renderUI();
}
function checkGate(){
  var v=parseInt(document.getElementById('gate-input').value);
  if(v===gateA*gateB){document.getElementById('parents-info').style.display='block';document.getElementById('gate-error').textContent=''}
  else document.getElementById('gate-error').textContent=t('gate_err');
}
document.getElementById('gate-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkGate()});

function showLevels(){renderLevelCards();showScreen('screen-levels')}
function renderLevelCards(){
  var c=document.getElementById('level-cards');c.innerHTML='';
  [{icon:'🗺️',nk:'level1_name',dk:'level1_desc',lvl:0},{icon:'🏙️',nk:'level2_name',dk:'level2_desc',lvl:1},{icon:'🌊',nk:'level3_name',dk:'level3_desc',lvl:2}].forEach(function(lv){
    var s=progress['s'+lv.lvl]||0;var st=s>=3?'⭐⭐⭐':s>=2?'⭐⭐':s>=1?'⭐':'·';
    var card=document.createElement('div');card.className='level-card';card.tabIndex=0;
    card.innerHTML='<div class="lv-icon">'+lv.icon+'</div><div class="lv-name">'+t(lv.nk)+'</div><div class="lv-desc">'+t(lv.dk)+'</div><div class="lv-stars">'+st+'</div>';
    card.addEventListener('click',function(){startLevel(lv.lvl)});
    card.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' ')startLevel(lv.lvl)});
    c.appendChild(card);
  });
}

function renderUI(){
  document.getElementById('subtitle-text').textContent=t('subtitle');
  document.getElementById('play-btn').textContent=t('play');
  document.getElementById('parents-btn').textContent=t('parents_btn');
  document.getElementById('parents-title').textContent=t('parents_title');
  document.getElementById('gate-desc').textContent=t('gate_desc')+' '+gateA+' × '+gateB+' ?';
  document.getElementById('gate-ok-btn').textContent=t('gate_ok');
  document.getElementById('parents-info-title').textContent=t('parents_info_title');
  document.getElementById('parents-info-text').textContent=t('parents_info_text');
  document.getElementById('parents-back-btn').textContent=t('parents_back');
  document.getElementById('levels-title').textContent=t('levels_title');
  document.getElementById('levels-back-btn').textContent=t('levels_back');
  renderLevelCards();
  if(questions.length&&currentQIdx<questions.length) renderQ();
}

document.getElementById('btn-fr').classList.toggle('active',lang==='fr');
document.getElementById('btn-en').classList.toggle('active',lang==='en');
renderUI();
</script>
</body>
</html>
