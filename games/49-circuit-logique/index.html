<style>
:root{
  --blue:#0f4c81;
  --blue-dark:#0a3559;
  --navy:#0f172a;
  --orange:#f97316;
  --orange-dark:#ea580c;
  --gold:#ffd23f;
  --sky:#7ec3ee;
  --sky-light:#eaf6ff;
  --slate:#475569;
  --success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(135deg,#eaf6ff 0%,#dbeeff 100%);
  min-height:100vh;
  color:var(--navy);
  overflow-x:hidden;
}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--blue);color:#fff;padding:8px 16px;
  position:sticky;top:0;z-index:100;gap:8px;flex-wrap:wrap;
}
#topbar-left{display:flex;align-items:center;gap:10px;}
#topbar-right{display:flex;align-items:center;gap:6px;}
.brand-text{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.2rem;font-weight:700;color:#fff;}
.btn-lang{
  background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.4);
  color:#fff;border-radius:20px;padding:4px 14px;font-size:0.9rem;cursor:pointer;
  min-width:48px;min-height:36px;font-weight:700;transition:background 0.2s;
}
.btn-lang.active{background:var(--orange);border-color:var(--orange-dark);}
.btn-lang:hover{background:rgba(255,255,255,0.3);}
#btn-mute{
  background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.4);
  color:#fff;border-radius:50%;width:40px;height:40px;font-size:1.3rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  min-width:40px;min-height:40px;transition:background 0.2s;
}
#btn-mute:hover{background:rgba(255,255,255,0.3);}
.screen{display:none;padding:20px 16px;max-width:900px;margin:0 auto;}
.screen.active{display:block;}
#screen-title{text-align:center;padding-top:10px;}
.mascot-container{margin:16px auto;width:160px;}
.game-title{font-size:2.2rem;color:var(--blue);line-height:1.1;margin:10px 0 6px;}
.game-subtitle{font-size:1.1rem;color:var(--slate);margin-bottom:24px;}
.btn-play{
  background:var(--orange);color:#fff;border:none;border-radius:24px;
  font-size:1.4rem;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-weight:700;padding:14px 48px;cursor:pointer;
  box-shadow:0 5px 0 var(--orange-dark);transition:transform 0.1s,box-shadow 0.1s;
  display:inline-block;min-height:56px;
}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--orange-dark);}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{
  display:inline-block;margin-top:18px;color:var(--slate);font-size:0.9rem;
  background:none;border:none;cursor:pointer;text-decoration:underline;
}
#screen-parent{text-align:center;}
.parent-box{
  background:#fff;border-radius:20px;padding:28px;max-width:420px;
  margin:20px auto;box-shadow:0 4px 24px rgba(0,0,0,0.08);
}
.parent-box h2{color:var(--blue);margin-bottom:12px;}
#parent-question{font-size:1.3rem;margin:16px 0;font-weight:700;}
#parent-input{
  font-size:1.2rem;padding:10px 16px;border-radius:12px;
  border:2px solid var(--sky);width:120px;text-align:center;
  outline:none;
}
#parent-input:focus{border-color:var(--blue);}
#parent-feedback{min-height:24px;color:crimson;margin-top:8px;font-weight:700;}
.btn-blue{
  background:var(--blue);color:#fff;border:none;border-radius:20px;
  padding:12px 32px;font-size:1rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 var(--blue-dark);min-height:48px;margin-top:12px;
  font-family:'Nunito',system-ui,sans-serif;transition:transform 0.1s;
}
.btn-blue:hover{transform:translateY(-1px);}
.btn-blue:active{transform:translateY(2px);}
.parent-info{
  background:var(--sky-light);border-radius:16px;padding:20px;
  max-width:500px;margin:16px auto;text-align:left;font-size:0.95rem;
  line-height:1.6;
}
.parent-info h3{color:var(--blue);margin-bottom:8px;}
#screen-game{padding:12px 16px;}
.game-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px;
}
.level-badge{
  background:var(--blue);color:#fff;border-radius:20px;
  padding:6px 18px;font-weight:700;font-size:1rem;
}
.score-display{
  background:var(--gold);color:var(--navy);border-radius:20px;
  padding:6px 18px;font-weight:700;font-size:1rem;
}
.objective-box{
  background:#fff;border-radius:16px;padding:14px 18px;
  margin-bottom:14px;border-left:5px solid var(--orange);
  font-size:1.05rem;font-weight:700;color:var(--navy);
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.gate-explain{
  background:var(--sky-light);border-radius:12px;padding:10px 14px;
  margin-bottom:12px;font-size:0.92rem;color:var(--slate);
  border:1px solid var(--sky);
}
.circuit-area{
  background:#fff;border-radius:20px;padding:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-bottom:14px;overflow:auto;
}
#circuit-svg{display:block;margin:0 auto;max-width:100%;}
.switch-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.switch-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;min-width:64px;padding:4px;
}
.switch-visual{
  width:64px;height:36px;border-radius:18px;border:3px solid #cbd5e1;
  position:relative;background:#e2e8f0;transition:background 0.3s,border-color 0.3s;
  display:flex;align-items:center;padding:3px;
}
.switch-visual::after{
  content:'';width:28px;height:28px;border-radius:50%;background:#94a3b8;
  transition:transform 0.3s,background 0.3s;display:block;
}
.switch-btn.on .switch-visual{background:var(--success);border-color:#22a362;}
.switch-btn.on .switch-visual::after{background:#fff;transform:translateX(28px);}
.switch-label{font-size:0.95rem;font-weight:700;color:var(--slate);}
.switch-state{font-size:0.8rem;font-weight:700;padding:2px 10px;border-radius:10px;background:#e2e8f0;color:var(--slate);}
.switch-btn.on .switch-state{background:var(--success);color:#fff;}
.gate-choice-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.gate-choice-btn{
  background:#fff;border:3px solid #cbd5e1;border-radius:14px;
  padding:10px 20px;font-size:1rem;font-weight:700;cursor:pointer;
  min-height:48px;min-width:90px;transition:border-color 0.2s,background 0.2s;
  color:var(--navy);
}
.gate-choice-btn:hover{border-color:var(--blue);background:var(--sky-light);}
.gate-choice-btn.selected{border-color:var(--orange);background:#fff3e0;}
#feedback-area{
  text-align:center;min-height:56px;font-size:1.1rem;font-weight:700;
  padding:8px;
}
.feedback-correct{color:var(--success);}
.feedback-wrong{color:#ef4444;}
.feedback-hint{color:var(--orange-dark);}
#screen-result{text-align:center;padding:30px 16px;}
.stars-row{font-size:3rem;margin:16px 0;}
.result-title{font-size:1.8rem;color:var(--blue);margin-bottom:8px;}
.result-sub{color:var(--slate);margin-bottom:24px;font-size:1rem;}
.result-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-action{
  background:var(--orange);color:#fff;border:none;border-radius:20px;
  padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 var(--orange-dark);min-height:48px;
  font-family:'Nunito',system-ui,sans-serif;transition:transform 0.1s;
}
.btn-action:hover{transform:translateY(-1px);}
.btn-action.secondary{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark);}
.progress-row{display:flex;gap:6px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}
.prog-dot{
  width:14px;height:14px;border-radius:50%;background:#cbd5e1;
  transition:background 0.3s;flex-shrink:0;
}
.prog-dot.done{background:var(--gold);}
.prog-dot.current{background:var(--orange);}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
@keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.pop-anim{animation:pop 0.4s ease forwards;display:inline-block;}
@media(max-width:500px){
  .game-title{font-size:1.7rem;}
  .switch-visual{width:54px;}
  .switch-btn.on .switch-visual::after{transform:translateX(18px);}
}
</style>
</head>

function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type,vol){
  if(muted)return;type=type||'sine';vol=vol||0.15;
  try{var ctx=getAudioCtx();var osc=ctx.createOscillator();var gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=freq;osc.type=type;gain.gain.setValueAtTime(vol,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);osc.start();osc.stop(ctx.currentTime+dur);}catch(e){}
}

function evalNOT(a){return a===1?0:1;}
function evalAND(a,b){return(a===1&&b===1)?1:0;}
function evalOR(a,b){return(a===1||b===1)?1:0;}
function evalCircuit(gateType,sw){
  if(gateType==='NOT')return evalNOT(sw[0]);
  if(gateType==='AND')return evalAND(sw[0],sw[1]);
  if(gateType==='OR')return evalOR(sw[0],sw[1]);
  if(gateType==='AND_NOT')return evalNOT(evalAND(sw[0],sw[1]));
  if(gateType==='OR_NOT')return evalNOT(evalOR(sw[0],sw[1]));
  if(gateType==='AND_OR')return evalOR(evalAND(sw[0],sw[1]),sw[2]);
  return 0;
}

function startGame(){
  playClick();loadProgress();
  showScreen('screen-game');

function loadLevel(idx){
  if(idx>=LEVELS.length){showFinalResult();return;}
  currentLevelIdx=idx;currentLevel=LEVELS[idx];
  switchStates=currentLevel.inputs.slice();selectedGate=null;wrongCount=0;
  document.getElementById('score-val').textContent=score;
  document.getElementById('level-badge').textContent=tr('levelLabel')+' '+currentLevel.id;
  var pr=document.getElementById('progress-row');pr.innerHTML='';
  LEVELS.forEach(function(lv,i){
    var dot=document.createElement('div');
    dot.className='prog-dot'+(i<idx?' done':'')+(i===idx?' current':'');
    dot.title=tr('levelLabel')+' '+lv.id;
    pr.appendChild(dot);
  });
  renderLevel();
}

function renderLevel(){
  if(!currentLevel)return;
  var lv=currentLevel;
  var objText='';
  if(lv.mode==='gate'){objText=tr('objChooseGate');}
  else{objText=lv.targetOutput===1?tr('objTurnOn'):tr('objTurnOff');}
  document.getElementById('objective-box').innerHTML='<strong>'+tr('objectiveLabel')+'</strong> '+objText;

  var explain='';
  if(lv.gateType==='NOT')explain='<strong>'+tr('gateNOTTitle')+'</strong> — '+tr('gateNOTExplain');
  else if(lv.gateType==='AND')explain='<strong>'+tr('gateANDTitle')+'</strong> — '+tr('gateANDExplain');
  else if(lv.gateType==='OR')explain='<strong>'+tr('gateORTitle')+'</strong> — '+tr('gateORExplain');
  else if(lv.gateType==='AND_NOT')explain='<strong>'+tr('gateANDTitle')+'</strong> + <strong>'+tr('gateNOTTitle')+'</strong> — '+tr('gateComboExplain');
  else if(lv.gateType==='OR_NOT')explain='<strong>'+tr('gateORTitle')+'</strong> + <strong>'+tr('gateNOTTitle')+'</strong> — '+tr('gateComboExplain');
  else if(lv.gateType==='AND_OR')explain='<strong>'+tr('gateANDTitle')+'</strong> + <strong>'+tr('gateORTitle')+'</strong> — '+tr('gateComboExplain');
  else if(lv.gateType==='CHOOSE'){
    if(lv.inputs.length===1)explain='<strong>'+tr('gateNOTTitle')+'</strong> | <strong>'+tr('gateANDTitle')+'</strong> | <strong>'+tr('gateORTitle')+'</strong>';
    else explain='<strong>'+tr('gateANDTitle')+'</strong> | <strong>'+tr('gateORTitle')+'</strong>';
  }
  document.getElementById('gate-explain').innerHTML=explain;

  drawCircuit(lv.gateType,switchStates,lv.targetOutput);

  var switchRow=document.getElementById('switch-row');
  switchRow.innerHTML='';switchRow.style.display='flex';
  if(lv.mode==='switch'){
    var labels=['A','B','C'];
    switchStates.forEach(function(st,i){
      var btn=document.createElement('button');
      btn.className='switch-btn'+(st===1?' on':'');
      btn.setAttribute('aria-label',tr('switchLabel')+' '+labels[i]+': '+(st===1?tr('on'):tr('off')));
      btn.setAttribute('aria-pressed',st===1?'true':'false');
      btn.innerHTML='<div class="switch-label">'+labels[i]+'</div><div class="switch-visual"></div><div class="switch-state">'+(st===1?tr('on'):tr('off'))+'</div>';
      (function(idx){btn.addEventListener('click',function(){toggleSwitch(idx);});})(i);
      switchRow.appendChild(btn);
    });
  } else {
    switchRow.style.display='none';
  }

  var gateRow=document.getElementById('gate-choice-row');
  if(lv.mode==='gate'){
    gateRow.style.display='flex';gateRow.innerHTML='';
    var title=document.createElement('div');
    title.style.cssText='width:100%;text-align:center;font-weight:700;color:var(--slate);margin-bottom:4px;font-size:1rem;';
    title.textContent=tr('chooseGate');
    gateRow.appendChild(title);
    lv.choices.forEach(function(gate){
      var btn=document.createElement('button');
      btn.className='gate-choice-btn'+(selectedGate===gate?' selected':'');
      btn.textContent=gate;
      btn.setAttribute('aria-pressed',selectedGate===gate?'true':'false');
      btn.addEventListener('click',function(){chooseGate(gate);});
      gateRow.appendChild(btn);
    });
  } else {
    gateRow.style.display='none';
  }
  document.getElementById('feedback-area').innerHTML='';
}

function toggleSwitch(idx){
  switchStates[idx]=switchStates[idx]===1?0:1;
  if(switchStates[idx]===1)playSwitchOn();else playSwitchOff();
  var switchRow=document.getElementById('switch-row');
  var btns=switchRow.querySelectorAll('.switch-btn');
  var btn=btns[idx];
  if(btn){
    btn.classList.toggle('on',switchStates[idx]===1);
    btn.querySelector('.switch-state').textContent=switchStates[idx]===1?tr('on'):tr('off');
    btn.setAttribute('aria-pressed',switchStates[idx]===1?'true':'false');
    btn.setAttribute('aria-label',tr('switchLabel')+' '+['A','B','C'][idx]+': '+(switchStates[idx]===1?tr('on'):tr('off')));
  }
  drawCircuit(currentLevel.gateType,switchStates,currentLevel.targetOutput);
  checkAnswer(true);
}

function chooseGate(gate){
  selectedGate=gate;playClick();
  document.querySelectorAll('.gate-choice-btn').forEach(function(b){
    b.classList.toggle('selected',b.textContent===gate);
    b.setAttribute('aria-pressed',b.textContent===gate?'true':'false');
  });
  drawCircuit(currentLevel.gateType,switchStates,currentLevel.targetOutput);
  checkAnswer(false);
}

function checkAnswer(auto){
  var lv=currentLevel;var output;
  if(lv.mode==='gate'){if(!selectedGate)return;output=evalCircuit(selectedGate,switchStates);}
  else{output=evalCircuit(lv.gateType,switchStates);}
  var correct=(output===lv.targetOutput);
  var fb=document.getElementById('feedback-area');
  if(correct){
    var msg;
    if(lv.mode==='gate')msg=tr('feedbackGateCorrect');
    else msg=(lv.targetOutput===1?tr('feedbackCorrect'):tr('feedbackOff'));
    fb.innerHTML='<span class="feedback-correct pop-anim">'+msg+'</span>';
    document.getElementById('aria-live').textContent=msg;
    playSuccess();
    score+=Math.max(1,3-wrongCount);
    document.getElementById('score-val').textContent=score;
    saveProgress();
    setTimeout(function(){showLevelResult();},1500);
  } else {
    if(!auto){
      wrongCount++;
      var msg=lv.mode==='gate'?tr('feedbackGateWrong'):tr('feedbackWrong');
      fb.innerHTML='<span class="feedback-wrong">'+msg+'</span>';
      document.getElementById('aria-live').textContent=msg;
      playError();
    } else if(wrongCount>=3){
      fb.innerHTML='<span class="feedback-hint">💡 '+tr('tryAgain')+'</span>';
    }
  }
}

function showLevelResult(){
  var stars=score>LEVELS.length*2?'⭐⭐⭐':score>LEVELS.length?'⭐⭐':'⭐';
  document.getElementById('result-stars').textContent=stars;
  document.getElementById('t-result-title').textContent=tr('resultTitle');
  document.getElementById('t-result-sub').textContent=tr('resultSub')+' — '+tr('levelLabel')+' '+currentLevel.id;
  var nextBtn=document.getElementById('t-result-next');
  nextBtn.style.display=currentLevelIdx<LEVELS.length-1?'inline-block':'none';
  showScreen('screen-result');
}
function showFinalResult(){
  document.getElementById('result-stars').textContent='🏆⭐⭐⭐';
  document.getElementById('t-result-title').textContent=lang==='fr'?'Félicitations !':'Congratulations!';
  document.getElementById('t-result-sub').textContent=(lang==='fr'?'Tu as terminé tous les niveaux ! Score : ':'You finished all levels! Score: ')+score;
  document.getElementById('t-result-next').style.display='none';
  showScreen('screen-result');
}
function nextLevel(){
  playClick();
  if(currentLevelIdx<LEVELS.length-1){currentLevelIdx++;saveProgress();showScreen('screen-game');loadLevel(currentLevelIdx);}
  else{showFinalResult();}
}
function replayLevel(){playClick();showScreen('screen-game');loadLevel(currentLevelIdx);}

window.addEventListener('DOMContentLoaded',function(){
  loadProgress();setLang(lang);
  document.getElementById('parent-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkParent();});
});
</script>
</body>
</html>
