<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f4c81">
<title>Météo Master / Weather Master — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;
  --orange:#f97316;--orange-dark:#ea580c;--gold:#ffd23f;
  --sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;
  --success:#34c77b;--white:#ffffff;--error:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(160deg,#c9e8ff 0%,#eaf6ff 60%,#fffbe6 100%);
  min-height:100vh;overflow-x:hidden;
}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px}
.screen.active{display:flex}
.top-bar{
  width:100%;max-width:700px;display:flex;align-items:center;
  justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;
}
.lang-btns{display:flex;gap:6px}
.lang-btn{
  background:var(--blue);color:#fff;border:none;border-radius:20px;
  padding:6px 16px;font-size:14px;font-weight:700;cursor:pointer;
  transition:background .2s;min-width:48px;min-height:36px;
}
.lang-btn.active{background:var(--orange)}
.lang-btn:hover{background:var(--orange-dark)}
.mute-btn{
  background:var(--blue);color:#fff;border:none;border-radius:20px;
  padding:6px 14px;font-size:18px;cursor:pointer;min-width:48px;min-height:36px;
  transition:background .2s;
}
.mute-btn:hover{background:var(--blue-dark)}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-text{font-family:'Fredoka','Nunito',system-ui;font-size:22px;font-weight:700;color:var(--blue)}
.mascot-wrap{margin:8px 0 4px}
.game-title{
  font-family:'Fredoka','Baloo 2',system-ui;font-size:2.4rem;font-weight:700;
  color:var(--blue);text-align:center;line-height:1.1;
}
.game-subtitle{
  font-size:1.1rem;color:var(--slate);text-align:center;margin:8px 0 20px;
  font-weight:600;
}
.btn-main{
  background:var(--orange);color:#fff;border:none;border-radius:24px;
  padding:14px 40px;font-size:1.2rem;font-weight:700;cursor:pointer;
  box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;
  font-family:'Fredoka','Nunito',system-ui;min-height:52px;min-width:160px;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--orange-dark)}
.btn-main:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark)}
.btn-secondary{
  background:var(--blue);color:#fff;border:none;border-radius:24px;
  padding:10px 28px;font-size:1rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 var(--blue-dark);transition:transform .1s,box-shadow .1s;
  font-family:'Fredoka','Nunito',system-ui;min-height:48px;
}
.btn-secondary:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--blue-dark)}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark)}
.parent-link{
  margin-top:14px;background:none;border:2px solid var(--blue);border-radius:20px;
  padding:8px 22px;color:var(--blue);font-size:.9rem;font-weight:700;
  cursor:pointer;transition:background .2s,color .2s;min-height:40px;
}
.parent-link:hover{background:var(--blue);color:#fff}
.parent-modal{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(15,23,42,.6);z-index:100;align-items:center;justify-content:center;
}
.parent-modal.open{display:flex}
.parent-box{
  background:#fff;border-radius:20px;padding:28px;max-width:380px;width:90%;
  box-shadow:0 8px 40px rgba(0,0,0,.2);text-align:center;
}
.parent-box h3{color:var(--blue);margin-bottom:10px;font-size:1.3rem}
.parent-box p{color:var(--slate);font-size:.95rem;margin-bottom:14px;line-height:1.6}
.parent-calc{font-size:1.5rem;font-weight:700;color:var(--blue);margin-bottom:10px}
.parent-input{
  border:2px solid var(--sky);border-radius:12px;padding:8px 14px;
  font-size:1.2rem;width:100px;text-align:center;margin:0 auto 12px;display:block;
  outline:none;
}
.parent-input:focus{border-color:var(--blue)}
.parent-answer-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* GAME AREA */
.game-wrap{width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center;gap:14px}
.progress-bar-wrap{width:100%;background:#d0e8fa;border-radius:20px;height:14px;overflow:hidden}
.progress-bar{height:14px;background:linear-gradient(90deg,var(--orange),var(--gold));border-radius:20px;transition:width .4s}
.level-badge{
  background:var(--blue);color:#fff;border-radius:16px;padding:4px 16px;
  font-size:.85rem;font-weight:700;margin-bottom:2px;
}
.score-disp{font-size:1rem;font-weight:700;color:var(--blue)}
.weather-scene{
  width:100%;max-width:500px;border-radius:24px;overflow:hidden;
  box-shadow:0 6px 24px rgba(15,76,129,.15);
  background:#87ceeb;position:relative;min-height:220px;
  display:flex;align-items:center;justify-content:center;
}
.question-box{
  background:#fff;border-radius:20px;padding:14px 20px;text-align:center;
  width:100%;max-width:500px;box-shadow:0 3px 14px rgba(15,76,129,.1);
}
.question-text{font-size:1.15rem;font-weight:700;color:var(--blue);margin-bottom:4px}
.choices-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  width:100%;max-width:500px;
}
.choice-btn{
  background:#fff;border:3px solid var(--sky);border-radius:18px;
  padding:12px 8px;cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:.9rem;font-weight:700;color:var(--blue);
  min-height:90px;box-shadow:0 3px 0 #b8dff8;
}
.choice-btn:hover{border-color:var(--orange);transform:translateY(-3px);box-shadow:0 6px 0 var(--orange-dark)}
.choice-btn.correct{border-color:var(--success);background:#e8fdf1;box-shadow:0 3px 0 #1a8a53}
.choice-btn.wrong{border-color:var(--error);background:#fff0f0;box-shadow:0 3px 0 #b91c1c}
.choice-btn:disabled{cursor:default;transform:none}
.choice-icon{font-size:2rem;line-height:1}
.feedback-msg{
  min-height:40px;font-size:1.05rem;font-weight:700;text-align:center;
  padding:6px 10px;border-radius:12px;transition:opacity .3s;
}
.feedback-msg.show-ok{background:#e8fdf1;color:#0f6a35}
.feedback-msg.show-err{background:#fff0f0;color:#991b1b}
.bilingual-word{
  background:var(--gold);border-radius:16px;padding:10px 20px;
  font-size:1.15rem;font-weight:700;color:var(--navy);text-align:center;
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) both;
  display:none;
}
@keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.aria-live{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* SUCCESS */
.success-wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;max-width:500px;width:100%}
.stars-row{display:flex;gap:8px;justify-content:center;font-size:2.4rem}
.star{display:inline-block;animation:starPop .4s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes starPop{from{transform:scale(0) rotate(-30deg)}to{transform:scale(1) rotate(0)}}
.success-title{font-size:2rem;font-weight:700;color:var(--blue)}
.success-sub{color:var(--slate);font-size:1rem}
.success-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* responsive */
@media(max-width:480px){
  .game-title{font-size:1.7rem}
  .choices-grid{grid-template-columns:repeat(3,1fr);gap:7px}
  .choice-btn{min-height:76px;font-size:.8rem;padding:8px 4px}
  .choice-icon{font-size:1.6rem}
  .weather-scene{min-height:170px}
}
</style>
</head>

<!-- SCREEN: GAME -->
<div class="screen" id="screen-game">
  <div class="top-bar">
    <div class="logo-row">
      <img src="../../brand/logo-pgrg-256.png" alt="PGRG IA" style="height:28px" onerror="this.style.display='none'">

    </div>
    <div style="display:flex;gap:8px;align-items:center">

        <button class="lang-btn active" id="gbtn-fr" onclick="setLang('fr')">FR</button>

    <button class="btn-secondary" id="btn-next" onclick="nextQuestion()" style="display:none" id="btn-next">→</button>
  </div>
</div>

<!-- SCREEN: SUCCESS -->
<div class="screen" id="screen-success">

    <div class="logo-row">
      <img src="../../brand/logo-pgrg-256.png" alt="PGRG IA" style="height:28px" onerror="this.style.display='none'">

    <div class="stars-row" id="stars-row"></div>
    <div class="success-title" id="success-title">Bravo !</div>
    <div class="success-sub" id="success-sub"></div>
    <div class="success-btns">
      <button class="btn-secondary" id="btn-replay" onclick="replayLevel()"></button>
      <button class="btn-main" id="btn-next-level" onclick="nextLevel()"></button>
      <button class="btn-secondary" id="btn-home" onclick="goHome()"></button>
    </div>
  </div>
</div>

<!-- PARENT MODAL -->
<div class="parent-modal" id="parent-modal">
  <div class="parent-box">
    <h3 id="pm-title">Porte parentale</h3>

    <input class="parent-input" type="number" id="pm-input" min="0" max="99" placeholder="?">
    <div class="parent-answer-row">
      <button class="btn-secondary" onclick="checkParent()" id="pm-ok">OK</button>
      <button class="btn-secondary" onclick="closeParents()" id="pm-cancel">Annuler</button>

    <div id="pm-feedback" style="min-height:24px;margin-top:8px;font-weight:700;color:var(--error)"></div>

  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playTone(freq, dur, type, gain) {
  if (muted) return;
  var ctx = getAudioCtx();
  if (!ctx) return;
  try {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    g.gain.setValueAtTime(gain || 0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playSuccess() {
  if (muted) return;
  var ctx = getAudioCtx(); if (!ctx) return;
  var notes = [523, 659, 784, 1047];
  notes.forEach(function(f, i) {
    setTimeout(function() { playTone(f, 0.22, 'sine', 0.16); }, i * 100);
  });
}

function playWrong() {
  if (muted) return;
  playTone(220, 0.28, 'triangle', 0.1);
  setTimeout(function(){ playTone(196, 0.22, 'triangle', 0.08); }, 130);
}

function playLevelUp() {
  if (muted) return;
  var ctx = getAudioCtx(); if (!ctx) return;
  var notes = [523, 659, 784, 880, 1047];
  notes.forEach(function(f, i) {
    setTimeout(function() { playTone(f, 0.25, 'sine', 0.14); }, i * 90);
  });
}

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  ['fr','en'].forEach(function(x){
    var b1 = document.getElementById('btn-'+x);
    var b2 = document.getElementById('gbtn-'+x);
    var b3 = document.getElementById('sbtn-'+x);
    if(b1){ b1.classList.toggle('active', x===l); }
    if(b2){ b2.classList.toggle('active', x===l); }
    if(b3){ b3.classList.toggle('active', x===l); }
  });
  renderTitle();
  if (document.getElementById('screen-game').classList.contains('active')) renderQuestion();
  if (document.getElementById('screen-success').classList.contains('active')) renderSuccess();
}

function toggleMute() {
  muted = !muted;
  ['mute-btn','gmute-btn','smute-btn'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.textContent = muted ? '🔇' : '🔊';
  });
  if (!muted) getAudioCtx();
}

function renderTitle() {
  var t = T[lang];
  document.getElementById('t-title').textContent = t.title;
  document.getElementById('t-subtitle').textContent = t.subtitle;
  document.getElementById('t-play').textContent = t.play;
  document.getElementById('t-parents').textContent = t.parents;
  document.title = T.fr.title + ' / ' + T.en.title + ' — PGRG IA';
}

function showScreen(id) {
  ['screen-title','screen-game','screen-success'].forEach(function(s){
    var el = document.getElementById(s);
    el.classList.remove('active');
    el.style.display = '';
  });
  var target = document.getElementById(id);
  target.classList.add('active');
  target.style.display = 'flex';
}

function buildQuestions() {
  var weathers = ['sun','rain','snow','wind','cloud','storm'];
  var shuffled = weathers.slice().sort(function(){ return Math.random()-.5; });
  questionSequence = [];
  shuffled.forEach(function(w) {
    questionSequence.push({ weather: w, type: 'name' });
  });
  if (currentLevel >= 2) {
    var s2 = weathers.slice().sort(function(){ return Math.random()-.5; });
    s2.forEach(function(w) {
      questionSequence.push({ weather: w, type: 'clothes' });
    });
  }
  if (currentLevel >= 3) {
    var s3 = weathers.slice().sort(function(){ return Math.random()-.5; });
    s3.forEach(function(w) {
      questionSequence.push({ weather: w, type: 'activity' });
    });
  }
  totalQ = questionSequence.length;
  maxScore = totalQ;
}

function startGame() {
  currentQ = 0; score = 0; qIdx = 0;
  buildQuestions();
  showScreen('screen-game');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  if (qIdx >= questionSequence.length) { showSuccess(); return; }
  var q = questionSequence[qIdx];
  var t = T[lang];
  var w = q.weather;
  var wData = WEATHER[w];

  // Level badge
  var lvl = currentLevel;
  document.getElementById('level-badge').textContent = t.level_badge.replace('{n}', lvl);

  // Progress
  var pct = Math.round((qIdx / questionSequence.length) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';

  // Score
  document.getElementById('score-disp').textContent = score + ' ' + t.score_label;

  // Scene
  document.getElementById('weather-scene').innerHTML = buildScene(wData.scene);

  // Question
  var qText = '';
  if (q.type === 'name') qText = t.q1;
  else if (q.type === 'clothes') qText = t.q2;
  else qText = t.q3;
  document.getElementById('question-text').textContent = qText;

  // Bilingual word — hidden initially
  var bw = document.getElementById('bilingual-word');
  bw.style.display = 'none';
  bw.textContent = '';

  // Choices
  var choices = buildChoices(q);
  var grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.setAttribute('data-correct', c.correct ? '1' : '0');
    btn.setAttribute('data-weather', w);
    btn.innerHTML = '<span class="choice-icon">' + c.emoji + '</span><span>' + c[lang] + '</span>';
    btn.onclick = function() { checkAnswer(btn, q); };
    grid.appendChild(btn);
  });

  // Feedback
  var fb = document.getElementById('feedback-msg');
  fb.textContent = '';
  fb.className = 'feedback-msg';

  // Next btn
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-next').textContent = t.next;
}

function buildChoices(q) {
  var w = q.weather;
  var weathers = ['sun','rain','snow','wind','cloud','storm'];
  var choices = [];

  if (q.type === 'name') {
    var correct = { fr: WEATHER[w].fr, en: WEATHER[w].en, emoji: WEATHER[w].emoji, correct: true };
    choices.push(correct);
    var others = weathers.filter(function(x){ return x !== w; }).sort(function(){ return Math.random()-.5; }).slice(0,2);
    others.forEach(function(o) {
      choices.push({ fr: WEATHER[o].fr, en: WEATHER[o].en, emoji: WEATHER[o].emoji, correct: false });
    });
  } else if (q.type === 'clothes') {
    var correct = { fr: CLOTHES[w].fr, en: CLOTHES[w].en, emoji: CLOTHES[w].emoji, correct: true };
    choices.push(correct);
    WRONG_CLOTHES[w].forEach(function(c) {
      choices.push({ fr: c.fr, en: c.en, emoji: c.emoji, correct: false });
    });
  } else {
    var correct = { fr: ACTIVITIES[w].fr, en: ACTIVITIES[w].en, emoji: ACTIVITIES[w].emoji, correct: true };
    choices.push(correct);
    WRONG_ACTIVITIES[w].forEach(function(c) {
      choices.push({ fr: c.fr, en: c.en, emoji: c.emoji, correct: false });
    });
  }

  // shuffle
  choices.sort(function(){ return Math.random()-.5; });
  return choices;
}

function checkAnswer(btn, q) {
  if (answered) return;
  answered = true;
  var isCorrect = btn.getAttribute('data-correct') === '1';
  var w = q.weather;
  var t = T[lang];
  var fb = document.getElementById('feedback-msg');
  var grid = document.getElementById('choices-grid');
  var btns = grid.querySelectorAll('.choice-btn');

  // Disable all
  btns.forEach(function(b) { b.disabled = true; });

  // Reveal correct
  btns.forEach(function(b) {
    if (b.getAttribute('data-correct') === '1') b.classList.add('correct');
  });

  if (isCorrect) {
    btn.classList.remove('wrong');
    btn.classList.add('correct');
    score++;
    fb.textContent = t.good;
    fb.className = 'feedback-msg show-ok';
    playSuccess();
    announce(t.good);
    showBilingualWord(w, q.type);
  } else {
    btn.classList.add('wrong');
    fb.textContent = t.retry;
    fb.className = 'feedback-msg show-err';
    playWrong();
    announce(t.retry);
    // Still show the word when wrong (learning)
    setTimeout(function(){ showBilingualWord(w, q.type); }, 500);
  }

  document.getElementById('score-disp').textContent = score + ' ' + t.score_label;
  setTimeout(function(){
    document.getElementById('btn-next').style.display = 'inline-block';
  }, 600);
}

function showBilingualWord(w, type) {
  var bw = document.getElementById('bilingual-word');
  var fr_word = WEATHER[w].fr;
  var en_word = WEATHER[w].en;
  bw.innerHTML = WEATHER[w].emoji + ' <strong>' + fr_word + '</strong> / <strong>' + en_word + '</strong>';
  bw.style.display = 'block';
}

function nextQuestion() {
  qIdx++;
  document.getElementById('progress-bar').style.width = Math.round((qIdx / questionSequence.length) * 100) + '%';
  renderQuestion();
}

function showSuccess() {
  showScreen('screen-success');
  renderSuccess();
  playLevelUp();
  saveProgress();
}

function renderSuccess() {
  var t = T[lang];
  document.getElementById('success-title').textContent = t.success_title;
  var sub = t.success_sub.replace('{s}', score).replace('{m}', maxScore);
  document.getElementById('success-sub').textContent = sub;
  document.getElementById('btn-replay').textContent = t.replay;
  document.getElementById('btn-home').textContent = t.home;
  var nlBtn = document.getElementById('btn-next-level');
  if (currentLevel < 3) {
    nlBtn.textContent = t.next_level;
    nlBtn.style.display = 'inline-block';
  } else {
    nlBtn.style.display = 'none';
  }
  // Stars
  var stars = Math.round((score / maxScore) * 5);
  if (stars < 1 && score > 0) stars = 1;
  if (stars < 1) stars = 1;
  var row = document.getElementById('stars-row');
  row.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var sp = document.createElement('span');
    sp.className = 'star';
    sp.style.animationDelay = (i * 0.1) + 's';
    sp.textContent = i < stars ? '⭐' : '✩';
    sp.style.opacity = i < stars ? '1' : '.35';
    row.appendChild(sp);
  }
  announce(t.success_title + ' ' + sub);
}

function replayLevel() {
  qIdx = 0; score = 0;
  buildQuestions();
  showScreen('screen-game');
  renderQuestion();
}

function nextLevel() {
  if (currentLevel < 3) currentLevel++;
  qIdx = 0; score = 0;
  buildQuestions();
  showScreen('screen-game');
  renderQuestion();
}

function goHome() {
  currentLevel = 1;
  showScreen('screen-title');
  renderTitle();
}

function saveProgress() {
  try {
    var data = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');
    if (!data.levels) data.levels = {};
    var k = 'level' + currentLevel;
    var stars = Math.round((score / maxScore) * 5);
    if (!data.levels[k] || data.levels[k] < stars) data.levels[k] = stars;
    data.lastPlayed = new Date().toISOString();
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function announce(msg) {
  var el = document.getElementById('aria-live');
  el.textContent = '';
  setTimeout(function(){ el.textContent = msg; }, 50);
}

// PARENT GATE
function openParents() {
  parentA = Math.floor(Math.random() * 8) + 2;
  parentB = Math.floor(Math.random() * 8) + 2;
  var t = T[lang];
  document.getElementById('pm-title').textContent = t.pm_title;
  document.getElementById('pm-desc').textContent = t.pm_desc;
  document.getElementById('pm-calc').textContent = parentA + ' × ' + parentB + ' = ?';
  document.getElementById('pm-ok').textContent = t.pm_ok;
  document.getElementById('pm-cancel').textContent = t.pm_cancel;
  document.getElementById('pm-feedback').textContent = '';
  document.getElementById('pm-input').value = '';
  document.getElementById('pm-info').style.display = 'none';
  document.getElementById('parent-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('pm-input').focus(); }, 100);
}

function closeParents() {
  document.getElementById('parent-modal').classList.remove('open');
}

function checkParent() {
  var val = parseInt(document.getElementById('pm-input').value, 10);
  if (val === parentA * parentB) {
    document.getElementById('pm-feedback').textContent = '';
    document.getElementById('pm-info').style.display = 'block';
    document.getElementById('pm-info-text').textContent = T[lang].pm_info;
  } else {
    document.getElementById('pm-feedback').textContent = T[lang].pm_wrong;
  }
}

document.getElementById('pm-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') checkParent();
});
document.getElementById('parent-modal').addEventListener('click', function(e){
  if (e.target === this) closeParents();
});

  };
  return scenes[type] || scenes.sun;
}

// Init

  var navLang = (navigator.language || 'fr').toLowerCase();

  showScreen('screen-title');
