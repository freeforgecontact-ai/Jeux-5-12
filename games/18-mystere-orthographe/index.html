<!DOCTYPE html>

<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;
  --orange:#f97316;--orange-dark:#ea580c;--gold:#ffd23f;
  --sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(160deg,#eaf6ff 0%,#d4ebfc 100%);min-height:100vh;color:var(--navy);}
.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;}
.screen.active{display:flex;}
.topbar{width:100%;background:var(--blue);display:flex;align-items:center;justify-content:space-between;padding:8px 14px;flex-shrink:0;}
.topbar-brand{display:flex;align-items:center;gap:8px;}
.topbar-brand span{color:#fff;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.btn-lang,.btn-mute{background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.4);color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:0.9rem;font-weight:700;min-width:48px;min-height:36px;}
.btn-lang.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.btn-mute{font-size:1.2rem;min-width:44px;}
#screen-title{padding:20px 16px 30px;gap:18px;justify-content:flex-start;}
.mascot-area{margin-top:10px;}
.title-main{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;color:var(--blue);text-align:center;line-height:1.2;}
.title-sub{color:var(--slate);font-size:1rem;text-align:center;max-width:380px;}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:16px;padding:16px 40px;font-size:1.3rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;transition:transform .1s,box-shadow .1s;min-height:56px;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{background:none;border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:8px 20px;cursor:pointer;font-size:0.9rem;font-weight:700;min-height:44px;}
#screen-parental{position:fixed;inset:0;background:rgba(10,30,60,.7);display:none;align-items:center;justify-content:center;z-index:100;}
#screen-parental.active{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:28px;max-width:380px;width:90%;text-align:center;}
.modal-box h2{color:var(--blue);margin-bottom:12px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
.modal-box p{color:var(--slate);font-size:.95rem;margin-bottom:12px;line-height:1.5;}
.parental-input{border:2px solid var(--sky);border-radius:10px;padding:10px;font-size:1.2rem;text-align:center;width:140px;margin:8px auto;display:block;}
.btn-check{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;min-height:44px;}
.btn-close-modal{background:none;border:2px solid var(--slate);color:var(--slate);border-radius:10px;padding:8px 18px;cursor:pointer;font-size:.9rem;margin-top:8px;min-height:44px;}
.parental-error{color:#e53e3e;font-size:.85rem;min-height:20px;}
#screen-game{padding:14px 14px 30px;gap:12px;justify-content:flex-start;}
.game-header{width:100%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.level-badge{background:var(--blue);color:#fff;border-radius:20px;padding:5px 14px;font-weight:700;font-size:.9rem;}
.progress-area{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:700;color:var(--slate);}
.hearts{font-size:1.2rem;letter-spacing:2px;}
.score-display{background:var(--gold);color:var(--navy);border-radius:20px;padding:5px 14px;font-weight:800;}
.detective-scene{width:100%;max-width:520px;background:#fff;border-radius:20px;padding:16px;box-shadow:0 4px 18px rgba(15,76,129,.12);position:relative;}
.question-card{background:var(--sky-light);border:2px solid var(--sky);border-radius:14px;padding:14px 16px;margin-bottom:12px;text-align:center;}
.question-intro{font-size:.85rem;color:var(--slate);margin-bottom:6px;}
.question-text{font-size:clamp(1rem,3.5vw,1.25rem);font-weight:700;color:var(--navy);line-height:1.4;}
.blank{display:inline-block;min-width:60px;border-bottom:3px solid var(--blue);padding:0 4px;}
.question-type-badge{display:inline-block;background:var(--orange);color:#fff;border-radius:8px;padding:2px 10px;font-size:.75rem;font-weight:700;margin-bottom:6px;}
.choices-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:520px;}
.choice-btn{background:#fff;border:3px solid var(--sky);border-radius:14px;padding:14px 8px;font-size:clamp(.9rem,2.5vw,1.1rem);font-weight:700;cursor:pointer;color:var(--navy);min-height:60px;transition:all .15s;box-shadow:0 3px 0 #b0d8f5;text-align:center;word-break:break-word;}
.choice-btn:hover:not(:disabled){border-color:var(--blue);transform:translateY(-2px);box-shadow:0 5px 0 #b0d8f5;}
.choice-btn.correct{background:var(--success);border-color:var(--success);color:#fff;box-shadow:0 3px 0 #27a367;}
.choice-btn.wrong{background:#fee2e2;border-color:#e53e3e;color:#c53030;}
.choice-btn:disabled{cursor:default;}
.sentence-display{background:var(--sky-light);border:2px solid var(--sky);border-radius:14px;padding:14px;margin-bottom:10px;font-size:clamp(1rem,3vw,1.2rem);line-height:1.8;text-align:center;}
.word-btn{display:inline-block;background:#fff;border:2px solid var(--sky);border-radius:8px;padding:4px 10px;margin:4px;cursor:pointer;font-size:inherit;font-weight:600;color:var(--navy);transition:all .15s;}
.word-btn:hover:not(:disabled){border-color:var(--orange);background:#fff8f0;}
.word-btn.correct-word{background:var(--success);border-color:var(--success);color:#fff;}
.word-btn.wrong-word{background:#fee2e2;border-color:#e53e3e;color:#c53030;}
.feedback-area{min-height:48px;text-align:center;font-size:1rem;font-weight:700;padding:8px;border-radius:10px;width:100%;max-width:520px;transition:all .3s;}
.feedback-area.ok{background:#d1fae5;color:#166534;}
.feedback-area.ko{background:#fee2e2;color:#c53030;}
.detective-track{width:100%;max-width:520px;background:#e2effc;border-radius:30px;height:18px;overflow:hidden;position:relative;}
.detective-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--sky));border-radius:30px;transition:width .5s ease;}
.detective-fig{position:absolute;top:50%;transform:translateY(-50%);font-size:1.4rem;transition:left .5s ease;}
.btn-next{background:var(--orange);color:#fff;border:none;border-radius:14px;padding:12px 36px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);min-height:52px;display:none;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
.btn-next:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-next.visible{display:block;}
#screen-success{padding:20px 16px 30px;gap:16px;text-align:center;justify-content:center;}
.success-stars{font-size:2.5rem;letter-spacing:4px;}
.success-title{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2rem;font-weight:800;color:var(--blue);}
.success-msg{color:var(--slate);font-size:1rem;max-width:340px;}
.success-score{font-size:1.5rem;font-weight:800;background:var(--gold);color:var(--navy);border-radius:16px;padding:10px 30px;}
.success-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.btn-secondary{background:var(--blue);color:#fff;border:none;border-radius:14px;padding:12px 24px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);min-height:52px;}
.clue-ribbon{background:var(--navy);color:var(--gold);border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:700;text-align:center;max-width:520px;width:100%;}
#aria-live{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;}
@keyframes starPop{0%{transform:scale(0) rotate(-20deg);}70%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0);}}
.star-pop{animation:starPop .4s ease forwards;}
</style>
</head>

var lang = (navigator.language||"fr").startsWith("fr") ? "fr" : "en";
var muted = false;
var currentLevel = 0;
var currentQIndex = 0;
var score = 0;
var hearts = 3;
var levelQuestions = [];
var answered = false;
var parentalA = 0, parentalB = 0;
var MAX_HEARTS = 3;
var QUESTIONS_PER_LEVEL = 8;
var audioCtx = null;

function saveProgress() {
  try { localStorage.setItem("pgrg_mystere_ortho", JSON.stringify({lang:lang,currentLevel:currentLevel,score:score})); } catch(e) {}
}
function loadProgress() {
  try {
    var d = JSON.parse(localStorage.getItem("pgrg_mystere_ortho")||"{}");
    if (d.lang) lang = d.lang;
    if (typeof d.currentLevel === "number") currentLevel = Math.min(d.currentLevel, 2);
    if (typeof d.score === "number") score = d.score;
  } catch(e) {}
}

function getCtx() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  return audioCtx;
}
function playTone(freq, dur, type, vol) {
  if (muted) return;
  type = type||"sine"; vol = vol||0.18;
  var ctx = getCtx(); if (!ctx) return;
  var o = ctx.createOscillator();
  var g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  o.start(); o.stop(ctx.currentTime + dur);
}
function playSuccess() { playTone(523,.12);setTimeout(function(){playTone(659,.12);},100);setTimeout(function(){playTone(784,.2);},200); }
function playWrong() { playTone(200,.2,"sawtooth",.12); }
function playLevelUp() { var fs=[523,587,659,698,784];fs.forEach(function(f,i){setTimeout(function(){playTone(f,.15);},i*80);}); }
function toggleMute() {
  muted = !muted;
  ["t","g","s"].forEach(function(id){
    var btn=document.getElementById("btn-mute-"+id);
    if(btn) btn.textContent = muted ? "🔇" : "🔊";
  });
}

function tget(key) {
  var parts = key.split(".");
  var obj = T[lang];
  for (var i=0;i<parts.length;i++) { obj = obj && obj[parts[i]]; }
  return obj || key;
}

function setLang(l) {
  lang = l; saveProgress(); renderUI();
  if (document.getElementById("screen-game").classList.contains("active")) {
    loadQuestion();
  }
}

function renderUI() {
  ["t","g","s"].forEach(function(id){
    var fr=document.getElementById("btn-fr-"+id);
    var en=document.getElementById("btn-en-"+id);
    if(fr) fr.classList.toggle("active",lang==="fr");
    if(en) en.classList.toggle("active",lang==="en");
  });
  var tm=document.getElementById("title-main-text"); if(tm) tm.textContent=tget("gameTitle");
  var ts=document.getElementById("title-sub-text"); if(ts) ts.textContent=tget("gameSub");
  var bp=document.getElementById("btn-play-t"); if(bp) bp.textContent=tget("btnPlay");
  var bpar=document.getElementById("btn-parents-t"); if(bpar) bpar.textContent=tget("btnParents");
  var pt=document.getElementById("parental-title"); if(pt) pt.textContent=tget("parentalTitle");
  var pbtn=document.getElementById("btn-check-parental"); if(pbtn) pbtn.textContent=tget("parentalBtn");
  var pcl=document.getElementById("btn-close-parental"); if(pcl) pcl.textContent=tget("parentalClose");
  var lb=document.getElementById("level-badge-text");
  if(lb) lb.textContent=tget("levelLabel")+" "+(currentLevel+1)+" - "+(tget("levelNames")[currentLevel]||"");
  updateHeartsDisplay();
  var sd=document.getElementById("score-display"); if(sd) sd.textContent="* "+score;
  var bng=document.getElementById("btn-next"); if(bng) bng.textContent=tget("btnNext");
  var bhg=document.getElementById("btn-home-g"); if(bhg) bhg.textContent=tget("btnHomeGame");
  var stit=document.getElementById("success-title"); if(stit) stit.textContent=tget("successTitle");
  var smsg=document.getElementById("success-msg"); if(smsg) smsg.textContent=tget("successMsg");
  var br=document.getElementById("btn-replay-s"); if(br) br.textContent=tget("btnReplay");
  var bnl=document.getElementById("btn-nextlvl-s"); if(bnl) bnl.textContent=tget("btnNextLvl");
  var bhs=document.getElementById("btn-home-s"); if(bhs) bhs.textContent=tget("btnHome");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById(id).classList.add("active");
}

function openParental() {
  parentalA = Math.floor(Math.random()*9)+2;
  parentalB = Math.floor(Math.random()*9)+2;
  var pq=document.getElementById("parental-question-text");
  if(pq) pq.textContent=tget("parentalQ")+" "+parentalA+" x "+parentalB+" = ?";
  var pi=document.getElementById("parental-info"); if(pi) pi.style.display="none";
  var pe=document.getElementById("parental-error"); if(pe) pe.textContent="";
  var pa=document.getElementById("parental-answer"); if(pa) pa.value="";
  document.getElementById("screen-parental").classList.add("active");
}
function closeParental() { document.getElementById("screen-parental").classList.remove("active"); }
function checkParental() {
  var val=parseInt(document.getElementById("parental-answer").value,10);
  if(val===parentalA*parentalB){
    document.getElementById("parental-error").textContent="";
    var pi=document.getElementById("parental-info");
    pi.style.display="block";
    pi.innerHTML="<p>"+tget("parentalInfo")+"</p>";
  } else {
    document.getElementById("parental-error").textContent=tget("parentalWrong");
    playWrong();
  }
}

function getDataForLang() { return lang==="fr" ? DATA_FR : DATA_EN; }

function shuffle(arr) {
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
  return a;
}

function startGame() {
  hearts = MAX_HEARTS;
  currentQIndex = 0;
  answered = false;
  var allData = getDataForLang();
  var pool = allData.filter(function(q){return q.level===currentLevel;});
  levelQuestions = shuffle(pool).slice(0, QUESTIONS_PER_LEVEL);
  showScreen("screen-game");
  renderUI();
  updateDetective(0);
  loadQuestion();
}

function updateHeartsDisplay() {
  var hd=document.getElementById("hearts-display"); if(!hd) return;
  var h="";
  for(var i=0;i<MAX_HEARTS;i++) h+=(i<hearts)?"❤":"🖤";
  hd.textContent=h;
  hd.setAttribute("aria-label",(lang==="fr"?"Vies ":"Lives ")+hearts);
}

function updateDetective(fraction) {
  var fill=document.getElementById("detective-fill");
  var fig=document.getElementById("detective-fig");
  if(fill) fill.style.width=Math.round(fraction*100)+"%";
  if(fig) fig.style.left=Math.max(0,Math.min(88,Math.round(fraction*88)))+"%";
  var clues=tget("clues");
  var idx=Math.min(Math.floor(fraction*clues.length),clues.length-1);
  var cr=document.getElementById("clue-ribbon"); if(cr) cr.textContent=clues[idx];
}

function loadQuestion() {
  answered=false;
  var btn=document.getElementById("btn-next"); if(btn) btn.classList.remove("visible");
  var fa=document.getElementById("feedback-area"); if(fa){fa.textContent="";fa.className="feedback-area";}

  if(currentQIndex>=levelQuestions.length){showSuccess();return;}

  var q=levelQuestions[currentQIndex];
  updateDetective(currentQIndex/levelQuestions.length);

  var badge=document.getElementById("qtype-badge");
  if(badge) badge.textContent=tget("qTypeBadge."+q.type)||"";
  var intro=document.getElementById("question-intro");
  if(intro) intro.textContent=tget("questionIntros."+q.type)||"";

  var qtext=document.getElementById("question-text");
  var sdisplay=document.getElementById("sentence-display");
  var grid=document.getElementById("choices-grid");

  if(q.type==="findError"){
    if(qtext) qtext.textContent="";
    if(sdisplay){
      sdisplay.style.display="block";
      sdisplay.innerHTML=buildSentenceHTML(q);
    }
    if(grid){grid.innerHTML="";grid.style.display="none";}
  } else {
    if(sdisplay) sdisplay.style.display="none";
    if(qtext){
      if(q.type==="complete"){
        qtext.innerHTML=q.question.replace("_",'<span class="blank">___</span>');
      } else {
        qtext.textContent=q.question;
      }
    }
    if(grid){
      grid.style.display="grid";
      grid.innerHTML="";
      var choiceData=q.choices.map(function(c,i){return{text:c,isCorrect:i===q.correct};});
      var shuffled=shuffle(choiceData);
      shuffled.forEach(function(ch){
        var btn2=document.createElement("button");
        btn2.className="choice-btn";
        btn2.textContent=ch.text;
        btn2.setAttribute("aria-label",ch.text);
        (function(b,correct,qref){
          b.onclick=function(){handleChoice(b,correct,qref);};
        })(btn2,ch.isCorrect,q);
        grid.appendChild(btn2);
      });
    }
  }

  var sd=document.getElementById("score-display"); if(sd) sd.textContent="* "+score;
  updateHeartsDisplay();
  ariaAnnounce((tget("questionIntros."+q.type)||"")+" "+(q.question||((q.sentence||[]).join(" "))||""));
}

function buildSentenceHTML(q) {
  return q.sentence.map(function(word,i){
    return '<button class="word-btn" onclick="handleWordClick(this,'+i+','+i+')" data-idx="'+i+'" aria-label="'+word+'">'+word+'</button>';
  }).join(" ");
}

function handleChoice(btn, isCorrect, q) {
  if(answered) return;
  answered=true;
  disableChoices();
  if(isCorrect){
    btn.classList.add("correct");
    showFeedback("ok",null);
    score+=10;
    var sd=document.getElementById("score-display"); if(sd) sd.textContent="* "+score;
    playSuccess();
    saveProgress();
  } else {
    btn.classList.add("wrong");
    highlightCorrectChoice(q);
    hearts=Math.max(0,hearts-1);
    updateHeartsDisplay();
    showFeedback("ko",q.choices[q.correct]);
    if(q.hint) showHint(q.hint);
    playWrong();
    if(hearts===0){setTimeout(function(){hearts=MAX_HEARTS;updateHeartsDisplay();},1500);}
  }
  showNextBtn();
}

function highlightCorrectChoice(q) {
  var grid=document.getElementById("choices-grid"); if(!grid) return;
  var btns=grid.querySelectorAll(".choice-btn");
  btns.forEach(function(b){if(b.textContent===q.choices[q.correct]) b.classList.add("correct");});
}

function handleWordClick(btn, idx) {
  if(answered) return;
  answered=true;
  var q=levelQuestions[currentQIndex];
  var allWords=document.querySelectorAll(".word-btn");
  allWords.forEach(function(w){w.disabled=true;});
  var clickedIdx=parseInt(btn.getAttribute("data-idx"),10);
  if(clickedIdx===q.errorIndex){
    btn.classList.add("correct-word");
    showFeedback("ok",null);
    score+=10;
    var sd=document.getElementById("score-display"); if(sd) sd.textContent="* "+score;
    playSuccess();
    saveProgress();
  } else {
    btn.classList.add("wrong-word");
    allWords.forEach(function(w,i){if(parseInt(w.getAttribute("data-idx"),10)===q.errorIndex) w.classList.add("correct-word");});
    hearts=Math.max(0,hearts-1);
    updateHeartsDisplay();
    showFeedback("ko",q.correct);
    if(q.hint) showHint(q.hint);
    playWrong();
    if(hearts===0){setTimeout(function(){hearts=MAX_HEARTS;updateHeartsDisplay();},1500);}
  }
  showNextBtn();
}

function disableChoices() {
  var grid=document.getElementById("choices-grid"); if(!grid) return;
  grid.querySelectorAll(".choice-btn").forEach(function(b){b.disabled=true;});
}

function showFeedback(type, correctWord) {
  var fa=document.getElementById("feedback-area"); if(!fa) return;
  fa.className="feedback-area "+(type==="ok"?"ok":"ko");
  if(type==="ok"){
    var msgs=tget("feedbackOk");
    fa.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  } else {
    var msgs2=tget("feedbackKo");
    var base=msgs2[Math.floor(Math.random()*msgs2.length)];
    fa.textContent=base+(correctWord?" "+correctWord:"");
  }
  ariaAnnounce(fa.textContent);
}

function showHint(hint) {
  if(!hint) return;
  var fa=document.getElementById("feedback-area"); if(!fa) return;
  fa.textContent+=" | "+tget("feedbackHint")+" "+hint;
}

function showNextBtn() {
  var btn=document.getElementById("btn-next"); if(btn) btn.classList.add("visible");
}

function nextQuestion() {
  currentQIndex++;
  updateDetective(currentQIndex/levelQuestions.length);
  loadQuestion();
}

function goHome() { showScreen("screen-title"); renderUI(); }

function showSuccess() {
  playLevelUp();
  updateDetective(1);
  var total=levelQuestions.length*10;
  var stars="*";
  var starIdx=0;
  if(score>=total*0.9){stars="* * *";starIdx=2;}
  else if(score>=total*0.6){stars="* *";starIdx=1;}
  var ss=document.getElementById("success-stars"); if(ss) ss.textContent=stars;
  var sc=document.getElementById("success-score"); if(sc) sc.textContent=score+" pts";
  var sm=document.getElementById("success-msg"); if(sm) sm.textContent=(tget("starMsg")[starIdx]||tget("successMsg"));
  showScreen("screen-success");
  renderUI();
  var btnNL=document.getElementById("btn-nextlvl-s");
  if(btnNL) btnNL.style.display=currentLevel>=2?"none":"";
}

function replayLevel() { score=0; startGame(); }

function nextLevel() {
  if(currentLevel<2){currentLevel++;saveProgress();score=0;startGame();}
  else{goHome();}
}

function ariaAnnounce(msg) {
  var el=document.getElementById("aria-live"); if(!el) return;
  el.textContent="";
  setTimeout(function(){el.textContent=msg;},50);
}

loadProgress();
renderUI();
showScreen("screen-title");
</script>
