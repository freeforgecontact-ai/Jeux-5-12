<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f4c81">
<title>Explorateur du Corps Humain / Body Explorer — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;--orange:#f97316;
  --orange-dark:#ea580c;--gold:#ffd23f;--sky:#7ec3ee;--sky-light:#eaf6ff;
  --slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(135deg,#eaf6ff 0%,#dbeafe 60%,#e0f2fe 100%);
  min-height:100vh;color:var(--navy);
}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--blue);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #0003;}
#topbar img{height:34px;}
#topbar .brand{font-family:'Fredoka','Nunito',system-ui,sans-serif;font-size:1.15rem;font-weight:700;color:#fff;margin-right:auto;}
.lang-btn{background:transparent;border:2px solid #fff;color:#fff;border-radius:8px;padding:4px 10px;font-size:.85rem;font-weight:700;cursor:pointer;min-width:40px;min-height:36px;transition:background .2s;}
.lang-btn.active,.lang-btn:hover{background:var(--orange);border-color:var(--orange);}
#muteBtn{background:transparent;border:none;font-size:1.4rem;cursor:pointer;padding:4px 6px;border-radius:8px;min-width:44px;min-height:44px;}
#muteBtn:hover{background:#ffffff22;}
.screen{display:none;padding:20px 16px 40px;}
.screen.active{display:block;}
#titleScreen{text-align:center;}
#titleScreen h1{font-size:clamp(1.8rem,6vw,2.6rem);color:var(--blue);margin-bottom:4px;}
#titleScreen .sub{font-size:1.1rem;color:var(--slate);margin-bottom:20px;}
#mascot-area{margin:10px auto 20px;max-width:220px;}
.btn-play{display:inline-block;background:var(--orange);color:#fff;font-family:'Fredoka',system-ui,sans-serif;font-size:1.5rem;font-weight:700;padding:14px 40px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;min-height:56px;margin:8px;}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--orange-dark);}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-secondary{display:inline-block;background:var(--blue);color:#fff;font-family:'Fredoka',system-ui,sans-serif;font-size:1rem;font-weight:700;padding:10px 24px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);transition:transform .1s;min-height:48px;margin:8px;}
.btn-secondary:hover{transform:translateY(-1px);}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 1px 0 var(--blue-dark);}
#levelScreen{text-align:center;}
#levelScreen h2{font-size:1.8rem;color:var(--blue);margin-bottom:8px;}
.level-cards{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:16px;}
.level-card{background:#fff;border-radius:20px;padding:20px;width:180px;cursor:pointer;border:3px solid var(--sky);box-shadow:0 4px 12px #0001;transition:transform .15s,box-shadow .15s;text-align:center;}
.level-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px #0002;}
.level-card .icon{font-size:2.5rem;margin-bottom:8px;}
.level-card h3{font-size:1rem;color:var(--blue);}
.level-card p{font-size:.8rem;color:var(--slate);margin-top:4px;}
.level-card.locked{opacity:.55;cursor:not-allowed;}
.level-card .badge{display:inline-block;background:var(--success);color:#fff;border-radius:50px;font-size:.7rem;padding:2px 8px;margin-top:6px;}
#gameScreen{max-width:900px;margin:0 auto;}
#gameHeader{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
#gameHeader h2{font-size:1.3rem;color:var(--blue);flex:1;}
#scoreDisplay{background:var(--blue);color:var(--gold);font-weight:700;border-radius:50px;padding:6px 16px;font-size:.95rem;}
#progressBar{width:100%;height:10px;background:#d1e8ff;border-radius:50px;margin-bottom:14px;}
#progressFill{height:100%;background:var(--success);border-radius:50px;transition:width .5s;}
#organGame{display:none;}
#bodyArea{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
#bodySvgWrap{position:relative;flex-shrink:0;width:min(280px,80vw);}
#bodySvgWrap svg{width:100%;height:auto;display:block;}
.drop-zone{position:absolute;border-radius:50%;border:3px dashed var(--blue);background:#7ec3ee33;cursor:default;transition:background .2s,border-color .2s;}
.drop-zone.hover{background:#f9731644;border-color:var(--orange);}
.drop-zone.correct{background:#34c77b44;border-color:var(--success);border-style:solid;}
.drop-zone.wrong{background:#f9731644;border-color:#ef4444;border-style:solid;animation:shake .3s;}
#organBank{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;padding:12px;background:#fff;border-radius:16px;border:2px solid var(--sky);max-width:260px;}
.organ-chip{display:flex;align-items:center;gap:6px;background:var(--sky-light);border:2px solid var(--sky);border-radius:12px;padding:8px 12px;cursor:grab;font-weight:700;font-size:.9rem;user-select:none;touch-action:none;min-height:48px;transition:transform .15s,box-shadow .15s;}
.organ-chip:hover{transform:scale(1.05);box-shadow:0 4px 12px #0002;}
.organ-chip.dragging{opacity:.5;cursor:grabbing;}
.organ-chip.placed{opacity:.4;pointer-events:none;}
#quizGame{display:none;}
.quiz-card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 4px 16px #0001;margin-bottom:16px;text-align:center;}
.quiz-card .organ-emoji{font-size:3.5rem;margin-bottom:8px;}
.quiz-card .question{font-size:1.15rem;font-weight:700;color:var(--navy);margin-bottom:16px;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.quiz-opt{background:var(--sky-light);border:2px solid var(--sky);border-radius:14px;padding:12px 8px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:56px;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;text-align:center;}
.quiz-opt:hover{background:#dbeafe;transform:scale(1.02);}
.quiz-opt.correct{background:#d1fae5;border-color:var(--success);}
.quiz-opt.wrong{background:#fee2e2;border-color:#ef4444;}
#systemGame{display:none;}
.system-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 16px #0001;margin-bottom:14px;}
.system-card h3{font-size:1.1rem;color:var(--blue);margin-bottom:10px;}
.organ-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.organ-tag{background:var(--sky-light);border:2px solid var(--sky);border-radius:50px;padding:6px 14px;font-size:.9rem;font-weight:600;cursor:pointer;min-height:44px;display:flex;align-items:center;transition:background .15s;}
.system-targets{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.sys-drop{border:3px dashed;border-radius:16px;padding:10px 14px;min-width:130px;min-height:60px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .2s;text-align:center;}
#feedbackToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;border-radius:16px;padding:14px 24px;font-size:1rem;font-weight:700;text-align:center;max-width:360px;transition:transform .35s cubic-bezier(.23,1,.32,1),opacity .35s;opacity:0;z-index:200;pointer-events:none;box-shadow:0 8px 32px #0004;}
#feedbackToast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#feedbackToast.success{background:var(--success);}
#feedbackToast.error{background:#ef4444;}
#infoPanel{background:linear-gradient(135deg,#fff 0%,#eaf6ff 100%);border:2px solid var(--sky);border-radius:16px;padding:16px;margin-bottom:14px;display:none;animation:fadeIn .4s;}
#infoPanel .info-emoji{font-size:2rem;margin-bottom:4px;}
#infoPanel .info-title{font-weight:700;color:var(--blue);margin-bottom:4px;}
#infoPanel p{font-size:.9rem;color:var(--slate);}
#successScreen{text-align:center;padding:30px 16px;}
#successScreen h2{font-size:2rem;color:var(--blue);margin-bottom:8px;}
.stars{font-size:2.5rem;margin:12px 0;}
.success-msg{font-size:1.1rem;color:var(--slate);margin-bottom:24px;}
#successScreen .btn-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
#parentGate{position:fixed;inset:0;background:#0009;z-index:300;display:none;align-items:center;justify-content:center;}
#parentGate.open{display:flex;}
#parentBox{background:#fff;border-radius:24px;padding:28px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px #0005;}
#parentBox h3{font-size:1.3rem;color:var(--blue);margin-bottom:8px;}
#parentBox p{font-size:.9rem;color:var(--slate);margin-bottom:14px;}
#parentBox .math-q{font-size:1.8rem;font-weight:700;color:var(--navy);margin:10px 0;}
#parentBox input{border:2px solid var(--sky);border-radius:10px;padding:8px 14px;font-size:1.1rem;width:80px;text-align:center;}
#parentBox .err{color:#ef4444;font-size:.85rem;margin-top:6px;min-height:20px;}
#parentInfo{display:none;margin-top:14px;text-align:left;background:var(--sky-light);border-radius:12px;padding:14px;font-size:.88rem;color:var(--slate);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px)};}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
.pop{animation:pop .35s ease;}
@media(max-width:540px){.quiz-options{grid-template-columns:1fr;}#bodyArea{flex-direction:column;align-items:center;}#organBank{max-width:90vw;}}
</style>
</head>
<body>
<div id="topbar" role="banner">
  <img src="../../brand/logo-pgrg-256.png" alt="PGRG IA" style="height:34px" onerror="this.style.display='none'">
  <span class="brand">PGRG IA</span>
  <button class="lang-btn active" id="btnFR" onclick="setLang('fr')" aria-label="Francais">FR</button>
  <button class="lang-btn" id="btnEN" onclick="setLang('en')" aria-label="English">EN</button>
  <button id="muteBtn" onclick="toggleMute()" aria-label="Muet / Mute">&#x1F50A;</button>
</div>
<div id="titleScreen" class="screen active" role="main">
  <div id="mascot-area" aria-hidden="true"></div>
  <h1 id="t-title"></h1>
  <p class="sub" id="t-sub"></p>
  <br>
  <button class="btn-play" onclick="showLevels()" id="t-play"></button>
  <br><br>
  <button class="btn-secondary" onclick="openParents()" id="t-parents"></button>
</div>
<div id="levelScreen" class="screen" role="main">
  <h2 id="ls-title"></h2>
  <p id="ls-sub" style="color:var(--slate);margin-bottom:4px;"></p>
  <div class="level-cards" id="levelCards"></div>
  <br>
  <button class="btn-secondary" onclick="showScreen('titleScreen')" id="ls-back"></button>
</div>
<div id="gameScreen" class="screen" role="main">
  <div id="gameHeader">
    <h2 id="gh-title"></h2>
    <span id="scoreDisplay">&#x2B50; <span id="scoreVal">0</span></span>
  </div>
  <div id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div id="progressFill" style="width:0%"></div>
  </div>
  <div id="infoPanel" aria-live="polite">
    <div class="info-emoji" id="info-emoji"></div>
    <div class="info-title" id="info-title"></div>
    <p id="info-body"></p>
  </div>
  <div id="organGame">
    <p id="og-instruction" style="margin-bottom:12px;font-weight:600;color:var(--slate);"></p>
    <div id="bodyArea">
      <div id="bodySvgWrap"></div>
      <div id="organBank" aria-label="Organes a placer"></div>
    </div>
  </div>
  <div id="quizGame">
    <div class="quiz-card" id="quizCard">
      <div class="organ-emoji" id="quiz-emoji"></div>
      <div class="question" id="quiz-question"></div>
      <div class="quiz-options" id="quiz-options" role="list"></div>
    </div>
    <p id="quiz-progress" style="text-align:center;color:var(--slate);font-size:.85rem;"></p>
  </div>
  <div id="systemGame">
    <p id="sg-instruction" style="margin-bottom:12px;font-weight:600;color:var(--slate);"></p>
    <div class="system-card">
      <h3 id="sg-drag-title"></h3>
      <div class="organ-tags" id="systemOrganPool"></div>
    </div>
    <div class="system-card">
      <h3 id="sg-drop-title"></h3>
      <div class="system-targets" id="systemTargets"></div>
    </div>
    <div style="text-align:center;margin-top:10px;">
      <button class="btn-play" id="sg-check" style="font-size:1rem;padding:10px 28px;" onclick="checkSystems()"></button>
    </div>
  </div>
  <div style="text-align:center;margin-top:20px;">
    <button class="btn-secondary" onclick="showLevels()" id="g-home"></button>
  </div>
</div>
<div id="successScreen" class="screen" role="main" aria-live="assertive">
  <h2 id="ss-title"></h2>
  <div class="stars" id="ss-stars"></div>
  <p class="success-msg" id="ss-msg"></p>
  <div class="btn-row">
    <button class="btn-secondary" onclick="replayLevel()" id="ss-replay"></button>
    <button class="btn-play" onclick="nextLevel()" id="ss-next"></button>
    <button class="btn-secondary" onclick="showLevels()" id="ss-home"></button>
  </div>
</div>
<div id="feedbackToast" role="alert" aria-live="assertive"></div>
<div id="parentGate" role="dialog" aria-modal="true" aria-labelledby="pg-title">
  <div id="parentBox">
    <h3 id="pg-title"></h3>
    <p id="pg-desc"></p>
    <div class="math-q" id="pg-math"></div>
    <input type="number" id="pg-input" aria-label="Reponse" onkeydown="if(event.key==='Enter')checkParent()">
    <div class="err" id="pg-err"></div>
    <br>
    <button class="btn-play" style="font-size:1rem;padding:10px 24px;" onclick="checkParent()" id="pg-btn"></button>
    <button class="btn-secondary" style="margin-top:8px;" onclick="closeParents()" id="pg-close"></button>
    <div id="parentInfo">
      <strong id="pi-title"></strong>
      <p id="pi-body"></p>
    </div>
  </div>
</div>

function playTone(freq,dur,type,vol){
  if(muted)return;type=type||'sine';vol=vol||0.15;
  try{var a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=type;o.frequency.setValueAtTime(freq,a.currentTime);
    g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);}catch(e){}}

function setupDropZone(dz){
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('hover');});

function renderOrganBank(){
  var bank=document.getElementById('organBank');bank.innerHTML='';
  var organs=T[lang].organs;
  Object.keys(organs).forEach(function(key){
    var o=organs[key];

    chip.setAttribute('role','button');

    chip.addEventListener('dragend',function(){chip.classList.remove('dragging');});
    chip.addEventListener('touchstart',function(e){
      if(organPlaced[key])return;
      dragOrgan=key;
      var touch=e.touches[0];
      var ghost=document.createElement('div');
      ghost.className='organ-chip';ghost.innerHTML=chip.innerHTML;
      ghost.style.cssText='position:fixed;z-index:999;opacity:.8;pointer-events:none;left:'+(touch.clientX-40)+'px;top:'+(touch.clientY-40)+'px;';
      document.body.appendChild(ghost);dragGhost=ghost;
    },{passive:true});
    chip.addEventListener('touchmove',function(e){
      if(!dragGhost)return;e.preventDefault();
      var touch=e.touches[0];
      dragGhost.style.left=(touch.clientX-40)+'px';dragGhost.style.top=(touch.clientY-40)+'px';
      document.querySelectorAll('.drop-zone').forEach(function(dz){
        var r=dz.getBoundingClientRect();
        dz.classList.toggle('hover',touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom);
      });
    },{passive:false});
    chip.addEventListener('touchend',function(e){
      if(dragGhost){dragGhost.remove();dragGhost=null;}
      document.querySelectorAll('.drop-zone').forEach(function(dz){dz.classList.remove('hover');});
      var touch=e.changedTouches[0];
      var el=document.elementFromPoint(touch.clientX,touch.clientY);
      var dz=el?el.closest('.drop-zone'):null;
      if(dz)handleDrop(dz,dragOrgan);
      dragOrgan=null;
    });
    bank.appendChild(chip);
  });
}
function handleDrop(dz,organKey){
  if(!organKey||organPlaced[organKey])return;
  var expected=dz.dataset.organ;
  if(expected===organKey){
    organPlaced[organKey]=true;
    dz.classList.add('correct');dz.classList.remove('wrong');
    var o=T[lang].organs[organKey];
    dz.innerHTML='<span style="font-size:clamp(16px,5vw,24px);pointer-events:none;">'+o.emoji+'</span>';
    showInfo(o.emoji,o.name,o.info);addScore(10);playSuccess();
    showToast(o.name+' !',true);
    var total=Object.keys(organPlaced).length;
    var placed=Object.values(organPlaced).filter(Boolean).length;
    updateProgress(Math.round(placed/total*100));
    renderOrganBank();
    if(placed===total)setTimeout(function(){completeLevel();},900);
  } else {
    dz.classList.add('wrong');setTimeout(function(){dz.classList.remove('wrong');},500);
    playError();showToast(lang==='fr'?'Essaie encore !':'Try again!',false);
  }
  dragOrgan=null;
}

function answerQuiz(chosen,correct,btn,opts){
  opts.querySelectorAll('.quiz-opt').forEach(function(b){b.onclick=null;});
  var q=quizList[quizIdx];var o=T[lang].organs[q.organ];

    showToast(lang==='fr'?'Bravo !':'Well done!',true);showInfo(o.emoji,o.name,o.info);
  } else {

    opts.querySelectorAll('.quiz-opt')[correct].classList.add('correct');
    playError();showToast(lang==='fr'?'Essaie encore !':'Try again!',false);showInfo(o.emoji,o.name,o.info);
  }
  quizIdx++;updateProgress(Math.round(quizIdx/quizList.length*100));

function assignToSystem(sysKey){

  Object.keys(T[lang].systems).forEach(function(sk){

function checkSystems(){
  var systems=T[lang].systems;var organs=T[lang].organs;
  var total=Object.keys(organs).length;
  if(Object.keys(systemAssignments).length<total){
    showToast(tr('sg_place_all'),false);playError();return;
  }
  var allCorrect=true;
  Object.keys(systemAssignments).forEach(function(organ){
    var assignedSys=systemAssignments[organ];
    var isRight=Object.keys(systems).some(function(sk){return systems[sk].organs.indexOf(organ)>=0&&assignedSys===sk;});
    if(isRight)return;
    allCorrect=false;
    var tag=document.querySelector('.organ-tag[data-organ="'+organ+'"]');
    if(tag){tag.style.outline='2px solid #ef4444';setTimeout(function(){if(tag)tag.style.outline='';},2000);}
  });
  if(allCorrect){
    addScore(30);playSuccess();showToast(tr('sg_check_ok'),true);
    setTimeout(function(){completeLevel();},1000);
  } else {
    playError();showToast(tr('sg_check_err'),false);
  }
}

    document.getElementById('pg-err').textContent='';

    document.getElementById('pi-body').textContent=tr('pi_body');
    document.getElementById('parentInfo').style.display='block';
  } else {
    document.getElementById('pg-err').textContent=tr('pg_err');playError();
  }
}

/* ---- INIT ---- */
loadState();setLang(lang);renderTitle();showScreen('titleScreen');
</script>
