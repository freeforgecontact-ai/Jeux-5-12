<title>Marchand & Monnaie / Coin Market — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81; --blue-dark:#0a3559; --navy:#0f172a;
  --orange:#f97316; --orange-dark:#ea580c; --gold:#ffd23f;
  --sky:#7ec3ee; --sky-light:#eaf6ff; --slate:#475569;
  --success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(135deg,#eaf6ff 0%,#dbeafe 100%);
  min-height:100vh; color:var(--navy);
  display:flex; flex-direction:column; align-items:center;
}
#topbar{
  width:100%; background:var(--blue);
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 12px; gap:8px; flex-wrap:wrap;
}
#topbar-left{display:flex;align-items:center;gap:8px}
#topbar-brand{color:#fff;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700}
#topbar-right{display:flex;align-items:center;gap:6px}
.lang-btn{
  background:transparent;border:2px solid #fff;color:#fff;
  border-radius:8px;padding:4px 10px;font-size:.85rem;font-weight:700;
  cursor:pointer;min-width:48px;min-height:36px;transition:background .2s;
}
.lang-btn.active,.lang-btn:hover{background:rgba(255,255,255,.2)}
#mute-btn{
  background:transparent;border:none;font-size:1.4rem;cursor:pointer;
  min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;
}
.screen{display:none;flex-direction:column;align-items:center;padding:16px;width:100%;max-width:700px}
.screen.active{display:flex}
#title-mascot{margin:16px 0 8px}
h1{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  color:var(--blue);font-size:2rem;text-align:center;line-height:1.2;
}
.subtitle{color:var(--slate);font-size:1rem;text-align:center;margin:6px 0 18px}
.btn-play{
  background:var(--orange);color:#fff;border:none;border-radius:16px;
  padding:14px 40px;font-size:1.3rem;font-weight:700;cursor:pointer;
  box-shadow:0 5px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  min-width:180px;min-height:56px;
}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark)}
.btn-secondary{
  background:var(--blue);color:#fff;border:none;border-radius:12px;
  padding:10px 24px;font-size:.95rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 var(--blue-dark);transition:transform .1s,box-shadow .1s;
  min-height:48px; margin-top:10px;
}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark)}
#level-select{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.level-btn{
  background:#fff;border:3px solid var(--blue);color:var(--blue);
  border-radius:14px;padding:12px 20px;font-size:1rem;font-weight:700;
  cursor:pointer;min-width:140px;min-height:56px;
  transition:background .15s,color .15s;
}
.level-btn.active,.level-btn:hover{background:var(--blue);color:#fff}
#game-header{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
#game-level-badge{
  background:var(--blue);color:#fff;border-radius:10px;
  padding:4px 14px;font-size:.85rem;font-weight:700;
}
#game-score{color:var(--slate);font-size:.9rem;font-weight:700}
#stall{
  background:#fff;border-radius:20px;padding:14px;
  box-shadow:0 4px 16px rgba(15,76,129,.12);
  width:100%;margin-bottom:14px;
}
#stall-title{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  color:var(--blue);font-size:1.1rem;font-weight:700;margin-bottom:8px;text-align:center;
}
#items-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.item-card{
  background:var(--sky-light);border:2px solid var(--sky);border-radius:14px;
  padding:8px 12px;display:flex;flex-direction:column;align-items:center;
  gap:4px;min-width:80px;font-size:.85rem;
}
.item-card .item-emoji{font-size:2rem}
.item-card .item-name{font-weight:700;color:var(--navy)}
.item-card .item-price{color:var(--orange);font-weight:700}
.item-card.selected{border-color:var(--orange);background:#fff3e0}
#transaction-panel{
  background:#fff;border-radius:20px;padding:14px;
  box-shadow:0 4px 16px rgba(15,76,129,.12);
  width:100%;margin-bottom:14px;
}
#transaction-item{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:4px}
#transaction-price{font-size:1.1rem;color:var(--orange);font-weight:700}
#paid-label{font-size:.85rem;color:var(--slate);margin-top:6px}
#paid-display{
  font-size:1.3rem;font-weight:700;color:var(--blue);
  background:var(--sky-light);border-radius:10px;padding:6px 12px;
  display:inline-block;margin-top:2px;min-width:80px;text-align:center;
}
#change-label{font-size:.85rem;color:var(--slate);margin-top:6px}
#change-needed{
  font-size:1.3rem;font-weight:700;color:var(--success);
  background:#f0fdf4;border-radius:10px;padding:6px 12px;
  display:inline-block;margin-top:2px;
}
#coins-section{margin-bottom:14px;width:100%}
#coins-title{font-size:.9rem;font-weight:700;color:var(--slate);text-align:center;margin-bottom:8px;}
#coins-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.coin-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;
  min-width:56px;min-height:72px;padding:4px;
  border-radius:12px;transition:transform .1s;
}
.coin-btn:hover,.coin-btn:focus{transform:scale(1.08)}
.coin-btn:active{transform:scale(.95)}
.coin-label{font-size:.7rem;font-weight:700;color:var(--slate)}
#selection-tray{
  background:var(--sky-light);border:2px dashed var(--sky);border-radius:14px;
  padding:10px;width:100%;min-height:60px;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;
  margin-bottom:14px;
  position:relative;
}
#tray-placeholder{
  color:#aaa;font-size:.9rem;position:absolute;pointer-events:none;
  display:flex;align-items:center;justify-content:center;width:100%;height:100%;
}
.tray-coin{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  cursor:pointer;padding:3px;border-radius:8px;transition:transform .1s;
}
.tray-coin:hover{transform:scale(.9)}
.tray-coin .coin-label{font-size:.65rem;color:var(--slate)}
#validate-btn{
  background:var(--success);color:#fff;border:none;border-radius:14px;
  padding:12px 32px;font-size:1.1rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 #22a05a;transition:transform .1s,box-shadow .1s;
  min-height:52px;width:100%;max-width:320px;
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
}
#validate-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #22a05a}
#validate-btn:disabled{background:#cbd5e1;box-shadow:none;cursor:default}
#feedback-overlay{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:100;pointer-events:none;
}
#feedback-bubble{
  background:#fff;border-radius:20px;padding:20px 32px;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  font-size:1.2rem;font-weight:700;text-align:center;
  transform:scale(0);transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events:auto;max-width:280px;
}
#feedback-bubble.show{transform:scale(1)}
#feedback-emoji{font-size:3rem;display:block;margin-bottom:6px}
#customer-area{display:flex;justify-content:center;margin-bottom:10px;}
#success-stars{font-size:3rem;margin:10px 0;text-align:center}
#success-msg{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:1.5rem;color:var(--blue);text-align:center;margin-bottom:6px;
}
#success-sub{color:var(--slate);text-align:center;margin-bottom:18px}
#success-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
#parent-gate{
  background:#fff;border-radius:20px;padding:24px;
  box-shadow:0 4px 16px rgba(15,76,129,.1);
  width:100%;max-width:400px;text-align:center;
}
#parent-gate h2{color:var(--blue);margin-bottom:8px}
#gate-question{font-size:1.1rem;margin:10px 0 6px;font-weight:700}
#gate-input{
  border:2px solid var(--sky);border-radius:10px;padding:8px 14px;
  font-size:1.1rem;width:100px;text-align:center;margin-bottom:8px;
}
#gate-err{color:red;font-size:.85rem;min-height:18px}
#parent-info{background:var(--sky-light);border-radius:14px;padding:14px;text-align:left;margin-top:12px;}
#parent-info h3{color:var(--blue);margin-bottom:6px}
#parent-info p{font-size:.9rem;color:var(--slate);line-height:1.5}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
#progress-bar-wrap{width:100%;background:#dbeafe;border-radius:8px;height:10px;margin-bottom:10px}
#progress-bar{height:10px;background:var(--orange);border-radius:8px;transition:width .4s}
@media(max-width:480px){
  h1{font-size:1.5rem}
  .coin-btn{min-width:48px}
  #validate-btn{font-size:1rem;padding:10px 20px}
}
</style>

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type){
  if(muted) return;
  try{
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==='good'){
      osc.frequency.setValueAtTime(523,ctx.currentTime);
      osc.frequency.setValueAtTime(659,ctx.currentTime+.1);
      osc.frequency.setValueAtTime(784,ctx.currentTime+.2);
      gain.gain.setValueAtTime(.22,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.5);
    } else if(type==='coin'){
      osc.type='triangle';
      osc.frequency.setValueAtTime(900,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+.12);
      gain.gain.setValueAtTime(.12,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.18);
    } else if(type==='bad'){
      osc.frequency.setValueAtTime(300,ctx.currentTime);
      osc.frequency.setValueAtTime(220,ctx.currentTime+.1);
      gain.gain.setValueAtTime(.12,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.3);
    } else if(type==='success'){
      var freqs=[523,659,784,1047];
      freqs.forEach(function(f,i){
        var o2=ctx.createOscillator(); var g2=ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value=f;
        g2.gain.setValueAtTime(.18,ctx.currentTime+i*.12);
        g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.12+.3);
        o2.start(ctx.currentTime+i*.12); o2.stop(ctx.currentTime+i*.12+.35);
      });
    }
  }catch(e){}
}

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
}

function setLang(l){
  lang=l;
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.documentElement.lang=l;
  renderUI();
}

function ge(id){return document.getElementById(id);}
function setText(id,txt){var el=ge(id);if(el)el.textContent=txt;}
function setHTML(id,html){var el=ge(id);if(el)el.innerHTML=html;}

function renderUI(){
  var t=T[lang];
  setText('title-h1',t.title);
  setText('title-sub',t.subtitle);
  setText('lbtn1',t.lbtn1);
  setText('lbtn2',t.lbtn2);
  setText('lbtn3',t.lbtn3);
  setText('btn-jouer',t.jouer);
  setText('btn-parents',t.parents);
  setText('pg-title',t.pgTitle);
  setText('pg-desc',t.pgDesc);
  setText('pg-btn',t.pgBtn);
  setText('pg-back',t.pgBack);
  setText('pi-title',t.piTitle);
  setText('pi-desc',t.piDesc);
  setText('validate-btn',t.validate);
  setText('btn-replay',t.btnReplay);
  setText('btn-home',t.btnHome);
  setText('btn-next',t.btnNext);
  setText('tray-placeholder',t.trayPlaceholder);
  if(ge('coins-title')) setText('coins-title',t.coinsTitle);
  if(ge('stall-title')) setText('stall-title',t.stallTitle);
  if(currentItem) updateTransactionPanel();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  ge(id).classList.add('active');
}

function selectLevel(n){
  currentLevel=n;
  document.querySelectorAll('.level-btn').forEach(function(b,i){b.classList.toggle('active',i===n-1);});
}

function startGame(){
  correctCount=0;
  questionIndex=0;
  showScreen('screen-game');
  nextQuestion();
}

function nextQuestion(){
  var pool=getItemsForLevel();
  currentItem=pool[Math.floor(Math.random()*pool.length)];
  paidAmountCents=0;
  selectedCoins=[];
  clientPaidCents=0;
  neededCents=0;
  if(currentLevel>=2){
    clientPaidCents=pickClientPayment(currentItem.price);
    neededCents=clientPaidCents-currentItem.price;
  } else {
    neededCents=currentItem.price;
  }
  updateProgress();
  renderGameScreen();
}

function getItemsForLevel(){
  if(currentLevel===1) return ITEMS.filter(function(i){return i.price<=100;});
  if(currentLevel===2) return ITEMS.filter(function(i){return i.price<=200;});
  return ITEMS.filter(function(i){return i.price<=350;});
}

function pickClientPayment(price){
  var bills=[2000,1000,500,200,100];
  for(var i=0;i<bills.length;i++){if(bills[i]>=price) return bills[i];}
  return Math.ceil(price/100)*100;
}

function getCoinSetForLevel(){
  if(currentLevel===1) return COINS.filter(function(c){return ['1c','5c','10c','25c','1d'].indexOf(c.id)>=0;});
  if(currentLevel===2) return COINS.filter(function(c){return ['1c','5c','10c','25c','1d','2d'].indexOf(c.id)>=0;});
  return COINS;
}

function renderGameScreen(){
  var t=T[lang];
  setText('game-level-badge',t.levelBadge(currentLevel));
  setText('game-score',t.score(correctCount,totalQuestions));
  setText('stall-title',t.stallTitle);
  var ig=ge('items-grid');
  ig.innerHTML='<div class="item-card selected">'
    +'<span class="item-emoji">'+currentItem.emoji+'</span>'
    +'<span class="item-name">'+currentItem.name[lang]+'</span>'
    +'<span class="item-price">'+t.currency(currentItem.price)+'</span>'
    +'</div>';
  updateTransactionPanel();
  buildCoinsGrid();
  renderTray();
  ge('validate-btn').disabled=true;
}

function updateTransactionPanel(){
  var t=T[lang];
  if(!currentItem) return;
  var priceStr=t.currency(currentItem.price);
  if(currentLevel===1){
    setText('transaction-item',t.youPay+' '+currentItem.emoji+' '+currentItem.name[lang]);
    setText('transaction-price',priceStr);
    setText('paid-label',t.paidLabel);
    ge('paid-display').textContent=t.currency(paidAmountCents);
    ge('change-label').style.display='none';
    ge('change-needed').style.display='none';
  } else {
    setText('transaction-item',currentItem.emoji+' '+currentItem.name[lang]+' — '+priceStr);
    setText('transaction-price',t.clientPays+' '+t.currency(clientPaidCents));
    setText('paid-label',t.paidLabel);
    ge('paid-display').textContent=t.currency(paidAmountCents);
    ge('change-label').style.display='block';
    setText('change-label',t.changeLabel);
    ge('change-needed').style.display='inline-block';
    ge('change-needed').textContent=t.currency(neededCents);
  }
}

function makeCoinSVG(coin, size){
  size=size||52;
  if(coin.type==='bill'){
    var h=Math.round(size*.55);
    return '<svg width="'+size+'" height="'+h+'" viewBox="0 0 100 55" xmlns="http://www.w3.org/2000/svg">'
      +'<rect x="2" y="2" width="96" height="51" rx="7" fill="'+coin.color+'" stroke="'+coin.shine+'" stroke-width="2"/>'
      +'<rect x="8" y="8" width="84" height="39" rx="4" fill="none" stroke="'+coin.shine+'" stroke-width="1.5" opacity=".5"/>'
      +'<text x="50" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="Nunito,sans-serif">'+coin.label+'</text>'
      +'</svg>';
  }
  if(coin.type==='coin2'){
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">'
      +'<circle cx="30" cy="30" r="28" fill="'+coin.color+'" stroke="'+coin.shine+'" stroke-width="2.5"/>'
      +'<circle cx="30" cy="30" r="18" fill="'+coin.shine+'"/>'
      +'<circle cx="30" cy="30" r="10" fill="'+coin.color+'"/>'
      +'<text x="30" y="35" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff" font-family="Nunito,sans-serif">'+coin.label+'</text>'
      +'</svg>';
  }
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">'
    +'<circle cx="30" cy="30" r="28" fill="'+coin.color+'" stroke="'+coin.shine+'" stroke-width="2"/>'
    +'<circle cx="30" cy="30" r="22" fill="none" stroke="'+coin.shine+'" stroke-width="1.5" opacity=".5"/>'
    +'<text x="30" y="35" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="Nunito,sans-serif">'+coin.label+'</text>'
    +'</svg>';
}

function buildCoinsGrid(){
  var grid=ge('coins-grid');
  grid.innerHTML='';
  setText('coins-title',T[lang].coinsTitle);
  var coinSet=getCoinSetForLevel();
  coinSet.forEach(function(coin){
    var btn=document.createElement('button');
    btn.className='coin-btn';
    btn.setAttribute('aria-label',coin.label);
    var isWide=(coin.type==='bill');
    var svgW=isWide?72:52;
    var svgH=isWide?40:52;
    btn.innerHTML='<div style="width:'+svgW+'px;height:'+svgH+'px">'+makeCoinSVG(coin,svgW)+'</div>'
      +'<span class="coin-label">'+coin.label+'</span>';
    btn.onclick=(function(c){return function(){addCoin(c);};})(coin);
    grid.appendChild(btn);
  });
}

function addCoin(coin){
  playSound('coin');
  selectedCoins.push(coin.id);
  paidAmountCents+=coin.value;
  renderTray();
  updateTransactionPanel();
  ge('validate-btn').disabled=(paidAmountCents===0);
}

function removeCoinAt(idx){
  var coinId=selectedCoins[idx];
  var coin=COINS.find(function(c){return c.id===coinId;});
  paidAmountCents-=coin.value;
  selectedCoins.splice(idx,1);
  renderTray();
  updateTransactionPanel();
  ge('validate-btn').disabled=(paidAmountCents===0);
}

function renderTray(){
  var tray=ge('selection-tray');
  // clear existing tray coins but keep placeholder span
  var coins=tray.querySelectorAll('.tray-coin');
  coins.forEach(function(c){tray.removeChild(c);});
  var ph=ge('tray-placeholder');
  if(selectedCoins.length>0){
    if(ph) ph.style.display='none';
  } else {
    if(ph) ph.style.display='';
  }
  selectedCoins.forEach(function(coinId,idx){
    var coin=COINS.find(function(c){return c.id===coinId;});
    var div=document.createElement('div');
    div.className='tray-coin';
    div.setAttribute('role','button');
    div.setAttribute('aria-label','Retirer '+coin.label);
    div.setAttribute('tabindex','0');
    var isWide=(coin.type==='bill');
    var svgW=isWide?56:38;
    var svgH=isWide?32:38;
    div.innerHTML='<div style="width:'+svgW+'px;height:'+svgH+'px">'+makeCoinSVG(coin,svgW)+'</div>'
      +'<span class="coin-label">'+coin.label+'</span>';
    (function(i){
      div.onclick=function(){removeCoinAt(i);};
      div.onkeydown=function(e){if(e.key==='Enter'||e.key===' ')removeCoinAt(i);};
    })(idx);
    tray.appendChild(div);
  });
}

function validateAnswer(){
  var t=T[lang];
  var correct=false;
  if(currentLevel===1){
    correct=(paidAmountCents===currentItem.price);
  } else {
    correct=(paidAmountCents===neededCents);
  }
  if(correct){
    correctCount++;
    playSound('good');
    setCustomerHappy(true);
    var msg=t.feedbackGood[Math.floor(Math.random()*t.feedbackGood.length)];
    showFeedback(true,msg);
    announce(msg);
    setTimeout(function(){
      questionIndex++;
      updateProgress();
      if(questionIndex>=totalQuestions){
        showSuccess();
      } else {
        nextQuestion();
      }
      setCustomerHappy(null);
    },1400);
  } else {
    playSound('bad');
    setCustomerHappy(false);
    var msg2=t.feedbackBad[Math.floor(Math.random()*t.feedbackBad.length)];
    showFeedback(false,msg2);
    announce(msg2);
    setTimeout(function(){
      paidAmountCents=0;
      selectedCoins=[];
      renderTray();
      updateTransactionPanel();
      ge('validate-btn').disabled=true;
      setCustomerHappy(null);
    },1800);
  }
}

function setCustomerHappy(happy){
  var mouth=ge('cust-mouth');
  var eyeL=ge('eye-l');
  var eyeR=ge('eye-r');
  if(!mouth) return;
  if(happy===true){
    mouth.setAttribute('d','M33 47 Q45 60 57 47');
    eyeL.setAttribute('r','4'); eyeR.setAttribute('r','4');
  } else if(happy===false){
    mouth.setAttribute('d','M34 53 Q45 44 56 53');
    eyeL.setAttribute('r','2'); eyeR.setAttribute('r','2');
  } else {
    mouth.setAttribute('d','M37 48 Q45 55 53 48');
    eyeL.setAttribute('r','3'); eyeR.setAttribute('r','3');
  }
}

function showFeedback(good, msg){
  var bubble=ge('feedback-bubble');
  ge('feedback-emoji').textContent=good?'🎉':'💭';
  ge('feedback-text').textContent=msg;
  bubble.style.background=good?'#f0fdf4':'#fff7ed';
  bubble.style.border='3px solid '+(good?'#34c77b':'#f97316');
  bubble.classList.add('show');
  setTimeout(function(){bubble.classList.remove('show');},1300);
}

function updateProgress(){
  var pct=Math.round((questionIndex/totalQuestions)*100);
  ge('progress-bar').style.width=pct+'%';
  setText('game-score',T[lang].score(correctCount,totalQuestions));
}

function announce(msg){
  ge('aria-live').textContent='';
  setTimeout(function(){ge('aria-live').textContent=msg;},10);
}

function showSuccess(){
  playSound('success');
  var t=T[lang];
  var pct=Math.round((correctCount/totalQuestions)*100);
  var stars='⭐';
  if(pct>=80) stars='⭐⭐⭐';
  else if(pct>=60) stars='⭐⭐';
  setText('success-stars',stars);
  setText('success-msg',t.successMsg[Math.floor(Math.random()*t.successMsg.length)]);
  setText('success-sub',t.successSub(correctCount));
  setText('btn-replay',t.btnReplay);
  setText('btn-next',t.btnNext);
  setText('btn-home',t.btnHome);
  var nextBtn=ge('btn-next');
  nextBtn.style.display=(currentLevel<3)?'inline-block':'none';
  saveProgress();
  showScreen('screen-success');
}

function nextLevel(){
  currentLevel=Math.min(3,currentLevel+1);
  document.querySelectorAll('.level-btn').forEach(function(b,i){b.classList.toggle('active',i===currentLevel-1);});
  startGame();
}

function saveProgress(){
  try{
    var data=JSON.parse(localStorage.getItem(LSKEY)||'{}');
    var key='level'+currentLevel;
    data[key]={correctCount:correctCount,totalQuestions:totalQuestions,ts:Date.now()};
    data.highLevel=Math.max(data.highLevel||1,currentLevel);
    localStorage.setItem(LSKEY,JSON.stringify(data));
  }catch(e){}
}

function loadProgress(){
  try{
    var data=JSON.parse(localStorage.getItem(LSKEY)||'{}');
    if(data.highLevel) currentLevel=Math.min(3,data.highLevel);
  }catch(e){}
}

function showParentGate(){
  gateA=Math.floor(Math.random()*9)+2;
  gateB=Math.floor(Math.random()*9)+2;
  ge('gate-question').textContent=gateA+' x '+gateB+' = ?';
  ge('gate-input').value='';
  ge('gate-err').textContent='';
  ge('parent-info').style.display='none';
  showScreen('screen-parent');
}

function checkGate(){
  var val=parseInt(ge('gate-input').value,10);
  if(val===gateA*gateB){
    ge('gate-err').textContent='';
    ge('parent-info').style.display='block';
    setText('pi-desc',T[lang].piDesc);
  } else {
    setText('gate-err',T[lang].pgErr);
  }
}

// init
loadProgress();
selectLevel(currentLevel);
renderUI();
ge('gate-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkGate();});
</script>
</body>
</html>
