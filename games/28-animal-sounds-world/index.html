<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Animal Sounds World – Monde des Animaux – PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;--orange:#f97316;
  --orange-dark:#ea580c;--gold:#ffd23f;--sky:#7ec3ee;--sky-light:#eaf6ff;
  --slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(160deg,var(--sky-light) 0%,#d4eeff 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
#topbar{
  width:100%;background:var(--blue);display:flex;align-items:center;
  justify-content:space-between;padding:8px 16px;position:sticky;top:0;z-index:100;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
}
#topbar-left{display:flex;align-items:center;gap:10px;}
#topbar-left img{height:34px;}
#brand-text{color:#fff;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:1.1rem;font-weight:700;letter-spacing:.5px;}
#topbar-right{display:flex;align-items:center;gap:8px;}
.lang-btn{
  background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.5);
  color:#fff;font-weight:800;font-size:.85rem;padding:5px 12px;border-radius:20px;
  cursor:pointer;transition:background .2s;min-width:48px;min-height:48px;
  display:flex;align-items:center;justify-content:center;
}
.lang-btn.active,.lang-btn:hover{background:var(--orange);border-color:var(--orange);}
#mute-btn{
  background:none;border:none;font-size:1.6rem;cursor:pointer;padding:4px;
  min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background .2s;
}
#mute-btn:hover{background:rgba(255,255,255,.15);}
.screen{display:none;flex-direction:column;align-items:center;padding:20px 16px 40px;
  width:100%;max-width:720px;margin:0 auto;}
.screen.active{display:flex;}
#mascot-area{margin:16px 0 8px;}
h1{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  color:var(--blue);font-size:clamp(1.8rem,6vw,2.8rem);text-align:center;
  text-shadow:0 2px 0 rgba(255,255,255,.7);
}
.subtitle{color:var(--slate);font-size:1.1rem;margin:8px 0 24px;text-align:center;}
.btn-play{
  background:var(--orange);color:#fff;border:none;border-radius:30px;
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:1.6rem;font-weight:800;padding:16px 52px;cursor:pointer;
  box-shadow:0 6px 0 var(--orange-dark);transition:transform .1s,box-shadow .1s;
  min-height:64px;letter-spacing:.5px;
}
.btn-play:active{transform:translateY(4px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{
  margin-top:16px;background:none;border:none;color:var(--slate);
  font-size:.9rem;cursor:pointer;text-decoration:underline;padding:8px;min-height:44px;
}
.level-cards{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:20px;}
.level-card{
  background:#fff;border-radius:24px;padding:20px 24px;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.12);transition:transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;align-items:center;gap:8px;min-width:140px;
  border:3px solid transparent;
}
.level-card:hover,.level-card:focus{
  transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.18);
  border-color:var(--orange);outline:none;
}
.level-card.locked{opacity:.5;cursor:default;}
.level-icon{font-size:3rem;}
.level-name{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:1.2rem;font-weight:700;color:var(--blue);}
.level-stars{color:var(--gold);font-size:1.2rem;letter-spacing:3px;}
#score-bar{
  display:flex;gap:16px;align-items:center;justify-content:center;
  margin-bottom:8px;font-size:1rem;color:var(--slate);width:100%;
}
.score-pill{
  background:#fff;border-radius:16px;padding:6px 18px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);font-weight:700;font-size:1.1rem;
}
#mode-btns{display:flex;gap:12px;margin:8px 0 12px;flex-wrap:wrap;justify-content:center;}
.mode-btn{
  background:var(--blue);color:#fff;border:none;border-radius:20px;
  font-size:.95rem;font-weight:700;padding:10px 22px;cursor:pointer;
  box-shadow:0 4px 0 var(--blue-dark);min-height:48px;transition:background .2s;
}
.mode-btn.active,.mode-btn:hover{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark);}
#explore-hint{
  font-size:.98rem;color:var(--slate);text-align:center;margin-bottom:8px;font-style:italic;
}
#question-box{
  background:#fff;border-radius:20px;padding:14px 20px;margin-bottom:10px;
  box-shadow:0 3px 12px rgba(0,0,0,.1);text-align:center;width:100%;
}
#question-text{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:clamp(1.1rem,4vw,1.5rem);color:var(--blue);font-weight:700;
}
#question-hint{font-size:.9rem;color:var(--slate);margin-top:4px;}
#scene-container{
  width:100%;max-width:680px;border-radius:28px;overflow:hidden;
  position:relative;margin-bottom:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.15);
}
#scene-svg{width:100%;display:block;}
#feedback{
  font-size:1.25rem;font-weight:700;text-align:center;min-height:38px;
  padding:4px 0;transition:opacity .3s;
}
.back-btn{
  background:var(--blue);color:#fff;border:none;border-radius:20px;
  font-size:1rem;font-weight:700;padding:12px 28px;cursor:pointer;
  box-shadow:0 4px 0 var(--blue-dark);margin-top:12px;min-height:48px;
}
.back-btn:hover{background:var(--blue-dark);}
#success-stars{font-size:3.5rem;letter-spacing:8px;margin:16px 0;display:block;text-align:center;}
#success-screen h2{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  color:var(--blue);font-size:2rem;text-align:center;
}
#success-screen p{color:var(--slate);text-align:center;margin:8px 0 20px;}
.success-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
.success-btns button{
  background:var(--orange);color:#fff;border:none;border-radius:24px;
  font-size:1.05rem;font-weight:800;padding:14px 28px;cursor:pointer;
  box-shadow:0 5px 0 var(--orange-dark);min-height:56px;
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
}
.success-btns button.secondary{background:var(--blue);box-shadow:0 5px 0 var(--blue-dark);}
#modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:200;align-items:center;justify-content:center;
}
#modal-overlay.open{display:flex;}
#modal-box{
  background:#fff;border-radius:24px;padding:32px 28px;max-width:440px;width:90%;
  box-shadow:0 12px 40px rgba(0,0,0,.3);text-align:center;
}
#modal-box h2{color:var(--blue);margin-bottom:12px;
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#modal-box p,#modal-box label{color:var(--slate);font-size:.95rem;line-height:1.6;}
#gate-question{color:var(--navy);font-weight:700;font-size:1.05rem;margin:10px 0;}
#gate-input{
  display:block;width:100%;margin:14px auto;padding:12px;border-radius:12px;
  border:2px solid var(--sky);font-size:1.2rem;text-align:center;
}
#gate-error{color:#e11;font-size:.9rem;min-height:20px;}
#parents-info{display:none;text-align:left;margin-top:12px;}
#parents-info p{margin-bottom:8px;font-size:.92rem;color:var(--slate);}
#modal-btns{display:flex;gap:12px;justify-content:center;margin-top:16px;}
#modal-btns button{
  padding:10px 24px;border:none;border-radius:16px;font-weight:700;
  cursor:pointer;font-size:1rem;min-height:48px;
}
#modal-confirm{background:var(--orange);color:#fff;}
#modal-close-btn{background:var(--blue);color:#fff;}
#animal-popup{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#fff;border-radius:20px;padding:12px 28px;
  box-shadow:0 8px 28px rgba(0,0,0,.22);z-index:150;
  display:none;flex-direction:column;align-items:center;gap:4px;
  border:3px solid var(--orange);min-width:180px;text-align:center;
  pointer-events:none;
}
#animal-popup.show{display:flex;animation:pop .3s ease;}
#popup-emoji{font-size:2.6rem;}
#popup-en{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:1.4rem;font-weight:800;color:var(--blue);}
#popup-fr{font-size:1rem;color:var(--slate);}
.sr-only{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
@keyframes pop{from{opacity:0;transform:translateX(-50%) scale(.7);}to{opacity:1;transform:translateX(-50%) scale(1);}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-10deg);}75%{transform:rotate(10deg);}}
</style>
</head>

const SK='pgrg_animal_sounds';
let lang='fr', muted=false, curLevel=0, mode='explore',
    score=0, streak=0, quizTarget=null, quizDone=[], levelStars=[0,0,0];

(function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SK)||'{}');
    if(d.levelStars) levelStars=d.levelStars;
    if(d.lang) lang=d.lang;
  }catch(e){}
})();

function save(){
  try{ localStorage.setItem(SK,JSON.stringify({levelStars,lang})); }catch(e){}
}

// Audio
let ctx=null;
function getCtx(){
  if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
  return ctx;
}
function tone(freq,dur,type,vol){
  if(muted) return;
  type=type||'sine'; vol=vol||.28;
  try{
    const c=getCtx();
    const o=c.createOscillator();
    const g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=type; o.frequency.setValueAtTime(freq,c.currentTime);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
    o.start(); o.stop(c.currentTime+dur);
  }catch(e){}
}
function playSuccess(){
  if(muted) return;
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,'sine',.22),i*110));
}
function playWrong(){
  if(muted) return;
  tone(200,.3,'sawtooth',.14);
  setTimeout(()=>tone(180,.22,'sawtooth',.1),220);
}
function playSnd(snd){
  const p=SOUNDS[snd]||[[440,.3]];
  p.forEach(([f,d],i)=>setTimeout(()=>tone(f,d,'sine',.24),i*175));
}
function speak(en){
  if(muted||!window.speechSynthesis) return;
  try{
    const u=new SpeechSynthesisUtterance(en);
    u.lang='en-US'; u.rate=.82; u.pitch=1.15; u.volume=1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(e){}
}

// Lang
function setLang(l){
  lang=l; save();
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  applyT();
  if(document.getElementById('screen-levels').classList.contains('active')) renderLevels();
  if(document.getElementById('screen-game').classList.contains('active')){ renderScene(); updateQUI(); }
}
function t(k){ return T[lang][k]||T.fr[k]||k; }
function applyT(){
  const m={
    't-title':'title','t-subtitle':'subtitle','t-play':'play','t-parents':'parents',
    't-choose-level':'chooseLevel','t-back-home':'backHome','t-back-levels':'backLevels',
    't-success-title':'successTitle','t-success-msg':'successMsg',
    't-replay':'replay','t-next-level':'nextLevel','t-home-btn':'homeBtn',
    't-gate-title':'gateTitle','t-confirm':'confirm','t-close':'close',
    't-pi-1':'pi1','t-pi-2':'pi2','t-pi-3':'pi3','t-pi-4':'pi4',
  };
  Object.entries(m).forEach(([id,k])=>{
    const el=document.getElementById(id);
    if(el) el.textContent=t(k);
  });
  document.getElementById('btn-explore').textContent=t('modeExplore');
  document.getElementById('btn-quiz').textContent=t('modeQuiz');
  document.getElementById('explore-hint').textContent=t('exploreHint');
}

// Screens
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLevelSelect(){ renderLevels(); showScreen('screen-levels'); }

function renderLevels(){
  const c=document.getElementById('level-cards-container');
  c.innerHTML='';
  T[lang].levels.forEach((lv,i)=>{
    const stars=levelStars[i]||0;
    const locked=i>0&&(levelStars[i-1]||0)<1;
    const btn=document.createElement('button');
    btn.className='level-card'+(locked?' locked':'');
    btn.setAttribute('tabindex',locked?'-1':'0');
    btn.setAttribute('aria-label',(locked?t('locked')+' ':'')+lv.name);
    btn.innerHTML=`<div class="level-icon">${lv.emoji}</div>
      <div class="level-name">${lv.name}</div>
      <div class="level-stars">${'⭐'.repeat(stars)||'○○○'}</div>`;
    if(!locked){
      btn.addEventListener('click',()=>startLevel(i));
      btn.addEventListener('keydown',e=>(e.key==='Enter'||e.key===' ')&&startLevel(i));
    }
    c.appendChild(btn);
  });
}

// Game
function startLevel(i){
  curLevel=i; score=0; streak=0; mode='explore'; quizTarget=null; quizDone=[];
  document.getElementById('btn-explore').classList.add('active');
  document.getElementById('btn-quiz').classList.remove('active');
  document.getElementById('question-box').style.display='none';
  document.getElementById('explore-hint').style.display='';
  document.getElementById('feedback').textContent='';
  updScore();
  renderScene();
  showScreen('screen-game');
}

function setMode(m){
  mode=m;
  document.getElementById('btn-explore').classList.toggle('active',m==='explore');
  document.getElementById('btn-quiz').classList.toggle('active',m==='quiz');
  document.getElementById('question-box').style.display=m==='quiz'?'':'none';
  document.getElementById('explore-hint').style.display=m==='explore'?'':'none';
  document.getElementById('feedback').textContent='';
  if(m==='quiz'){ quizDone=[]; score=0; streak=0; updScore(); pickQ(); }
}

function pickQ(){
  const all=ANIMALS[curLevel];
  const rem=all.filter(a=>!quizDone.includes(a.id));
  if(rem.length===0){ showSuccess(); return; }
  const a=rem[Math.floor(Math.random()*rem.length)];
  quizTarget=a.id;
  updateQUI();
}

function updateQUI(){
  if(mode!=='quiz'||!quizTarget) return;
  const a=ANIMALS[curLevel].find(x=>x.id===quizTarget);
  if(!a) return;
  document.getElementById('question-text').textContent=t('whereIs')+' '+a.en+' ?';
  document.getElementById('question-hint').textContent='('+a.fr+') — '+t('touchIt');
}

function updScore(){
  document.getElementById('score-label').textContent='⭐ '+score;
  document.getElementById('streak-label').textContent='🔥 '+streak;
}

function onAnimal(id){
  const a=ANIMALS[curLevel].find(x=>x.id===id);
  if(!a) return;
  playSnd(a.snd);
  setTimeout(()=>speak(a.en),320);
  animEl(id,false);
  showPop(a);
  if(mode==='explore'){
    setFB('🎵 '+a.en+' · '+a.fr,getComputedStyle(document.documentElement).getPropertyValue('--blue').trim()||'#0f4c81');
  } else {
    if(id===quizTarget){
      score++; streak++; updScore(); playSuccess();
      quizDone.push(id);
      const bv=t('bravo');
      const bMsg=Array.isArray(bv)?bv[Math.floor(Math.random()*bv.length)]:bv;
      setFB(bMsg,'#34c77b');
      setTimeout(()=>{ document.getElementById('feedback').textContent=''; pickQ(); },1300);
    } else {
      streak=0; updScore(); playWrong();
      setFB(t('tryAgain'),'#f97316');
      animEl(id,true);
      setTimeout(()=>document.getElementById('feedback').textContent='',1300);
    }
  }
}

function setFB(txt,color){
  const el=document.getElementById('feedback');
  el.textContent=txt; el.style.color=color;
  document.getElementById('live-announce').textContent=txt;
}

function animEl(id, shake){
  const em=document.getElementById('em-'+id);
  if(!em) return;
  em.style.animation='none';
  void em.offsetWidth;
  em.style.animation=shake?'wiggle .4s ease 2':'bounce .5s ease 2';
  setTimeout(()=>em.style.animation='',shake?900:1100);
}

let popTimer=null;
function showPop(a){
  const pop=document.getElementById('animal-popup');
  document.getElementById('popup-emoji').textContent=a.emoji;
  document.getElementById('popup-en').textContent=a.en;
  document.getElementById('popup-fr').textContent=a.fr;
  pop.classList.add('show');
  if(popTimer) clearTimeout(popTimer);
  popTimer=setTimeout(()=>pop.classList.remove('show'),2400);
}

// Success
function showSuccess(){
  const total=ANIMALS[curLevel].length;
  const s=score>=total?3:score>=Math.ceil(total*.6)?2:1;
  levelStars[curLevel]=Math.max(levelStars[curLevel]||0,s);
  save();
  document.getElementById('success-stars').textContent='⭐'.repeat(s)+'☆'.repeat(3-s);
  applyT();
  showScreen('screen-success');
  playSuccess(); setTimeout(playSuccess,500);
}
function replayLevel(){ startLevel(curLevel); }
function nextLevel(){
  if(curLevel<ANIMALS.length-1) startLevel(curLevel+1);
  else showLevelSelect();
}

// Parents
let ga=0,gb=0,gc=0;
function openParents(){
  ga=Math.floor(Math.random()*9)+2;
  gb=Math.floor(Math.random()*9)+2;
  gc=ga*gb;
  document.getElementById('gate-question').textContent=t('gateCalc')+' '+ga+' × '+gb+' ?';
  document.getElementById('gate-input').value='';
  document.getElementById('gate-error').textContent='';
  document.getElementById('parents-info').style.display='none';
  applyT();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('gate-input').focus(),200);
}
function checkGate(){
  const v=parseInt(document.getElementById('gate-input').value,10);
  if(v===gc){
    document.getElementById('parents-info').style.display='block';
    document.getElementById('gate-error').textContent='';
  } else {
    document.getElementById('gate-error').textContent=t('gateError');
    playWrong();
  }
}
function closeParents(){ document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('gate-input').addEventListener('keydown',e=>e.key==='Enter'&&checkGate());
document.getElementById('modal-overlay').addEventListener('click',e=>e.target===e.currentTarget&&closeParents());

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
}

// Init
(function(){
  const nl=(navigator.language||'fr').toLowerCase();
  lang=nl.startsWith('en')?'en':'fr';
  document.getElementById('btn-fr').classList.toggle('active',lang==='fr');
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  applyT();
  showScreen('screen-title');
  const resume=()=>{try{getCtx().resume();}catch(e){}};
  document.addEventListener('click',resume,{once:true});
  document.addEventListener('touchstart',resume,{once:true,passive:true});
})();
