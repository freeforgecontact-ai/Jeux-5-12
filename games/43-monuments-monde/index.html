<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f4c81">
<title>Monuments du Monde / World Landmarks — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;--orange:#f97316;
  --orange-dark:#ea580c;--gold:#ffd23f;--sky:#7ec3ee;--sky-light:#eaf6ff;
  --slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(135deg,#eaf6ff 0%,#dbeeff 100%);
  min-height:100vh;color:var(--navy);
}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{background:var(--blue);color:#fff;display:flex;align-items:center;gap:10px;padding:8px 14px;flex-wrap:wrap;}
#topbar-brand{display:flex;align-items:center;gap:8px;flex:1}
#topbar-brand img{height:34px}
#topbar-brand span{font-family:'Fredoka','Nunito',system-ui,sans-serif;font-size:1.2rem;font-weight:700;color:#fff}
.top-btn{border:none;cursor:pointer;border-radius:8px;padding:6px 13px;font-size:.95rem;font-weight:700;font-family:inherit;background:var(--blue-dark);color:#fff;min-width:48px;min-height:40px;transition:background .15s;}
.top-btn:hover{background:var(--orange)}
.top-btn.active{background:var(--orange);color:#fff}
#btn-mute{font-size:1.3rem;background:transparent;border:none;cursor:pointer;padding:4px 8px;min-height:40px}
.screen{display:none;padding:16px;max-width:750px;margin:0 auto}
.screen.active{display:block}
#screen-title{text-align:center;padding-top:10px}
.mascot-wrap{margin:10px auto 0;width:140px;height:140px}
#game-title{font-size:2rem;color:var(--blue);margin:10px 0 4px;line-height:1.1}
#game-subtitle{font-size:1.05rem;color:var(--slate);margin-bottom:18px}
.play-btn{background:var(--orange);color:#fff;border:none;border-radius:16px;padding:16px 48px;font-size:1.4rem;font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);font-family:inherit;transition:transform .1s;min-height:60px;}
.play-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark)}
#btn-parents{margin-top:14px;background:transparent;border:none;color:var(--blue);cursor:pointer;font-size:.9rem;text-decoration:underline;font-family:inherit;}
.level-selector{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:16px 0 8px}
.lvl-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;box-shadow:0 4px 0 var(--blue-dark);transition:background .15s,transform .1s;}
.lvl-btn:hover{background:var(--orange)}
.lvl-btn.selected{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark)}
.lvl-btn:active{transform:translateY(2px)}
#screen-parents{text-align:center}
#parents-gate{background:#fff;border-radius:16px;padding:24px;margin:20px auto;max-width:400px;box-shadow:0 2px 16px #0001}
#gate-question{font-size:1.3rem;font-weight:700;margin-bottom:12px}
#gate-input{width:100%;max-width:160px;font-size:1.4rem;text-align:center;border:2px solid var(--blue);border-radius:10px;padding:8px;margin-bottom:10px;font-family:inherit;}
#gate-error{color:red;font-size:.9rem;min-height:20px}
.sec-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;box-shadow:0 4px 0 var(--blue-dark);}
.sec-btn:hover{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark)}
#parents-info{background:#fff;border-radius:16px;padding:20px;margin:0 auto;max-width:520px;text-align:left;box-shadow:0 2px 16px #0001}
#parents-info h3{color:var(--blue);margin-bottom:8px}
#parents-info p{margin-bottom:8px;font-size:.95rem;line-height:1.5}
#game-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
#progress-bar-wrap{flex:1;background:#c8e0f5;border-radius:99px;height:16px;min-width:80px;overflow:hidden;}
#progress-bar-fill{height:100%;background:var(--success);border-radius:99px;transition:width .4s}
#score-display{font-size:1.05rem;font-weight:700;color:var(--blue);white-space:nowrap}
#level-label{font-size:.9rem;color:var(--slate);white-space:nowrap}
#monument-stage{background:#fff;border-radius:20px;box-shadow:0 4px 20px #0002;padding:16px;margin-bottom:14px;text-align:center;}
#monument-svg-wrap{display:flex;justify-content:center;align-items:center;min-height:200px}
#monument-svg-wrap svg{max-width:100%;height:auto}
#question-text{font-size:1.2rem;font-weight:700;color:var(--blue);margin:10px 0 14px;text-align:center;}
#choices-grid{display:grid;gap:10px;grid-template-columns:1fr 1fr;}
.choice-btn{background:#eaf6ff;color:var(--navy);border:2.5px solid var(--sky);border-radius:14px;padding:13px 10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:54px;transition:background .15s,border-color .15s,transform .1s;text-align:center;line-height:1.2;}
.choice-btn:hover:not(:disabled){background:var(--sky-light);border-color:var(--blue)}
.choice-btn.correct{background:#d1fadf;border-color:var(--success);color:#155724}
.choice-btn.wrong{background:#ffe0e0;border-color:#e05c5c;color:#7a1010}
.choice-btn:disabled{cursor:default}
#feedback-area{text-align:center;font-size:1.2rem;font-weight:700;min-height:36px;margin:8px 0;}
#feedback-area.good{color:var(--success)}
#feedback-area.bad{color:#c0392b}
#btn-next{display:block;margin:10px auto 0;background:var(--orange);color:#fff;border:none;border-radius:14px;padding:14px 40px;font-size:1.1rem;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 5px 0 var(--orange-dark);min-height:54px;visibility:hidden;}
#btn-next:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark)}
#country-hint{font-size:.95rem;color:var(--slate);text-align:center;margin-top:6px;min-height:22px}
#screen-success{text-align:center;padding-top:20px}
#stars-row{font-size:3rem;margin:10px 0 6px;letter-spacing:4px}
#success-title{font-size:2rem;color:var(--blue);margin-bottom:6px}
#success-msg{font-size:1.1rem;color:var(--slate);margin-bottom:20px}
#success-score{font-size:1.3rem;font-weight:700;color:var(--orange);margin-bottom:22px}
.success-btns{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.s-btn{border:none;border-radius:14px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:54px;}
.s-btn.primary{background:var(--orange);color:#fff;box-shadow:0 5px 0 var(--orange-dark)}
.s-btn.secondary{background:var(--blue);color:#fff;box-shadow:0 4px 0 var(--blue-dark)}
#aria-live{position:absolute;left:-9999px;top:0}
@media(max-width:480px){#choices-grid{grid-template-columns:1fr}#game-title{font-size:1.5rem}.play-btn{font-size:1.1rem;padding:13px 32px}}
</style>
</head>

</div>

  <h1 class="title-font" id="game-title"></h1>

  <div class="level-selector">

</div>
<div id="screen-parents" class="screen" role="main">
  <div id="parents-gate">
    <h2 class="title-font" style="color:var(--blue);margin-bottom:14px" id="lbl-gate-title"></h2>
    <p id="gate-question"></p>
    <br>
    <input id="gate-input" type="number" inputmode="numeric" aria-label="Reponse" min="0" max="200">
    <br>
    <span id="gate-error"></span>
    <br>
    <button class="sec-btn" onclick="checkGate()" id="lbl-validate"></button>
    <br><br>
    <button class="sec-btn" onclick="showScreen('screen-title')" id="lbl-back" style="background:var(--slate);box-shadow:0 4px 0 #334"></button>
  </div>
  <div id="parents-info" style="display:none">
    <h3 id="pi-title"></h3>
    <p id="pi-1"></p>
    <p id="pi-2"></p>
    <p id="pi-3"></p>
    <br>
    <button class="sec-btn" onclick="showScreen('screen-title')" id="pi-back"></button>
  </div>
</div>
<div id="screen-game" class="screen" role="main">
  <div id="game-header">
    <span id="level-label"></span>
    <div id="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div id="progress-bar-fill" style="width:0%"></div>
    </div>
    <span id="score-display"></span>
  </div>
  <div id="monument-stage">
    <div id="monument-svg-wrap" aria-hidden="true"></div>
    <div id="country-hint"></div>
  </div>
  <div id="question-text" role="heading" aria-level="2"></div>
  <div id="choices-grid" role="list"></div>
  <div id="feedback-area" aria-live="assertive"></div>
  <button id="btn-next" onclick="nextQuestion()"></button>
</div>
<div id="screen-success" class="screen" role="main">
  <div id="stars-row" aria-hidden="true"></div>
  <h2 class="title-font" id="success-title"></h2>
  <p id="success-msg"></p>
  <p id="success-score"></p>
  <div class="success-btns">
    <button class="s-btn secondary" onclick="startGame()" id="btn-replay"></button>
    <button class="s-btn primary" onclick="nextLevel()" id="btn-nextlvl"></button>
    <button class="s-btn secondary" onclick="showScreen('screen-title')" id="btn-home"></button>
  </div>
</div>

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type,vol){type=type||'sine';vol=vol||0.15;if(muted)return;try{var ctx=getAudio();var osc=ctx.createOscillator();var gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);gain.gain.setValueAtTime(vol,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);osc.start();osc.stop(ctx.currentTime+dur);}catch(e){}}
function playSuccess(){if(muted)return;[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.18,'sine',0.13);},i*90);});}
function playWrong(){playTone(220,0.3,'sawtooth',0.07);}
function playClick(){playTone(660,0.08,'sine',0.09);}
function toggleMute(){muted=!muted;document.getElementById('btn-mute').textContent=muted?'🔇':'🔊';}
function setLang(l){lang=l;document.documentElement.lang=l;document.getElementById('btn-fr').classList.toggle('active',l==='fr');document.getElementById('btn-en').classList.toggle('active',l==='en');renderAll();}
function t(key){return(T[lang]&&T[lang][key]!==undefined)?T[lang][key]:(T['fr'][key]||key);}

function loadProgress(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return{};}}
function saveProgress(data){try{var prev=loadProgress();localStorage.setItem(LS_KEY,JSON.stringify(Object.assign(prev,data)));}catch(e){}}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function selectLevel(l){currentLevel=l;[1,2,3].forEach(function(i){document.getElementById('lvl-btn-'+i).classList.toggle('selected',i===l);});}
function showParentsGate(){
  document.getElementById('parents-gate').style.display='';
  document.getElementById('parents-info').style.display='none';
  gateA=Math.floor(Math.random()*9)+2;
  gateB=Math.floor(Math.random()*9)+2;
  document.getElementById('gate-question').textContent=gateA+' x '+gateB+' = ?';
  document.getElementById('gate-input').value='';
  document.getElementById('gate-error').textContent='';
  showScreen('screen-parents');
}
function checkGate(){
  var val=parseInt(document.getElementById('gate-input').value);
  if(val===gateA*gateB){
    document.getElementById('parents-gate').style.display='none';
    document.getElementById('parents-info').style.display='';
  }else{
    document.getElementById('gate-error').textContent=lang==='fr'?'Incorrect, essaie encore !':'Incorrect, try again!';
  }
}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function getQuestionType(level){
  if(level===1)return 'name';
  if(level===2)return Math.random()<0.5?'country':'continent';
  var types=['name','country','continent','city'];
  return types[Math.floor(Math.random()*types.length)];
}
function buildPool(){
  var monuments=shuffle(MONUMENTS).slice(0,totalQ);
  return monuments.map(function(m){return{monument:m,type:getQuestionType(currentLevel)};});
}
function getChoiceLabel(m,type){
  if(type==='name')return m.name[lang];
  if(type==='country')return m.country[lang];
  if(type==='continent')return m.continent[lang];
  if(type==='city')return m.city[lang];
  return m.name[lang];
}
function getChoices(monument,type){
  var others=MONUMENTS.filter(function(m){return m.id!==monument.id;});
  var sOthers=shuffle(others);
  var used=new Set([getChoiceLabel(monument,type)]);
  var filtered=sOthers.filter(function(m){
    var lbl=getChoiceLabel(m,type);
    if(used.has(lbl))return false;
    used.add(lbl);
    return true;
  }).slice(0,3);
  if(filtered.length<3){filtered=sOthers.slice(0,3);}
  return shuffle([monument].concat(filtered));
}
function getQuestionText(type){
  if(type==='name')return t('question_name');
  if(type==='country')return t('question_country');
  if(type==='continent')return t('question_continent');
  if(type==='city')return t('question_city');
  return t('question_name');
}
function startGame(){
  playClick();
  score=0;currentQ=0;
  questionPool=buildPool();
  showScreen('screen-game');
  showQuestion();
}
function updateGameHeader(){
  var pct=Math.round((currentQ/totalQ)*100);
  document.getElementById('progress-bar-fill').style.width=pct+'%';
  document.getElementById('progress-bar-wrap').setAttribute('aria-valuenow',pct);
  document.getElementById('score-display').textContent=t('score_lbl')+': '+score+'/'+currentQ;
  document.getElementById('level-label').textContent=t('level_lbl')+' '+currentLevel;
}
function showQuestion(){
  if(currentQ>=totalQ){showSuccess();return;}
  answered=false;
  var q=questionPool[currentQ];
  var m=q.monument;
  var type=q.type;
  document.getElementById('monument-svg-wrap').innerHTML=SVG_DRAW[m.svgKey]||'';
  var hint=document.getElementById('country-hint');
  if(currentLevel>=2&&type!=='name'){hint.textContent=t('hint_city')+' '+m.city[lang];}
  else{hint.textContent='';}
  document.getElementById('question-text').textContent=getQuestionText(type);
  var choices=getChoices(m,type);
  var correctAns=getChoiceLabel(m,type);
  var grid=document.getElementById('choices-grid');
  grid.innerHTML='';
  choices.forEach(function(c){
    var label=getChoiceLabel(c,type);
    var btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=label;
    btn.setAttribute('role','listitem');
    (function(b,lbl){b.onclick=function(){handleChoice(b,lbl,correctAns,m);};})(btn,label);
    grid.appendChild(btn);
  });
  var fb=document.getElementById('feedback-area');
  fb.textContent='';fb.className='';
  document.getElementById('btn-next').style.visibility='hidden';
  updateGameHeader();
  setAriaLive('');
}
function handleChoice(btn,chosen,correct,monument){
  if(answered)return;
  answered=true;
  var fb=document.getElementById('feedback-area');
  var allBtns=document.querySelectorAll('.choice-btn');
  allBtns.forEach(function(b){
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
  });
  if(chosen===correct){
    score++;
    btn.classList.add('correct');
    var wd=t('well_done');
    fb.textContent=wd[Math.floor(Math.random()*wd.length)];
    fb.className='good';
    playSuccess();
    setAriaLive(fb.textContent);
    var q=questionPool[currentQ];
    if(q.type!=='name')document.getElementById('country-hint').textContent='🏛 '+monument.name[lang];
  }else{
    btn.classList.add('wrong');
    var ta=t('try_again');
    fb.textContent=ta[Math.floor(Math.random()*ta.length)]+' — '+monument.name[lang];
    fb.className='bad';
    playWrong();
    setAriaLive(fb.textContent);
    var q2=questionPool[currentQ];
    if(q2.type!=='name')document.getElementById('country-hint').textContent='🏛 '+monument.name[lang];
  }
  updateGameHeader();
  document.getElementById('btn-next').style.visibility='visible';
}
function nextQuestion(){playClick();currentQ++;if(currentQ>=totalQ){showSuccess();return;}showQuestion();}
function setAriaLive(msg){var el=document.getElementById('aria-live');el.textContent='';setTimeout(function(){el.textContent=msg;},50);}
function showSuccess(){
  saveProgress({last_level:currentLevel});
  var pct=score/totalQ;
  var stars=pct>=0.9?'★★★':pct>=0.6?'★★☆':'★☆☆';
  var msg=pct>=0.9?t('success_msg_3'):pct>=0.6?t('success_msg_2'):t('success_msg_1');
  document.getElementById('stars-row').textContent=stars;
  document.getElementById('success-title').textContent=t('success_title');
  document.getElementById('success-msg').textContent=msg;
  document.getElementById('success-score').textContent=t('score_label')+' : '+score+' '+t('of')+' '+totalQ;
  document.getElementById('btn-nextlvl').style.display=currentLevel<3?'':'none';
  showScreen('screen-success');
  playSuccess();
}
function nextLevel(){if(currentLevel<3){selectLevel(currentLevel+1);startGame();}}
function init(){
  setLang(lang);
  var saved=loadProgress();
  if(saved.last_level)selectLevel(saved.last_level);
  renderAll();
}
init();
</script>
</body>
</html>
