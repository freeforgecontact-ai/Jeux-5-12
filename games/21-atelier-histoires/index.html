<!DOCTYPE html>

<meta charset="UTF-8">

<title>L'Atelier d'Histoires / Story Workshop — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;--orange:#f97316;--orange-dark:#ea580c;
  --gold:#ffd23f;--sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(135deg,var(--sky-light) 0%,#d4eeff 100%);
  min-height:100vh;color:var(--navy);
}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--blue);color:#fff;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
#topbar .brand{display:flex;align-items:center;gap:8px;flex:1;}
#topbar .brand span{font-family:'Fredoka','Nunito',system-ui,sans-serif;font-size:1.2rem;font-weight:700;}
.bar-btn{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);color:#fff;border-radius:10px;padding:6px 14px;font-size:0.9rem;cursor:pointer;transition:background 0.2s;min-height:40px;}
.bar-btn:hover,.bar-btn.active{background:rgba(255,255,255,0.35);}
.bar-btn.active{border-color:#fff;font-weight:700;}
.screen{display:none;padding:20px;max-width:780px;margin:0 auto;}
.screen.active{display:block;}
#screen-title{text-align:center;padding:20px;}
.mascot-wrap{margin:0 auto 16px;width:160px;height:160px;}
#screen-title h1{font-size:2.2rem;color:var(--blue);margin-bottom:8px;}
#screen-title .subtitle{font-size:1.1rem;color:var(--slate);margin-bottom:24px;}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:18px;padding:16px 44px;font-size:1.3rem;cursor:pointer;font-family:'Fredoka','Nunito',system-ui,sans-serif;box-shadow:0 5px 0 var(--orange-dark);transition:transform 0.1s,box-shadow 0.1s;min-height:56px;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-secondary{background:var(--blue);color:#fff;border:none;border-radius:14px;padding:12px 28px;font-size:1rem;cursor:pointer;font-family:'Fredoka','Nunito',system-ui,sans-serif;box-shadow:0 4px 0 var(--blue-dark);transition:transform 0.1s,box-shadow 0.1s;min-height:48px;}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
.parents-link{display:inline-block;margin-top:16px;color:var(--slate);text-decoration:underline;cursor:pointer;font-size:0.9rem;background:none;border:none;}
.mode-selector{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.mode-card{background:#fff;border:3px solid var(--sky);border-radius:18px;padding:16px 20px;cursor:pointer;text-align:center;flex:1;min-width:140px;max-width:200px;transition:border-color 0.2s,box-shadow 0.2s;}
.mode-card:hover,.mode-card.selected{border-color:var(--orange);box-shadow:0 4px 12px rgba(249,115,22,0.25);}
.mode-card .mode-emoji{font-size:2rem;display:block;margin-bottom:6px;}
.mode-card .mode-label{font-weight:700;color:var(--blue);}
.mode-card .mode-desc{font-size:0.8rem;color:var(--slate);margin-top:4px;}
#screen-game h2{font-size:1.5rem;color:var(--blue);margin-bottom:8px;text-align:center;}
.step-indicator{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.step-dot{width:28px;height:28px;border-radius:50%;background:#ccc;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;transition:background 0.3s;}
.step-dot.done{background:var(--success);}
.step-dot.current{background:var(--orange);}
.step-prompt{background:#fff;border-radius:18px;padding:18px;margin-bottom:16px;border-left:5px solid var(--orange);font-size:1.1rem;color:var(--navy);box-shadow:0 2px 8px rgba(15,76,129,0.1);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.story-card{background:#fff;border:3px solid var(--sky);border-radius:18px;padding:14px 10px;cursor:pointer;text-align:center;transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.story-card:hover{border-color:var(--orange);transform:translateY(-3px);box-shadow:0 6px 16px rgba(249,115,22,0.2);}
.story-card.selected{border-color:var(--success);background:#f0fff7;transform:translateY(-2px);}
.story-card .card-emoji{font-size:2.2rem;}
.story-card .card-label{font-size:0.85rem;font-weight:700;color:var(--navy);}
#screen-story{text-align:center;}
#screen-story h2{font-size:1.6rem;color:var(--blue);margin-bottom:16px;}
.story-book{background:#fff;border-radius:22px;padding:28px 24px;box-shadow:0 4px 20px rgba(15,76,129,0.15);text-align:left;line-height:1.9;font-size:1.05rem;color:var(--navy);margin-bottom:24px;border:3px solid var(--sky);position:relative;}
.story-book::before{content:'';position:absolute;top:-18px;left:50%;transform:translateX(-50%);}
.story-para{margin-bottom:16px;}
.story-para:last-child{margin-bottom:0;}
.stars-row{display:flex;justify-content:center;gap:8px;margin-bottom:16px;font-size:2rem;}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
#screen-parents{text-align:center;max-width:480px;}
#screen-parents h2{color:var(--blue);margin-bottom:16px;}
.gate-question{background:#fff;border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(15,76,129,0.1);}
#gate-input{border:2px solid var(--sky);border-radius:12px;padding:10px 16px;font-size:1.3rem;text-align:center;width:120px;margin:12px auto;display:block;font-family:'Nunito',system-ui,sans-serif;}
#gate-input:focus{outline:none;border-color:var(--orange);}
.gate-error{color:#e74c3c;margin-top:8px;min-height:22px;}
.parents-info{background:var(--sky-light);border-radius:18px;padding:20px;border:2px solid var(--sky);text-align:left;line-height:1.7;display:none;}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
@media(max-width:480px){.cards-grid{grid-template-columns:repeat(2,1fr);}.mode-selector{flex-direction:column;align-items:center;}#screen-title h1{font-size:1.6rem;}}
.fade-in{animation:fadeIn 0.4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.bounce{animation:bounce 0.5s ease;}
@keyframes bounce{0%{transform:scale(1);}40%{transform:scale(1.2);}70%{transform:scale(0.95);}100%{transform:scale(1);}}
</style>
</head>

      {e:"🌑",l:"a shadow stole all the light"},{e:"🌊",l:"a giant storm was approaching"},
      {e:"👹",l:"a monster blocked the path"},{e:"🔒",l:"a magic door was locked shut"},
      {e:"😴",l:"everyone fell asleep at once"},{e:"🌀",l:"a whirlpool swallowed everything"},
      {e:"❓",l:"the hero lost all their powers"},{e:"🕳",l:"a crack opened an unknown portal"}
    ],
    ally:[
      {e:"🦊",l:"a cunning fox appeared"},{e:"🦉",l:"a wise owl showed up"},
      {e:"🧞",l:"a genie of the lamp arrived"},{e:"🐬",l:"a silver dolphin rose up"},
      {e:"🌟",l:"a shooting star came to life"},{e:"👩‍🍳",l:"a magical cook lent a hand"},
      {e:"🦋",l:"a rainbow butterfly showed the way"},{e:"🐘",l:"a wise elephant came to help"}
    ],
    twist:[
      {e:"🔄",l:"the villain was a friend in disguise"},{e:"🗝",l:"the magic object held a second secret"},
      {e:"👥",l:"an unknown twin appeared"},{e:"⏳",l:"time started going backwards"},
      {e:"🌈",l:"a rainbow door opened in the sky"},{e:"🤫",l:"the hero discovered they were magical"},
      {e:"📦",l:"a mysterious box fell from the sky"},{e:"🧩",l:"a missing puzzle piece was revealed"}
    ],
    end:[
      {e:"🌅",l:"peace and harmony reigned forever"},{e:"🎉",l:"a huge party celebrated the victory"},
      {e:"🌱",l:"a new world was born from this adventure"},{e:"🤝",l:"former enemies became best friends"},
      {e:"🏆",l:"the hero returned home, stronger and wiser"},{e:"💫",l:"magic returned more powerful than ever"},
      {e:"📖",l:"the story was written in a golden book"},{e:"🌍",l:"the entire world was changed forever"}
    ]
  },
  connectors:{
    short:{
      hero:"{prefix} {choice}.",
      place:"This character lived {choice}.",
      end:"{prefix}, {choice}. What a wonderful adventure!"
    },
    medium:{
      hero:"{prefix} {choice}.",
      place:"This character lived {choice}.",
      object:"{prefix} {choice}.",
      problem:"{prefix}, {choice}!",
      end:"{prefix}, {choice}. Everyone cheered!"
    },
    long:{
      hero:"{prefix} {choice}.",
      place:"This extraordinary character lived {choice}.",
      object:"{prefix} something incredible: {choice}.",
      problem:"{prefix}, {choice}! The danger was immense.",
      ally:"{prefix}, {choice} to lend a hand.",
      twist:"And then - surprise! - {choice}.",
      end:"{prefix}, {choice}. An adventure to remember!"
    }
  }
}
};

var STORAGE_KEY='pgrg_atelier_histoires';
var state={lang:'fr',muted:false,mode:'medium',currentStep:0,choices:{},totalStoriesCreated:0};
var currentSelected=null;
var gateAnswer=0;
var audioCtx=null;

function loadState(){
  try{
    var s=localStorage.getItem(STORAGE_KEY);
    if(s){var p=JSON.parse(s);if(p.lang)state.lang=p.lang;if(p.muted!==undefined)state.muted=p.muted;if(p.mode)state.mode=p.mode;if(p.totalStoriesCreated)state.totalStoriesCreated=p.totalStoriesCreated;}
  }catch(e){}
}
function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({lang:state.lang,muted:state.muted,mode:state.mode,totalStoriesCreated:state.totalStoriesCreated}));}catch(e){}
}
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type,vol){
  if(state.muted)return;type=type||'sine';vol=vol||0.3;
  try{var ctx=getAudioCtx();var osc=ctx.createOscillator();var gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;gain.gain.setValueAtTime(vol,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);osc.start();osc.stop(ctx.currentTime+dur);}catch(e){}
}
function playSelect(){playTone(520,0.12,'sine',0.2);}
function playSuccess(){[440,550,660,880].forEach(function(f,i){setTimeout(function(){playTone(f,0.18,'sine',0.18);},i*80)});}
function playStory(){[330,440,550,440,660].forEach(function(f,i){setTimeout(function(){playTone(f,0.18,'sine',0.15);},i*100)});}

function toggleMute(){state.muted=!state.muted;document.getElementById('btn-mute').textContent=state.muted?'🔇':'🔊';saveState();}
function setLang(lang){state.lang=lang;document.documentElement.lang=lang;document.getElementById('btn-fr').classList.toggle('active',lang==='fr');document.getElementById('btn-en').classList.toggle('active',lang==='en');saveState();renderTexts();}
function ariaAnnounce(msg){var el=document.getElementById('aria-live');el.textContent='';setTimeout(function(){el.textContent=msg;},50);}

function showScreen(id){
  /* Hide all screens by removing active class AND forcing display:none */
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++){
    screens[i].classList.remove('active');
    screens[i].style.display='none';
  }
  /* Show target screen by adding active class AND forcing display:block */
  var el=document.getElementById(id);
  if(!el)return;
  el.style.display='block';
  el.classList.add('active');
  el.classList.add('fade-in');
  setTimeout(function(){if(el.classList)el.classList.remove('fade-in');},500);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderTexts(){
  var L=T[state.lang];
  document.getElementById('t-title').textContent=L.title;
  document.getElementById('t-subtitle').textContent=L.subtitle;
  document.getElementById('t-mode-short-label').textContent=L.modeShortLabel;
  document.getElementById('t-mode-short-desc').textContent=L.modeShortDesc;
  document.getElementById('t-mode-medium-label').textContent=L.modeMediumLabel;
  document.getElementById('t-mode-medium-desc').textContent=L.modeMediumDesc;
  document.getElementById('t-mode-long-label').textContent=L.modeLongLabel;
  document.getElementById('t-mode-long-desc').textContent=L.modeLongDesc;
  document.getElementById('t-play-btn').textContent=L.playBtn;
  document.getElementById('t-parents-link').textContent=L.parentsLink;
  document.getElementById('t-game-title').textContent=L.gameTitle;
  document.getElementById('btn-validate').textContent=L.validate;
  document.getElementById('t-story-title').textContent=L.storyTitle;
  document.getElementById('t-btn-replay').textContent=L.btnReplay;
  document.getElementById('t-btn-regen').textContent=L.btnRegen;
  document.getElementById('t-btn-home').textContent=L.btnHome;
  document.getElementById('t-parents-title').textContent=L.parentsTitle;
  document.getElementById('t-gate-question').textContent=L.gateQuestion;
  document.getElementById('t-gate-btn').textContent=L.gateBtn;
  document.getElementById('t-back-home').textContent=L.backHome;
  document.getElementById('t-pinfo-title').textContent=L.pinfoTitle;
  document.getElementById('t-pinfo-body').textContent=L.pinfoBody;
  document.title=L.title+' — PGRG IA';
  highlightMode();
}
function selectMode(mode){state.mode=mode;highlightMode();saveState();playSelect();}
function highlightMode(){['short','medium','long'].forEach(function(m){document.getElementById('mode-'+m).classList.toggle('selected',state.mode===m);});}

function startGame(){
  state.currentStep=0;
  state.choices={};
  currentSelected=null;
  showScreen('screen-game');
  renderStep();
  playSelect();
}

function getSteps(){return T[state.lang].steps[state.mode];}

function renderStep(){
  var steps=getSteps();
  if(!steps||steps.length===0)return;
  if(state.currentStep>=steps.length)return;
  var step=steps[state.currentStep];
  var L=T[state.lang];
  var ind=document.getElementById('step-indicator');
  ind.innerHTML='';
  steps.forEach(function(s,i){
    var dot=document.createElement('div');
    dot.className='step-dot'+(i<state.currentStep?' done':i===state.currentStep?' current':'');
    dot.textContent=i+1;
    dot.setAttribute('aria-label',s.label);
    ind.appendChild(dot);
  });
  document.getElementById('step-prompt').textContent=step.label+' :';
  ariaAnnounce(step.label);
  var grid=document.getElementById('cards-grid');
  grid.innerHTML='';
  currentSelected=null;
  document.getElementById('btn-validate').style.display='none';
  var cardData=L.cards[step.key];
  if(!cardData||cardData.length===0)return;
  var shuffled=cardData.slice().sort(function(){return Math.random()-0.5;});
  shuffled.forEach(function(card){
    var el=document.createElement('div');
    el.className='story-card';
    el.tabIndex=0;
    el.setAttribute('role','button');
    el.setAttribute('aria-pressed','false');
    el.setAttribute('aria-label',card.l);
    el.innerHTML='<span class="card-emoji">'+card.e+'</span><span class="card-label">'+card.l+'</span>';
    (function(elem,c,k){
      elem.onclick=function(){selectCard(elem,c,k);};
      elem.onkeydown=function(ev){if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();selectCard(elem,c,k);}};
    })(el,card,step.key);
    grid.appendChild(el);
  });
}

function selectCard(el,card,key){
  var cards=document.querySelectorAll('.story-card');
  for(var i=0;i<cards.length;i++){cards[i].classList.remove('selected');cards[i].setAttribute('aria-pressed','false');}
  el.classList.add('selected');el.setAttribute('aria-pressed','true');
  currentSelected={card:card,key:key};
  document.getElementById('btn-validate').style.display='inline-block';
  playSelect();
  el.classList.add('bounce');
  setTimeout(function(){el.classList.remove('bounce');},500);
}

function validateStep(){
  if(!currentSelected)return;
  var steps=getSteps();
  state.choices[currentSelected.key]=currentSelected.card;
  state.currentStep++;
  currentSelected=null;
  playSuccess();
  if(state.currentStep>=steps.length){state.totalStoriesCreated++;saveState();buildAndShowStory();}
  else{renderStep();}
}

function buildSentence(tpl,prefix,choice){return tpl.replace('{prefix}',prefix).replace('{choice}',choice);}
function buildStory(){
  var L=T[state.lang];
  var steps=getSteps();
  var conns=L.connectors[state.mode];
  var paragraphs=[];
  steps.forEach(function(step){
    var choice=state.choices[step.key];
    if(!choice)return;
    var tpl=conns[step.key]||'{prefix} {choice}.';
    var sentence=buildSentence(tpl,step.prefix,choice.l);
    var cap=sentence.charAt(0).toUpperCase()+sentence.slice(1);
    paragraphs.push({text:cap,emoji:choice.e});
  });
  return paragraphs;
}
function buildAndShowStory(){
  var paragraphs=buildStory();
  var bookEl=document.getElementById('story-book');
  bookEl.innerHTML='';
  paragraphs.forEach(function(para,i){
    var p=document.createElement('p');
    p.className='story-para fade-in';
    p.style.animationDelay=(i*0.12)+'s';
    p.innerHTML='<span style="font-size:1.4rem;margin-right:6px;">'+para.emoji+'</span>'+para.text;
    bookEl.appendChild(p);
  });
  var starsEl=document.getElementById('stars-row');
  var count=state.mode==='short'?3:state.mode==='medium'?4:5;
  starsEl.textContent='';
  for(var i=0;i<count;i++)starsEl.textContent+='⭐';
  showScreen('screen-story');
  playStory();
  ariaAnnounce(T[state.lang].storyTitle);
}
function restartGame(){showScreen('screen-title');playSelect();}
function regenerateStory(){buildAndShowStory();playSelect();}
function showParents(){
  var a=Math.floor(Math.random()*9)+2;
  var b=Math.floor(Math.random()*9)+2;
  gateAnswer=a*b;
  document.getElementById('gate-math').textContent=a+' x '+b+' = ?';
  document.getElementById('gate-input').value='';
  document.getElementById('gate-error').textContent='';
  document.getElementById('parents-info').style.display='none';
  showScreen('screen-parents');
}
function checkGate(){
  var val=parseInt(document.getElementById('gate-input').value,10);
  if(val===gateAnswer){document.getElementById('parents-info').style.display='block';document.getElementById('gate-error').textContent='';playSuccess();}
  else{document.getElementById('gate-error').textContent=T[state.lang].gateError;playTone(220,0.3,'sawtooth',0.12);}
}
document.addEventListener('keydown',function(ev){
  if(ev.key==='Enter'){
    var screen=document.querySelector('.screen.active');
    if(screen&&screen.id==='screen-game'&&currentSelected)validateStep();
    if(screen&&screen.id==='screen-parents')checkGate();
  }
});
function init(){
  loadState();
  var nav=(navigator.language||'fr').toLowerCase();
  if(!localStorage.getItem(STORAGE_KEY)){state.lang=nav.startsWith('en')?'en':'fr';}
  document.documentElement.lang=state.lang;
  document.getElementById('btn-fr').classList.toggle('active',state.lang==='fr');
  document.getElementById('btn-en').classList.toggle('active',state.lang==='en');
  document.getElementById('btn-mute').textContent=state.muted?'🔇':'🔊';
  /* Force correct initial visibility: only title screen shown */
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++){
    screens[i].classList.remove('active');
    screens[i].style.display='none';
  }
  var titleEl=document.getElementById('screen-title');
  titleEl.classList.add('active');
  titleEl.style.display='block';
  renderTexts();
  highlightMode();
}
init();
</script>
