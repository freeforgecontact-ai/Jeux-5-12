<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;--orange:#f97316;
  --orange-dark:#ea580c;--gold:#ffd23f;--sky:#7ec3ee;--sky-light:#eaf6ff;
  --slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(160deg,#c8eaff 0%,var(--sky-light) 60%,#d4f5e3 100%);
  min-height:100vh;overflow-x:hidden;
}
h1,h2,h3,.title-font{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#topbar{display:flex;align-items:center;justify-content:space-between;background:var(--blue);color:#fff;padding:6px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #0003;}
#topbar .brand{display:flex;align-items:center;gap:8px;}
#topbar .brand span{font-family:'Fredoka','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.5px;}
#topbar .controls{display:flex;gap:6px;align-items:center;}
.btn-sm{background:var(--blue-dark);border:2px solid #ffffff44;color:#fff;border-radius:8px;padding:4px 10px;font-size:.85rem;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-sm:hover{background:#1a5a9a;}
.btn-sm.active{background:var(--orange);border-color:var(--orange-dark);}
#mute-btn{font-size:1.3rem;background:none;border:none;cursor:pointer;color:#fff;line-height:1;}
.screen{display:none;min-height:calc(100vh - 52px);padding:16px;}
.screen.active{display:flex;flex-direction:column;align-items:center;}
#title-screen{justify-content:center;gap:16px;text-align:center;}
#title-screen h1{font-size:clamp(1.8rem,6vw,3rem);color:var(--blue);line-height:1.1;}
#title-screen .subtitle{color:var(--slate);font-size:1.1rem;}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:16px;padding:16px 40px;font-size:1.4rem;font-family:'Fredoka','Nunito',system-ui,sans-serif;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);transition:.1s;margin-top:8px;min-width:180px;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{background:none;border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:8px 20px;font-size:.95rem;cursor:pointer;font-family:inherit;}
.btn-parents:hover{background:var(--sky-light);}
#gate-screen{justify-content:center;gap:16px;text-align:center;}
#gate-screen h2{color:var(--blue);font-size:1.6rem;}
#gate-q{font-size:1.3rem;color:var(--navy);margin:8px 0;}
#gate-input{font-size:1.4rem;width:100px;text-align:center;border:3px solid var(--blue);border-radius:10px;padding:8px;color:var(--navy);}
#gate-err{color:red;font-size:.95rem;min-height:20px;}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);font-family:inherit;}
.btn-blue:hover{background:#1a5a9a;}
#parents-screen{justify-content:flex-start;gap:14px;max-width:600px;margin:0 auto;}
#parents-screen h2{color:var(--blue);font-size:1.5rem;margin-top:8px;}
.info-box{background:#fff;border-radius:14px;padding:16px 20px;border:2px solid var(--sky);width:100%;line-height:1.7;color:var(--navy);}
#level-screen{justify-content:center;gap:20px;text-align:center;}
#level-screen h2{color:var(--blue);font-size:1.8rem;}
.level-cards{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:4px;}
.level-card{background:#fff;border:3px solid var(--sky);border-radius:16px;padding:20px 24px;cursor:pointer;transition:.15s;text-align:center;min-width:140px;}
.level-card:hover{border-color:var(--orange);box-shadow:0 4px 12px #f973162a;}
.level-card .lv-emoji{font-size:2.5rem;}
.level-card .lv-name{font-family:'Fredoka',system-ui,sans-serif;font-size:1.1rem;color:var(--blue);margin-top:6px;}
.level-card .lv-desc{font-size:.82rem;color:var(--slate);margin-top:4px;}
.level-card .lv-stars{font-size:1rem;margin-top:6px;letter-spacing:2px;}
.level-card.locked{opacity:.45;cursor:not-allowed;}
#game-screen{padding:8px 12px;max-width:900px;margin:0 auto;width:100%;}
#game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
#hud-score{font-family:'Fredoka',system-ui,sans-serif;font-size:1.5rem;color:var(--blue);}
#hud-level{font-size:.95rem;color:var(--slate);}
#hud-lives{font-size:1.4rem;letter-spacing:2px;}
#progress-bar-wrap{width:100%;background:#d0e8fa;border-radius:20px;height:12px;margin-bottom:10px;}
#progress-bar{height:12px;border-radius:20px;background:linear-gradient(90deg,var(--success),var(--gold));transition:.4s;}
#game-area{position:relative;width:100%;background:linear-gradient(180deg,#c8eaff 0%,#d4f5e3 100%);border-radius:20px;border:3px solid var(--sky);min-height:260px;overflow:hidden;margin-bottom:10px;}
#sky-bg{position:absolute;inset:0;pointer-events:none;}
.trash-item{position:absolute;font-size:2.6rem;cursor:grab;user-select:none;z-index:10;touch-action:none;transition:filter .15s;filter:drop-shadow(0 3px 4px #0004);-webkit-user-select:none;}
.trash-item:hover{filter:drop-shadow(0 3px 8px #f9731688);}
.trash-item.dragging{opacity:.85;z-index:50;filter:drop-shadow(0 8px 16px #0006);}
#bins-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:6px 0 4px;}
.bin{display:flex;flex-direction:column;align-items:center;border-radius:16px;padding:10px 10px 6px;min-width:80px;flex:1;max-width:160px;border:3px solid transparent;transition:.15s;cursor:pointer;position:relative;}
.bin.hover-target{transform:scale(1.08);box-shadow:0 0 0 4px var(--gold);}
.bin-icon{font-size:2.2rem;pointer-events:none;}
.bin-label{font-size:.72rem;font-weight:700;letter-spacing:.5px;text-align:center;margin-top:4px;pointer-events:none;text-transform:uppercase;}
.bin-count{position:absolute;top:-8px;right:-8px;background:var(--orange);color:#fff;border-radius:50%;width:22px;height:22px;font-size:.75rem;display:flex;align-items:center;justify-content:center;font-weight:700;pointer-events:none;}
.bin-recycle{background:#d4f5e3;border-color:#34c77b;color:#1a6e3c;}
.bin-compost{background:#fdf3d0;border-color:#d97706;color:#7c4700;}
.bin-trash{background:#f1f5f9;border-color:#94a3b8;color:#334155;}
.bin-glass{background:#dbeafe;border-color:#3b82f6;color:#1e3a8a;}
#feedback{min-height:36px;text-align:center;font-family:'Fredoka',system-ui,sans-serif;font-size:1.3rem;color:var(--success);margin:4px 0;transition:.2s;}
#feedback.wrong{color:#e11d48;}
#eco-msg{background:#fff;border-radius:12px;border:2px solid var(--sky);padding:8px 14px;font-size:.88rem;color:var(--slate);text-align:center;margin-bottom:4px;min-height:34px;}
#bonus-banner{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--gold);color:var(--navy);border-radius:20px;padding:24px 36px;font-family:'Fredoka',system-ui,sans-serif;font-size:1.5rem;text-align:center;z-index:200;box-shadow:0 8px 30px #0004;max-width:80vw;}
#bonus-banner button{margin-top:14px;background:var(--orange);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:1.1rem;cursor:pointer;font-family:inherit;}
#win-screen{justify-content:center;gap:16px;text-align:center;padding:24px 16px;}
#win-screen h2{font-size:2.2rem;color:var(--blue);}
#win-stars{font-size:3.5rem;letter-spacing:4px;}
#win-score{font-size:1.3rem;color:var(--slate);}
#win-eco{background:#d4f5e3;border-radius:14px;padding:14px 20px;color:#1a6e3c;font-size:1rem;max-width:400px;border:2px solid var(--success);}
.win-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.btn-action{background:var(--orange);color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 0 var(--orange-dark);font-family:'Fredoka',system-ui,sans-serif;}
.btn-action:hover{background:#fb8033;}
.btn-action.sec{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark);}
.btn-action.sec:hover{background:#1a5a9a;}
#mascot-wrap{margin:8px 0;}
@media(max-width:500px){
  .bin{min-width:64px;padding:8px 6px 4px;}
  .bin-icon{font-size:1.8rem;}
  .bin-label{font-size:.65rem;}
  .trash-item{font-size:2.1rem;}
  #win-screen h2{font-size:1.7rem;}
}
</style>
</head>

  try{
    var d=localStorage.getItem(LS_KEY);
    if(d){var p=JSON.parse(d);state=Object.assign({scores:[0,0,0],starsEarned:[0,0,0]},p);}
  }catch(e){}
}

function t(k){return T[lang][k];}

function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  renderCurrentScreen();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  currentScreen=id;
  renderCurrentScreen();
}

function renderCurrentScreen(){
  if(currentScreen==='title-screen') renderTitle();
  else if(currentScreen==='gate-screen') renderGate();
  else if(currentScreen==='parents-screen') renderParents();
  else if(currentScreen==='level-screen') renderLevelSelect();
  else if(currentScreen==='game-screen') renderHUD();
}

function renderTitle(){
  document.getElementById('title-h1').textContent=t('title');
  document.getElementById('title-sub').textContent=t('subtitle');
  document.getElementById('btn-play-title').textContent=t('play');
  document.getElementById('btn-parents-title').textContent=t('parents');
}

function showGate(){
  gateA=Math.floor(Math.random()*9)+2;
  gateB=Math.floor(Math.random()*9)+2;
  showScreen('gate-screen');
}

function renderGate(){
  document.getElementById('gate-h2').textContent=t('gate_h');
  document.getElementById('gate-p').textContent=t('gate_p');
  document.getElementById('gate-q').textContent=gateA+" x "+gateB+" = ?";
  document.getElementById('gate-ok').textContent=t('gate_ok');
  document.getElementById('gate-back').textContent=t('gate_back');
  document.getElementById('gate-err').textContent='';
  document.getElementById('gate-input').value='';
}

function checkGate(){
  var v=parseInt(document.getElementById('gate-input').value);
  if(v===gateA*gateB){showScreen('parents-screen');}
  else{document.getElementById('gate-err').textContent=t('gate_err');playSound('wrong');}
}

function renderParents(){
  document.getElementById('pinfo-h2').textContent=t('pinfo_h');
  document.getElementById('pinfo-1').textContent=t('pinfo_1');
  document.getElementById('pinfo-2').textContent=t('pinfo_2');
  document.getElementById('pinfo-3').textContent=t('pinfo_3');
  document.getElementById('pinfo-4').textContent=t('pinfo_4');
  document.getElementById('pinfo-back').textContent=t('pinfo_back');
}

function showLevels(){showScreen('level-screen');}

function starsDisplay(n){return '⭐'.repeat(n)+'☆'.repeat(3-n);}

function renderLevelSelect(){
  document.getElementById('level-h2').textContent=t('level_h');
  document.getElementById('level-back').textContent=t('level_back');
  var lvls=t('levels');
  var container=document.getElementById('level-cards');
  container.innerHTML='';
  lvls.forEach(function(lv,i){
    var locked=i>0&&state.starsEarned[i-1]===0;
    var card=document.createElement('div');
    card.className='level-card'+(locked?' locked':'');
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');
    card.setAttribute('aria-label',lv.name+(locked?' (verrouille)':''));
    card.innerHTML='<div class="lv-emoji">'+lv.emoji+'</div>'
      +'<div class="lv-name">'+lv.name+'</div>'
      +'<div class="lv-desc">'+lv.desc+'</div>'
      +'<div class="lv-stars">'+starsDisplay(state.starsEarned[i])+'</div>';
    if(!locked){
      card.onclick=function(){startGame(i);};
      card.onkeydown=function(e){if(e.key==='Enter')startGame(i);};
    }
    container.appendChild(card);
  });
}

function startGame(lvlIdx){
  currentLevel=lvlIdx;
  score=0;
  lives=3;
  trashCount=0;
  bonusTrigger=0;
  gameRunning=true;
  items=[];
  ecoMsgIdx=Math.floor(Math.random()*t('eco_msgs').length);
  bonusMsgIdx=0;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
  showScreen('game-screen');
  buildBins();
  renderHUD();
  showEcoMsg();
  if(spawnTimer){clearInterval(spawnTimer);}
  if(ecoMsgTimer){clearInterval(ecoMsgTimer);}
  var cfg=LEVEL_CONFIG[currentLevel];
  targetCount=cfg.count;
  spawnItem();
  spawnTimer=setInterval(function(){if(gameRunning&&items.length<5)spawnItem();},cfg.interval);
  ecoMsgTimer=setInterval(function(){if(gameRunning)showEcoMsg();},9000);
}

function quitGame(){
  gameRunning=false;
  if(spawnTimer){clearInterval(spawnTimer);spawnTimer=null;}
  if(ecoMsgTimer){clearInterval(ecoMsgTimer);ecoMsgTimer=null;}
  items.forEach(function(el){if(el.parentNode)el.remove();});
  items=[];
  showScreen('level-screen');
}

function renderHUD(){
  var lvl=t('levels')[currentLevel];
  document.getElementById('hud-level').textContent=t('level')+' '+(currentLevel+1)+' - '+(lvl?lvl.name:'');
  document.getElementById('hud-score').textContent=t('score')+': '+score;
  document.getElementById('hud-lives').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
  var pct=Math.min(100,Math.round(trashCount/LEVEL_CONFIG[currentLevel].count*100));
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-bar-wrap').setAttribute('aria-valuenow',pct);
}

function buildBins(){
  var cfg=LEVEL_CONFIG[currentLevel];
  var binsRow=document.getElementById('bins-row');
  binsRow.innerHTML='';
  cfg.bins.forEach(function(btype){
    var div=document.createElement('div');
    div.className='bin bin-'+btype;
    div.dataset.bin=btype;
    div.setAttribute('role','listitem');
    div.setAttribute('tabindex','0');
    div.setAttribute('aria-label',t('bins')[btype]);
    div.innerHTML='<div class="bin-icon">'+t('bin_icons')[btype]+'</div>'
      +'<div class="bin-label">'+t('bins')[btype]+'</div>'
      +'<div class="bin-count" id="bincount-'+btype+'">0</div>';
    div.addEventListener('click',function(){tapBin(btype);});
    div.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' ')tapBin(btype);});
    binsRow.appendChild(div);
  });
}

function updateBinCount(btype){
  var el=document.getElementById('bincount-'+btype);
  if(el)el.textContent=parseInt(el.textContent||'0')+1;
}

function spawnItem(){
  if(!gameRunning)return;
  var cfg=LEVEL_CONFIG[currentLevel];
  if(trashCount>=targetCount)return;
  var btype=cfg.bins[Math.floor(Math.random()*cfg.bins.length)];
  var pool=TRASH_DB[btype];
  var item=pool[Math.floor(Math.random()*pool.length)];
  var gameArea=document.getElementById('game-area');
  var areaW=gameArea.clientWidth||300;
  var el=document.createElement('div');
  el.className='trash-item';
  el.textContent=item.emoji;
  var label=lang==='fr'?item.fr:item.en;
  el.title=label;
  el.setAttribute('aria-label',label);
  el.setAttribute('role','img');
  el.setAttribute('tabindex','0');
  el.dataset.bin=btype;
  el.dataset.selected='0';
  var startX=Math.floor(Math.random()*(areaW-70))+10;
  el.style.left=startX+'px';
  el.style.top='-50px';
  el.dataset.y='-50';
  el.dataset.speed=cfg.fallSpeed;
  gameArea.appendChild(el);
  items.push(el);
  setupDrag(el);
  el.addEventListener('keydown',function(e){
    if(e.key==='Enter'||e.key===' '){
      e.preventDefault();
      selectItem(el);
    }
  });
  el.addEventListener('click',function(e){
    e.stopPropagation();
    selectItem(el);
  });
  startFall(el);
}

var selectedItemEl=null;
function selectItem(el){
  if(selectedItemEl&&selectedItemEl!==el){
    selectedItemEl.style.outline='';
    selectedItemEl=null;
  }
  selectedItemEl=el;
  el.style.outline='3px solid var(--gold)';
}

function tapBin(btype){
  if(selectedItemEl&&selectedItemEl.parentNode){
    var el=selectedItemEl;
    selectedItemEl=null;
    el.style.outline='';
    scoreDrop(el,btype);
    return;
  }
  if(items.length>0){
    var lowest=null;
    var lowestY=-Infinity;
    items.forEach(function(it){
      var y=parseFloat(it.dataset.y)||0;
      if(y>lowestY){lowestY=y;lowest=it;}
    });
    if(lowest)scoreDrop(lowest,btype);
  }
}

function startFall(el){
  var id={active:true};
  el._fallId=id;
  var lastT=null;
  function fall(ts){
    if(!id.active||!el.parentNode||el.dataset.dragging==='1'||!gameRunning)return;
    if(!lastT)lastT=ts;
    var dt=Math.min(ts-lastT,100);
    lastT=ts;
    var speed=parseFloat(el.dataset.speed)||0.4;
    var y=parseFloat(el.dataset.y)||-50;
    y+=speed*dt;
    el.style.top=y+'px';
    el.dataset.y=y;
    var gameArea=document.getElementById('game-area');
    if(y>(gameArea.clientHeight||240)+20){
      id.active=false;
      el.remove();
      items=items.filter(function(i){return i!==el;});
      if(selectedItemEl===el)selectedItemEl=null;
      loseLife();
      return;
    }
    requestAnimationFrame(fall);
  }
  requestAnimationFrame(fall);
}

function loseLife(){
  if(!gameRunning)return;
  lives--;
  playSound('wrong');
  if(lives<=0){lives=3;}
  showFeedback(false);
  renderHUD();
}

function setupDrag(el){
  el.addEventListener('mousedown',onDragStart,{passive:false});
  el.addEventListener('touchstart',onTouchStart,{passive:false});
}

function onDragStart(e){
  e.preventDefault();
  e.stopPropagation();
  dragEl=e.currentTarget;
  var rect=dragEl.getBoundingClientRect();
  var gameArea=document.getElementById('game-area');
  var areaRect=gameArea.getBoundingClientRect();
  dragOffX=e.clientX-rect.left;
  dragOffY=e.clientY-rect.top;
  dragEl.dataset.dragging='1';
  dragEl.classList.add('dragging');
  window.addEventListener('mousemove',onDragMove,{passive:false});
  window.addEventListener('mouseup',onDragEnd);
}

function onTouchStart(e){
  if(e.touches.length!==1)return;
  e.preventDefault();
  e.stopPropagation();
  dragEl=e.currentTarget;
  var touch=e.touches[0];
  var rect=dragEl.getBoundingClientRect();
  dragOffX=touch.clientX-rect.left;
  dragOffY=touch.clientY-rect.top;
  dragEl.dataset.dragging='1';
  dragEl.classList.add('dragging');
  window.addEventListener('touchmove',onTouchMove,{passive:false});
  window.addEventListener('touchend',onTouchEnd,{passive:false});
}

function moveToPointer(clientX,clientY){
  if(!dragEl)return;
  var gameArea=document.getElementById('game-area');
  var areaRect=gameArea.getBoundingClientRect();
  var x=clientX-dragOffX-areaRect.left;
  var y=clientY-dragOffY-areaRect.top;
  dragEl.style.left=x+'px';
  dragEl.style.top=y+'px';
  dragEl.dataset.y=y;
}

function onDragMove(e){
  if(!dragEl)return;
  e.preventDefault();
  moveToPointer(e.clientX,e.clientY);
  highlightBinUnder(e.clientX,e.clientY);
}

function onTouchMove(e){
  if(!dragEl||!e.touches.length)return;
  e.preventDefault();
  var touch=e.touches[0];
  moveToPointer(touch.clientX,touch.clientY);
  highlightBinUnder(touch.clientX,touch.clientY);
}

function highlightBinUnder(cx,cy){
  document.querySelectorAll('.bin').forEach(function(b){
    var r=b.getBoundingClientRect();
    var over=cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
    b.classList.toggle('hover-target',over);
  });
}

function clearBinHighlights(){
  document.querySelectorAll('.bin').forEach(function(b){b.classList.remove('hover-target');});
}

function onDragEnd(e){
  window.removeEventListener('mousemove',onDragMove);
  window.removeEventListener('mouseup',onDragEnd);
  if(!dragEl)return;
  clearBinHighlights();
  dropItem(e.clientX,e.clientY);
}

function onTouchEnd(e){
  window.removeEventListener('touchmove',onTouchMove);
  window.removeEventListener('touchend',onTouchEnd);
  if(!dragEl)return;
  clearBinHighlights();
  var touch=e.changedTouches[0];
  dropItem(touch.clientX,touch.clientY);
}

function dropItem(cx,cy){
  var el=dragEl;
  dragEl=null;
  if(!el)return;
  el.dataset.dragging='0';
  el.classList.remove('dragging');
  var matched=null;
  document.querySelectorAll('.bin').forEach(function(b){
    var r=b.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)matched=b.dataset.bin;
  });
  if(matched){
    scoreDrop(el,matched);
  } else {
    el.dataset.dragging='0';
    if(el._fallId)el._fallId.active=false;
    startFall(el);
  }
}

function scoreDrop(el,targetBin){
  if(!el||!el.parentNode)return;
  var correctBin=el.dataset.bin;
  if(el._fallId)el._fallId.active=false;
  el.dataset.dragging='0';
  items=items.filter(function(i){return i!==el;});
  if(selectedItemEl===el)selectedItemEl=null;
  if(targetBin===correctBin){
    score+=10;
    trashCount++;
    updateBinCount(correctBin);
    playSound('correct');
    showFeedback(true);
    animateSuccess(el);
    bonusTrigger++;
    if(bonusTrigger%5===0)showBonusMsg();
    renderHUD();
    if(trashCount>=targetCount)endGame(true);
  } else {
    playSound('wrong');
    showFeedback(false);
    animateWrong(el);
    var gameArea=document.getElementById('game-area');
    el.style.left=(Math.floor(Math.random()*(gameArea.clientWidth-70))+10)+'px';
    el.style.top='-50px';
    el.dataset.y='-50';
    items.push(el);
    setTimeout(function(){startFall(el);},300);
  }
}

function animateSuccess(el){
  el.style.transition='transform .3s,opacity .3s';
  el.style.transform='scale(1.5)';
  el.style.opacity='0';
  setTimeout(function(){if(el.parentNode)el.remove();el.style.transition='';},330);
}

function animateWrong(el){
  el.style.transition='transform .15s';
  el.style.transform='rotate(-15deg) scale(1.1)';
  setTimeout(function(){el.style.transform='rotate(10deg)';},150);
  setTimeout(function(){el.style.transform='';el.style.transition='';},300);
}

function showFeedback(ok){
  var msgs=t(ok?'feedback_ok':'feedback_wrong');
  var msg=msgs[Math.floor(Math.random()*msgs.length)];
  var fb=document.getElementById('feedback');
  fb.textContent=(ok?'✅ ':'')+msg;
  fb.className=ok?'':'wrong';
  if(fb._t)clearTimeout(fb._t);
  fb._t=setTimeout(function(){fb.textContent='';fb.className='';},1800);
}

function showEcoMsg(){
  var msgs=t('eco_msgs');
  var icons=['💧','💡','🌳','🚲','🥕','♻️','🐝','🌊','🔌','🛍️'];
  var idx=ecoMsgIdx%msgs.length;
  document.getElementById('eco-msg').textContent=icons[idx]+' '+msgs[idx];
  ecoMsgIdx++;
}

function showBonusMsg(){
  var msgs=t('bonus_msgs');
  var msg=msgs[bonusMsgIdx%msgs.length];
  bonusMsgIdx++;
  document.getElementById('bonus-icon').textContent=msg.icon;
  document.getElementById('bonus-text').textContent=msg.text;
  document.getElementById('bonus-banner').style.display='block';
  document.getElementById('bonus-ok').textContent=lang==='fr'?'Super !':'Great!';
  gameRunning=false;
  if(spawnTimer){clearInterval(spawnTimer);spawnTimer=null;}
}

function closeBonusBanner(){
  document.getElementById('bonus-banner').style.display='none';
  score+=10;
  gameRunning=true;
  renderHUD();
  var cfg=LEVEL_CONFIG[currentLevel];
  spawnTimer=setInterval(function(){if(gameRunning&&items.length<5)spawnItem();},cfg.interval);
}

function endGame(won){
  gameRunning=false;
  if(spawnTimer){clearInterval(spawnTimer);spawnTimer=null;}
  if(ecoMsgTimer){clearInterval(ecoMsgTimer);ecoMsgTimer=null;}
  items.forEach(function(el){if(el._fallId)el._fallId.active=false;if(el.parentNode)el.remove();});
  items=[];
  if(!won)return;
  var stars=lives>=3?3:lives>=2?2:1;
  if(stars>state.starsEarned[currentLevel])state.starsEarned[currentLevel]=stars;
  if(score>state.scores[currentLevel])state.scores[currentLevel]=score;
  saveState();
  playSound('win');
  showWinScreen(stars);
}

function showWinScreen(stars){
  document.getElementById('win-stars').textContent=starsDisplay(stars);
  document.getElementById('win-h2').textContent=t('win_h');
  document.getElementById('win-score').textContent=t('score')+': '+score;
  var ecoMsgs=t('win_eco');
  document.getElementById('win-eco').textContent=ecoMsgs[Math.floor(Math.random()*ecoMsgs.length)];
  document.getElementById('win-replay').textContent=t('win_replay');
  document.getElementById('win-next').textContent=t('win_next');
  document.getElementById('win-home').textContent=t('win_home');
  document.getElementById('win-next').style.display=currentLevel<2?'':'none';
  showScreen('win-screen');
}

function replayLevel(){startGame(currentLevel);}
function nextLevel(){if(currentLevel<2)startGame(currentLevel+1);else showScreen('level-screen');}

function getAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  }
  return audioCtx;
}

function playSound(type){
  if(muted)return;
  var ctx=getAudio();
  if(!ctx)return;
  try{
    if(type==='correct'){
      var freqs=[523,659,784];
      freqs.forEach(function(f,i){
        var osc=ctx.createOscillator();
        var g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);
        osc.type='sine';
        osc.frequency.setValueAtTime(f,ctx.currentTime+i*0.09);
        g.gain.setValueAtTime(0.16,ctx.currentTime+i*0.09);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.09+0.25);
        osc.start(ctx.currentTime+i*0.09);
        osc.stop(ctx.currentTime+i*0.09+0.25);
      });
    } else if(type==='wrong'){
      var osc=ctx.createOscillator();
      var g=ctx.createGain();
      osc.connect(g);g.connect(ctx.destination);
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(220,ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(170,ctx.currentTime+0.25);
      g.gain.setValueAtTime(0.1,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
    } else if(type==='win'){
      [523,659,784,1047].forEach(function(f,i){
        var osc=ctx.createOscillator();
        var g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);
        osc.type='sine';
        osc.frequency.setValueAtTime(f,ctx.currentTime+i*0.14);
        g.gain.setValueAtTime(0.14,ctx.currentTime+i*0.14);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.14+0.45);
        osc.start(ctx.currentTime+i*0.14);osc.stop(ctx.currentTime+i*0.14+0.45);
      });
    }
  }catch(e){}
}

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
  document.getElementById('mute-btn').setAttribute('aria-label',muted?'Son desactive':'Son active');
}

document.getElementById('gate-input').addEventListener('keydown',function(e){
  if(e.key==='Enter')checkGate();
});

loadState();
setLang(lang);
renderTitle();
