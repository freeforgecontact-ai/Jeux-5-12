<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;--orange:#f97316;--orange-dark:#ea580c;
  --gold:#ffd23f;--sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;--success:#34c77b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:linear-gradient(160deg,#d4eeff 0%,#eaf6ff 50%,#d8f0e8 100%);
  min-height:100vh;color:var(--navy);
  display:flex;flex-direction:column;align-items:center;
}
.topbar{
  width:100%;background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;gap:8px;flex-wrap:wrap;
}
.topbar-left{display:flex;align-items:center;gap:8px;}
.topbar-brand{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700;color:#fff;}
.topbar-right{display:flex;gap:6px;align-items:center;}
.btn-lang,.btn-mute{
  background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.4);
  color:#fff;border-radius:10px;padding:5px 11px;font-size:0.9rem;cursor:pointer;
  font-family:inherit;font-weight:700;min-width:48px;min-height:48px;
  display:flex;align-items:center;justify-content:center;transition:background 0.2s;
}
.btn-lang:hover,.btn-mute:hover{background:rgba(255,255,255,0.32);}
.btn-lang.active{background:var(--orange);border-color:var(--orange-dark);}
.screen{display:none;flex-direction:column;align-items:center;padding:20px 16px 40px;width:100%;max-width:700px;margin:0 auto;}
.screen.active{display:flex;}
.title-mascot{margin:12px 0;}
h1.game-title{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:2.2rem;color:var(--blue);text-align:center;line-height:1.2;
}
.subtitle{color:var(--slate);font-size:1.05rem;text-align:center;margin:8px 0 20px;}
.btn-primary{
  background:var(--orange);color:#fff;border:none;border-radius:18px;
  padding:14px 36px;font-size:1.2rem;font-weight:800;cursor:pointer;
  font-family:inherit;box-shadow:0 5px 0 var(--orange-dark);
  transition:transform 0.1s,box-shadow 0.1s;min-height:54px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--orange-dark);}
.btn-primary:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-secondary{
  background:var(--blue);color:#fff;border:none;border-radius:14px;
  padding:10px 24px;font-size:1rem;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 4px 0 var(--blue-dark);margin-top:12px;
  min-height:48px;transition:transform 0.1s,box-shadow 0.1s;
}
.btn-secondary:hover{transform:translateY(-1px);box-shadow:0 5px 0 var(--blue-dark);}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
.link-parents{
  margin-top:10px;color:var(--slate);font-size:0.9rem;cursor:pointer;
  text-decoration:underline;background:none;border:none;font-family:inherit;
}
.link-parents:hover{color:var(--blue);}
.parental-box{
  background:#fff;border-radius:20px;padding:28px 24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:380px;width:100%;text-align:center;
}
.parental-box h2{color:var(--blue);margin-bottom:10px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
.parental-box p{color:var(--slate);margin-bottom:16px;}
.parental-input{
  width:90px;font-size:1.4rem;text-align:center;border:2px solid var(--sky);
  border-radius:10px;padding:8px;font-family:inherit;outline:none;
}
.parental-input:focus{border-color:var(--blue);}
.parental-error{color:red;font-size:0.9rem;margin-top:6px;min-height:20px;}
.parents-info{
  background:#fff;border-radius:20px;padding:28px 24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:420px;width:100%;
}
.parents-info h2{color:var(--blue);margin-bottom:10px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
.parents-info p{color:var(--slate);line-height:1.6;margin-bottom:8px;}
.level-badge{
  background:var(--blue);color:#fff;border-radius:20px;padding:4px 14px;
  font-size:0.85rem;font-weight:700;margin-bottom:6px;
}
.progress-bar-wrap{width:100%;max-width:480px;background:#c8e4f8;border-radius:20px;height:12px;margin-bottom:18px;}
.progress-bar-fill{background:var(--success);height:100%;border-radius:20px;transition:width 0.4s;}
.garden-wrap{
  width:100%;max-width:480px;background:linear-gradient(180deg,#c8f0d8 0%,#a8e0b8 60%,#7ec87e 100%);
  border-radius:22px;border:3px solid #5ab87a;padding:10px 10px 4px;
  min-height:140px;margin-bottom:18px;position:relative;overflow:hidden;
}
.garden-svg{width:100%;height:130px;display:block;}
.garden-label{text-align:center;color:#2d6a4f;font-size:0.8rem;font-weight:700;margin-top:2px;}
.situation-card{
  background:#fff;border-radius:22px;padding:20px 18px;
  box-shadow:0 4px 18px rgba(0,0,0,0.08);width:100%;max-width:480px;
  margin-bottom:18px;
}
.situation-icon{font-size:2.8rem;text-align:center;margin-bottom:8px;}
.situation-text{font-size:1.05rem;color:var(--navy);line-height:1.5;text-align:center;}
.choices-grid{width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px;}
.choice-btn{
  background:#fff;border:2.5px solid #c8e4f8;border-radius:16px;
  padding:14px 16px;text-align:left;font-size:1rem;font-weight:600;
  color:var(--navy);cursor:pointer;font-family:inherit;
  transition:all 0.18s;min-height:54px;display:flex;align-items:center;gap:10px;
}
.choice-btn:hover:not(:disabled){border-color:var(--blue);background:#eaf6ff;transform:translateY(-1px);}
.choice-btn.correct{background:#d4f7e8;border-color:var(--success);color:#155a3c;}
.choice-btn.wrong{background:#fde8e8;border-color:#e05454;color:#7a1a1a;}
.choice-btn:disabled{cursor:default;}
.feedback-box{
  width:100%;max-width:480px;border-radius:16px;padding:14px 18px;
  font-size:1.0rem;font-weight:700;text-align:center;margin:10px 0;
  opacity:0;transition:opacity 0.3s;
}
.feedback-box.show{opacity:1;}
.feedback-box.pos{background:#d4f7e8;color:#155a3c;border:2px solid var(--success);}
.feedback-box.neg{background:#fff3e0;color:#7a4100;border:2px solid #f97316;}
.btn-next{margin-top:10px;}
.success-title{
  font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;
  font-size:2rem;color:var(--orange);text-align:center;margin:10px 0 4px;
}
.stars-row{font-size:2.5rem;margin:8px 0;}
.success-garden-wrap{
  width:100%;max-width:480px;background:linear-gradient(180deg,#c8f0d8 0%,#a8e0b8 60%,#7ec87e 100%);
  border-radius:22px;border:3px solid #5ab87a;padding:10px 10px 4px;
  margin:16px 0;
}
.success-garden-svg{width:100%;height:160px;display:block;}
.success-msg{color:var(--slate);text-align:center;font-size:1.05rem;margin-bottom:16px;line-height:1.5;}
.success-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
@media(max-width:480px){
  h1.game-title{font-size:1.6rem;}
  .situation-text{font-size:0.97rem;}
  .choice-btn{font-size:0.93rem;}
}
</style>
</head>

  document.getElementById('btn-fr').classList.toggle('active', l==='fr');

  renderCurrentScreen();
}

function getAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type, vol) {
  if(muted) return;
  dur = dur||0.15; type = type||'sine'; vol = vol||0.18;
  try {
    var ctx = getAudio();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+dur);
  } catch(e){}
}

function playSuccess() {
  if(muted) return;
  [523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.2,'sine',0.15);},i*100);});
}

function buildFlowerSVG(x, height, colorIdx, groundY) {
  var c = FLOWER_COLORS[colorIdx % FLOWER_COLORS.length];
  var pc = c.petals, cc = c.center;
  var r = 9, cr = 5;
  var baseY = groundY;
  var topY = baseY - height;
  return '<line x1="'+x+'" y1="'+baseY+'" x2="'+x+'" y2="'+topY+'" stroke="#5a8a3a" stroke-width="3" stroke-linecap="round"/>'
    +'<ellipse cx="'+(x-9)+'" cy="'+(topY+height*0.45)+'" rx="6" ry="3" fill="#6ec45a" transform="rotate(-30,'+(x-9)+','+(topY+height*0.45)+')"/>'
    +'<ellipse cx="'+(x+9)+'" cy="'+(topY+height*0.3)+'" rx="6" ry="3" fill="#6ec45a" transform="rotate(30,'+(x+9)+','+(topY+height*0.3)+')"/>'
    +'<ellipse cx="'+x+'" cy="'+(topY-r*0.9)+'" rx="'+(r*0.5)+'" ry="'+(r*0.9)+'" fill="'+pc+'"/>'
    +'<ellipse cx="'+x+'" cy="'+(topY+r*0.9)+'" rx="'+(r*0.5)+'" ry="'+(r*0.9)+'" fill="'+pc+'"/>'
    +'<ellipse cx="'+(x-r*0.9)+'" cy="'+topY+'" rx="'+(r*0.9)+'" ry="'+(r*0.5)+'" fill="'+pc+'"/>'
    +'<ellipse cx="'+(x+r*0.9)+'" cy="'+topY+'" rx="'+(r*0.9)+'" ry="'+(r*0.5)+'" fill="'+pc+'"/>'
    +'<ellipse cx="'+(x-r*0.65)+'" cy="'+(topY-r*0.65)+'" rx="'+(r*0.5)+'" ry="'+(r*0.85)+'" fill="'+pc+'" transform="rotate(-45,'+(x-r*0.65)+','+(topY-r*0.65)+')"/>'
    +'<ellipse cx="'+(x+r*0.65)+'" cy="'+(topY-r*0.65)+'" rx="'+(r*0.5)+'" ry="'+(r*0.85)+'" fill="'+pc+'" transform="rotate(45,'+(x+r*0.65)+','+(topY-r*0.65)+')"/>'
    +'<ellipse cx="'+(x-r*0.65)+'" cy="'+(topY+r*0.65)+'" rx="'+(r*0.5)+'" ry="'+(r*0.85)+'" fill="'+pc+'" transform="rotate(45,'+(x-r*0.65)+','+(topY+r*0.65)+')"/>'
    +'<ellipse cx="'+(x+r*0.65)+'" cy="'+(topY+r*0.65)+'" rx="'+(r*0.5)+'" ry="'+(r*0.85)+'" fill="'+pc+'" transform="rotate(-45,'+(x+r*0.65)+','+(topY+r*0.65)+')"/>'
    +'<circle cx="'+x+'" cy="'+topY+'" r="'+cr+'" fill="'+cc+'"/>';
}

function renderGarden(svgId, groundY) {
  var svg = document.getElementById(svgId);
  if(!svg) return;
  svg.querySelectorAll('.fg').forEach(function(e){e.remove();});
  for(var i=0; i<flowerCount && i<FLOWER_POSITIONS.length; i++) {
    var pos = FLOWER_POSITIONS[i];
    var g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('fg');
    g.innerHTML = buildFlowerSVG(pos.x, pos.h, i, groundY);
    svg.appendChild(g);
  }
}

function animateNewFlower() {
  var svg = document.getElementById('garden-svg');
  var groups = svg.querySelectorAll('.fg');
  var last = groups[groups.length-1];
  if(!last) return;
  var idx = flowerCount - 1;
  var cx = FLOWER_POSITIONS[idx] ? FLOWER_POSITIONS[idx].x : 240;
  last.style.opacity = '0';
  last.style.transform = 'scale(0.2)';
  last.style.transformOrigin = cx+'px 90px';
  last.style.transition = 'opacity 0.6s, transform 0.6s';
  setTimeout(function(){
    last.style.opacity = '1';
    last.style.transform = 'scale(1)';
  }, 50);
}

function showParentalGate() {
  pgA = 2 + Math.floor(Math.random()*8);
  pgB = 2 + Math.floor(Math.random()*8);
  document.getElementById('pg-question').textContent = pgA + ' x ' + pgB + ' = ?';
  document.getElementById('pg-input').value = '';
  document.getElementById('pg-error').textContent = '';
  showScreen('screen-parental');
}

function checkParental() {
  var val = parseInt(document.getElementById('pg-input').value, 10);
  if(val === pgA * pgB) {
    showScreen('screen-parents-info');
  } else {
    document.getElementById('pg-error').textContent = T[lang].pgError;
    playWrong();
  }
}

function getLevelSituations(level) {
  var all = SITUATIONS[lang].filter(function(s){return s.level===level;});
  return all.sort(function(){return Math.random()-0.5;});
}

function startGame() {
  currentLevel = Math.min(currentLevel, 3);
  levelSituations = getLevelSituations(currentLevel);
  currentSituationIndex = 0;
  totalSituations = levelSituations.length;
  answered = false;
  wrongThisSituation = false;
  showScreen('screen-game');
  updateProgressBar();
  loadSituation();
  renderGarden('garden-svg', 90);
}

function loadSituation() {
  answered = false;
  wrongThisSituation = false;
  if(currentSituationIndex >= levelSituations.length) {
    showLevelSuccess();
    return;
  }
  currentSituation = levelSituations[currentSituationIndex];
  renderSituation();
  updateProgressBar();
}

    btn.setAttribute('aria-label', ch.text);
    (function(choice, button){
      button.onclick = function(){ handleChoice(choice, button); };
    })(ch, btn);
    grid.appendChild(btn);
  });
  var fb = document.getElementById('g-feedback');
  fb.textContent = '';
  fb.className = 'feedback-box';
  document.getElementById('g-next-btn').style.display = 'none';
  document.getElementById('g-next-btn').textContent = t.nextBtn;
}

function handleChoice(choice, btn) {
  if(answered) return;
  answered = true;
  document.querySelectorAll('#g-choices .choice-btn').forEach(function(b){b.disabled=true;});
  var fb = document.getElementById('g-feedback');
  if(choice.correct) {
    btn.classList.add('correct');
    fb.textContent = T[lang].correct(choice.feedback);
    fb.className = 'feedback-box pos show';
    setAriaLive(T[lang].correct(choice.feedback));
    if(!wrongThisSituation && flowerCount < FLOWER_POSITIONS.length) {
      flowerCount++;
      saveState();
      renderGarden('garden-svg', 90);
      setTimeout(animateNewFlower, 50);
      playFlower();
      setTimeout(function(){playSuccess();}, 600);
    } else {
      playSuccess();
    }
    document.getElementById('g-garden-label').textContent = T[lang].gardenLabel(flowerCount);
    document.getElementById('g-next-btn').style.display = '';
  } else {
    btn.classList.add('wrong');
    wrongThisSituation = true;
    fb.textContent = T[lang].wrong(choice.feedback);
    fb.className = 'feedback-box neg show';
    setAriaLive(T[lang].wrong(choice.feedback));
    playWrong();
    setTimeout(function(){
      answered = false;
      document.querySelectorAll('#g-choices .choice-btn').forEach(function(b){
        if(!b.classList.contains('wrong')) b.disabled = false;
      });
      btn.disabled = true;
    }, 1400);
  }
}

function nextSituation() {
  currentSituationIndex++;
  updateProgressBar();
  if(currentSituationIndex >= levelSituations.length) {
    showLevelSuccess();
  } else {
    loadSituation();
  }
}

function updateProgressBar() {
  var pct = totalSituations > 0 ? Math.round((currentSituationIndex / totalSituations)*100) : 0;
  var bar = document.getElementById('g-progress');
  bar.style.width = pct + '%';
  bar.parentElement.setAttribute('aria-valuenow', pct);
}

function showLevelSuccess() {
  playLevelUp();
  var t = T[lang];
  document.getElementById('s-stars').textContent = currentLevel===1?'⭐':currentLevel===2?'⭐⭐':'⭐⭐⭐';
  document.getElementById('s-title').textContent = t.sTitle(currentLevel);
  document.getElementById('s-msg').textContent = t.sMsg(flowerCount);
  document.getElementById('s-replay').textContent = t.sReplay;
  document.getElementById('s-next').textContent = t.sNext;
  document.getElementById('s-home').textContent = t.sHome;
  document.getElementById('s-next').style.display = (currentLevel >= 3) ? 'none' : '';
  renderGarden('success-garden-svg', 110);
  showScreen('screen-success');
}

function nextLevel() {
  if(currentLevel >= 3) {
    showAllDone();
    return;
  }
  currentLevel++;
  saveState();
  startGame();
}

function showAllDone() {
  var t = T[lang];
  document.getElementById('ad-title').textContent = t.adTitle;
  document.getElementById('ad-msg').textContent = t.adMsg;
  document.getElementById('ad-restart').textContent = t.adRestart;
  document.getElementById('ad-home').textContent = t.adHome;
  renderGarden('alldone-garden-svg', 110);
  showScreen('screen-alldone');
  playLevelUp();
}

function restartAll() {
  flowerCount = 0;
  currentLevel = 1;
  saveState();
  startGame();
}

function setAriaLive(msg) {
  var el = document.getElementById('aria-live');
  el.textContent = '';
  setTimeout(function(){el.textContent = msg;}, 50);
}

document.getElementById('pg-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') checkParental();
});

function init() {
  loadState();
  var nav = navigator.language || 'fr';
  lang = nav.startsWith('fr') ? 'fr' : 'en';
  document.getElementById('btn-fr').classList.toggle('active', lang==='fr');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.documentElement.lang = lang;
  renderCurrentScreen();
  showScreen('screen-title');
}

init();
</script>
</body>
</html>
