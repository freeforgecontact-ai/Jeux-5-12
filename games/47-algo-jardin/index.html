<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f4c81">
<title>Algo Jardin / Algo Garden — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;
  --orange:#f97316;--orange-dark:#ea580c;--gold:#ffd23f;
  --sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;
  --success:#34c77b;
  --cell:56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(160deg,#e0f0ff 0%,#f5fffe 100%);min-height:100vh;color:var(--navy);}
#topbar{background:var(--blue);color:#fff;display:flex;align-items:center;gap:10px;padding:6px 14px;flex-wrap:wrap;}
#topbar .brand{display:flex;align-items:center;gap:8px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700;flex:1;}
#topbar .controls{display:flex;gap:6px;align-items:center;}
.btn-lang{background:var(--blue-dark);color:#fff;border:2px solid var(--sky);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:.9rem;font-weight:700;min-width:48px;min-height:36px;}
.btn-lang.active{background:var(--orange);border-color:var(--orange-dark);}
#btn-mute{background:none;border:none;font-size:1.4rem;cursor:pointer;min-width:48px;min-height:36px;}
.screen{display:none;padding:16px;max-width:900px;margin:0 auto;}
.screen.active{display:block;}
#title-screen{text-align:center;}
#title-screen h1{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2.4rem;color:var(--blue);margin:12px 0 4px;}
#title-screen .subtitle{color:var(--slate);font-size:1.05rem;margin-bottom:20px;}
.mascot-wrap{display:flex;justify-content:center;margin:10px 0 18px;}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:18px;font-size:1.3rem;font-weight:700;padding:14px 40px;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;min-height:56px;transition:transform .1s;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{background:none;border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:8px 18px;cursor:pointer;margin-top:16px;font-size:.9rem;min-height:48px;}
#gate-screen{text-align:center;padding:40px 20px;}
#gate-screen h2{color:var(--blue);font-size:1.4rem;margin-bottom:18px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#gate-q{font-size:1.5rem;font-weight:700;margin:12px 0;}
#gate-input{font-size:1.2rem;padding:8px 14px;border:2px solid var(--blue);border-radius:10px;width:90px;text-align:center;}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 24px;cursor:pointer;font-size:1rem;font-weight:700;min-height:48px;box-shadow:0 4px 0 var(--blue-dark);margin-top:10px;}
.btn-blue:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
#gate-err{color:#e74c3c;margin-top:8px;min-height:24px;}
#parent-info{background:#fff;border-radius:16px;padding:20px;margin-top:20px;text-align:left;max-width:500px;margin-inline:auto;border:2px solid var(--sky);}
#parent-info h3{color:var(--blue);margin-bottom:10px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#parent-info p{color:var(--slate);line-height:1.6;font-size:.95rem;}
.btn-back{background:var(--slate);color:#fff;border:none;border-radius:10px;padding:9px 20px;cursor:pointer;margin-top:14px;font-size:.9rem;min-height:48px;}
#level-select-screen{text-align:center;}
#level-select-screen h2{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.7rem;color:var(--blue);margin-bottom:20px;}
.level-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;}
.lvl-btn{background:#fff;border:3px solid var(--sky);border-radius:16px;padding:14px 18px;cursor:pointer;min-width:110px;min-height:90px;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:.95rem;font-weight:700;color:var(--blue);transition:transform .12s,border-color .12s;}
.lvl-btn:hover:not(:disabled){transform:translateY(-3px);border-color:var(--orange);}
.lvl-btn .lvl-icon{font-size:2rem;}
.lvl-btn:disabled{opacity:.45;cursor:not-allowed;}
.lvl-btn.done{border-color:var(--success);background:#f0fff8;}
.lvl-stars{font-size:1rem;letter-spacing:2px;}
#game-screen{padding:10px;}
#game-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
#game-header .level-tag{background:var(--blue);color:#fff;border-radius:10px;padding:5px 14px;font-weight:700;font-size:.95rem;}
#game-header .goal-tag{background:var(--gold);color:var(--navy);border-radius:10px;padding:5px 14px;font-size:.9rem;font-weight:600;}
#game-layout{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;justify-content:center;}
#garden-wrap{background:#fff;border-radius:16px;padding:10px;border:3px solid var(--sky);box-shadow:0 4px 14px rgba(15,76,129,.1);}
#garden{display:grid;gap:3px;}
.cell{width:var(--cell);height:var(--cell);border-radius:8px;background:#c8f0b8;border:2px solid #9fd98a;display:flex;align-items:center;justify-content:center;font-size:1.4rem;position:relative;transition:background .2s;user-select:none;}
.cell.wet{background:#a3d8f4;border-color:#5bc0f8;}
.cell.has-robot{background:#ffe7b0;border-color:#f5b942;}
#program-panel{flex:1;min-width:240px;max-width:340px;}
#program-panel h3{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;color:var(--blue);font-size:1.1rem;margin-bottom:8px;}
#blocks-palette{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.block-btn{background:#fff;border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:7px 10px;cursor:pointer;font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:5px;min-height:48px;min-width:48px;transition:background .12s;}
.block-btn:hover{background:var(--sky-light);}
.block-btn.block-loop{border-color:var(--orange);color:var(--orange);}
.block-btn.block-cond{border-color:#8b5cf6;color:#8b5cf6;}
#program-list{min-height:80px;background:#f5faff;border:2px dashed var(--sky);border-radius:12px;padding:8px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;}
.prog-block{display:flex;align-items:center;gap:4px;background:#fff;border:2px solid var(--blue);color:var(--blue);border-radius:8px;padding:5px 8px;font-size:.82rem;font-weight:700;}
.prog-block.pb-loop{border-color:var(--orange);color:var(--orange);}
.prog-block.pb-cond{border-color:#8b5cf6;color:#8b5cf6;}
.del-btn{background:none;border:none;color:#aaa;cursor:pointer;font-size:.9rem;padding:0 2px;line-height:1;}
.del-btn:hover{color:#e74c3c;}
.loop-count{width:28px;height:28px;border:1px solid var(--orange);border-radius:6px;text-align:center;font-size:.9rem;font-weight:700;color:var(--orange);background:#fff0e6;}
#action-bar{display:flex;gap:8px;flex-wrap:wrap;}
.btn-go{background:var(--success);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;padding:10px 22px;cursor:pointer;box-shadow:0 4px 0 #229a5a;min-height:48px;flex:1;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
.btn-go:active{transform:translateY(2px);box-shadow:0 2px 0 #229a5a;}
.btn-go:disabled{background:#aaa;box-shadow:0 4px 0 #888;cursor:not-allowed;}
.btn-clear{background:#fff;color:var(--slate);border:2px solid var(--slate);border-radius:12px;padding:10px 16px;cursor:pointer;font-size:1rem;min-height:48px;}
#feedback-bar{margin-top:10px;border-radius:12px;padding:10px 14px;font-weight:700;font-size:1rem;min-height:44px;text-align:center;background:var(--sky-light);color:var(--slate);transition:background .3s;}
#feedback-bar.ok{background:#d4f7e7;color:#1a6640;}
#feedback-bar.err{background:#fde8e8;color:#c0392b;}
#success-screen{text-align:center;padding:30px 16px;}
#success-screen h2{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2rem;color:var(--success);margin:14px 0 8px;}
#success-stars{font-size:2.5rem;letter-spacing:6px;margin:10px 0;}
#success-screen p{color:var(--slate);margin-bottom:20px;}
.success-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
@media(max-width:600px){
  :root{--cell:44px;}
  #title-screen h1{font-size:1.7rem;}
  #game-layout{flex-direction:column;}
  #program-panel{max-width:100%;}
}
</style>
</head>

<script>
// ==================== I18N ====================
const T={
fr:{
  title:"Algo Jardin",subtitle:"Programme ton robot jardinier !",play:"🌱 Jouer",parents:"Pour les parents",
  gate_title:"Espace parents",gate_q:"Calcul rapide :",gate_ok:"Vérifier",gate_err:"Oups ! Essaie encore.",
  pi_title:"Algo Jardin — Infos parents",
  pi_body:"Ce jeu développe la pensée informatique (7-11 ans) : séquences d'instructions, boucles de répétition et conditions logiques. L'enfant programme un robot jardinier sur une grille en empilant des blocs visuels. Aucune donnée collectée, aucune publicité, 100% hors-ligne.",
  pi_back:"Fermer",ls_title:"Choisis un niveau",ls_back:"← Accueil",gh_back:"←",
  goal_water:"Arrose tout !",goal_harvest:"Récolte tout !",goal_mix:"Arrose et récolte !",
  pp_palette:"Blocs disponibles",pp_prog:"Mon programme",go:"▶ Go !",clear:"Effacer",
  feedback_empty:"Ajoute des blocs puis clique Go !",feedback_run:"Exécution en cours…",
  feedback_ok:"🎉 Bravo ! Tu as tout terminé !",feedback_not_done:"Pas encore fini… Essaie encore !",
  feedback_crash:"Le robot est sorti du jardin ! Essaie encore.",
  succ_title:"Bravo !",succ_msg:"Tu as réussi ce niveau ! Continue !",
  succ_replay:"↺ Rejouer",succ_next:"Niveau suivant →",succ_menu:"Menu niveaux",
  lvl_name:["Séquence 1","Séquence 2","Séquence 3","Boucle 1","Boucle 2","Boucle 3","Condition 1","Condition 2","Condition 3"],
  lvl_desc:["Avancer et arroser","Ligne en L","Chemin tordu","Répète x3","Grande ligne","Serpent","Si fleur, récolte","Rangées mélangées","Grand défi"],
  blk_forward:"↑ Avancer",blk_turn_r:"→ Droite",blk_turn_l:"← Gauche",
  blk_water:"💧 Arroser",blk_harvest:"🌻 Récolter",blk_loop:"🔁 Répéter",blk_cond:"🌸 Si fleur→",
  times:" × ",hint_loop:"Astuce : utilise Répéter !",hint_cond:"Astuce : utilise Si fleur !",
},
en:{
  title:"Algo Garden",subtitle:"Program your gardener robot!",play:"🌱 Play",parents:"For parents",
  gate_title:"Parent area",gate_q:"Quick maths:",gate_ok:"Check",gate_err:"Oops! Try again.",
  pi_title:"Algo Garden — Parent info",
  pi_body:"This game develops computational thinking (ages 7-11): instruction sequences, repeat loops, and conditions. Children program a gardener robot on a grid by stacking visual blocks. No data collected, no ads, 100% offline.",
  pi_back:"Close",ls_title:"Choose a level",ls_back:"← Home",gh_back:"←",
  goal_water:"Water everything!",goal_harvest:"Harvest everything!",goal_mix:"Water & Harvest!",
  pp_palette:"Available blocks",pp_prog:"My program",go:"▶ Go!",clear:"Clear",
  feedback_empty:"Add blocks then click Go!",feedback_run:"Running…",
  feedback_ok:"🎉 Well done! All done!",feedback_not_done:"Not finished yet… Try again!",
  feedback_crash:"Robot went out of the garden! Try again.",
  succ_title:"Well done!",succ_msg:"You completed this level! Keep going!",
  succ_replay:"↺ Replay",succ_next:"Next level →",succ_menu:"Level menu",
  lvl_name:["Sequence 1","Sequence 2","Sequence 3","Loop 1","Loop 2","Loop 3","Condition 1","Condition 2","Condition 3"],
  lvl_desc:["Move and water","L-shaped path","Winding path","Repeat x3","Long row","Snake","If flower, harvest","Mixed rows","Grand challenge"],
  blk_forward:"↑ Forward",blk_turn_r:"→ Right",blk_turn_l:"← Left",
  blk_water:"💧 Water",blk_harvest:"🌻 Harvest",blk_loop:"🔁 Repeat",blk_cond:"🌸 If flower→",
  times:" × ",hint_loop:"Tip: use Repeat!",hint_cond:"Tip: use If flower!",
}
};

let lang='fr';
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  applyAllTexts();
}
function t(k){return(T[lang]&&T[lang][k]!=null)?T[lang][k]:k;}

function applyAllTexts(){
  document.getElementById('ttl-main').textContent=t('title');
  document.getElementById('ttl-sub').textContent=t('subtitle');
  document.getElementById('btn-play-lbl').textContent=t('play');
  document.getElementById('btn-parents-lbl').textContent=t('parents');
  document.getElementById('gate-title').textContent=t('gate_title');
  document.getElementById('gate-q-label').textContent=t('gate_q');
  document.getElementById('gate-ok-btn').textContent=t('gate_ok');
  document.getElementById('pi-title').textContent=t('pi_title');
  document.getElementById('pi-body').textContent=t('pi_body');
  document.getElementById('pi-back').textContent=t('pi_back');
  document.getElementById('ls-title').textContent=t('ls_title');
  document.getElementById('ls-back').textContent=t('ls_back');
  document.getElementById('gh-back').textContent=t('gh_back');
  document.getElementById('pp-palette-title').textContent=t('pp_palette');
  document.getElementById('pp-prog-title').textContent=t('pp_prog');
  document.getElementById('btn-go').textContent=t('go');
  document.getElementById('btn-clear-lbl').textContent=t('clear');
  document.getElementById('succ-title').textContent=t('succ_title');
  document.getElementById('succ-msg').textContent=t('succ_msg');
  document.getElementById('succ-replay').textContent=t('succ_replay');
  document.getElementById('succ-next').textContent=t('succ_next');
  document.getElementById('succ-menu').textContent=t('succ_menu');
  if(currentScreen==='level-select-screen') buildLevelSelect();
  if(currentScreen==='game-screen'){buildPalette(LEVELS[currentLevel].blocks);renderProgram();updateGameHeader();}
}

// ==================== SCREENS ====================
let currentScreen='title-screen';
function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen=id;
  if(id==='level-select-screen') buildLevelSelect();
}

// ==================== SOUND ====================
let muted=false;
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playNote(freq,dur,type,vol){
  if(muted)return;
  try{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);
    o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function sndStep(){playNote(480,.1,'sine',.1);}
function sndWater(){playNote(700,.15,'triangle',.12);setTimeout(()=>playNote(900,.12,'triangle',.08),110);}
function sndHarvest(){[523,659,784].forEach((f,i)=>setTimeout(()=>playNote(f,.15,'sine',.15),i*100));}
function sndSuccess(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playNote(f,.22,'sine',.18),i*130));}
function sndError(){playNote(200,.3,'sawtooth',.1);}
function toggleMute(){muted=!muted;document.getElementById('btn-mute').textContent=muted?'🔇':'🔊';}

// ==================== PARENT GATE ====================
let gateAns=0;
function openGate(){
  const a=2+Math.floor(Math.random()*8),b=2+Math.floor(Math.random()*8);
  gateAns=a*b;
  document.getElementById('gate-q').textContent=a+' × '+b+' = ?';
  document.getElementById('gate-err').textContent='';
  document.getElementById('gate-input').value='';
  document.getElementById('parent-info').style.display='none';
  goScreen('gate-screen');
}
function checkGate(){
  const v=parseInt(document.getElementById('gate-input').value,10);
  if(v===gateAns){
    document.getElementById('gate-err').textContent='';
    document.getElementById('parent-info').style.display='block';
    playNote(880,.4,'sine',.15);
  } else {
    document.getElementById('gate-err').textContent=t('gate_err');
    sndError();
  }
}
function closeGate(){goScreen('title-screen');}
document.getElementById('gate-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkGate();});

// ==================== LEVELS ====================
// Cell values: '.'=empty soil, 'W'=needs water, 'F'=flower(needs harvest)
// Done values: 'DW'=watered, 'DF'=harvested
// Robot dirs: 0=up, 1=right, 2=down, 3=left

const LEVELS=[
  // Phase 0: sequences only
  {grid:3, cells:[['W','.','.'],['.','.','W'],['.','W','.']], robot:{r:0,c:0,dir:1}, goal:'water', blocks:['forward','turn_r','turn_l','water']},
  {grid:4, cells:[['.','.','.','.'],['.','.','.','.'],['W','.','.','.'],['.','W','W','W']], robot:{r:0,c:3,dir:2}, goal:'water', blocks:['forward','turn_r','turn_l','water']},
  {grid:4, cells:[['W','.','.','.'],['W','.','.','.'],['.','.','.','W'],['.','.','W','.']], robot:{r:3,c:0,dir:0}, goal:'water', blocks:['forward','turn_r','turn_l','water']},
  // Phase 1: loops
  {grid:4, cells:[['.','.','.','.'],['.','.','.','.'],['.','.','.','.'],['W','W','W','.']], robot:{r:3,c:3,dir:3}, goal:'water', blocks:['forward','turn_r','turn_l','water','loop']},
  {grid:5, cells:[['W','W','W','W','W'],['.','.','.','.','.'],['.','.','.','.','.'],['.','.','.','.','.'],['.','.','.','.','.']],robot:{r:4,c:0,dir:0},goal:'water',blocks:['forward','turn_r','turn_l','water','loop']},
  {grid:4, cells:[['W','W','W','W'],['.','.','.','.'],['W','W','W','W'],['.','.','.','.']],robot:{r:3,c:0,dir:0},goal:'water',blocks:['forward','turn_r','turn_l','water','loop']},
  // Phase 2: conditions
  {grid:3, cells:[['F','W','F'],['W','.','W'],['F','W','F']],robot:{r:1,c:1,dir:0},goal:'mix',blocks:['forward','turn_r','turn_l','water','harvest','loop','cond']},
  {grid:4, cells:[['F','W','F','W'],['W','F','W','F'],['.','.','.','.'],['.','.','.','.']],robot:{r:3,c:0,dir:0},goal:'mix',blocks:['forward','turn_r','turn_l','water','harvest','loop','cond']},
  {grid:5, cells:[['F','W','F','W','F'],['W','F','W','F','W'],['F','W','F','W','F'],['.','.','.','.','.'],['.','.','.','.','.']],robot:{r:4,c:0,dir:0},goal:'mix',blocks:['forward','turn_r','turn_l','water','harvest','loop','cond']},
];
const LEVEL_ICONS=['🌱','🌿','🍀','🔁','🔁','🔁','🌸','🌸','🌸'];

// ==================== SAVE ====================
const LS_KEY='pgrg_algo_jardin';
function loadSave(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return {};}}
function saveLevel(idx,stars){
  const s=loadSave();
  if(!s.levels)s.levels={};
  if(!s.levels[idx]||s.levels[idx]<stars)s.levels[idx]=stars;
  localStorage.setItem(LS_KEY,JSON.stringify(s));
}
function getStars(idx){const s=loadSave();return(s.levels&&s.levels[idx])||0;}

// ==================== LEVEL SELECT ====================
function buildLevelSelect(){
  const g=document.getElementById('level-grid');
  g.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const stars=getStars(i);
    const unlocked=(i===0)||(getStars(i-1)>0);
    const btn=document.createElement('button');
    btn.className='lvl-btn'+(stars>0?' done':'');
    btn.disabled=!unlocked;
    btn.setAttribute('aria-label',t('lvl_name')[i]+(unlocked?'':' (verrouillé)'));
    btn.innerHTML=`<span class="lvl-icon">${LEVEL_ICONS[i]}</span><span style="text-align:center">${t('lvl_name')[i]}</span><span style="font-size:.78rem;color:var(--slate);text-align:center">${t('lvl_desc')[i]}</span><span class="lvl-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</span>`;
    if(unlocked) btn.onclick=()=>startLevel(i);
    g.appendChild(btn);
  });
}

// ==================== GAME STATE ====================
let currentLevel=0;
let gridState=[];
let robot={r:0,c:0,dir:0};
let program=[];
let running=false;
let animTimer=null;

function startLevel(idx){
  currentLevel=idx;
  const lv=LEVELS[idx];
  gridState=lv.cells.map(row=>[...row]);
  robot={...lv.robot};
  program=[];
  running=false;
  if(animTimer){clearTimeout(animTimer);animTimer=null;}
  document.getElementById('btn-go').disabled=false;
  buildPalette(lv.blocks);
  renderProgram();
  renderGrid();
  updateGameHeader();
  setFeedback(t('feedback_empty'),'');
  goScreen('game-screen');
}

function updateGameHeader(){
  const lv=LEVELS[currentLevel];
  document.getElementById('gh-level').textContent=t('lvl_name')[currentLevel]||'';
  const gmap={water:t('goal_water'),harvest:t('goal_harvest'),mix:t('goal_mix')};
  document.getElementById('gh-goal').textContent=gmap[lv.goal]||'';
}

// ==================== GRID RENDER ====================
const DIR_ARROWS=['⬆️','➡️','⬇️','⬅️'];
function renderGrid(){
  const lv=LEVELS[currentLevel];
  const N=lv.grid;
  const garden=document.getElementById('garden');
  garden.style.gridTemplateColumns=`repeat(${N},var(--cell))`;
  garden.innerHTML='';
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const div=document.createElement('div');
      div.className='cell';
      const isBot=(r===robot.r&&c===robot.c);
      const st=gridState[r][c];
      if(isBot){
        div.classList.add('has-robot');
        div.textContent=DIR_ARROWS[robot.dir];
      } else if(st==='W'){div.textContent='💧';}
      else if(st==='F'){div.textContent='🌸';}
      else if(st==='DW'){div.classList.add('wet');div.textContent='✅';}
      else if(st==='DF'){div.textContent='🌻';}
      garden.appendChild(div);
    }
  }
}

// ==================== PALETTE ====================
const BLOCK_DEFS={
  forward:{lbl:()=>t('blk_forward'),cls:''},
  turn_r:{lbl:()=>t('blk_turn_r'),cls:''},
  turn_l:{lbl:()=>t('blk_turn_l'),cls:''},
  water:{lbl:()=>t('blk_water'),cls:''},
  harvest:{lbl:()=>t('blk_harvest'),cls:''},
  loop:{lbl:()=>t('blk_loop'),cls:'block-loop',isLoop:true},
  cond:{lbl:()=>t('blk_cond'),cls:'block-cond',isCond:true},
};

function buildPalette(keys){
  const pal=document.getElementById('blocks-palette');
  pal.innerHTML='';
  keys.forEach(k=>{
    const bd=BLOCK_DEFS[k];
    if(!bd)return;
    const btn=document.createElement('button');
    btn.className='block-btn '+bd.cls;
    btn.textContent=bd.lbl();
    btn.setAttribute('aria-label',bd.lbl());
    btn.onclick=()=>addBlock(k);
    pal.appendChild(btn);
  });
}

// ==================== PROGRAM ====================
function addBlock(key){
  if(running)return;
  const bd=BLOCK_DEFS[key];
  if(!bd)return;
  const item={key};
  if(bd.isLoop)item.count=3;
  program.push(item);
  renderProgram();
  setFeedback('','');
}

function renderProgram(){
  const pl=document.getElementById('program-list');
  pl.innerHTML='';
  if(program.length===0){
    const sp=document.createElement('span');
    sp.style.cssText='color:#aaa;font-size:.85rem;padding:4px;';
    sp.textContent=t('feedback_empty');
    pl.appendChild(sp);
    return;
  }
  program.forEach((item,idx)=>{
    const bd=BLOCK_DEFS[item.key];
    if(!bd)return;
    const div=document.createElement('div');
    div.className='prog-block'+(item.key==='loop'?' pb-loop':item.key==='cond'?' pb-cond':'');

    const lbl=document.createElement('span');
    lbl.textContent=bd.lbl();
    div.appendChild(lbl);

    if(item.key==='loop'){
      const tinp=document.createElement('input');
      tinp.type='number';tinp.className='loop-count';
      tinp.min=1;tinp.max=9;tinp.value=item.count||3;
      tinp.setAttribute('aria-label',t('times'));
      tinp.onchange=function(){
        const v=Math.max(1,Math.min(9,parseInt(this.value,10)||1));
        program[idx].count=v;this.value=v;
      };
      div.appendChild(tinp);
      const tx=document.createElement('span');
      tx.textContent=t('times');tx.style.fontSize='.75rem';
      div.appendChild(tx);
    }

    if(item.key==='cond'){
      const info=document.createElement('span');
      info.textContent=' → 🌻/💧';info.style.fontSize='.8rem';
      div.appendChild(info);
    }

    const del=document.createElement('button');
    del.className='del-btn';del.textContent='✕';
    del.setAttribute('aria-label','Supprimer');
    del.onclick=()=>{if(!running){program.splice(idx,1);renderProgram();}};
    div.appendChild(del);
    pl.appendChild(div);
  });
}

function clearProgram(){
  if(running)return;
  program=[];
  renderProgram();
  setFeedback('','');
}

// ==================== EXECUTION ====================
function setFeedback(msg,cls){
  const fb=document.getElementById('feedback-bar');
  fb.textContent=msg;
  fb.className='';
  if(cls)fb.classList.add(cls);
  document.getElementById('aria-live').textContent=msg;
}

function runProgram(){
  if(running)return;
  if(program.length===0){setFeedback(t('feedback_empty'),'');return;}
  // Reset to initial state
  const lv=LEVELS[currentLevel];
  gridState=lv.cells.map(row=>[...row]);
  robot={...lv.robot};
  renderGrid();
  setFeedback(t('feedback_run'),'');
  document.getElementById('btn-go').disabled=true;
  running=true;
  const instrs=flattenProgram(program);
  execStep(instrs,0);
}

function flattenProgram(prog){
  // Convert program blocks into flat instruction list
  // Loop block: repeats the NEXT instruction N times
  // Cond block: at current cell, if W water it, if F harvest it
  const out=[];
  for(let i=0;i<prog.length;i++){
    const item=prog[i];
    if(item.key==='loop'){
      const cnt=Math.max(1,item.count||3);
      // find all subsequent non-loop blocks and repeat them
      const inner=[];
      for(let j=i+1;j<prog.length;j++){
        if(prog[j].key!=='loop')inner.push(prog[j]);
      }
      for(let x=0;x<cnt;x++) inner.forEach(b=>out.push({key:b.key}));
      // skip the rest
      i=prog.length; // done, loop consumed remaining
    } else {
      out.push({key:item.key});
    }
  }
  return out;
}

function execStep(instrs,idx){
  if(!running){document.getElementById('btn-go').disabled=false;return;}
  if(idx>=instrs.length){
    running=false;
    document.getElementById('btn-go').disabled=false;
    evalWin();
    return;
  }
  const instr=instrs[idx];
  const crash=doAction(instr.key);
  renderGrid();
  if(crash){
    running=false;
    document.getElementById('btn-go').disabled=false;
    setFeedback(t('feedback_crash'),'err');
    sndError();
    return;
  }
  animTimer=setTimeout(()=>execStep(instrs,idx+1),400);
}

function doAction(key){
  const lv=LEVELS[currentLevel];
  const N=lv.grid;
  if(key==='forward'){
    let nr=robot.r,nc=robot.c;
    if(robot.dir===0)nr--;
    else if(robot.dir===1)nc++;
    else if(robot.dir===2)nr++;
    else nc--;
    if(nr<0||nr>=N||nc<0||nc>=N)return true; // crash
    robot.r=nr;robot.c=nc;
    sndStep();
  } else if(key==='turn_r'){
    robot.dir=(robot.dir+1)%4;sndStep();
  } else if(key==='turn_l'){
    robot.dir=(robot.dir+3)%4;sndStep();
  } else if(key==='water'){
    const st=gridState[robot.r][robot.c];
    if(st==='W'){gridState[robot.r][robot.c]='DW';sndWater();}
  } else if(key==='harvest'){
    const st=gridState[robot.r][robot.c];
    if(st==='F'){gridState[robot.r][robot.c]='DF';sndHarvest();}
  } else if(key==='cond'){
    const st=gridState[robot.r][robot.c];
    if(st==='F'){gridState[robot.r][robot.c]='DF';sndHarvest();}
    else if(st==='W'){gridState[robot.r][robot.c]='DW';sndWater();}
  }
  return false;
}

function evalWin(){
  const targets=gridState.flat().filter(c=>c==='W'||c==='F').length;
  const done=gridState.flat().filter(c=>c==='DW'||c==='DF').length;
  const total=LEVELS[currentLevel].cells.flat().filter(c=>c==='W'||c==='F').length;
  if(done===total){
    setFeedback(t('feedback_ok'),'ok');
    sndSuccess();
    const stars=calcStars();
    saveLevel(currentLevel,stars);
    setTimeout(()=>showSuccess(stars),600);
  } else {
    setFeedback(t('feedback_not_done'),'err');
    sndError();
  }
}

function calcStars(){
  const effMap={0:4,1:5,2:6,3:4,4:4,5:5,6:5,7:5,8:6};
  const eff=effMap[currentLevel]||4;
  const len=program.length;
  if(len<=eff)return 3;
  if(len<=eff+3)return 2;
  return 1;
}

function showSuccess(stars){
  document.getElementById('success-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('succ-title').textContent=t('succ_title');
  document.getElementById('succ-msg').textContent=t('succ_msg');
  document.getElementById('succ-replay').textContent=t('succ_replay');
  document.getElementById('succ-next').textContent=t('succ_next');
  document.getElementById('succ-menu').textContent=t('succ_menu');
  document.getElementById('succ-next').style.display=(currentLevel<LEVELS.length-1)?'inline-flex':'none';
  goScreen('success-screen');
}

function replayLevel(){startLevel(currentLevel);}
function nextLevel(){
  if(currentLevel<LEVELS.length-1)startLevel(currentLevel+1);
  else goScreen('level-select-screen');
}

  const nl=(navigator.language||'fr').toLowerCase();
  lang=nl.startsWith('en')?'en':'fr';
