<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Algo Jardin / Algo Garden — PGRG IA</title>
<style>
:root{
  --blue:#0f4c81;--blue-dark:#0a3559;--navy:#0f172a;
  --orange:#f97316;--orange-dark:#ea580c;--gold:#ffd23f;
  --sky:#7ec3ee;--sky-light:#eaf6ff;--slate:#475569;
  --success:#34c77b;
  --cell:56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;background:linear-gradient(160deg,#e0f0ff 0%,#f5fffe 100%);min-height:100vh;color:var(--navy);}
#topbar{background:var(--blue);color:#fff;display:flex;align-items:center;gap:10px;padding:6px 14px;flex-wrap:wrap;}
#topbar .brand{display:flex;align-items:center;gap:8px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.1rem;font-weight:700;flex:1;}
#topbar .controls{display:flex;gap:6px;align-items:center;}
.btn-lang{background:var(--blue-dark);color:#fff;border:2px solid var(--sky);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:.9rem;font-weight:700;min-width:48px;min-height:36px;}
.btn-lang.active{background:var(--orange);border-color:var(--orange-dark);}
#btn-mute{background:none;border:none;font-size:1.4rem;cursor:pointer;min-width:48px;min-height:36px;}
.screen{display:none;padding:16px;max-width:920px;margin:0 auto;}
.screen.active{display:block;}
#title-screen{text-align:center;}
#title-screen h1{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2.4rem;color:var(--blue);margin:12px 0 4px;}
#title-screen .subtitle{color:var(--slate);font-size:1.05rem;margin-bottom:20px;}
.mascot-wrap{display:flex;justify-content:center;margin:10px 0 18px;}
.btn-play{background:var(--orange);color:#fff;border:none;border-radius:18px;font-size:1.3rem;font-weight:700;padding:14px 40px;cursor:pointer;box-shadow:0 5px 0 var(--orange-dark);font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;min-height:56px;transition:transform .1s;}
.btn-play:active{transform:translateY(3px);box-shadow:0 2px 0 var(--orange-dark);}
.btn-parents{background:none;border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:8px 18px;cursor:pointer;margin-top:16px;font-size:.9rem;min-height:48px;}
#gate-screen{text-align:center;padding:40px 20px;}
#gate-screen h2{color:var(--blue);font-size:1.4rem;margin-bottom:18px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#gate-q{font-size:1.5rem;font-weight:700;margin:12px 0;}
#gate-input{font-size:1.2rem;padding:8px 14px;border:2px solid var(--blue);border-radius:10px;width:90px;text-align:center;}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 24px;cursor:pointer;font-size:1rem;font-weight:700;min-height:48px;box-shadow:0 4px 0 var(--blue-dark);margin-top:10px;}
.btn-blue:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-dark);}
#gate-err{color:#e74c3c;margin-top:8px;min-height:24px;}
#parent-info{background:#fff;border-radius:16px;padding:20px;margin-top:20px;text-align:left;max-width:500px;margin-inline:auto;border:2px solid var(--sky);}
#parent-info h3{color:var(--blue);margin-bottom:10px;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
#parent-info p{color:var(--slate);line-height:1.6;font-size:.95rem;}
.btn-back{background:var(--slate);color:#fff;border:none;border-radius:10px;padding:9px 20px;cursor:pointer;margin-top:14px;font-size:.9rem;min-height:48px;}
#level-select-screen{text-align:center;}
#level-select-screen h2{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:1.7rem;color:var(--blue);margin-bottom:20px;}
.level-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;}
.lvl-btn{background:#fff;border:3px solid var(--sky);border-radius:16px;padding:14px 18px;cursor:pointer;min-width:110px;min-height:90px;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:.95rem;font-weight:700;color:var(--blue);transition:transform .12s,border-color .12s;}
.lvl-btn:hover:not(:disabled){transform:translateY(-3px);border-color:var(--orange);}
.lvl-btn .lvl-icon{font-size:2rem;}
.lvl-btn:disabled{opacity:.45;cursor:not-allowed;}
.lvl-btn.done{border-color:var(--success);background:#f0fff8;}
.lvl-stars{font-size:1rem;letter-spacing:2px;}
#game-screen{padding:10px;}
#game-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
#game-header .level-tag{background:var(--blue);color:#fff;border-radius:10px;padding:5px 14px;font-weight:700;font-size:.95rem;}
#goal-banner{background:#fff8e6;border:2px solid var(--gold);border-radius:12px;padding:8px 14px;margin-bottom:8px;font-size:1rem;font-weight:700;color:var(--navy);text-align:center;line-height:1.5;}
#game-layout{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;justify-content:center;}
#garden-wrap{background:#fff;border-radius:16px;padding:10px;border:3px solid var(--sky);box-shadow:0 4px 14px rgba(15,76,129,.1);}
#garden{display:grid;gap:3px;}
.cell{width:var(--cell);height:var(--cell);border-radius:8px;background:#c8f0b8;border:2px solid #9fd98a;display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative;transition:background .2s;user-select:none;}
.cell.wet{background:#a3d8f4;border-color:#5bc0f8;}
.cell.has-robot{background:#ffe7b0;border-color:#f5b942;}
.cell.highlight{box-shadow:0 0 0 3px #f97316 inset;}
#legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:.82rem;}
.leg-item{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--sky);border-radius:8px;padding:3px 8px;}
#program-panel{flex:1;min-width:240px;max-width:360px;}
#program-panel h3{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;color:var(--blue);font-size:1.05rem;margin-bottom:6px;}
#blocks-palette{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.block-btn{background:#fff;border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:7px 10px;cursor:pointer;font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:5px;min-height:48px;min-width:48px;transition:background .12s;}
.block-btn:hover:not(:disabled){background:var(--sky-light);}
.block-btn:disabled{opacity:.4;cursor:not-allowed;}
.block-btn.block-loop{border-color:var(--orange);color:var(--orange);}
.block-btn.block-cond{border-color:#8b5cf6;color:#8b5cf6;}
#program-list{min-height:80px;background:#f5faff;border:2px dashed var(--sky);border-radius:12px;padding:8px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;}
.prog-block{display:inline-flex;align-items:center;gap:4px;background:#fff;border:2px solid var(--blue);color:var(--blue);border-radius:8px;padding:5px 8px;font-size:.82rem;font-weight:700;}
.prog-block.pb-loop{border-color:var(--orange);color:var(--orange);background:#fff7ed;}
.prog-block.pb-cond{border-color:#8b5cf6;color:#8b5cf6;}
.del-btn{background:none;border:none;color:#aaa;cursor:pointer;font-size:.9rem;padding:0 2px;line-height:1;}
.del-btn:hover:not(:disabled){color:#e74c3c;}
.del-btn:disabled{opacity:.3;cursor:not-allowed;}
.loop-count{width:32px;height:28px;border:1px solid var(--orange);border-radius:6px;text-align:center;font-size:.9rem;font-weight:700;color:var(--orange);background:#fff0e6;}
#action-bar{display:flex;gap:8px;flex-wrap:wrap;}
.btn-go{background:var(--success);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;padding:10px 22px;cursor:pointer;box-shadow:0 4px 0 #229a5a;min-height:52px;flex:1;font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;}
.btn-go:active{transform:translateY(2px);box-shadow:0 2px 0 #229a5a;}
.btn-go:disabled{background:#aaa;box-shadow:0 4px 0 #888;cursor:not-allowed;}
.btn-clear{background:#fff;color:var(--slate);border:2px solid var(--slate);border-radius:12px;padding:10px 16px;cursor:pointer;font-size:1rem;min-height:52px;}
.btn-clear:disabled{opacity:.4;cursor:not-allowed;}
#feedback-bar{margin-top:10px;border-radius:12px;padding:10px 14px;font-weight:700;font-size:1rem;min-height:44px;text-align:center;background:var(--sky-light);color:var(--slate);transition:background .3s;}
#feedback-bar.ok{background:#d4f7e7;color:#1a6640;}
#feedback-bar.err{background:#fde8e8;color:#c0392b;}
#success-screen{text-align:center;padding:30px 16px;}
#success-screen h2{font-family:'Fredoka','Baloo 2','Nunito',system-ui,sans-serif;font-size:2rem;color:var(--success);margin:14px 0 8px;}
#success-stars{font-size:2.5rem;letter-spacing:6px;margin:10px 0;}
#success-screen p{color:var(--slate);margin-bottom:20px;}
.success-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
@media(max-width:600px){
  :root{--cell:44px;}
  #title-screen h1{font-size:1.7rem;}
  #game-layout{flex-direction:column;}
  #program-panel{max-width:100%;}
}
</style>
</head>

<a id="pgrg-reset" role="button" tabindex="0" aria-label="Recommencer a zero" onclick="if(confirm(document.documentElement.lang==='en'?'Restart this game from the beginning? (your progress on this game will be erased)':'Recommencer ce jeu depuis le debut ? (ta progression sur ce jeu sera effacee)')){['pgrg_algo_jardin'].forEach(function(k){try{localStorage.removeItem(k)}catch(e){}});location.reload();}" style="position:fixed;right:10px;bottom:10px;z-index:2147483647;background:#0f4c81;color:#fff;font-family:'Nunito',system-ui,sans-serif;font-weight:800;font-size:14px;cursor:pointer;text-decoration:none;padding:10px 14px;border-radius:999px;box-shadow:0 3px 10px rgba(0,0,0,.3);min-height:44px;display:inline-flex;align-items:center;gap:6px">&#8634; Recommencer</a>

<!-- PARENT GATE -->
<div id="gate-screen" class="screen">
  <h2 id="gate-title"></h2>
  <p id="gate-q-label"></p>

    <h3 id="pi-title"></h3>
    <p id="pi-body"></p>
    <button class="btn-back" onclick="closeGate()" id="pi-back"></button>
  </div>
</div>

<!-- LEVEL SELECT -->
<div id="level-select-screen" class="screen">
  <h2 id="ls-title"></h2>
  <div class="level-grid" id="level-grid"></div>
  <br>
  <button class="btn-blue" onclick="goScreen('title-screen')" id="ls-back"></button>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div id="game-header">
    <button class="btn-back" onclick="goScreen('level-select-screen')" id="gh-back"></button>

  </div>
  <div id="goal-banner"></div>
  <div id="legend"></div>

    <div id="garden-wrap">
      <div id="garden"></div>

      <div id="blocks-palette"></div>
      <h3 id="pp-prog-title"></h3>

      <div id="action-bar">
        <button class="btn-go" id="btn-go" onclick="runProgram()"></button>
        <button class="btn-clear" onclick="clearProgram()" id="btn-clear-lbl"></button>
      </div>
      <div id="feedback-bar" role="alert"></div>
    </div>
  </div>
</div>

<!-- SUCCESS -->

  <div id="success-stars"></div>
  <p id="succ-msg"></p>
  <div class="success-btns">
    <button class="btn-back" onclick="replayLevel()" id="succ-replay"></button>
    <button class="btn-play" onclick="nextLevel()" id="succ-next"></button>
    <button class="btn-blue" onclick="goScreen('level-select-screen')" id="succ-menu"></button>
  </div>
</div>

var lang='fr';
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');

var muted=false;
var audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playNote(freq,dur,type,vol){
  if(muted)return;
  try{
    var c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);
    o.start();o.stop(c.currentTime+dur);
  }catch(e){}
}
function sndStep(){playNote(480,.1,'sine',.1);}
function sndWater(){playNote(700,.15,'triangle',.12);setTimeout(function(){playNote(900,.12,'triangle',.08);},110);}
function sndHarvest(){[523,659,784].forEach(function(f,i){setTimeout(function(){playNote(f,.15,'sine',.15);},i*100);});}
function sndSuccess(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playNote(f,.22,'sine',.18);},i*130);});}
function sndError(){playNote(200,.3,'sawtooth',.1);}

var LEVELS=[
  // ---- PHASE 1 : Sequences ----

  // Level 0 - Sequence 1
  // Grid 3x3. Robot at (2,0) facing RIGHT. W at (2,1) and (2,2).
  // Optimal: [Avancer, Arroser, Avancer, Arroser] = 4 blocks
  {
    grid:3,
    cells:[['.','.','.'],['.','.','.'],['.',  'W','W']],
    robot:{r:2,c:0,dir:1},

    blocks:['forward','water'],

  },

  // Level 1 - Sequence 2

  // Optimal: [Avancer,Avancer,Arroser,Droite(now south),Avancer,Arroser,Avancer,Arroser] = not right
  // Simpler: W only at (0,1),(0,2). Robot (0,0) facing right.
  // [Avancer,Arroser,Avancer,Arroser] = 4 blocks... too similar to level 0.
  // Better - L path: W at (0,2),(1,2),(2,2). Robot (0,0) facing right.
  // [Avancer,Avancer,Arroser, TurnRight(now south),Avancer,Arroser,Avancer,Arroser] = 8 blocks
  // Wait - after watering (0,2) we need to go south to (1,2) and (2,2).
  // [Avancer,Avancer, TurnRight, Avancer,Arroser,Avancer,Arroser] = 7 but miss (0,2).
  // Fix: W at (0,1),(0,2),(1,2). Robot (0,0) facing right.
  // [Avancer,Arroser,Avancer,Arroser, TurnRight,Avancer,Arroser] = 7 blocks (par=7)
  {
    grid:3,
    cells:[['.',  'W','W'],['.','.','W'],['.','.','.']],
    robot:{r:0,c:0,dir:1},
    goal:'water',
    blocks:['forward','turn_r','turn_l','water'],
    hint:'feedback_hint1',
    par:7
  },

  // Level 2 - Sequence 3
  // Grid 4x4. Robot at (3,0) facing UP. W at (2,0),(1,0),(0,0),(0,1),(0,2).
  // Winding path: go up 3, turn right, go right 2, water each.
  // [Avancer,Arroser, Avancer,Arroser, Avancer,Arroser, TurnRight,Avancer,Arroser,Avancer,Arroser] = 11 (par=11)
  // But robot starts at (3,0) NOT on a W cell, so first Avancer takes to (2,0).
  {
    grid:4,
    cells:[['W','W','W','.'],['W','.','.','.'],['W','.','.','.'],['.','.','.', '.']],
    robot:{r:3,c:0,dir:0},
    goal:'water',
    blocks:['forward','turn_r','turn_l','water'],
    hint:'feedback_hint1',
    par:11
  },

  // ---- PHASE 2 : Loops ----
  // LOOP SEMANTICS: [A, B, Repeter x N, C, D, E] executes A,B once, then (C,D,E) repeated N times.
  // The loop block repeats ALL blocks that come AFTER it (up to next loop block or end).

  // Level 3 - Boucle 1
  // Grid 4x4. Robot at (3,3) facing LEFT. W at (3,2),(3,1),(3,0).
  // Need: move left + water, 3 times.
  // Optimal: [Repeter x3, Avancer, Arroser] = 3 blocks (loop repeats Avancer+Arroser 3 times)
  {
    grid:4,
    cells:[['.','.','.','.'],['.','.','.','.'],['.','.','.','.'],['W','W','W','.']],
    robot:{r:3,c:3,dir:3},
    goal:'water',
    blocks:['forward','water','loop'],
    hint:'feedback_hint_loop',
    par:3
  },

  // Level 4 - Boucle 2
  // Grid 4x4. Robot at (0,0) facing RIGHT. W at (0,1),(0,2),(0,3) - 3 cells to the right.
  // But robot is ON (0,0) which is empty. Must move then water.
  // Optimal: [Repeter x3, Avancer, Arroser] = 3 blocks
  {
    grid:4,
    cells:[['.',  'W','W','W'],['.','.','.','.'],['.','.','.','.'],['.','.','.', '.']],
    robot:{r:0,c:0,dir:1},
    goal:'water',
    blocks:['forward','water','loop'],
    hint:'feedback_hint_loop',
    par:3
  },

  // Level 5 - Boucle 3
  // Grid 5x5. Robot at (4,0) facing RIGHT. W at (4,0),(4,1),(4,2),(4,3),(4,4) - full bottom row.

  // Optimal: [Arroser, Repeter x4, Avancer, Arroser] = 4 blocks
  {
    grid:5,

  // Level 6 - Condition 1
  // Grid 3x3. Robot at (0,0) facing RIGHT. Row 0 = [F, W, F].
  // Optimal: [Cond, Repeter x2, Avancer, Cond] = 4 blocks
  // Flatten: Cond(0,0)=F harvest, (Avancer,Cond)x2: (0,1)W water, (0,2)F harvest.
  {

  // Optimal program using 2 loops (each loop repeats its own tail):

  {
    grid:5,

    {key:'phase_seq',from:0,to:2},

    for(var i=ph.from;i<=ph.to;i++){
      (function(idx){

        var btn=document.createElement('button');
        btn.className='lvl-btn'+(stars>0?' done':'');
        btn.disabled=!unlocked;
        var starsHtml='';
        for(var s=0;s<stars;s++) starsHtml+='*';
        for(var s=stars;s<3;s++) starsHtml+='o';
        btn.innerHTML='<span class="lvl-icon">'+LEVEL_ICONS[idx]+'</span><span style="text-align:center">'+t('lvl_name')[idx]+'</span><span style="font-size:.78rem;color:var(--slate);text-align:center">'+t('lvl_desc')[idx]+'</span><span class="lvl-stars">'+starsHtml+'</span>';
        if(unlocked) btn.onclick=(function(i2){return function(){startLevel(i2);};})(idx);
        row.appendChild(btn);
      })(i);
    }
    g.appendChild(row);
  });
}

var currentLevel=0;

function startLevel(idx){
  currentLevel=idx;

  gridState=lv.cells.map(function(row){return row.slice();});
  robot={r:lv.robot.r,c:lv.robot.c,dir:lv.robot.dir};
  program=[];
  running=false;
  if(animTimer){clearTimeout(animTimer);animTimer=null;}
  buildPalette(lv.blocks);
  renderProgram();
  renderGrid();
  updateGameHeader();
  setFeedback(t(lv.hint),'');

}

function updateGameHeader(){
  var lv=LEVELS[currentLevel];
  document.getElementById('gh-level').textContent=t('lvl_name')[currentLevel]||'';
  var gmap={water:t('goal_water'),harvest:t('goal_harvest'),mix:t('goal_mix')};
  document.getElementById('goal-banner').textContent=gmap[lv.goal]||'';
  // Legend
  var hasW=lv.cells.some(function(row){return row.some(function(c){return c==='W';});});
  var hasF=lv.cells.some(function(row){return row.some(function(c){return c==='F';});});
  var legEl=document.getElementById('legend');

  var items=[{icon:'[jardinier]',lbl:t('legend_robot')}];

  if(hasF) items.push({icon:'[fleur]',lbl:t('legend_flower')});
  items.push({icon:'[v]',lbl:t('legend_done')});
  items.forEach(function(item){
    var d=document.createElement('span');
    d.className='leg-item';
    d.textContent=item.icon+' '+item.lbl;
    legEl.appendChild(d);
  });
}

// ==================== GRID RENDER ====================
// dir: 0=up, 1=right, 2=down, 3=left
var DIR_CHAR=['^','>','v','<'];
function renderGrid(){
  var lv=LEVELS[currentLevel];
  var N=lv.grid;
  var garden=document.getElementById('garden');
  garden.style.gridTemplateColumns='repeat('+N+',var(--cell))';
  garden.innerHTML='';
  for(var r=0;r<N;r++){
    for(var c=0;c<N;c++){
      var div=document.createElement('div');
      div.className='cell';
      var isBot=(r===robot.r&&c===robot.c);
      var st=gridState[r][c];
      if(isBot){
        div.classList.add('has-robot');
        // Robot emoji + direction arrow
        div.textContent=DIR_CHAR[robot.dir];
        div.style.fontSize='1.6rem';
        div.style.fontWeight='bold';
      } else if(st==='W'){
        div.textContent='💧';
      } else if(st==='F'){
        div.textContent='🌸';
      } else if(st==='DW'){
        div.classList.add('wet');
        div.textContent='✅';
      } else if(st==='DF'){
        div.textContent='🌻';
      }
      garden.appendChild(div);
    }
  }
}

function highlightRobotCell(){
  var lv=LEVELS[currentLevel];
  var N=lv.grid;

  cells.forEach(function(c){c.classList.remove('highlight');});
  var idx=robot.r*N+robot.c;
  if(cells[idx]) cells[idx].classList.add('highlight');

// ==================== PROGRAM ====================
function addBlock(key){
  if(running)return;
  var bd=BLOCK_DEFS[key];
  if(!bd)return;
  var item={key:key};
  if(bd.isLoop)item.count=3;
  program.push(item);
  renderProgram();
  setFeedback('','');
}

function renderProgram(){
  var pl=document.getElementById('program-list');
  pl.innerHTML='';
  if(program.length===0){
    var sp=document.createElement('span');
    sp.style.cssText='color:#aaa;font-size:.85rem;padding:4px;display:block;';
    sp.textContent=t('feedback_hint1');
    pl.appendChild(sp);
    return;
  }
  program.forEach(function(item,idx){
    var bd=BLOCK_DEFS[item.key];
    if(!bd)return;
    var div=document.createElement('div');
    div.className='prog-block'+(item.key==='loop'?' pb-loop':item.key==='cond'?' pb-cond':'');
    div.id='pb-'+idx;

    if(item.key==='loop'){
      var lbl=document.createElement('span');
      lbl.textContent=bd.lbl();
      div.appendChild(lbl);
      var tinp=document.createElement('input');
      tinp.type='number';tinp.className='loop-count';
      tinp.min=1;tinp.max=9;tinp.value=item.count||3;
      tinp.setAttribute('aria-label',t('times'));
      (function(i){
        tinp.oninput=function(){
          var v=parseInt(this.value,10);
          if(!isNaN(v)&&v>=1&&v<=9) program[i].count=v;
        };
        tinp.onchange=function(){
          var v=Math.max(1,Math.min(9,parseInt(this.value,10)||1));
          program[i].count=v;this.value=v;
        };
      })(idx);
      div.appendChild(tinp);
      var tx=document.createElement('span');
      tx.textContent=t('times');tx.style.fontSize='.75rem';
      div.appendChild(tx);
      var hint=document.createElement('span');
      hint.textContent=t('loop_hint');
      hint.style.cssText='font-size:.7rem;font-style:italic;opacity:.7;';
      div.appendChild(hint);
    } else {
      var lbl=document.createElement('span');
      lbl.textContent=bd.lbl();
      div.appendChild(lbl);
    }

    var del=document.createElement('button');
    del.className='del-btn';
    del.textContent='x';
    del.setAttribute('aria-label','Supprimer');
    (function(i){del.onclick=function(){if(!running){program.splice(i,1);renderProgram();}};})(idx);
    div.appendChild(del);
    pl.appendChild(div);
  });
}

function clearProgram(){
  if(running)return;
  program=[];
  renderProgram();
  setFeedback(t(LEVELS[currentLevel].hint),'');
}

  document.getElementById('btn-go').disabled=locked;
  document.getElementById('btn-clear-lbl').disabled=locked;

// ==================== EXECUTION ====================
function setFeedback(msg,cls){
  var fb=document.getElementById('feedback-bar');
  fb.textContent=msg;
  fb.className='';
  if(cls)fb.classList.add(cls);
  document.getElementById('aria-live').textContent=msg;
}

function runProgram(){
  if(running)return;
  if(program.length===0){setFeedback(t('feedback_hint1'),'');return;}
  // Reset grid and robot to initial state
  var lv=LEVELS[currentLevel];
  gridState=lv.cells.map(function(row){return row.slice();});
  robot={r:lv.robot.r,c:lv.robot.c,dir:lv.robot.dir};
  renderGrid();
  setFeedback(t('feedback_run'),'');
  setUILocked(true);
  var instrs=flattenProgram(program);
  execStep(instrs,0);
}

// ==================== FLATTEN PROGRAM ====================
// Rules:
//   1. Instructions before the first loop block execute once.
//   2. Each loop block repeats all instructions between it and the next loop block
//      (or end of program if it's the last loop block) N times.
//   3. Multiple loop blocks are supported; each governs its own "segment".
//
// Example: [A, Loop x3, B, C, Loop x2, D]
//   -> A, (B,C)x3, (D)x2
//
// Example: [Cond, Loop x4, Forward, Cond, TurnRight, Forward, TurnRight, Cond, Loop x4, Forward, Cond]
//   -> Cond, (Forward,Cond)x4, TurnRight, Forward, TurnRight, Cond, (Forward,Cond)x4

function flattenProgram(prog){
  // Find loop block positions
  var loopPositions=[];
  prog.forEach(function(item,i){
    if(item.key==='loop') loopPositions.push(i);
  });

  var out=[];

  if(loopPositions.length===0){
    // No loops: output all non-loop blocks in order
    prog.forEach(function(item){
      if(item.key!=='loop') out.push({key:item.key});
    });
    return out;
  }

  // Output blocks before the first loop
  var firstLoop=loopPositions[0];
  for(var i=0;i<firstLoop;i++){
    out.push({key:prog[i].key});
  }

  // Process each loop segment
  for(var li=0;li<loopPositions.length;li++){
    var loopIdx=loopPositions[li];
    var segEnd=(li+1<loopPositions.length) ? loopPositions[li+1] : prog.length;
    var cnt=Math.max(1,Math.min(99,prog[loopIdx].count||3));

    // Collect body = blocks between this loop and the next one
    var body=[];
    for(var j=loopIdx+1;j<segEnd;j++){
      if(prog[j].key!=='loop') body.push({key:prog[j].key});
    }

    // Repeat body cnt times
    for(var x=0;x<cnt;x++){
      body.forEach(function(b){out.push({key:b.key});});
    }
  }

  return out;
}

// ==================== STEP EXECUTION ====================
function execStep(instrs,idx){
  if(!running){setUILocked(false);return;}
  if(idx>=instrs.length){
    setUILocked(false);
    evalWin();
    return;
  }
  var instr=instrs[idx];
  var crash=doAction(instr.key);
  renderGrid();
  highlightRobotCell();
  if(crash){
    setUILocked(false);
    setFeedback(t('feedback_crash'),'err');
    sndError();
    return;
  }
  animTimer=setTimeout(function(){execStep(instrs,idx+1);},450);
}

function doAction(key){
  var lv=LEVELS[currentLevel];
  var N=lv.grid;
  if(key==='forward'){
    var nr=robot.r,nc=robot.c;
    if(robot.dir===0)nr--;
    else if(robot.dir===1)nc++;
    else if(robot.dir===2)nr++;
    else nc--;
    if(nr<0||nr>=N||nc<0||nc>=N)return true; // out of bounds = crash
    robot.r=nr;robot.c=nc;
    sndStep();
  } else if(key==='turn_r'){
    robot.dir=(robot.dir+1)%4;
    sndStep();
  } else if(key==='turn_l'){
    robot.dir=(robot.dir+3)%4;
    sndStep();
  } else if(key==='water'){
    if(gridState[robot.r][robot.c]==='W'){
      gridState[robot.r][robot.c]='DW';
      sndWater();
    }
  } else if(key==='harvest'){
    if(gridState[robot.r][robot.c]==='F'){
      gridState[robot.r][robot.c]='DF';
      sndHarvest();
    }
  } else if(key==='cond'){
    var st=gridState[robot.r][robot.c];
    if(st==='F'){gridState[robot.r][robot.c]='DF';sndHarvest();}
    else if(st==='W'){gridState[robot.r][robot.c]='DW';sndWater();}
  }
  return false;
}

function evalWin(){
  var lv=LEVELS[currentLevel];
  var total=lv.cells.flat().filter(function(c){return c==='W'||c==='F';}).length;
  var done=gridState.flat().filter(function(c){return c==='DW'||c==='DF';}).length;
  if(done===total){
    setFeedback(t('feedback_ok'),'ok');
    sndSuccess();
    var stars=calcStars();
    saveLevel(currentLevel,stars);
    setTimeout(function(){showSuccess(stars);},700);
  } else {
    setFeedback(t('feedback_not_done'),'err');
    sndError();
  }
}

function calcStars(){
  var lv=LEVELS[currentLevel];
  var par=lv.par||5;
  var len=program.length;
  if(len<=par)return 3;
  if(len<=par+3)return 2;
  return 1;
}

function showSuccess(stars){
  var starsHtml='';
  for(var s=0;s<stars;s++) starsHtml+='★';
  for(var s=stars;s<3;s++) starsHtml+='☆';
  document.getElementById('success-stars').textContent=starsHtml;
  document.getElementById('succ-title').textContent=t('succ_title');
  document.getElementById('succ-msg').textContent=t('succ_msg');
  document.getElementById('succ-replay').textContent=t('succ_replay');
  document.getElementById('succ-next').textContent=t('succ_next');
  document.getElementById('succ-menu').textContent=t('succ_menu');
  document.getElementById('succ-next').style.display=(currentLevel<LEVELS.length-1)?'inline-flex':'none';
  goScreen('success-screen');
}

function replayLevel(){startLevel(currentLevel);}
function nextLevel(){
  if(currentLevel<LEVELS.length-1)startLevel(currentLevel+1);
  else goScreen('level-select-screen');
}

(function(){
  var nl=(navigator.language||'fr').toLowerCase();
  lang=nl.startsWith('en')?'en':'fr';
  setLang(lang);
  goScreen('title-screen');
})();
</script>
